name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp RxClinic.html _site/index.html
          cp manifest.json _site/
          cp sw.js _site/
          cp icon-192.png _site/
          cp icon-512.png _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate version tag
        id: version
        run: |
          DATE=$(TZ='Asia/Bangkok' date +'%Y.%m.%d')
          TAG="v${DATE}-${GITHUB_RUN_NUMBER}"
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "date=$(TZ='Asia/Bangkok' date +'%d/%m/%Y %H:%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Rx-COPD/Asthma Clinic ${{ steps.version.outputs.tag }}"
          body: |
            ## 🚀 อัปเดตอัตโนมัติ — ${{ steps.version.outputs.date }} (ICT)

            ### 🌐 เปิดแอพได้เลยที่
            **https://rxanasmyt.github.io/rx-copdasthma-clinic/**

            ### 📝 Commit ล่าสุด
            ${{ github.event.head_commit.message }}

            ---
            *Deploy โดย GitHub Actions อัตโนมัติ*
          files: RxClinic.html
          make_latest: true
