name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp RxClinic.html _site/index.html
          cp manifest.json _site/
          cp sw.js _site/
          cp icon-192.png _site/
          cp icon-512.png _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Bump version and create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # อ่าน version จากไฟล์ แล้ว increment patch
          CURRENT=$(cat VERSION)
          MAJOR=$(echo $CURRENT | cut -d. -f1)
          MINOR=$(echo $CURRENT | cut -d. -f2)
          PATCH=$(echo $CURRENT | cut -d. -f3)
          NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          TAG="v${NEXT}"

          # บันทึก version ใหม่กลับเข้า repo
          echo $NEXT > VERSION
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add VERSION
          git commit -m "chore: bump version to ${NEXT} [skip ci]"
          git push

          # สร้าง GitHub Release
          gh release create "$TAG" RxClinic.html \
            --title "Rx-COPD/Asthma Clinic ${TAG}" \
            --notes "$(cat <<EOF
          ### 🌐 เปิดแอพได้เลยที่
          **https://rxanasmyt.github.io/rx-copdasthma-clinic/**

          ### 📝 การเปลี่ยนแปลง
          ${{ github.event.head_commit.message }}
          EOF
          )" \
            --latest
