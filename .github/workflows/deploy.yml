name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site files
        run: |
          mkdir -p _site
          cp RxClinic.html _site/index.html
          cp manifest.json _site/
          cp sw.js _site/
          cp icon-192.png _site/
          cp icon-512.png _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Generate version tag
        id: version
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ดึง tag ล่าสุดที่ขึ้นต้นด้วย v (รูปแบบ vX.Y.Z)
          LATEST=$(gh release list --repo ${{ github.repository }} --limit 50 --json tagName \
            | jq -r '.[].tagName' \
            | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sort -V | tail -1)

          if [ -z "$LATEST" ]; then
            NEXT="v1.0.0"
          else
            # แยก major.minor.patch แล้ว increment patch
            MAJOR=$(echo $LATEST | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LATEST | cut -d. -f2)
            PATCH=$(echo $LATEST | cut -d. -f3)
            NEXT="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          echo "tag=${NEXT}" >> $GITHUB_OUTPUT
          echo "date=$(TZ='Asia/Bangkok' date +'%d/%m/%Y %H:%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Rx-COPD/Asthma Clinic ${{ steps.version.outputs.tag }}"
          body: |
            ## 🚀 อัปเดตอัตโนมัติ — ${{ steps.version.outputs.date }} (ICT)

            ### 🌐 เปิดแอพได้เลยที่
            **https://rxanasmyt.github.io/rx-copdasthma-clinic/**

            ### 📝 Commit ล่าสุด
            ${{ github.event.head_commit.message }}

            ---
            *Deploy โดย GitHub Actions อัตโนมัติ*
          files: RxClinic.html
          make_latest: true
