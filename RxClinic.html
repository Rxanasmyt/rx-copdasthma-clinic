            </FormField>
          </Card>

          {/* HA6: Informed Consent */}
          <Card style={{ padding: '14px 18px' }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer' }}>
              <input type="checkbox" checked={f.informedConsent || false}
                onChange={e => set('informedConsent', e.target.checked)}
                style={{ accentColor: C.low, width: 20, height: 20 }} />
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: f.informedConsent ? C.low : C.text }}>
                  ✍️ Informed Consent — ผู้ป่วยรับทราบและยินยอมรับบริบาลเภสัชกรรม
                </div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>
                  HA PSG.6 · ผู้ป่วย/ผู้แทนได้รับข้อมูลครบถ้วน ยินยอมให้ข้อมูลและรับคำแนะนำ
                </div>
              </div>
            </label>
          </Card>
          <Card>
            <FormField label="หัวข้อ Counseling">
              <CheckboxGroup options={AppStore.COUNSELING_TOPICS} selected={f.counselingTopics}
                onChange={v => set('counselingTopics', v)} cols={2} />
            </FormField>
            <div style={row2}>
              <FormField label="วันนัดครั้งถัดไป (Next Visit)">
                <Input type="date" value={f.nextVisit} onChange={v => set('nextVisit', v)} />
              </FormField>
            </div>
            <FormField label="บันทึกเพิ่มเติมของเภสัชกร">
              <Textarea value={f.pharmacistNote} onChange={v => set('pharmacistNote', v)}
                placeholder="บันทึกพิเศษ การนัด Telepharmacy หรือข้อสังเกตอื่นๆ..." rows={2} />
            </FormField>
          </Card>

          {/* Buttons */}
          <div style={{ display: 'flex', gap: 12, justifyContent: 'space-between', alignItems: 'center', margin: '20px 0' }}>
            <div>
              {isEditing && (
                <Btn variant="danger" onClick={() => setConfirmDelete(true)}>🗑️ ลบ Visit นี้</Btn>
              )}
            </div>
            <div style={{ display: 'flex', gap: 10 }}>
              <Btn variant="ghost" onClick={() => navigate('history', patientId)}>ยกเลิก</Btn>
              <Btn variant="primary" size="lg" onClick={() => handleSave(false)} disabled={saving}>
                {saving ? '⏳ กำลังบันทึก...' : (isEditing ? '💾 บันทึกการแก้ไข (⌘+S)' : '💾 บันทึกการบริบาล (⌘+S)')}
              </Btn>
            </div>
          </div>
        </div>

        {/* RIGHT: Sticky panels */}
        <div style={{ position: 'sticky', top: 70, display: 'flex', flexDirection: 'column', gap: 14 }}>
          {/* Risk panel */}
          <Card style={{ border: `2px solid ${riskColor}30`, padding: 16 }}>
            <div style={{ textAlign: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 5 }}>
                ระดับความเสี่ยง (Auto)
              </div>
              <RiskBadge level={f.riskLevel} size="lg" />
            </div>
            {f.riskFlags.length > 0 ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                {f.riskFlags.map((flag, i) => (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'flex-start', gap: 6,
                    fontSize: 11, color: C.text, padding: '4px 8px',
                    background: `${riskColor}08`, borderRadius: 5,
                    borderLeft: `3px solid ${riskColor}`,
                  }}>
                    <span style={{ color: riskColor, flexShrink: 0 }}>⚠</span>
                    <span>{flag}</span>
                  </div>
                ))}
              </div>
            ) : (
              <div style={{ textAlign: 'center', fontSize: 11, color: C.low, padding: '6px 0' }}>✓ ไม่พบปัจจัยเสี่ยง</div>
            )}
            {f.riskLevel === 'High' && (
              <div style={{
                marginTop: 10, padding: '8px 10px', background: C.highBg,
                borderRadius: 6, border: `1px solid ${C.highBorder}`,
                fontSize: 11, color: C.high, fontWeight: 600, textAlign: 'center',
              }}>📞 ควรนัด Telepharmacy ติดตาม</div>
            )}
          </Card>

          {/* Drug Interaction alerts (if any) */}
          {f.medications.length > 0 && (
            <InteractionAlerts medications={f.medications} patient={patient} />
          )}

          {/* Renal Alert (if eGFR set) */}
          {patient.eGFR != null && patient.eGFR !== '' && (
            <RenalAlert patient={patient} medications={f.medications} />
          )}

          {/* GOLD ABE Classifier (COPD patients) */}
          {(['COPD', 'Both'].includes(patient.diagnosis)) && (a.cat?.allAnswered || a.mmrc?.grade != null || f.exacerbation.countThisYear > 0) && (
            <GOLDClassifierCard
              catScore={a.cat?.allAnswered ? a.cat.score : null}
              mmrcGrade={a.mmrc?.grade}
              exYear={f.exacerbation.countThisYear}
              hospitalized={f.exacerbation.hospitalized}
            />
          )}

          {/* GINA Step Recommendation (Asthma patients) */}
          {(['Asthma', 'Both'].includes(patient.diagnosis)) && a.act?.allAnswered && (
            <GINAClassifierCard actScore={a.act.score} exYear={f.exacerbation.countThisYear} />
          )}

          {/* Beers Criteria for elderly */}
          {patient.age >= 65 && f.medications.length > 0 && (
            <BeersAlert patient={patient} medications={f.medications} />
          )}

          {/* HA3: HAM / LASA Alert */}
          {f.medications.length > 0 && (
            <HAMAlert medications={f.medications} />
          )}

          {/* Last visits panel (up to 2) */}
          <LastVisitsPanel visits={previousVisits} currentMeds={f.medications} />
        </div>
      </div>

      {/* Toast */}
      {showToast && (
        <div style={{
          position: 'fixed', bottom: 24, right: 24, padding: '12px 18px',
          background: showToast.type === 'success' ? C.low : C.high,
          color: '#fff', borderRadius: 10, boxShadow: '0 10px 30px rgba(0,0,0,0.18)',
          fontSize: 13, fontWeight: 600, zIndex: 500, maxWidth: 380,
        }}>{showToast.msg}</div>
      )}

      {/* Draft Recovery Prompt */}
      {showDraftPrompt && (
        <Modal open={true} onClose={() => {
          // Decline: clear and use blank
          clearDraft(patientId, isEditing ? editingVisit.id : null);
          setShowDraftPrompt(null);
        }} title="🔄 พบร่างข้อมูลที่ยังไม่ได้บันทึก" width={460}>
          <p style={{ margin: '0 0 8px', fontSize: 13, color: C.text, lineHeight: 1.6 }}>
            พบร่าง Visit ที่บันทึกไว้เมื่อ {showDraftPrompt.ts ? new Date(showDraftPrompt.ts).toLocaleString('th-TH') : 'ไม่ทราบ'}
          </p>
          <p style={{ margin: '0 0 18px', fontSize: 12, color: C.textMuted }}>
            ถ้ากด "กู้คืนร่าง" ข้อมูลที่ยังไม่ได้ส่งจะถูกโหลดมา ถ้ากด "ยกเลิก" ร่างจะถูกลบถาวร
          </p>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn variant="ghost" onClick={() => {
              clearDraft(patientId, isEditing ? editingVisit.id : null);
              setShowDraftPrompt(null);
            }}>ยกเลิกร่าง</Btn>
            <Btn variant="primary" onClick={() => {
              setF(showDraftPrompt.data);
              setPrefillState('used');
              setShowDraftPrompt(null);
              setShowToast({ msg: '✓ กู้คืนร่างสำเร็จ', type: 'success' });
              setTimeout(() => setShowToast(null), 3000);
            }}>กู้คืนร่าง</Btn>
          </div>
        </Modal>
      )}

      {/* Validation Warning Modal */}
      {showValidation && (
        <Modal open={true} onClose={() => setShowValidation(null)}
          title="⚠️ ตรวจสอบข้อมูลก่อนบันทึก" width={500}>
          <p style={{ margin: '0 0 14px', fontSize: 13, color: C.text, lineHeight: 1.6 }}>
            ตรวจพบข้อมูลที่อาจตกหล่น {showValidation.warnings.length} รายการ — ต้องการระบุเพิ่มหรือไม่?
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 18 }}>
            {showValidation.warnings.map((w, i) => (
              <div key={i} style={{
                padding: '10px 12px', borderRadius: 7,
                background: C.mediumBg, border: `1px solid ${C.mediumBorder}`,
              }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: '#92400E', marginBottom: 2 }}>⚠ {w.title}</div>
                <div style={{ fontSize: 12, color: '#92400E', lineHeight: 1.5 }}>{w.detail}</div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn variant="ghost" onClick={() => setShowValidation(null)}>← กลับไปแก้</Btn>
            <Btn variant="primary" onClick={() => {
              setShowValidation(null);
              handleSave(true);
            }}>บันทึกต่อไป</Btn>
          </div>
        </Modal>
      )}

      {/* Delete confirmation */}
      <ConfirmModal open={confirmDelete} onClose={() => setConfirmDelete(false)}
        onConfirm={handleDelete}
        title="ยืนยันการลบ Visit"
        message={`ลบบันทึกการเยี่ยมวันที่ ${editingVisit?.visitDate}? ข้อมูลทั้งหมดของ Visit นี้จะหายและไม่สามารถกู้คืนได้`}
        danger />
    </div>
  );
}

Object.assign(window, { VisitForm });
</script>
<script type="text/babel">
// TelepharmacyReports.jsx — Risk Screening · Telepharmacy · Reports
// Requires: window.* from Shared.jsx, AppStore from store.js

const { useState: trState, useMemo: trMemo } = React;

// ── RiskScreeningView ─────────────────────────────────
function RiskScreeningView({ data, navigate }) {
  const highRisk   = data.patients.filter(p => p.riskLevel === 'High');
  const mediumRisk = data.patients.filter(p => p.riskLevel === 'Medium');
  const lowRisk    = data.patients.filter(p => p.riskLevel === 'Low' || !p.riskLevel);

  const getLastVisit = (id) => {
    const vs = data.visits.filter(v => v.patientId === id).sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    return vs[0] || null;
  };

  const hasPendingTele = (id) =>
    data.telepharmacy.some(t => t.patientId === id && t.status === 'Pending');

  const RiskGroup = ({ title, patients, color, bg, border, icon }) => (
    <Card style={{ marginBottom: 20, border: `1px solid ${border}` }}>
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 14 }}>
        <span style={{ fontSize: 20 }}>{icon}</span>
        <div>
          <h3 style={{ margin: 0, fontSize: 15, fontWeight: 700, color }}>{title}</h3>
          <p style={{ margin: 0, fontSize: 12, color: C.textMuted }}>{patients.length} ราย</p>
        </div>
        <div style={{ marginLeft: 'auto' }}>
          <span style={{
            display: 'inline-block', padding: '4px 14px', borderRadius: 20,
            background: bg, color, fontWeight: 700, fontSize: 14,
          }}>{patients.length}</span>
        </div>
      </div>
      {patients.length === 0 ? (
        <p style={{ color: C.textMuted, fontSize: 13, textAlign: 'center', padding: '12px 0' }}>ไม่มีผู้ป่วยในกลุ่มนี้</p>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {patients.map(p => {
            const lastVisit = getLastVisit(p.id);
            const pending   = hasPendingTele(p.id);
            return (
              <div key={p.id} style={{
                display: 'flex', alignItems: 'flex-start', gap: 14, padding: '12px 14px',
                background: bg, borderRadius: 8, border: `1px solid ${border}`,
              }}>
                <div style={{ flex: 1 }}>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
                    <span style={{ fontWeight: 700, fontSize: 14, color: C.primary }}>
                      {p.prefix}{p.firstName} {p.lastName}
                    </span>
                    <DiagBadge diagnosis={p.diagnosis} />
                    {pending && (
                      <span style={{
                        fontSize: 10, fontWeight: 700, color: '#0369A1', background: '#E0F2FE',
                        padding: '1px 7px', borderRadius: 20,
                      }}>📞 นัดโทรแล้ว</span>
                    )}
                  </div>
                  <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 6 }}>
                    HN: {p.hn} · อายุ {p.age} ปี · {p.phone}
                  </div>
                  <div style={{ display: 'flex', flexWrap: 'wrap', gap: 5 }}>
                    {(p.riskFlags || []).map((f, i) => (
                      <span key={i} style={{
                        fontSize: 11, padding: '2px 8px', borderRadius: 20,
                        background: C.surface, color, border: `1px solid ${border}`,
                      }}>⚠ {f}</span>
                    ))}
                  </div>
                </div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 5, flexShrink: 0, alignItems: 'flex-end' }}>
                  <span style={{ fontSize: 11, color: C.textMuted }}>
                    เยี่ยมล่าสุด: {lastVisit?.visitDate || '—'}
                  </span>
                  <Btn size="sm" variant="ghost" onClick={() => navigate('history', p.id)}>ดูประวัติ</Btn>
                  <Btn size="sm" variant="accent"  onClick={() => navigate('telepharmacy-add', p.id)}>+ นัด Telepharmacy</Btn>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </Card>
  );

  return (
    <div>
      <SectionHeader
        title="คัดกรองความเสี่ยง (Risk Screening)"
        subtitle="ระบบคำนวณอัตโนมัติจากข้อมูลการเยี่ยมล่าสุด"
      />

      {/* Summary row */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 24 }}>
        <StatCard label="High Risk" value={highRisk.length} color={C.high}   icon="🔴" sub="ควรติดตาม Telepharmacy" />
        <StatCard label="Medium Risk" value={mediumRisk.length} color={C.medium} icon="🟡" sub="ติดตามในคลินิกครั้งถัดไป" />
        <StatCard label="Low Risk" value={lowRisk.length} color={C.low}    icon="🟢" sub="ดูแลตามปกติ" />
      </div>

      {/* Criteria box */}
      <Card style={{ marginBottom: 24, background: '#EFF6FF', border: '1px solid #BFDBFE' }}>
        <div style={{ fontSize: 12, fontWeight: 700, color: '#1E40AF', marginBottom: 8 }}>
          เกณฑ์การคัดกรอง HIGH RISK (อย่างน้อย 1 เกณฑ์)
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '4px 16px' }}>
          {[
            'Exacerbation ≥2 ครั้ง/ปี หรือ นอน รพ. อย่างน้อย 1 ครั้ง',
            'Asthma ควบคุมไม่ได้ (Uncontrolled)',
            'COPD GOLD Grade 3–4 (Severe/Very Severe)',
          ].map((c, i) => (
            <div key={i} style={{ fontSize: 12, color: '#1E40AF', display: 'flex', gap: 6, alignItems: 'flex-start' }}>
              <span style={{ color: C.high, flexShrink: 0 }}>●</span> {c}
            </div>
          ))}
        </div>
        <div style={{ marginTop: 6, fontSize: 12, fontWeight: 700, color: '#1E40AF' }}>

        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: '4px 16px', marginTop: 4 }}>
          {[
            'ความร่วมมือในการใช้ยาต่ำ (Poor adherence)',
            'เทคนิคการใช้ยาพ่นไม่ถูกต้อง',
            'มีโรคร่วม ≥3 โรค / ผู้สูงอายุ ≥65 ปี',

            <div key={i} style={{ fontSize: 12, color: '#1E40AF', display: 'flex', gap: 6, alignItems: 'flex-start' }}>

        color={C.medium} bg={C.mediumBg} border={C.mediumBorder} icon="🟡" />
      <RiskGroup title="Low Risk — ดูแลตามปกติ" patients={lowRisk}
        color={C.low} bg={C.lowBg} border={C.lowBorder} icon="🟢" />

}

// ── TelepharmacyView ──────────────────────────────────
function TelepharmacyView({ data, onDataChange, navigate, initPatientId }) {
  const [schedOpen,  setSchedOpen]  = trState(!!initPatientId);
  const [recordOpen, setRecordOpen] = trState(false);
  const [selectedId, setSelectedId] = trState(null);
  const [preselPt,   setPreselPt]   = trState(initPatientId || '');
  const [filterStatus, setFilterStatus] = trState('');

  const getPatient = (pid) => data.patients.find(p => p.id === pid);

  const records = [...data.telepharmacy].sort((a, b) => b.scheduledDate.localeCompare(a.scheduledDate));
  const filtered = filterStatus ? records.filter(r => r.status === filterStatus) : records;

  const pendingCount  = records.filter(r => r.status === 'Pending').length;
  const successCount  = records.filter(r => r.status === 'Success').length;
  const noAnswerCount = records.filter(r => r.status === 'No Answer').length;

  // Schedule form
  const SchedForm = () => {
    const [sf, setSf] = trState({ patientId: preselPt, scheduledDate: '', pharmacistNote: '' });
    const handleSave = () => {
      if (!sf.patientId || !sf.scheduledDate) return;
      const pt = getPatient(sf.patientId);
      const rec = {
        id: AppStore.generateId(), patientId: sf.patientId,
        scheduledDate: sf.scheduledDate, actualDate: null, callTime: null,
        status: 'Pending', symptoms: '', exacerbation: false, rescueUse: '',
        medicationProblems: '', counseling: '', nextFollowup: null,
        pharmacistNote: sf.pharmacistNote,
      };
      const updPt = data.patients.map(p => p.id === sf.patientId
        ? { ...p, nextTelepharmacy: sf.scheduledDate } : p);
      onDataChange({ ...data, telepharmacy: [...data.telepharmacy, rec], patients: updPt });
      setSchedOpen(false);
      setPreselPt('');
    };
    return (
      <div>
        <FormField label="ผู้ป่วย" required>
          <Select value={sf.patientId} onChange={v => setSf(p => ({ ...p, patientId: v }))}
            placeholder="เลือกผู้ป่วย"
            options={data.patients.map(p => ({
              value: p.id,
              label: `${p.prefix}${p.firstName} ${p.lastName} (${p.hn}) — ${p.riskLevel || 'Low'} Risk`,
            }))} />
        </FormField>
        <FormField label="วันที่นัดโทร" required>
          <Input type="date" value={sf.scheduledDate} onChange={v => setSf(p => ({ ...p, scheduledDate: v }))} />
        </FormField>
        <FormField label="บันทึก / วัตถุประสงค์การโทร">
          <Textarea value={sf.pharmacistNote} onChange={v => setSf(p => ({ ...p, pharmacistNote: v }))}
            placeholder="เช่น ติดตามเทคนิคการใช้ยาพ่น..." rows={2} />
        </FormField>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
          <Btn variant="ghost" onClick={() => { setSchedOpen(false); setPreselPt(''); }}>ยกเลิก</Btn>
          <Btn variant="primary" onClick={handleSave}>บันทึกนัด</Btn>
        </div>
      </div>
    );
  };

  // Record call result form
  const RecordForm = () => {
    const rec = data.telepharmacy.find(t => t.id === selectedId);
    if (!rec) return null;
    const pt = getPatient(rec.patientId);
    const today = new Date().toISOString().slice(0, 10);
    const [rf, setRf] = trState({
      actualDate: today, callTime: '', status: 'Success',
      symptoms: rec.symptoms || '', exacerbation: rec.exacerbation || false,
      rescueUse: rec.rescueUse || '', medicationProblems: rec.medicationProblems || '',
      counseling: rec.counseling || '', nextFollowup: rec.nextFollowup || '',
      pharmacistNote: rec.pharmacistNote || '',
    });
    const setR = (k, v) => setRf(p => ({ ...p, [k]: v }));
    const handleSave = () => {
      const updated = data.telepharmacy.map(t => t.id === selectedId ? { ...t, ...rf } : t);
      onDataChange({ ...data, telepharmacy: updated });
      setRecordOpen(false); setSelectedId(null);
    };
    return (
      <div>
        {pt && (
          <div style={{ padding: '10px 14px', background: '#F8FAFC', borderRadius: 8, marginBottom: 16, fontSize: 13 }}>
            <strong>{pt.prefix}{pt.firstName} {pt.lastName}</strong>
            <span style={{ marginLeft: 8, color: C.textMuted }}>HN: {pt.hn} · นัดโทร: {rec.scheduledDate}</span>
            {rec.pharmacistNote && <div style={{ marginTop: 4, color: C.textMuted, fontSize: 12 }}>วัตถุประสงค์: {rec.pharmacistNote}</div>}
          </div>
        )}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
          <FormField label="สถานะการโทร" required>
            <Select value={rf.status} onChange={v => setR('status', v)}
              options={[
                { value: 'Success',   label: 'โทรสำเร็จ' },
                { value: 'No Answer', label: 'ไม่รับสาย' },
                { value: 'Cancelled', label: 'ยกเลิกนัด' },
              ]} />
          </FormField>
          <FormField label="วันที่โทรจริง">
            <Input type="date" value={rf.actualDate} onChange={v => setR('actualDate', v)} />
          </FormField>
          <FormField label="เวลาที่โทร">
            <Input type="time" value={rf.callTime} onChange={v => setR('callTime', v)} />
          </FormField>
        </div>

        {rf.status === 'Success' && (
          <>
            <FormField label="อาการล่าสุด / สิ่งที่ผู้ป่วยรายงาน">
              <Textarea value={rf.symptoms} onChange={v => setR('symptoms', v)}
                placeholder="อาการหอบ เหนื่อย ไอ หรืออื่นๆ..." rows={2} />
            </FormField>
            <div style={{ display: 'flex', gap: 24, marginBottom: 14 }}>
              <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13 }}>
                <input type="checkbox" checked={rf.exacerbation} onChange={e => setR('exacerbation', e.target.checked)}
                  style={{ accentColor: C.high, width: 16, height: 16 }} />
                <span style={{ color: rf.exacerbation ? C.high : C.text, fontWeight: rf.exacerbation ? 600 : 400 }}>
                  มี Exacerbation ในช่วงนี้
                </span>
              </label>
            </div>
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
              <FormField label="การใช้ยา Rescue">
                <Select value={rf.rescueUse} onChange={v => setR('rescueUse', v)} placeholder="เลือก"
                  options={[
                    { value: 'None',         label: 'ไม่ใช้' },
                    { value: 'Occasionally', label: 'นาน ๆ ครั้ง' },
                    { value: 'Frequently',   label: 'บ่อย' },
                    { value: 'Daily',        label: 'ทุกวัน' },
                  ]} />
              </FormField>
              <FormField label="นัดติดตามครั้งถัดไป">
                <Input type="date" value={rf.nextFollowup} onChange={v => setR('nextFollowup', v)} />
              </FormField>
            </div>
            <FormField label="ปัญหาการใช้ยา">
              <Textarea value={rf.medicationProblems} onChange={v => setR('medicationProblems', v)}
                placeholder="ลืมยา ผลข้างเคียง ไม่เข้าใจวิธีใช้..." rows={2} />
            </FormField>
            <FormField label="สิ่งที่แนะนำ / Counseling">
              <Textarea value={rf.counseling} onChange={v => setR('counseling', v)}
                placeholder="คำแนะนำที่ให้ในการโทรครั้งนี้..." rows={2} />
            </FormField>
          </>
        )}
        <FormField label="บันทึกเพิ่มเติม">
          <Textarea value={rf.pharmacistNote} onChange={v => setR('pharmacistNote', v)} rows={2} />
        </FormField>
        <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
          <Btn variant="ghost" onClick={() => { setRecordOpen(false); setSelectedId(null); }}>ยกเลิก</Btn>
          <Btn variant="primary" onClick={handleSave}>บันทึกผลการโทร</Btn>
        </div>
      </div>
    );
  };

  const cols = [
    {
      key: 'patient', label: 'ผู้ป่วย',
      render: r => {
        const pt = getPatient(r.patientId);
        if (!pt) return <span style={{ color: C.textMuted }}>—</span>;
        return (
          <div>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{pt.prefix}{pt.firstName} {pt.lastName}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>{pt.hn}</div>
          </div>
        );
      },
    },
    {
      key: 'risk', label: 'ความเสี่ยง', width: 140,
      render: r => {
        const pt = getPatient(r.patientId);
        return pt ? <RiskBadge level={pt.riskLevel || 'Low'} /> : null;
      },
    },
    { key: 'scheduledDate', label: 'วันนัดโทร', width: 120 },
    {
      key: 'actualDate', label: 'โทรจริง', width: 140,
      render: r => r.actualDate ? `${r.actualDate} ${r.callTime || ''}` : <span style={{ color: C.textMuted }}>—</span>,
    },
    {
      key: 'status', label: 'สถานะ', width: 120,
      render: r => <StatusBadge status={r.status} />,
    },
    {
      key: 'note', label: 'บันทึก',
      render: r => <span style={{ fontSize: 12, color: C.textMuted }}>{r.pharmacistNote || r.symptoms || '—'}</span>,
    },
    {
      key: 'actions', label: '', width: 100, align: 'right',
      render: r => (
        <div style={{ display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
          {r.status === 'Pending' && (
            <Btn size="sm" variant="primary" onClick={() => { setSelectedId(r.id); setRecordOpen(true); }}>บันทึกผล</Btn>
          )}
          {r.status !== 'Pending' && (
            <Btn size="sm" variant="ghost" onClick={() => { setSelectedId(r.id); setRecordOpen(true); }}>แก้ไข</Btn>
          )}
        </div>
      ),
    },
  ];

  return (
    <div>
      <SectionHeader
        title="Telepharmacy"
        subtitle="ติดตามการใช้ยาผ่านโทรศัพท์สำหรับผู้ป่วยความเสี่ยงสูง"
        action={<Btn variant="primary" onClick={() => setSchedOpen(true)}>+ นัด Telepharmacy</Btn>}
      />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 20 }}>
        <StatCard label="รอโทร (Pending)" value={pendingCount}  color="#0369A1" icon="📋" />
        <StatCard label="โทรสำเร็จ"       value={successCount}  color={C.low}   icon="✅" />
        <StatCard label="ไม่รับสาย"        value={noAnswerCount} color={C.medium} icon="📵" />
      </div>

      <Card padding={0}>
        <div style={{ padding: '14px 20px', borderBottom: `1px solid ${C.border}`, display: 'flex', gap: 12, alignItems: 'center' }}>
          <span style={{ fontSize: 13, fontWeight: 600, color: C.text }}>รายการทั้งหมด</span>
          <Select value={filterStatus} onChange={setFilterStatus} placeholder="ทุกสถานะ"
            options={[
              { value: 'Pending',    label: 'รอโทร' },
              { value: 'Success',    label: 'โทรสำเร็จ' },
              { value: 'No Answer',  label: 'ไม่รับสาย' },
              { value: 'Cancelled',  label: 'ยกเลิก' },
            ]} style={{ width: 180 }} />
        </div>
        <Table cols={cols} rows={filtered} emptyIcon="📞"
          emptyTitle="ยังไม่มีบันทึก Telepharmacy"
          emptySubtitle="กดปุ่ม '+ นัด Telepharmacy' เพื่อเพิ่มการนัดหมาย" />
      </Card>

      <Modal open={schedOpen} onClose={() => { setSchedOpen(false); setPreselPt(''); }} title="นัด Telepharmacy" width={480}>
        <SchedForm />
      </Modal>
      <Modal open={recordOpen} onClose={() => { setRecordOpen(false); setSelectedId(null); }} title="บันทึกผลการโทร" width={580}>
        <RecordForm />
      </Modal>
    </div>
  );
}

// ── ReportsView ───────────────────────────────────────
function ReportsView({ data, navigate }) {
  const pts = data.patients;
  const vis = data.visits;
  const tel = data.telepharmacy;

  const byDx = {
    COPD:   pts.filter(p => p.diagnosis === 'COPD').length,
    Asthma: pts.filter(p => p.diagnosis === 'Asthma').length,
    Both:   pts.filter(p => p.diagnosis === 'Both').length,
  };
  const byRisk = {
    High:   pts.filter(p => p.riskLevel === 'High').length,
    Medium: pts.filter(p => p.riskLevel === 'Medium').length,
    Low:    pts.filter(p => !p.riskLevel || p.riskLevel === 'Low').length,
  };
  const byGold = { '1': 0, '2': 0, '3': 0, '4': 0 };
  pts.filter(p => p.goldGrade).forEach(p => { byGold[p.goldGrade] = (byGold[p.goldGrade] || 0) + 1; });
  const byAsthma = { Controlled: 0, Partly: 0, Uncontrolled: 0 };
  pts.filter(p => p.asthmaControl).forEach(p => { byAsthma[p.asthmaControl] = (byAsthma[p.asthmaControl] || 0) + 1; });

  const totalEx = vis.reduce((s, v) => s + (v.exacerbation?.countThisYear || 0), 0);
  const hospCount = vis.filter(v => v.exacerbation?.hospitalized).length;
  const poorAdh  = vis.filter(v => v.adherence?.level === 'Poor').length;
  const poorTech = vis.filter(v => (v.inhalerTechnique || []).some(t => t.overallScore === 'Poor')).length;
  const teleSuccess = tel.filter(t => t.status === 'Success').length;
  const teleTotal   = tel.filter(t => t.status !== 'Pending').length;
  const teleRate    = teleTotal > 0 ? Math.round(teleSuccess / teleTotal * 100) : 0;

  const Bar = ({ label, value, max, color, bg }) => (
    <div style={{ marginBottom: 10 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, fontSize: 12 }}>
        <span style={{ color: C.text }}>{label}</span>
        <span style={{ fontWeight: 700, color }}>{value} ราย</span>
      </div>
      <div style={{ background: '#F1F5F9', borderRadius: 20, height: 8, overflow: 'hidden' }}>
        <div style={{
          width: `${max > 0 ? (value / max) * 100 : 0}%`, height: '100%',
          background: color, borderRadius: 20, transition: 'width 0.5s',
        }} />
      </div>
    </div>
  );

  const maxDx   = Math.max(...Object.values(byDx), 1);
  const maxRisk = Math.max(...Object.values(byRisk), 1);
  const maxGold = Math.max(...Object.values(byGold), 1);

  return (
    <div>
      <SectionHeader title="รายงานสรุป" subtitle={`ข้อมูล ณ วันที่ ${new Date().toLocaleDateString('th-TH')}`} />

      {/* Top stats */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 24 }}>
        <StatCard label="ผู้ป่วยทั้งหมด"     value={pts.length}   icon="👥" />
        <StatCard label="บันทึกการเยี่ยม"     value={vis.length}   icon="📋" color="#0369A1" />
        <StatCard label="Telepharmacy"         value={tel.length}   icon="📞" color="#7C3AED" />
        <StatCard label="High Risk"            value={byRisk.High}  icon="🔴" color={C.high} />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
        {/* Diagnosis */}
        <Card>
          <h4 style={{ margin: '0 0 16px', fontSize: 13, fontWeight: 700, color: C.primary }}>การวินิจฉัย (Diagnosis)</h4>
          <Bar label="COPD"         value={byDx.COPD}   max={maxDx} color="#0369A1" />
          <Bar label="Asthma"       value={byDx.Asthma} max={maxDx} color="#7C3AED" />
          <Bar label="COPD + Asthma" value={byDx.Both}   max={maxDx} color="#0F766E" />
        </Card>

        {/* Risk */}
        <Card>
          <h4 style={{ margin: '0 0 16px', fontSize: 13, fontWeight: 700, color: C.primary }}>ระดับความเสี่ยง (Risk Level)</h4>
          <Bar label="High Risk"   value={byRisk.High}   max={maxRisk} color={C.high} />
          <Bar label="Medium Risk" value={byRisk.Medium} max={maxRisk} color={C.medium} />
          <Bar label="Low Risk"    value={byRisk.Low}    max={maxRisk} color={C.low} />
        </Card>

        {/* COPD GOLD */}
        <Card>
          <h4 style={{ margin: '0 0 16px', fontSize: 13, fontWeight: 700, color: C.primary }}>COPD — GOLD Grade</h4>
          {['1','2','3','4'].map(g => (
            <Bar key={g} label={`GOLD ${g}`} value={byGold[g]} max={maxGold} color="#0369A1" />
          ))}
        </Card>

        {/* Asthma control */}
        <Card>
          <h4 style={{ margin: '0 0 16px', fontSize: 13, fontWeight: 700, color: C.primary }}>Asthma Control Level</h4>
          <Bar label="Controlled"     value={byAsthma.Controlled}   max={Math.max(...Object.values(byAsthma), 1)} color={C.low} />
          <Bar label="Partly Controlled" value={byAsthma.Partly}    max={Math.max(...Object.values(byAsthma), 1)} color={C.medium} />
          <Bar label="Uncontrolled"   value={byAsthma.Uncontrolled} max={Math.max(...Object.values(byAsthma), 1)} color={C.high} />
        </Card>
      </div>

      {/* Clinical outcomes */}
      <Card>
        <h4 style={{ margin: '0 0 16px', fontSize: 13, fontWeight: 700, color: C.primary }}>ผลลัพธ์ทางคลินิก (Clinical Outcomes)</h4>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 14 }}>
          {[
            { label: 'Exacerbation รวม', value: totalEx, unit: 'ครั้ง', color: C.high },
            { label: 'นอน รพ. (Hospitalization)', value: hospCount, unit: 'ครั้ง', color: C.high },
            { label: 'Adherence ต่ำ', value: poorAdh, unit: 'ราย', color: C.medium },
            { label: 'เทคนิคพ่นยาไม่ดี', value: poorTech, unit: 'ราย', color: C.medium },
            { label: 'Tele อัตราสำเร็จ', value: `${teleRate}%`, unit: `(${teleSuccess}/${teleTotal})`, color: C.low },
          ].map(({ label, value, unit, color }) => (
            <div key={label} style={{
              textAlign: 'center', padding: '14px 10px', background: `${color}08`,
              borderRadius: 8, border: `1px solid ${color}20`,
            }}>
              <div style={{ fontSize: 28, fontWeight: 800, color }}>{value}</div>
              <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{unit}</div>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.text, marginTop: 4 }}>{label}</div>
            </div>
          ))}
        </div>
      </Card>
      {/* Export Section */}
      <ExportSection data={data} />
    </div>
  );
}

Object.assign(window, { RiskScreeningView, TelepharmacyView, ReportsView });
</script>
<script type="text/babel">
// QuickSearch.jsx — Cmd/Ctrl+K Quick Patient Lookup
// Global search overlay: type HN or name → arrow keys → Enter to jump to visit form
// Requires: window.* from Shared.jsx

const { useState: qsState, useEffect: qsEffect, useRef: qsRef } = React;

function QuickSearch({ data, navigate, isOpen, onClose }) {
  const [query, setQuery] = qsState('');
  const [hovered, setHovered] = qsState(0);
  const inputRef = qsRef(null);

  // Reset on open
  qsEffect(() => {
    if (isOpen) {
      setQuery(''); setHovered(0);
      setTimeout(() => inputRef.current?.focus(), 50);
    }
  }, [isOpen]);

  // Filter patients
  const q = query.trim().toLowerCase();
  const results = !q ? data.patients.slice(0, 8) : data.patients.filter(p => {
    const hay = `${p.hn} ${p.firstName} ${p.lastName}`.toLowerCase();
    return hay.includes(q);
  }).slice(0, 10);

  // Get last visit info per patient
  const getLastVisit = (id) => {
    const v = data.visits.filter(x => x.patientId === id)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    return v[0] || null;
  };
  const daysAgo = (d) => d ? Math.floor((Date.now() - new Date(d).getTime()) / 86400000) : null;

  // Keyboard nav
  qsEffect(() => {
    if (!isOpen) return;
    const handler = (e) => {
      if (e.key === 'Escape') { onClose(); }
      else if (e.key === 'ArrowDown') { e.preventDefault(); setHovered(h => Math.min(h + 1, results.length - 1)); }
      else if (e.key === 'ArrowUp')   { e.preventDefault(); setHovered(h => Math.max(h - 1, 0)); }
      else if (e.key === 'Enter') {
        e.preventDefault();
        const pt = results[hovered];
        if (pt) {
          navigate('visit-form', pt.id);
          onClose();
        }
      }
    };
    document.addEventListener('keydown', handler);
    return () => document.removeEventListener('keydown', handler);
  }, [isOpen, results, hovered, navigate, onClose]);

  // Reset hover when query changes
  qsEffect(() => { setHovered(0); }, [query]);

  if (!isOpen) return null;

  return (
    <div onClick={onClose} style={{
      position: 'fixed', inset: 0, background: 'rgba(11,29,69,0.55)',
      backdropFilter: 'blur(4px)', zIndex: 1500,
      display: 'flex', alignItems: 'flex-start', justifyContent: 'center',
      paddingTop: '12vh',
    }}>
      <div onClick={e => e.stopPropagation()} style={{
        background: '#FFFFFF', borderRadius: 12, width: '90%', maxWidth: 600,
        boxShadow: '0 25px 80px rgba(11,29,69,0.4)', overflow: 'hidden',
      }}>
        {/* Search input */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 12,
          padding: '14px 18px', borderBottom: `1px solid ${C.border}`,
        }}>
          <span style={{ fontSize: 20, color: C.textMuted }}>🔍</span>
          <input ref={inputRef} value={query} onChange={e => setQuery(e.target.value)}
            placeholder="พิมพ์ HN, ชื่อ, หรือนามสกุล..."
            style={{
              flex: 1, padding: '6px 0', border: 'none', outline: 'none',
              fontSize: 15, fontFamily: 'Sarabun, sans-serif', color: C.text,
            }} />
          <span style={{
            fontSize: 10, fontWeight: 600, color: C.textMuted,
            padding: '3px 8px', borderRadius: 5, border: `1px solid ${C.border}`,
            background: '#F8FAFC',
          }}>ESC</span>
        </div>

        {/* Results */}
        <div style={{ maxHeight: 420, overflowY: 'auto' }}>
          {results.length === 0 ? (
            <div style={{ padding: 40, textAlign: 'center', color: C.textMuted }}>
              <div style={{ fontSize: 36, marginBottom: 8 }}>🔎</div>
              <div style={{ fontSize: 14, fontWeight: 600 }}>ไม่พบผู้ป่วย</div>
              <div style={{ fontSize: 12, marginTop: 4 }}>ลองค้นหาด้วยคำอื่น</div>
            </div>
          ) : (
            results.map((p, i) => {
              const lv = getLastVisit(p.id);
              const da = daysAgo(lv?.visitDate);
              const isHover = i === hovered;
              return (
                <button key={p.id}
                  onClick={() => { navigate('visit-form', p.id); onClose(); }}
                  onMouseEnter={() => setHovered(i)}
                  style={{
                    display: 'flex', alignItems: 'center', gap: 14, width: '100%',
                    padding: '12px 18px', border: 'none', cursor: 'pointer',
                    background: isHover ? '#EFF6FF' : 'transparent',
                    textAlign: 'left', fontFamily: 'Sarabun, sans-serif',
                    borderLeft: `3px solid ${isHover ? C.primary : 'transparent'}`,
                    transition: 'all 0.1s',
                  }}>
                  <div style={{
                    width: 38, height: 38, borderRadius: '50%',
                    background: p.riskLevel === 'High' ? C.high : p.riskLevel === 'Medium' ? C.medium : C.primary,
                    color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 14, fontWeight: 700, flexShrink: 0,
                  }}>{p.firstName.charAt(0)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <span style={{ fontWeight: 700, fontSize: 14, color: C.text }}>
                        {p.prefix}{p.firstName} {p.lastName}
                      </span>
                      <DiagBadge diagnosis={p.diagnosis} />
                    </div>
                    <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>
                      HN: <span style={{ fontFamily: 'monospace', fontWeight: 600 }}>{p.hn}</span>
                      <span style={{ margin: '0 6px' }}>·</span>
                      อายุ {p.age} ปี
                      {lv && (
                        <>
                          <span style={{ margin: '0 6px' }}>·</span>
                          <span style={{ color: da > 90 ? C.high : da > 30 ? C.medium : C.low, fontWeight: 600 }}>
                            เยี่ยมล่าสุด {da} วันก่อน
                          </span>
                        </>
                      )}
                      {!lv && (
                        <>
                          <span style={{ margin: '0 6px' }}>·</span>
                          <span style={{ color: '#0369A1', fontWeight: 600 }}>ผู้ป่วยใหม่</span>
                        </>
                      )}
                    </div>
                  </div>
                  <RiskBadge level={p.riskLevel || 'Low'} />
                  <span style={{
                    fontSize: 10, color: isHover ? C.primary : C.textMuted,
                    fontWeight: 600, padding: '3px 8px', borderRadius: 5,
                    border: `1px solid ${isHover ? '#BFDBFE' : C.border}`,
                    background: isHover ? '#fff' : '#F8FAFC', flexShrink: 0,
                  }}>↵ บันทึก</span>
                </button>
              );
            })
          )}
        </div>

        {/* Footer */}
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          padding: '8px 18px', borderTop: `1px solid ${C.border}`,
          background: '#F8FAFC', fontSize: 11, color: C.textMuted,
        }}>
          <div style={{ display: 'flex', gap: 14 }}>
            <span><kbd style={kbdStyle}>↑</kbd> <kbd style={kbdStyle}>↓</kbd> เลื่อน</span>
            <span><kbd style={kbdStyle}>↵</kbd> ไปที่บันทึก</span>
            <span><kbd style={kbdStyle}>ESC</kbd> ปิด</span>
          </div>
          <span>{results.length} ราย</span>
        </div>
      </div>
    </div>
  );
}

const kbdStyle = {
  display: 'inline-block', padding: '1px 6px', borderRadius: 4,
  border: '1px solid #CBD5E1', background: '#fff', fontFamily: 'monospace',
  fontSize: 10, color: '#475569', fontWeight: 600,
};

Object.assign(window, { QuickSearch });
</script>
<script type="text/babel">
// Analytics.jsx — KPIs, Charts, Advanced Analytics
const { useState, useEffect, useMemo } = React;

// ============ Helper: Calculate KPIs ============
const calculateKPIs = (data) => {
  const today = new Date().toISOString().slice(0, 10);
  const thisWeekStart = new Date();
  thisWeekStart.setDate(thisWeekStart.getDate() - thisWeekStart.getDay());
  const weekStartStr = thisWeekStart.toISOString().slice(0, 10);

  const allVisits = data.visits || [];
  const recentVisits = allVisits.filter(v => v.visitDate >= weekStartStr);

  // Adherence average
  const adherenceScores = allVisits.filter(v => v.adherence?.selfScore != null).map(v => v.adherence.selfScore);
  const avgAdherence = adherenceScores.length > 0
    ? (adherenceScores.reduce((a, b) => a + b, 0) / adherenceScores.length).toFixed(1)
    : '—';

  // Exacerbation rate (per 100 patient-years, simplified as count / total patients)
  const exacerbCount = allVisits.reduce((sum, v) => sum + (v.exacerbation?.countThisYear || 0), 0);
  const exacerbRate = data.patients.length > 0
    ? (exacerbCount / data.patients.length).toFixed(2)
    : '0';

  // DRP resolution rate
  const visitsWithDRP = allVisits.filter(v => v.drp?.noDRP === false);
  const drpResolved = visitsWithDRP.filter(v => v.drp?.resolved === true).length;
  const drpResolutionRate = visitsWithDRP.length > 0
    ? ((drpResolved / visitsWithDRP.length) * 100).toFixed(0)
    : '—';

  // Pharmacist workload (this week)
  const workloadMap = {};
  recentVisits.forEach(v => {
    workloadMap[v.pharmacist] = (workloadMap[v.pharmacist] || 0) + 1;
  });

  return { avgAdherence, exacerbRate, drpResolutionRate, workloadMap, recentVisits };
};

// ============ MetricCard Component ============
const MetricCard = ({ icon, label, value, subtitle, color = C.primary }) => (
  <div style={{
    background: '#fff', borderRadius: 10, padding: '16px 20px', border: `1px solid ${C.border}`,
    display: 'flex', flexDirection: 'column', gap: 6,
  }}>
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <span style={{ fontSize: 24 }}>{icon}</span>
      <span style={{ fontSize: 12, fontWeight: 600, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.03em' }}>{label}</span>
    </div>
    <div style={{ fontSize: 32, fontWeight: 700, color, lineHeight: 1 }}>{value}</div>
    {subtitle && <div style={{ fontSize: 12, color: C.textMuted }}>{subtitle}</div>}
  </div>
);

// ============ Weekly Calendar (นัดทั้งสัปดาห์) ============
const WeeklyCalendar = ({ data }) => {
  const week = useMemo(() => {
    const today = new Date();
    const dayOfWeek = today.getDay();
    const startOfWeek = new Date(today);
    startOfWeek.setDate(today.getDate() - dayOfWeek);
    return Array.from({ length: 7 }, (_, i) => {
      const d = new Date(startOfWeek);
      d.setDate(startOfWeek.getDate() + i);
      return d.toISOString().slice(0, 10);
    });
  }, []);

  const todayStr = new Date().toISOString().slice(0, 10);
  const dayLabels = ['อา', 'จ', 'อ', 'พ', 'พฤ', 'ศ', 'ส'];

  const appointmentsMap = useMemo(() => {
    const map = {};
    (data.telepharmacy || []).forEach(t => {
      if (t.scheduledDate && week.includes(t.scheduledDate)) {
        if (!map[t.scheduledDate]) map[t.scheduledDate] = [];
        map[t.scheduledDate].push(t);
      }
    });
    return map;
  }, [data, week]);

  return (
    <Card>
      <h3 style={{ margin: '0 0 14px', fontSize: 16, fontWeight: 700 }}>📅 ปฏิทินสัปดาห์นี้</h3>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(7, 1fr)', gap: 8 }}>
        {week.map((dateStr, i) => {
          const appts = appointmentsMap[dateStr] || [];
          const isToday = dateStr === todayStr;
          const dayNum = dateStr.slice(8, 10);
          return (
            <div key={dateStr} style={{
              padding: 10, borderRadius: 8,
              background: isToday ? C.primaryBg : '#F8FAFC',
              border: `1px solid ${isToday ? C.primary : C.border}`,
              textAlign: 'center',
            }}>
              <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, marginBottom: 4 }}>{dayLabels[i]}</div>
              <div style={{ fontSize: 18, fontWeight: 700, color: isToday ? C.primary : C.text, marginBottom: 6 }}>{dayNum}</div>
              {appts.length > 0 ? (
                <div style={{ fontSize: 10, fontWeight: 600, color: C.accent, background: C.accentBg, borderRadius: 4, padding: '2px 4px' }}>
                  {appts.length} นัด
                </div>
              ) : (
                <div style={{ fontSize: 10, color: C.textMuted }}>—</div>
              )}
            </div>
          );
        })}
      </div>
    </Card>
  );
};

// ============ Pharmacist Workload ============
const PharmacistWorkload = ({ workloadMap }) => {
  const entries = Object.entries(workloadMap).sort((a, b) => b[1] - a[1]);
  return (
    <Card>
      <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>👥 ภาระงานเภสัชกร (สัปดาห์นี้)</h3>
      {entries.length === 0 ? (
        <EmptyState icon="📊" title="ยังไม่มี Visit สัปดาห์นี้" />
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {entries.map(([name, count]) => (
            <div key={name} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{ flex: 1, fontSize: 14, fontWeight: 600 }}>{name}</div>
              <div style={{ fontSize: 20, fontWeight: 700, color: C.primary }}>{count}</div>
              <div style={{ fontSize: 12, color: C.textMuted }}>visits</div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
};

// ============ DRP Patterns (ยาไหนเจอบ่อย) ============
const DRPPatterns = ({ data }) => {
  const drpCounts = useMemo(() => {
    const map = {};
    (data.visits || []).forEach(v => {
      if (v.drp?.noDRP === false && v.drp?.items) {
        v.drp.items.forEach(item => {
          map[item] = (map[item] || 0) + 1;
        });
      }
    });
    return Object.entries(map).sort((a, b) => b[1] - a[1]).slice(0, 5);
  }, [data]);

  return (
    <Card>
      <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>⚠️ DRP Patterns (Top 5)</h3>
      {drpCounts.length === 0 ? (
        <EmptyState icon="✅" title="ไม่มี DRP ในระบบ" />
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {drpCounts.map(([drp, count], i) => (
            <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
              <div style={{
                minWidth: 24, height: 24, borderRadius: '50%', background: C.highBg, color: C.high,
                display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, fontWeight: 700,
              }}>{i + 1}</div>
              <div style={{ flex: 1, fontSize: 13 }}>{drp}</div>
              <div style={{ fontSize: 16, fontWeight: 700, color: C.high }}>{count}</div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
};

// ============ Outcome Tracking (Before/After) ============
const OutcomeTracking = ({ data }) => {
  const outcomes = useMemo(() => {
    const patients = data.patients || [];
    const catImprovement = [];
    const exacerbReduction = [];

    patients.forEach(p => {
      const visits = (data.visits || []).filter(v => v.patientId === p.id).sort((a, b) => a.visitDate.localeCompare(b.visitDate));
      if (visits.length >= 2) {
        const first = visits[0];
        const last = visits[visits.length - 1];
        if (first.cat?.score != null && last.cat?.score != null) {
          catImprovement.push({ hn: p.hn, before: first.cat.score, after: last.cat.score, delta: first.cat.score - last.cat.score });
        }
        const firstExacerb = first.exacerbation?.countThisYear || 0;
        const lastExacerb = last.exacerbation?.countThisYear || 0;
        if (firstExacerb > 0 || lastExacerb > 0) {
          exacerbReduction.push({ hn: p.hn, before: firstExacerb, after: lastExacerb, delta: firstExacerb - lastExacerb });
        }
      }
    });

    const avgCATDelta = catImprovement.length > 0
      ? (catImprovement.reduce((sum, x) => sum + x.delta, 0) / catImprovement.length).toFixed(1)
      : '—';
    const avgExacerbDelta = exacerbReduction.length > 0
      ? (exacerbReduction.reduce((sum, x) => sum + x.delta, 0) / exacerbReduction.length).toFixed(1)
      : '—';

    return { catImprovement: catImprovement.slice(0, 5), exacerbReduction: exacerbReduction.slice(0, 5), avgCATDelta, avgExacerbDelta };
  }, [data]);

  return (
    <Card>
      <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>📊 Outcome Tracking</h3>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16, marginBottom: 16 }}>
        <MetricCard icon="📉" label="CAT Δ (เฉลี่ย)" value={outcomes.avgCATDelta} subtitle="คะแนนลดลง = ดีขึ้น" color={C.low} />
        <MetricCard icon="🚑" label="Exacerbation Δ" value={outcomes.avgExacerbDelta} subtitle="ลดลง = ดีขึ้น" color={C.low} />
      </div>
      <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8 }}>ตัวอย่าง CAT Improvement (Top 5):</div>
      {outcomes.catImprovement.length === 0 ? (
        <div style={{ fontSize: 12, color: C.textMuted }}>ยังไม่มีข้อมูล (ต้องมี ≥2 visits พร้อม CAT)</div>
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {outcomes.catImprovement.map((o, i) => (
            <div key={i} style={{ display: 'flex', gap: 8, fontSize: 12 }}>
              <span style={{ fontWeight: 600, color: C.primary }}>{o.hn}</span>
              <span>{o.before} → {o.after}</span>
              <span style={{ color: o.delta > 0 ? C.low : C.high, fontWeight: 600 }}>({o.delta > 0 ? '-' : '+'}{Math.abs(o.delta)})</span>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
};

// ============ Technique Mastery Curve ============
const TechniqueMasteryCurve = ({ data }) => {
  const mastery = useMemo(() => {
    const patients = data.patients || [];
    const results = [];
    
    patients.forEach(p => {
      const visits = (data.visits || [])
        .filter(v => v.patientId === p.id && v.inhalerTechnique && v.inhalerTechnique.length > 0)
        .sort((a, b) => a.visitDate.localeCompare(b.visitDate));
      
      if (visits.length >= 2) {
        const scores = visits.map(v => {
          const techniques = v.inhalerTechnique || [];
          if (techniques.length === 0) return null;
          const avg = techniques.reduce((sum, t) => sum + t.overallScore, 0) / techniques.length;
          return avg;
        }).filter(s => s != null);
        
        if (scores.length >= 2) {
          results.push({
            hn: p.hn,
            firstName: p.firstName,
            visitCount: scores.length,
            firstScore: scores[0],
            lastScore: scores[scores.length - 1],
            improvement: scores[scores.length - 1] - scores[0],
          });
        }
      }
    });
    
    return results.sort((a, b) => b.improvement - a.improvement).slice(0, 10);
  }, [data]);

  return (
    <Card>
      <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>📈 Technique Mastery Curve (Top 10)</h3>
      {mastery.length === 0 ? (
        <EmptyState icon="📊" title="ยังไม่มีข้อมูล" subtitle="ต้องมี ≥2 visits พร้อมประเมินเทคนิค" />
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {mastery.map((m, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 12, padding: '8px 12px',
              background: m.improvement >= 2 ? '#F0FDF4' : '#F8FAFC',
              borderRadius: 8, border: `1px solid ${m.improvement >= 2 ? C.lowBorder : C.border}`,
            }}>
              <div style={{
                minWidth: 28, height: 28, borderRadius: '50%',
                background: m.improvement >= 2 ? C.low : C.primary,
                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 12, fontWeight: 700,
              }}>{i + 1}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{m.hn} {m.firstName}</div>
                <div style={{ fontSize: 11, color: C.textMuted }}>{m.visitCount} visits</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: C.textMuted }}>
                  {m.firstScore.toFixed(1)} → {m.lastScore.toFixed(1)}
                </div>
                <div style={{
                  fontSize: 14, fontWeight: 700,
                  color: m.improvement >= 2 ? C.low : m.improvement >= 1 ? C.accent : C.textMuted,
                }}>
                  {m.improvement >= 0 ? '+' : ''}{m.improvement.toFixed(1)}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
};

// ============ Main: Full Analytics Dashboard ============
const KPIsDashboard = ({ data }) => {
  const kpis = useMemo(() => calculateKPIs(data), [data]);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Metrics Cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 16 }}>
        <MetricCard icon="💊" label="Adherence เฉลี่ย" value={kpis.avgAdherence} subtitle="คะแนนจาก 0-10" color={C.primary} />
        <MetricCard icon="🚑" label="Exacerbation Rate" value={kpis.exacerbRate} subtitle="ครั้ง / ผู้ป่วย / ปี" color={C.high} />
        <MetricCard icon="✅" label="DRP Resolution" value={kpis.drpResolutionRate === '—' ? '—' : `${kpis.drpResolutionRate}%`} subtitle="แก้ไขได้ / ทั้งหมด" color={C.low} />
      </div>

      {/* Weekly Calendar */}
      <WeeklyCalendar data={data} />

      {/* Pharmacist Workload */}
      <PharmacistWorkload workloadMap={kpis.workloadMap} />
    </div>
  );
};


// ============ QUALITY KPIs COMPONENT ============
// 6 ตัวชี้วัดคุณภาพคลินิก COPD/Asthma (HA Accreditation KPIs)

const calculateQualityKPIs = (data, startDate, endDate) => {
  const allVisits = data.visits || [];
  const patients  = data.patients || [];

  // วิสิตในช่วงเวลา
  const periodVisits = allVisits.filter(v =>
    v.visitDate && v.visitDate >= startDate && v.visitDate <= endDate
  );

  // latest visit ต่อผู้ป่วย (ใช้ทั้งหมด ไม่จำกัดช่วง)
  const latestVisit = {};
  allVisits.forEach(v => {
    if (!latestVisit[v.patientId] || v.visitDate > latestVisit[v.patientId].visitDate)
      latestVisit[v.patientId] = v;
  });

  const copdPts   = patients.filter(p => p.diagnosis === 'COPD' || p.diagnosis === 'Both');
  const asthmaPts = patients.filter(p => p.diagnosis === 'Asthma' || p.diagnosis === 'Both');
  const asthmaIds = new Set(asthmaPts.map(p => p.id));

  // ─── KPI 1: COPD Exacerbation Rate (เป้า < 110 /100 ผู้ป่วย) ─────────────────
  // ใช้ countThisYear จาก latest visit ของผู้ป่วย COPD แต่ละคน
  let copdExacerbCount = 0;
  copdPts.forEach(p => {
    const v = latestVisit[p.id];
    copdExacerbCount += (v?.exacerbation?.countThisYear || 0);
  });
  const copdExacerbRate = copdPts.length > 0
    ? ((copdExacerbCount / copdPts.length) * 100).toFixed(1) : '0';
  const copdExacerbStatus = parseFloat(copdExacerbRate) < 110 ? 'pass' : 'warn';

  // ─── KPI 2: Asthma ER/OPD/Hospitalized Rate (เป้า < 20 /100 ผู้ป่วย) ──────────
  // นับ visit ที่มี erVisit=true หรือ hospitalized=true ของผู้ป่วย Asthma
  const srcVisits = periodVisits.length > 0 ? periodVisits : allVisits;
  const asthmaErVisits = srcVisits.filter(v =>
    asthmaIds.has(v.patientId) &&
    (v.exacerbation?.erVisit === true || v.exacerbation?.hospitalized === true)
  );
  const asthmaErCount = asthmaErVisits.length;
  const asthmaErRate  = asthmaPts.length > 0
    ? ((asthmaErCount / asthmaPts.length) * 100).toFixed(1) : '0';
  const asthmaErStatus = parseFloat(asthmaErRate) < 20 ? 'pass' : 'warn';

  // ─── KPI 3: Asthma + ICS ≥ 80% ───────────────────────────────────────────────
  const ICS_KW = ['budesonide','fluticasone','beclomethasone','ciclesonide','mometasone',
                  'symbicort','seretide','trelegy','foster','flixotide','pulmicort'];
  const hasICS = (meds) => (meds||[]).some(m => {
    const n = (m.name||'').toLowerCase();
    return ICS_KW.some(k => n.includes(k));
  });
  const asthmaWithICS = asthmaPts.filter(p => hasICS(latestVisit[p.id]?.medications)).length;
  const asthmaIcsPct  = asthmaPts.length > 0
    ? ((asthmaWithICS / asthmaPts.length) * 100).toFixed(1) : '0';
  const asthmaIcsStatus = parseFloat(asthmaIcsPct) >= 80 ? 'pass' : 'warn';

  // ─── KPI 4: COPD ที่มีประวัติกำเริบ ได้รับ LABA/LAMA/Combo ≥ 80% ──────────────
  const LABA_KW = ['salmeterol','formoterol','vilanterol','olodaterol','indacaterol','seretide','symbicort','anoro','trelegy'];
  const LAMA_KW = ['umeclidinium','tiotropium','glycopyrronium','aclidinium','anoro','trelegy'];
  const hasAppropriate = (meds) => {
    const names = (meds||[]).map(m => (m.name||'').toLowerCase());
    const laba = names.some(n => LABA_KW.some(k => n.includes(k)));
    const lama = names.some(n => LAMA_KW.some(k => n.includes(k)));
    return laba || lama;
  };
  const copdWithExacerb = copdPts.filter(p => {
    const v = latestVisit[p.id];
    return v && ((v.exacerbation?.countThisYear||0) > 0 || v.exacerbation?.hospitalized);
  });
  const copdExacerbBase = copdWithExacerb.length > 0 ? copdWithExacerb.length : copdPts.length;
  const copdAppropriate = (copdWithExacerb.length > 0 ? copdWithExacerb : copdPts)
    .filter(p => hasAppropriate(latestVisit[p.id]?.medications)).length;
  const copdTherapyPct  = copdExacerbBase > 0
    ? ((copdAppropriate / copdExacerbBase) * 100).toFixed(1) : '0';
  const copdTherapyStatus = parseFloat(copdTherapyPct) >= 80 ? 'pass' : 'warn';

  // ─── KPI 5: ผู้ป่วยผ่านเกณฑ์เทคนิคยาพ่น MDI/DPI ≥ 80% ──────────────────────
  // "ผ่านเกณฑ์" = overallScore เป็น 'Good' หรือ 'Acceptable'
  const techVisits  = srcVisits.filter(v => v.inhalerTechnique && v.inhalerTechnique.length > 0);
  const techPassed  = techVisits.filter(v =>
    v.inhalerTechnique.some(t => t.overallScore === 'Good' || t.overallScore === 'Acceptable')
  ).length;
  const techniquePct   = techVisits.length > 0
    ? ((techPassed / techVisits.length) * 100).toFixed(1) : '0';
  const techniqueStatus = parseFloat(techniquePct) >= 80 ? 'pass' : 'warn';

  // ─── KPI 6: ผู้ป่วยได้รับการบริบาลเภสัชกรรม ≥ 80% ───────────────────────────
  const visitedIds = new Set(allVisits.map(v => v.patientId));
  const teleIds    = new Set((data.telepharmacy||[]).map(t => t.patientId));
  const caredCount = patients.filter(p => visitedIds.has(p.id) || teleIds.has(p.id)).length;
  const carePct    = patients.length > 0
    ? ((caredCount / patients.length) * 100).toFixed(1) : '0';
  const careStatus  = parseFloat(carePct) >= 80 ? 'pass' : 'warn';

  return {
    copdExacerbRate:   { value: copdExacerbRate,  target: 110, unit: '/100 ผู้ป่วย', status: copdExacerbStatus,  label: 'COPD Exacerbation Rate',      num: copdExacerbCount,  den: copdPts.length,       lowerBetter: true  },
    asthmaErRate:      { value: asthmaErRate,      target: 20,  unit: '/100 ผู้ป่วย', status: asthmaErStatus,     label: 'Asthma ER/Admit Rate',         num: asthmaErCount,     den: asthmaPts.length,     lowerBetter: true  },
    asthmaIcsPercent:  { value: asthmaIcsPct,      target: 80,  unit: '%',            status: asthmaIcsStatus,    label: 'Asthma + ICS',                 num: asthmaWithICS,     den: asthmaPts.length,     lowerBetter: false },
    copdTherapyPercent:{ value: copdTherapyPct,    target: 80,  unit: '%',            status: copdTherapyStatus,  label: 'COPD LABA/LAMA/Combo',         num: copdAppropriate,   den: copdExacerbBase,      lowerBetter: false },
    techniquePercent:  { value: techniquePct,      target: 80,  unit: '%',            status: techniqueStatus,    label: 'Inhaler Technique ผ่านเกณฑ์',  num: techPassed,        den: techVisits.length,    lowerBetter: false },
    carePercent:       { value: carePct,           target: 80,  unit: '%',            status: careStatus,         label: 'ผู้ป่วยได้รับบริบาลเภสัชกรรม', num: caredCount,        den: patients.length,      lowerBetter: false },
    visitCount:  srcVisits.length,
    patientCount: patients.length,
    copdCount:   copdPts.length,
    asthmaCount: asthmaPts.length,
  };
};

// ─── KPI Card ─────────────────────────────────────────────────────────────────
const QualityKPICard = ({ metric, icon, desc, targetLabel }) => {
  const isPass = metric.status === 'pass';
  const passColor  = '#059669';
  const warnColor  = '#DC2626';
  const borderColor = isPass ? passColor : warnColor;
  const bgGrad     = isPass
    ? 'linear-gradient(135deg,#F0FDF4 0%,#DCFCE7 100%)'
    : 'linear-gradient(135deg,#FEF2F2 0%,#FECACA 100%)';

  // Progress bar: for lower-is-better KPIs, full bar = value/target (< target = good)
  //               for higher-is-better KPIs, full bar = value/target (> target = good)
  const numVal = parseFloat(metric.value);
  let barPct;
  if (metric.lowerBetter) {
    barPct = metric.target > 0 ? Math.min((numVal / metric.target) * 100, 150) : 0;
  } else {
    barPct = Math.min(numVal, 100);
  }
  const barColor = isPass ? passColor : warnColor;

  return (
    <div style={{
      background: bgGrad, border: `2px solid ${borderColor}30`,
      borderLeft: `5px solid ${borderColor}`,
      borderRadius: 12, padding: '16px 18px',
      display: 'flex', flexDirection: 'column', gap: 12,
      boxShadow: isPass ? '0 2px 8px rgba(5,150,105,0.12)' : '0 2px 8px rgba(220,38,38,0.12)',
    }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#6B7280', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>
            {icon} {metric.label}
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
            <span style={{ fontSize: 34, fontWeight: 800, color: borderColor, lineHeight: 1 }}>{metric.value}</span>
            <span style={{ fontSize: 14, color: '#6B7280', fontWeight: 600 }}>{metric.unit}</span>
          </div>
          {metric.den > 0 && (
            <div style={{ fontSize: 11, color: '#9CA3AF', marginTop: 3 }}>
              {metric.num} / {metric.den} {metric.unit.includes('%') ? 'ราย' : 'ครั้ง/ราย'}
            </div>
          )}
        </div>
        <div style={{
          padding: '5px 11px', borderRadius: 20,
          background: isPass ? '#059669' : '#DC2626',
          color: '#fff', fontSize: 11, fontWeight: 700, whiteSpace: 'nowrap', flexShrink: 0,
        }}>
          {isPass ? '✅ ผ่าน' : '⚠ ต้องปรับ'}
        </div>
      </div>

      {/* Progress bar */}
      <div>
        <div style={{ height: 8, borderRadius: 99, background: '#E5E7EB', overflow: 'hidden' }}>
          <div style={{
            height: '100%', borderRadius: 99,
            width: `${Math.min(barPct, 100)}%`,
            background: barColor, transition: 'width 0.6s ease',
          }} />
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4, fontSize: 10, color: '#9CA3AF' }}>
          <span>0</span>
          <span style={{ fontWeight: 700, color: '#6B7280' }}>เป้า: {targetLabel}</span>
        </div>
      </div>

      {/* Description */}
      {desc && (
        <div style={{
          fontSize: 11, color: '#374151', lineHeight: 1.6,
          borderTop: `1px solid ${borderColor}20`, paddingTop: 10,
        }}>
          {desc}
        </div>
      )}
    </div>
  );
};

// ============ HA7 + HA12: HA Audit Indicators ============
const HAIndicators = ({ data }) => {
  const visits = data.visits || [];
  const patients = data.patients || [];
  const ha = data.haCompliance || {};

  const total = visits.length;
  const pct = (n) => total > 0 ? ((n / total) * 100).toFixed(0) + '%' : '—';

  const soapComplete  = visits.filter(v => v.soap?.s && v.soap?.a && v.soap?.p).length;
  const hasConsent    = visits.filter(v => v.informedConsent === true).length;
  const hasDRP        = visits.filter(v => v.drp != null).length;
  const hasPCNE       = visits.filter(v => v.drp?.pcne?.problem).length;
  const drpWithPCNE   = visits.filter(v => v.drp?.noDRP === false).length;
  const teleTotal     = (data.telepharmacy || []).filter(t => t.status !== 'Pending').length;
  const teleSuccess   = (data.telepharmacy || []).filter(t => t.status === 'Success').length;
  const vaccFlu       = patients.filter(p => p.vaccinations?.flu).length;
  const vaccPCV       = patients.filter(p => p.vaccinations?.pcv13).length;

  const indicators = [
    { category: 'Documentation (PCT.4)', items: [
      { label: 'SOAP Complete (S+A+P)', value: pct(soapComplete), n: soapComplete, d: total, ok: soapComplete/total >= 0.8 },
      { label: 'Informed Consent บันทึกแล้ว', value: pct(hasConsent), n: hasConsent, d: total, ok: hasConsent/total >= 0.9 },
      { label: 'DRP Documentation ครบ', value: pct(hasDRP), n: hasDRP, d: total, ok: hasDRP/total >= 0.95 },
      { label: 'PCNE Classification (visits with DRP)', value: drpWithPCNE > 0 ? pct(hasPCNE) : 'N/A', n: hasPCNE, d: drpWithPCNE, ok: drpWithPCNE === 0 || hasPCNE/drpWithPCNE >= 0.7 },
    ]},
    { category: 'Continuity of Care (COC)', items: [

<script type="text/babel">
// Notifications.jsx — Smart Notification Center
const { useState, useMemo } = React;

// ============ Calculate Notifications ============
const calculateNotifications = (data) => {
  const today = new Date().toISOString().slice(0, 10);
  const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);

  const notifications = [];

  // 1. Overdue Telepharmacy
  (data.telepharmacy || []).forEach(t => {
    if (t.status === 'Scheduled' && t.scheduledDate < today) {
      const patient = data.patients.find(p => p.id === t.patientId);
      notifications.push({
        id: `tele-${t.id}`,
        type: 'overdue-tele',
        severity: 'high',
        icon: '📞',
        title: 'Telepharmacy เลยกำหนด',
        message: `${patient?.hn || '—'} ${patient?.firstName || ''} นัดโทร ${t.scheduledDate}`,
        patientId: t.patientId,
        actionLabel: 'เปิด Telepharmacy',
        action: () => window.AppNavigate && window.AppNavigate('telepharmacy'),
      });
    }
  });

  // 2. Missing Follow-up (High Risk ไม่มี Visit >30 วัน)
  data.patients.filter(p => p.riskLevel === 'High').forEach(p => {
    const visits = (data.visits || []).filter(v => v.patientId === p.id).sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    const lastVisit = visits[0];
    if (!lastVisit || lastVisit.visitDate < thirtyDaysAgo) {
      notifications.push({
        id: `followup-${p.id}`,
        type: 'missing-followup',
        severity: 'medium',
        icon: '⏰',
        title: 'High Risk ไม่มี Follow-up',
        message: `${p.hn} ${p.firstName} — Visit ล่าสุด ${lastVisit ? lastVisit.visitDate : 'ไม่มี'}`,
        patientId: p.id,
        actionLabel: 'ดูผู้ป่วย',
        action: () => window.AppNavigate && window.AppNavigate('visit-history', p.id),
      });
    }
  });

  // 3. Vaccine Due (Flu: ทุก 1 ปี, PCV13/PPSV23: ครั้งเดียว, COVID: ทุก 6 เดือน)
  const currentYear = new Date().getFullYear();
  data.patients.forEach(p => {
    const vacc = p.vaccinations || {};
    // Flu
    if (!vacc.flu || parseInt(vacc.flu) < currentYear) {
      notifications.push({
        id: `vaccine-flu-${p.id}`,
        type: 'vaccine-due',
        severity: 'low',
        icon: '💉',
        title: 'ครบกำหนดวัคซีน Flu',
        message: `${p.hn} ${p.firstName} — ฉีด Flu ล่าสุด ${vacc.flu || 'ไม่เคย'}`,
        patientId: p.id,
        actionLabel: 'ดูผู้ป่วย',
        action: () => window.AppNavigate && window.AppNavigate('visit-history', p.id),
      });
    }
    // PCV13/PPSV23
    if (!vacc.pcv13 && p.age >= 65) {
      notifications.push({
        id: `vaccine-pcv13-${p.id}`,
        type: 'vaccine-due',
        severity: 'low',
        icon: '💉',
        title: 'แนะนำวัคซีน PCV13',
        message: `${p.hn} ${p.firstName} (อายุ ${p.age} ปี) — ยังไม่ได้ฉีด PCV13`,
        patientId: p.id,
        actionLabel: 'ดูผู้ป่วย',
        action: () => window.AppNavigate && window.AppNavigate('visit-history', p.id),
      });
    }
  });

  return notifications;
};

// ============ NotificationBadge (for Sidebar) ============
const NotificationBadge = ({ count }) => {
  if (count === 0) return null;
  return (
    <span style={{
      background: C.high, color: '#fff', fontSize: 10, fontWeight: 700,
      borderRadius: '50%', width: 18, height: 18, display: 'inline-flex',
      alignItems: 'center', justifyContent: 'center', marginLeft: 6,
    }}>{count > 9 ? '9+' : count}</span>
  );
};

// ============ NotificationItem ============
const NotificationItem = ({ notif, onDismiss }) => {
  const severityColor = notif.severity === 'high' ? C.high : notif.severity === 'medium' ? C.accent : C.primary;
  const severityBg = notif.severity === 'high' ? C.highBg : notif.severity === 'medium' ? C.accentBg : C.primaryBg;

  return (
    <div style={{
      background: '#fff', border: `1px solid ${C.border}`, borderLeft: `4px solid ${severityColor}`,
      borderRadius: 8, padding: '12px 16px', display: 'flex', alignItems: 'flex-start', gap: 12,
    }}>
      <div style={{
        fontSize: 24, width: 40, height: 40, borderRadius: 8, background: severityBg,
        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
      }}>{notif.icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 2 }}>{notif.title}</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 8 }}>{notif.message}</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {notif.action && (
            <Btn size="sm" variant="ghost" onClick={notif.action}>{notif.actionLabel || 'ดูรายละเอียด'}</Btn>
          )}
          <Btn size="sm" variant="ghost" onClick={() => onDismiss(notif.id)} style={{ color: C.textMuted }}>ซ่อน</Btn>
        </div>
      </div>
    </div>
  );
};

// ============ NotificationCenter (Modal) ============
const NotificationCenter = ({ data, open, onClose }) => {
  const [dismissed, setDismissed] = useState([]);
  
  const notifications = useMemo(() => {
    const all = calculateNotifications(data);
    return all.filter(n => !dismissed.includes(n.id));
  }, [data, dismissed]);

  const handleDismiss = (id) => {
    setDismissed([...dismissed, id]);
  };

  const handleClearAll = () => {
    setDismissed(notifications.map(n => n.id));
  };

  return (
    <Modal open={open} onClose={onClose} title="🔔 Notifications" width={680}>
      {notifications.length === 0 ? (
        <EmptyState icon="✅" title="ไม่มีการแจ้งเตือน" subtitle="ทุกอย่างเรียบร้อยดี!" />
      ) : (
        <>
          <div style={{ marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 13, color: C.textMuted }}>{notifications.length} รายการ</div>
            <Btn size="sm" variant="ghost" onClick={handleClearAll}>ซ่อนทั้งหมด</Btn>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxHeight: 500, overflowY: 'auto' }}>
            {notifications.map(n => (
              <NotificationItem key={n.id} notif={n} onDismiss={handleDismiss} />
            ))}
          </div>
        </>
      )}
    </Modal>
  );
};

// ============ NotificationPreview (for Dashboard) ============
const NotificationPreview = ({ data, onOpenFull }) => {
  const notifications = useMemo(() => calculateNotifications(data).slice(0, 3), [data]);

  if (notifications.length === 0) {
    return (
      <Card>
        <div style={{ textAlign: 'center', padding: '20px 0' }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>ไม่มีการแจ้งเตือน</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>ทุกอย่างเรียบร้อย!</div>
        </div>
      </Card>
    );
  }

  return (
    <Card>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>🔔 Notifications</h3>
        <Btn size="sm" variant="ghost" onClick={onOpenFull}>ดูทั้งหมด</Btn>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {notifications.map(n => (
          <NotificationItem key={n.id} notif={n} onDismiss={() => {}} />
        ))}
      </div>
      {calculateNotifications(data).length > 3 && (
        <div style={{ marginTop: 10, textAlign: 'center' }}>
          <Btn size="sm" variant="ghost" onClick={onOpenFull}>
            ดูอีก {calculateNotifications(data).length - 3} รายการ
          </Btn>
        </div>
      )}
    </Card>
  );
};

// Export
window.NotificationCenter = NotificationCenter;
window.NotificationPreview = NotificationPreview;
window.NotificationBadge = NotificationBadge;
window.calculateNotifications = calculateNotifications;
</script>
