// พิมพ์ค้นหาได้ จัดกลุ่มยาพ่น/ยากิน แสดง badge category
function DrugSearchBox({ value, onChange }) {
  const [query, setQuery] = vfState('');
  const [open, setOpen]   = vfState(false);
  const [activeIdx, setActiveIdx] = vfState(-1);
  const inputRef    = vfRef(null);
  const containerRef = vfRef(null);

  const inhalers = AppStore.COMMON_MEDICATIONS.filter(m => !m.type || m.type !== 'oral');
  const oralMeds = AppStore.COMMON_MEDICATIONS.filter(m => m.type === 'oral');

  const q = query.toLowerCase().trim();
  const filt = (arr) => q ? arr.filter(m =>
    m.name.toLowerCase().includes(q) || (m.category || '').toLowerCase().includes(q)
  ) : arr;

  const sections = [];
  const fi = filt(inhalers), fo = filt(oralMeds);
  if (fi.length) { sections.push({ header: '💨 ยาพ่น (Inhalers)' }); fi.forEach(m => sections.push(m)); }
  if (fo.length) { sections.push({ header: '💊 ยารับประทาน (Oral — โรคร่วม)' }); fo.forEach(m => sections.push(m)); }
  const selectables = sections.filter(s => !s.header);

  vfEffect(() => {
    const fn = (e) => { if (containerRef.current && !containerRef.current.contains(e.target)) { setOpen(false); setQuery(''); } };
    document.addEventListener('mousedown', fn);
    return () => document.removeEventListener('mousedown', fn);
  }, []);

  const selectDrug = (name) => { onChange(name); setQuery(''); setOpen(false); setActiveIdx(-1); };

  const onKey = (e) => {
    if (!open) { if (e.key === 'ArrowDown' || e.key === 'Enter') { setOpen(true); } return; }
    if (e.key === 'ArrowDown') { e.preventDefault(); setActiveIdx(i => Math.min(i + 1, selectables.length - 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setActiveIdx(i => Math.max(i - 1, 0)); }
    else if (e.key === 'Enter' && activeIdx >= 0) { e.preventDefault(); selectDrug(selectables[activeIdx].name); }
    else if (e.key === 'Escape') { setOpen(false); setQuery(''); }
  };

  // Category badge colours
  const catColors = {
    SABA: '#0369A1', ICS: '#7C3AED', 'ICS/LABA': '#059669', 'LABA/LAMA': '#065F46',
    'SAMA/SABA': '#0369A1', OCS: '#DC2626', Theophylline: '#D97706', LTRA: '#0F766E',
    CCB: '#0F766E', 'ACE-I': '#0F766E', ARB: '#0F766E', Thiazide: '#6366F1', 'Loop Diuretic': '#6366F1',
    BB: '#F59E0B', 'BB-NS': '#DC2626', 'Aldosterone Ant': '#6366F1',
    Biguanide: '#2563EB', Sulfonylurea: '#2563EB', 'DPP4-I': '#6366F1', 'SGLT2-I': '#059669', TZD: '#D97706', 'Alpha-GI': '#9333EA',
    Statin: '#7C3AED', Fibrate: '#9333EA',
    PPI: '#059669', 'H2-Blocker': '#059669', Prokinetic: '#6366F1',
    Antihistamine: '#0F766E', 'Antihistamine-1G': '#D97706',
    Antiplatelet: '#DC2626', Anticoagulant: '#DC2626', Nitrate: '#9333EA', 'Cardiac Glycoside': '#9333EA',
    Analgesic: '#059669', NSAID: '#DC2626', 'COX2-I': '#D97706',
    Antibiotic: '#D97706', Macrolide: '#D97706', FQ: '#D97706',
    Uricosuric: '#6366F1', Bisphosphonate: '#6366F1', Supplement: '#6366F1',
  };
  const getCatColor = (cat) => catColors[cat] || '#64748B';

  const boxBorder = open ? '#3B82F6' : C.border;
  return (
    <div ref={containerRef} style={{ position: 'relative', flex: 1, minWidth: 0 }}>
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6, padding: '7px 10px',
        border: `1.5px solid ${boxBorder}`, borderRadius: 9, background: C.surface,
        cursor: 'text', minHeight: 38, transition: 'border-color 0.15s, box-shadow 0.15s',
        boxShadow: open ? '0 0 0 3px rgba(59,130,246,0.12)' : 'none',
      }} onClick={() => { setOpen(true); setTimeout(() => inputRef.current?.focus(), 0); }}>
        {open ? (
          <input ref={inputRef} value={query}
            onChange={e => { setQuery(e.target.value); setActiveIdx(-1); }}
            onKeyDown={onKey} autoFocus
            placeholder={value || 'พิมพ์ชื่อยา / กลุ่มยา เช่น SABA, statin, amlodipine...'}
            style={{ flex: 1, border: 'none', background: 'transparent', fontSize: 13, fontFamily: 'inherit', color: C.text, outline: 'none', padding: 0, minWidth: 0 }} />
        ) : (
          <span style={{ flex: 1, fontSize: 13, color: value ? C.text : C.textMuted, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {value || 'เลือก/พิมพ์ค้นหายา...'}
          </span>
        )}
        {value && !open && (
          <button onMouseDown={e => { e.stopPropagation(); selectDrug(''); }}
            style={{ background: 'none', border: 'none', color: C.textMuted, cursor: 'pointer', padding: '0 2px', fontSize: 14, flexShrink: 0, lineHeight: 1 }}>✕</button>
        )}
        <span style={{ color: C.textMuted, fontSize: 10, flexShrink: 0, userSelect: 'none' }}>{open ? '▴' : '▾'}</span>
      </div>

      {open && (
        <div style={{
          position: 'absolute', top: 'calc(100% + 4px)', left: 0, right: 0, zIndex: 300,
          background: '#fff', border: '1.5px solid #93C5FD', borderRadius: 10,
          boxShadow: '0 8px 32px rgba(0,0,0,0.16)', maxHeight: 340, overflowY: 'auto', fontFamily: 'inherit',
        }}>
          {sections.length === 0 && (
            <div style={{ padding: '14px', fontSize: 13, color: C.textMuted, textAlign: 'center' }}>ไม่พบยาที่ค้นหา — ลองค้นหาด้วย ชื่อยา หรือ กลุ่มยา</div>
          )}
          {sections.map((item, idx) => {
            if (item.header) return (
              <div key={idx} style={{ padding: '6px 12px 3px', fontSize: 10, fontWeight: 800, color: C.primary, textTransform: 'uppercase', letterSpacing: 0.5, background: '#F8FAFC', borderTop: idx > 0 ? `1px solid ${C.border}` : 'none', position: 'sticky', top: idx === 0 ? 0 : 'auto' }}>{item.header}</div>
            );
            const si = selectables.indexOf(item);
            const isActive = si === activeIdx;
            const isSelected = item.name === value;
            const cc = getCatColor(item.category);
            return (
              <div key={item.name} onMouseDown={() => selectDrug(item.name)} onMouseEnter={() => setActiveIdx(si)}
                style={{
                  padding: '8px 12px', cursor: 'pointer', display: 'flex', alignItems: 'center', gap: 8,
                  background: isSelected ? '#F0FDF4' : isActive ? '#EFF6FF' : 'transparent', transition: 'background 0.1s',
                  borderLeft: isSelected ? `3px solid ${C.low}` : '3px solid transparent',
                }}>
                {isSelected && <span style={{ fontSize: 11, color: C.low, flexShrink: 0 }}>✓</span>}
                <span style={{ flex: 1, fontSize: 13, color: C.text, lineHeight: 1.4, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{item.name}</span>
                <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 10, background: `${cc}18`, color: cc, flexShrink: 0, whiteSpace: 'nowrap' }}>{item.category}</span>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function MedRow({ med, index, onChange, onRemove, changeStatus }) {
  const guide = med.name && window.DRUG_DOSE_GUIDE ? window.DRUG_DOSE_GUIDE[med.name] : null;
  const isWarn = guide?.tip && (guide.tip.startsWith('⚠') || guide.tip.startsWith('⛔'));
  const medInfo = AppStore.COMMON_MEDICATIONS.find(m => m.name === med.name);
  const isOral  = medInfo?.type === 'oral';

  return (
    <div style={{ marginBottom: 8 }}>
      <div style={{
        display: 'grid', gridTemplateColumns: 'auto 1fr auto auto auto',
        gap: 8, alignItems: 'center',
        background: isWarn ? '#FFF7ED' : isOral ? '#F0F9FF' : '#F8FAFC',
        borderRadius: guide ? '9px 9px 0 0' : 9, padding: '8px 12px',
        border: `1.5px solid ${isWarn ? '#FED7AA' : guide ? '#BFDBFE' : C.border}`,
        borderBottom: guide ? 'none' : undefined,
      }}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 2, alignItems: 'flex-start' }}>
          {changeStatus === 'new'  && <span style={{ fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 12, background: '#FEF3C7', color: '#92400E', whiteSpace: 'nowrap' }}>NEW</span>}
          {changeStatus === 'same' && <span style={{ fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 12, background: '#E0F2FE', color: '#0369A1', whiteSpace: 'nowrap' }}>เดิม</span>}
          {!changeStatus && <span style={{ width: 4 }} />}
        </div>
        <DrugSearchBox value={med.name} onChange={v => {
          const g = window.DRUG_DOSE_GUIDE?.[v];
          onChange(index, { ...med, name: v, dose: g ? g.dose : med.dose });
        }} />
        <Input value={med.dose} onChange={v => onChange(index, { ...med, dose: v })}
          placeholder={guide ? guide.dose : 'Dose/วิธีใช้'}
          style={{ width: 140, flexShrink: 0 }} />
        <Select value={med.adherence} placeholder="Adh."
          options={[
            { value: 'Good', label: '✅ ดี' },
            { value: 'Fair', label: '⚠ พอใช้' },
            { value: 'Poor', label: '❌ ต่ำ' },
          ]}
          onChange={v => onChange(index, { ...med, adherence: v })}
          style={{ width: 110, flexShrink: 0 }} />
        <button onClick={() => onRemove(index)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textMuted, fontSize: 16, padding: '0 4px', flexShrink: 0 }}>✕</button>
      </div>
      {guide && (
        <div style={{
          padding: '5px 14px', fontSize: 11, lineHeight: 1.6,
          borderRadius: '0 0 9px 9px',
          background: isWarn ? '#FFF7ED' : '#EFF6FF',
          border: `1.5px solid ${isWarn ? '#FED7AA' : '#BFDBFE'}`,
          borderTop: `1px dashed ${isWarn ? '#FDBA74' : '#93C5FD'}`,
          display: 'flex', flexWrap: 'wrap', gap: '2px 16px',
        }}>
          <span style={{ color: '#1E40AF', fontWeight: 600 }}>💊 {guide.dose}</span>
          {guide.max && <span style={{ color: C.textMuted }}>Max: {guide.max}</span>}
          {guide.tip && <span style={{ color: isWarn ? '#9A3412' : '#0369A1', fontWeight: isWarn ? 600 : 400 }}>{guide.tip}</span>}
        </div>
      )}
    </div>
  );
}

// ── Adherence ─────────────────────────────────────────
const ADHERENCE_QUESTIONS = [
  'มีการลืมใช้ยาพ่นในช่วง 1 เดือนที่ผ่านมา?',
  'มีบางวันที่ไม่ได้ใช้ยาพ่นตามที่แพทย์สั่ง?',
  'เคยหยุดยาเองเมื่ออาการดีขึ้นหรือรู้สึกว่าหายดีแล้ว?',
  'เคยใช้ยาน้อยกว่าที่แพทย์สั่งเพราะรู้สึกว่ายาไม่ได้ผล?',
];

function AdherenceSection({ adherence, onChange }) {
  const answers = adherence?.answers || [false, false, false, false];
  const score = answers.filter(Boolean).length;
  const level = score === 0 ? 'Good' : score <= 1 ? 'Good' : score <= 2 ? 'Fair' : 'Poor';
  const toggle = (i) => {
    const next = [...answers]; next[i] = !next[i];
    const s = next.filter(Boolean).length;
    const l = s === 0 ? 'Good' : s <= 1 ? 'Good' : s <= 2 ? 'Fair' : 'Poor';
    onChange({ answers: next, score: s, level: l });
  };
  const scoreColor = level === 'Good' ? C.low : level === 'Fair' ? C.medium : C.high;
  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 14 }}>
        {ADHERENCE_QUESTIONS.map((q, i) => (
          <label key={i} style={{
            display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer',
            padding: '10px 12px', borderRadius: 8, border: `1px solid ${answers[i] ? C.highBorder : C.border}`,
            background: answers[i] ? C.highBg : C.surface, transition: 'all 0.15s',
          }}>
            <input type="checkbox" checked={!!answers[i]} onChange={() => toggle(i)}
              style={{ accentColor: C.high, marginTop: 2, flexShrink: 0, width: 15, height: 15 }} />
            <span style={{ fontSize: 13, color: C.text, lineHeight: 1.5 }}>
              <strong style={{ color: C.textMuted }}>{i + 1}.</strong> {q}
            </span>
          </label>
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '10px 14px',
        background: `${scoreColor}10`, borderRadius: 8, border: `1px solid ${scoreColor}30` }}>
        <div style={{ fontSize: 13 }}>ตอบ "ใช่" <strong style={{ color: scoreColor }}>{score}/4</strong> ข้อ</div>
        <div>ระดับ: <AdherenceBadge level={level} /></div>
        <div style={{ fontSize: 12, color: C.textMuted }}>
          {level === 'Good' ? '0–1 ข้อ = ดี' : level === 'Fair' ? '2 ข้อ = พอใช้' : '3–4 ข้อ = ต้องปรับปรุง'}
        </div>
      </div>
    </div>
  );
}

const daysAgo = (dateStr) => {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / (1000 * 60 * 60 * 24));
};

// ── Mini Visit Card (right panel) ─────────────────────
function MiniVisitCard({ visit, isLatest, currentMedNames }) {
  const days = daysAgo(visit.visitDate);
  const headerBg = isLatest ? '#0F2D5E' : '#475569';
  const labelText = isLatest ? 'Visit ล่าสุด' : 'Visit ก่อนหน้า';
  return (
    <Card style={{ padding: 0, overflow: 'hidden' }}>
      <div style={{
        background: headerBg, color: '#fff', padding: '7px 12px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div>
          <div style={{ fontSize: 9, fontWeight: 600, opacity: 0.8, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{labelText}</div>
          <div style={{ fontSize: 12, fontWeight: 700, marginTop: 1 }}>{visit.visitDate}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 14, fontWeight: 800, lineHeight: 1 }}>{days}</div>
          <div style={{ fontSize: 9, opacity: 0.8 }}>วันก่อน</div>
        </div>
      </div>

      <div style={{ padding: '10px 12px' }}>
        {/* Stats grid */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 5, marginBottom: 8 }}>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>Adherence</div>
            <div style={{ marginTop: 2 }}><AdherenceBadge level={visit.adherence?.level || '—'} /></div>
          </div>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>Exacerbation</div>
            <div style={{ fontSize: 12, fontWeight: 700, marginTop: 1, color: (visit.exacerbation?.countThisYear ?? 0) >= 2 ? C.high : C.text }}>
              {visit.exacerbation?.countThisYear ?? 0} ครั้ง
              {visit.exacerbation?.hospitalized && <span style={{ fontSize: 9, marginLeft: 3 }}>🏥</span>}
            </div>
          </div>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>เทคนิค</div>
            <div style={{ marginTop: 2, display: 'flex', gap: 2, flexWrap: 'wrap' }}>
              {(visit.inhalerTechnique || []).map((t, i) => <TechniqueBadge key={i} score={t.overallScore} />)}
              {(!visit.inhalerTechnique || visit.inhalerTechnique.length === 0) && <span style={{ fontSize: 10, color: C.textMuted }}>—</span>}
            </div>
          </div>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>Risk</div>
            <div style={{ marginTop: 2 }}><RiskBadge level={visit.riskLevel || 'Low'} /></div>
          </div>
        </div>

        {/* Medications */}
        {visit.medications?.length > 0 && (
          <div style={{ marginBottom: 7 }}>
            <div style={{ fontSize: 9, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 3 }}>
              💊 ยา ({visit.medications.length})
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              {visit.medications.map((m, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 10, lineHeight: 1.35 }}>
                  {isLatest && currentMedNames && (
                    <span style={{
                      fontSize: 8, fontWeight: 700, padding: '0 4px', borderRadius: 8,
                      background: currentMedNames.includes(m.name) ? '#E0F2FE' : '#FEE2E2',
                      color: currentMedNames.includes(m.name) ? '#0369A1' : '#B91C1C',
                      flexShrink: 0, minWidth: 9, textAlign: 'center',
                    }}>{currentMedNames.includes(m.name) ? '●' : '✕'}</span>
                  )}
                  <span style={{ color: C.text, flex: 1 }}>
                    {m.name.split(' (')[0].split(' DPI')[0].split(' MDI')[0]}
                    <span style={{ color: C.textMuted, marginLeft: 4 }}>{m.dose}</span>
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* DRP */}
        {visit.drp?.noDRP === false && visit.drp?.items?.length > 0 && (
          <div style={{ marginBottom: 6 }}>
            <div style={{ fontSize: 9, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', marginBottom: 2 }}>DRP</div>
            {visit.drp.items.map((d, i) => (
              <div key={i} style={{ fontSize: 10, color: C.high, lineHeight: 1.3 }}>⚠ {d.replace(/\s*\(.+\)/, '')}</div>
            ))}
          </div>
        )}

        {/* Plan */}
        {visit.soap?.p && (
          <div style={{ padding: '5px 7px', borderRadius: 4, background: '#EFF6FF', borderLeft: `2px solid ${C.accent}` }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.primary, textTransform: 'uppercase' }}>Plan</div>
            <div style={{ fontSize: 10, color: C.text, marginTop: 2, lineHeight: 1.4, whiteSpace: 'pre-wrap' }}>{visit.soap.p}</div>
          </div>
        )}
      </div>
    </Card>
  );
}

// ── Last Visits Panel (up to 2) ───────────────────────
function LastVisitsPanel({ visits, currentMeds }) {
  if (!visits || visits.length === 0) return (
    <Card>
      <div style={{ textAlign: 'center', padding: '14px 8px', color: C.textMuted }}>
        <div style={{ fontSize: 28, marginBottom: 6 }}>🆕</div>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>ผู้ป่วยใหม่</div>
        <div style={{ fontSize: 11, marginTop: 2 }}>ไม่มีบันทึกการเยี่ยมก่อนหน้า</div>
      </div>
    </Card>
  );
  const currentMedNames = currentMeds.map(m => m.name).filter(Boolean);
  const recent = visits.slice(0, 2);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {recent.map((v, i) => (
        <MiniVisitCard key={v.id} visit={v} isLatest={i === 0} currentMedNames={currentMedNames} />
      ))}
    </div>
  );
}

// ── SOAP Field with template picker ───────────────────
function SOAPField({ label, fieldKey, value, onChange, placeholder, rows }) {
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
        <label style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{label}</label>
        <TemplatePicker field={fieldKey}
          onInsert={(text) => onChange(value ? `${value}\n${text}` : text)} />
      </div>
      <Textarea value={value} onChange={onChange} placeholder={placeholder} rows={rows} />
    </div>
  );
}

// ── Main VisitForm (with edit support) ────────────────
function VisitForm({ data, patientId, editingVisit, onSave, onDelete, navigate, currentUser }) {
  const patient = data.patients.find(p => p.id === patientId);
  const isEditing = !!editingVisit;
  const today = new Date().toISOString().slice(0, 10);
  const defaultPharmacist = currentUser ? `${currentUser.prefix}${currentUser.name}` : '';

  // Previous visits — exclude the visit being edited
  const previousVisits = vfMemo(() => {
    let visits = data.visits.filter(v => v.patientId === patientId);
    if (isEditing) visits = visits.filter(v => v.id !== editingVisit.id);
    return visits.sort((a, b) => b.visitDate.localeCompare(a.visitDate));
  }, [data.visits, patientId, isEditing, editingVisit?.id]);

  const lastVisit = previousVisits[0] || null;

  const [prefillState, setPrefillState] = vfState(isEditing ? 'used' : null);
  const [saving, setSaving] = vfState(false);
  const [showToast, setShowToast] = vfState(null);
  const [confirmDelete, setConfirmDelete] = vfState(false);
  const [showDraftPrompt, setShowDraftPrompt] = vfState(null);  // {draft, ts} or null
  const [showValidation, setShowValidation] = vfState(null);    // {warnings:[]} or null
  const [attemptedSave, setAttemptedSave] = vfState(false);     // show inline warning summary after first save attempt

  const initial = isEditing ? { ...editingVisit } : {
    patientId, visitDate: today, pharmacist: defaultPharmacist,
    chiefComplaint: '',
    exacerbation: { countThisYear: 0, lastDate: '', severity: 'None', hospitalized: false, erVisit: false, triggers: [], rescueMedUse: 'Never' },
    vitals: { spO2: '', rr: '', bp: '', fev1: '', peakFlow: '' },
    medications: [],
    inhalerTechnique: [],
    adherence: { answers: [false, false, false, false], score: 0, level: 'Good' },
    assessments: {
      cat:  { answers: [null,null,null,null,null,null,null,null], score: 0, allAnswered: false },
      mmrc: { grade: null },
      act:  { answers: [null,null,null,null], score: 0, allAnswered: false },
    },
    soap: { s: '', o: '', a: '', p: '' },
    drp: { noDRP: true, items: [], note: '' },
    riskLevel: 'Low', riskFlags: [],
    counselingTopics: [],
    pharmacistNote: '',
    nextVisit: '',
    informedConsent: true,   // HA PSG.6 — default ยินยอม (ขอด้วยวาจาทุกครั้งก่อนบริการ) ปลดติ๊กได้ถ้ามีกรณีพิเศษ
  };
  const [f, setF] = vfState(initial);

  // Check for existing draft on mount
  vfEffect(() => {
    const editId = isEditing ? editingVisit.id : null;
    const draft = loadDraft(patientId, editId);
    if (draft && draft.data) {
      setShowDraftPrompt(draft);
    }
    // eslint-disable-next-line
  }, []);

  // Auto-save draft (debounced ~1s)
  vfEffect(() => {
    const editId = isEditing ? editingVisit.id : null;
    const handle = setTimeout(() => {
      // Only save if form has meaningful content
      const meaningful = f.chiefComplaint || f.medications.length > 0 ||
        f.inhalerTechnique.length > 0 || f.adherence.score > 0 ||
        f.soap.s || f.soap.a || f.soap.p || (f.drp.items || []).length > 0;
      if (meaningful) saveDraft(patientId, editId, f);
    }, 1000);
    return () => clearTimeout(handle);
  }, [f, patientId, isEditing, editingVisit?.id]);

  // Auto-calculate risk
  vfEffect(() => {
    if (!patient) return;
    const risk = AppStore.calculateRisk(patient, f);
    setF(prev => ({ ...prev, riskLevel: risk.level, riskFlags: risk.flags }));
  }, [f.exacerbation, f.adherence, f.inhalerTechnique, patient]);

  // ── ป้องกันข้อมูลหายเมื่อยังไม่บันทึก ──
  const justSavedRef = useRef(false);
  const hasUnsaved = () => !justSavedRef.current && (
    !!f.chiefComplaint || f.medications.length > 0 || f.inhalerTechnique.length > 0 ||
    (f.adherence?.score > 0) || !!f.soap?.s || !!f.soap?.a || !!f.soap?.p || (f.drp?.items || []).length > 0
  );
  vfEffect(() => {
    const handler = (e) => {
      if (hasUnsaved()) { e.preventDefault(); e.returnValue = ''; return ''; }
    };
    window.addEventListener('beforeunload', handler);
    return () => window.removeEventListener('beforeunload', handler);
  });
  const guardedLeave = () => {
    if (hasUnsaved() && !window.confirm('คุณยังไม่ได้บันทึกข้อมูล Visit นี้ — ต้องการออกจากหน้านี้หรือไม่? (ร่างถูกบันทึกไว้ให้อัตโนมัติ)')) return;
    navigate('history', patientId);
  };

  // Ctrl+S
  vfEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); handleSave(false); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  });

  const set = (k, v) => setF(prev => ({ ...prev, [k]: v }));
  const setEx = (k, v) => setF(prev => ({ ...prev, exacerbation: { ...prev.exacerbation, [k]: v } }));
  const setVital = (k, v) => setF(prev => ({ ...prev, vitals: { ...(prev.vitals || {}), [k]: v } }));
  const setSOAP = (k, v) => setF(prev => ({ ...prev, soap: { ...prev.soap, [k]: v } }));
  const setAssessment = (k, v) => setF(prev => ({
    ...prev,
    assessments: { ...(prev.assessments || {}), [k]: v },
  }));
  const a = f.assessments || { cat: {}, mmrc: {}, act: {} };

  const addMed = () => setF(prev => ({ ...prev, medications: [...prev.medications, { id: AppStore.generateId(), name: '', dose: '', adherence: '' }] }));
  const updateMed = (i, val) => { const next = [...f.medications]; next[i] = val; set('medications', next); };
  const removeMed = (i) => set('medications', f.medications.filter((_, idx) => idx !== i));

  const addTech = () => setF(prev => ({ ...prev, inhalerTechnique: [...prev.inhalerTechnique, { id: AppStore.generateId(), device: '', stepsCorrect: [], overallScore: 'Poor', errors: [] }] }));
  const updateTech = (i, val) => { const next = [...f.inhalerTechnique]; next[i] = val; set('inhalerTechnique', next); };
  const removeTech = (i) => set('inhalerTechnique', f.inhalerTechnique.filter((_, idx) => idx !== i));

  const applyPrefill = () => {
    if (!lastVisit) return;
    // Compute suggested nextVisit: 3 months for High/Medium, 6 months for Low
    const suggestNextVisit = () => {
      const d = new Date();
      const months = (lastVisit.riskLevel === 'High' || lastVisit.riskLevel === 'Medium') ? 3 : 6;
      d.setMonth(d.getMonth() + months);
      return d.toISOString().slice(0, 10);
    };
    setF(prev => ({
      ...prev,
      medications: (lastVisit.medications || []).map(m => ({ ...m, id: AppStore.generateId(), adherence: '' })),
      inhalerTechnique: (lastVisit.inhalerTechnique || []).map(t => ({
        id: AppStore.generateId(), device: t.device,
        stepsCorrect: [], overallScore: 'Poor', errors: [],
      })),
      exacerbation: {
        ...prev.exacerbation,
        triggers: lastVisit.exacerbation?.triggers || [],
        rescueMedUse: lastVisit.exacerbation?.rescueMedUse || 'Never',
      },
      soap: {
        s: '',
        o: lastVisit.soap?.o || '',
        a: lastVisit.soap?.a || '',
        p: lastVisit.soap?.p || '',
      },
      nextVisit: prev.nextVisit || suggestNextVisit(),
    }));
    setPrefillState('used');
    setShowToast({ msg: `✓ คัดลอกข้อมูลจาก Visit ${lastVisit.visitDate} แล้ว — กรุณาประเมิน Adherence และเทคนิคใหม่`, type: 'success' });
    setTimeout(() => setShowToast(null), 4000);
  };

  const validate = () => {
    const warnings = [];
    if (f.medications.length > 0 && f.inhalerTechnique.length === 0) {
      warnings.push({
        title: 'มียาพ่นแต่ยังไม่ได้ประเมินเทคนิค',
        detail: 'ผู้ป่วยมียา ' + f.medications.length + ' ตัว แต่ยังไม่ได้ประเมินเทคนิคยาพ่นสักตัว — ควรประเมินเพื่อหา DRP',
      });
    }
    if (!f.soap.p || f.soap.p.trim() === '') {
      warnings.push({
        title: 'SOAP Plan ยังว่าง',
        detail: 'ไม่ได้ระบุแผนการรักษา (P) — ควรมีรายละเอียด plan สำหรับผู้ป่วย',
      });
    }
    if (f.drp?.noDRP === false && (f.drp.items || []).length === 0) {
      warnings.push({
        title: 'เลือก "พบ DRP" แต่ไม่ได้ระบุประเภท',
        detail: 'ระบุไว้ว่าพบ DRP แต่ยังไม่ได้ติ๊กประเภท DRP ใด',
      });
    }
    if (!f.adherence || f.adherence.answers.every(a => a === false) && f.adherence.score === 0) {
      // Only warn if there's no other indication
      const hasMeds = f.medications.length > 0;
      if (hasMeds) {
        warnings.push({
          title: 'ยังไม่ได้ประเมิน Adherence',
          detail: 'ยังไม่ได้ตอบคำถาม Adherence ทั้ง 4 ข้อ — ถ้าผู้ป่วยร่วมมือดี ยืนยันจริงหรือไม่',
        });
      }
    }
    const dx = patient?.diagnosis;
    const a = f.assessments || {};
    if ((dx === 'COPD' || dx === 'Both') && f.medications.length > 0 && !a.cat?.allAnswered) {
      warnings.push({
        title: 'ยังไม่ได้ประเมิน CAT score',
        detail: 'ผู้ป่วย COPD/ACO ควรประเมิน CAT score ทุก visit — ใช้จัดกลุ่ม GOLD และติดตามผลการรักษา',
      });
    }
    if ((dx === 'Asthma' || dx === 'Both') && f.medications.length > 0 && !a.act?.allAnswered) {
      warnings.push({
        title: 'ยังไม่ได้ประเมิน ACT score',
        detail: 'ผู้ป่วย Asthma/ACO ควรประเมิน ACT score ทุก visit — ใช้ประเมินการควบคุมโรคตาม GINA',
      });
    }
    const medsMissingDose = f.medications.filter(m => m.name && !m.dose);
    if (medsMissingDose.length > 0) {
      warnings.push({
        title: `ยา ${medsMissingDose.length} รายการยังไม่ได้ระบุขนาดยา`,
        detail: `${medsMissingDose.map(m => m.name).join(', ')} — ควรระบุขนาดยาและความถี่เพื่อป้องกัน DRP`,
      });
    }
    return warnings;
  };

  const handleSave = (skipValidation) => {
    if (saving) return;
    if (!skipValidation) {
      const warnings = validate();
      if (warnings.length > 0) {
        setShowValidation({ warnings });
        setAttemptedSave(true);
        return;
      }
    }
    setSaving(true);
    justSavedRef.current = true; // ปิด guard เพราะกำลังบันทึกจริง
    const risk = AppStore.calculateRisk(patient, f);
    const visit = { ...f, id: isEditing ? editingVisit.id : AppStore.generateId(), riskLevel: risk.level, riskFlags: risk.flags };

    let updatedVisits;
    if (isEditing) {
      updatedVisits = data.visits.map(v => v.id === editingVisit.id ? visit : v);
    } else {
      updatedVisits = [...data.visits, visit];
    }

    // Update patient risk based on latest visit (most recent visitDate)
    const allForPt = updatedVisits.filter(v => v.patientId === patientId)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    const latestRisk = allForPt[0] ? { level: allForPt[0].riskLevel, flags: allForPt[0].riskFlags || [] } : { level: 'Low', flags: [] };

    const updatedPatients = data.patients.map(p => p.id === patientId
      ? { ...p, riskLevel: latestRisk.level, riskFlags: latestRisk.flags, isHighRisk: latestRisk.level === 'High' }
      : p);
    let newData = { ...data, visits: updatedVisits, patients: updatedPatients };
    // Audit log
    newData = appendAudit(newData, {
      user: currentUser ? `${currentUser.prefix}${currentUser.name}` : 'unknown',
      action: isEditing ? 'edit-visit' : 'create-visit',
      patientId, visitId: visit.id,
      summary: `${isEditing ? 'แก้ไข' : 'สร้าง'} Visit ${visit.visitDate} (${patient.prefix}${patient.firstName} ${patient.lastName})`,
    });
    // Clear draft on successful save
    clearDraft(patientId, isEditing ? editingVisit.id : null);
    onSave(newData);
    window.rxToast?.(isEditing ? `แก้ไข Visit ${visit.visitDate} สำเร็จ` : `บันทึก Visit ${visit.visitDate} สำเร็จ`, 'success');
    setTimeout(() => navigate('history', patientId), 100);
  };

  const handleDelete = () => {
    if (!isEditing) return;
    const updatedVisits = data.visits.filter(v => v.id !== editingVisit.id);
    const remaining = updatedVisits.filter(v => v.patientId === patientId)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    const latestRisk = remaining[0] ? { level: remaining[0].riskLevel, flags: remaining[0].riskFlags || [] } : { level: 'Low', flags: [] };
    const updatedPatients = data.patients.map(p => p.id === patientId
      ? { ...p, riskLevel: latestRisk.level, riskFlags: latestRisk.flags, isHighRisk: latestRisk.level === 'High' }
      : p);
    let newData = { ...data, visits: updatedVisits, patients: updatedPatients };
    newData = appendAudit(newData, {
      user: currentUser ? `${currentUser.prefix}${currentUser.name}` : 'unknown',
      action: 'delete-visit',
      patientId, visitId: editingVisit.id,
      summary: `ลบ Visit ${editingVisit.visitDate} (${patient.prefix}${patient.firstName} ${patient.lastName})`,
    });
    clearDraft(patientId, editingVisit.id);
    onSave(newData);
    window.rxToast?.(`ลบ Visit ${editingVisit.visitDate} สำเร็จ`, 'info');
    navigate('history', patientId);
  };

  if (!patient) return <EmptyState icon="❓" title="ไม่พบข้อมูลผู้ป่วย" />;

  const riskColor = { High: C.high, Medium: C.medium, Low: C.low }[f.riskLevel] || C.low;
  const row2 = { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 };
  const row3 = { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14 };

  const lastMedNames = (lastVisit?.medications || []).map(m => m.name);

  return (
    <div>
      {/* Sticky patient context bar */}
      <div style={{
        position: 'sticky', top: 0, zIndex: 50, marginBottom: 14,
        background: 'rgba(248,250,252,0.92)', backdropFilter: 'blur(12px)', WebkitBackdropFilter: 'blur(12px)',
        borderBottom: `1px solid ${C.border}`, borderRadius: '0 0 12px 12px',
        padding: '10px 16px', display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap',
        boxShadow: '0 2px 12px rgba(15,23,42,0.06)',
      }}>
        <Btn size="sm" variant="ghost" onClick={guardedLeave}>← กลับ</Btn>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: C.primary, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
            {isEditing ? '✏️ แก้ไข Visit' : '📝 บันทึกการบริบาล'} — {patient.prefix}{patient.firstName} {patient.lastName}
          </div>
          <div style={{ fontSize: 11, color: C.textMuted }}>HN: {patient.hn} · อายุ {patient.age} ปี{isEditing ? ` · ${editingVisit.visitDate}` : ''}</div>
        </div>
        <DiagBadge diagnosis={patient.diagnosis} />
        <RiskBadge level={f.riskLevel} />
        <span style={{ padding: '4px 10px', borderRadius: 20, background: '#F1F5F9', fontSize: 11, color: C.textMuted, fontWeight: 600, display: 'flex', alignItems: 'center', gap: 4 }}>
          ⌘S บันทึก
        </span>
      </div>

      {/* Allergy banner */}
      <div style={{ marginBottom: 12 }}>
        <AllergyBanner patient={patient} />
      </div>

      {/* Pre-fill banner */}
      {!isEditing && lastVisit && prefillState !== 'used' && prefillState !== 'declined' && (
        <div style={{
          background: 'linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%)',
          border: '1px solid #93C5FD', borderRadius: 10, padding: '12px 16px',
          marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <div style={{ fontSize: 22 }}>🔄</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#1E40AF' }}>
              พบ Visit ก่อนหน้าเมื่อ {daysAgo(lastVisit.visitDate)} วันก่อน ({lastVisit.visitDate})
            </div>
            <div style={{ fontSize: 11, color: '#1E40AF', marginTop: 2, opacity: 0.85 }}>
              คัดลอก <strong>ยา ({lastVisit.medications?.length||0} ตัว)</strong> · <strong>เทคนิคยาพ่น</strong> · <strong>Trigger factors</strong> จากครั้งก่อน เพื่อให้แก้เฉพาะจุดที่เปลี่ยน
            </div>
          </div>
          <Btn variant="primary" size="sm" onClick={applyPrefill}>✓ ใช้ข้อมูลครั้งก่อน</Btn>
          <Btn variant="ghost" size="sm" onClick={() => setPrefillState('declined')}>เริ่มจากศูนย์</Btn>
        </div>
      )}

      {!isEditing && prefillState === 'used' && (
        <div style={{
          background: C.lowBg, border: `1px solid ${C.lowBorder}`, borderRadius: 10,
          padding: '10px 14px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10,
          fontSize: 12, color: C.low, fontWeight: 600,
        }}>
          ✓ ใช้ข้อมูลจาก Visit {lastVisit?.visitDate} — กรุณาประเมิน Adherence และเทคนิคยาพ่นใหม่
        </div>
      )}

      {isEditing && (
        <div style={{
          background: '#FFFBEB', border: '1px solid #FDE68A', borderRadius: 10,
          padding: '10px 14px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10,
          fontSize: 12, color: '#92400E', fontWeight: 600,
        }}>
          ✏️ คุณกำลังแก้ไข Visit ที่บันทึกไปแล้วเมื่อ {editingVisit.visitDate} — การบันทึกจะทับข้อมูลเดิม
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 330px', gap: 18, alignItems: 'start' }}>
        {/* LEFT: form */}
        <div>
          {/* ① Visit Info */}
          <SecHd n="1" title="ข้อมูลการเยี่ยม" />
          <Card>
            <div style={row2}>
              <FormField label="วันที่บันทึก" required>
                <Input type="date" value={f.visitDate} onChange={v => set('visitDate', v)} />
              </FormField>
              <FormField label="ชื่อเภสัชกร" required>
                <Input value={f.pharmacist} onChange={v => set('pharmacist', v)} placeholder="ภก./ภญ. ชื่อ นามสกุล" />
              </FormField>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Chief Complaint / อาการนำ</label>
              <TemplatePicker field="cc"
                onInsert={(text) => set('chiefComplaint', f.chiefComplaint ? `${f.chiefComplaint}\n${text}` : text)} />
            </div>
            <Textarea value={f.chiefComplaint} onChange={v => set('chiefComplaint', v)}
              placeholder="อาการหลักที่ผู้ป่วยมา / ข้อกังวล..." rows={2} />
          </Card>

          {/* ② Exacerbation */}
          <SecHd n="2" title="ประเมิน Exacerbation" color="#DC2626" />
          <Card>
            <div style={row3}>
              <FormField label="ครั้ง Exacerbation ใน 6 เดือนล่าสุด">
                <Input type="number" value={f.exacerbation.countThisYear}
                  onChange={v => setEx('countThisYear', parseInt(v) || 0)} />
              </FormField>
              <FormField label="ครั้งล่าสุดที่ Exacerbate">
                <Input type="date" value={f.exacerbation.lastDate}
                  onChange={v => setEx('lastDate', v)} />
              </FormField>
              <FormField label="ระดับความรุนแรง">
                <Select value={f.exacerbation.severity} onChange={v => setEx('severity', v)}
                  options={[
                    { value: 'None',     label: 'None (ไม่มี)' },
                    { value: 'Mild',     label: 'Mild (เพิ่มยาที่บ้าน)' },
                    { value: 'Moderate', label: 'Moderate (ต้องรับการรักษา)' },
                    { value: 'Severe',   label: 'Severe (นอน รพ./ICU)' },
                  ]} />
              </FormField>
            </div>
            <div style={{ display: 'flex', gap: 24, marginBottom: 14, flexWrap: 'wrap' }}>
              {[
                { label: 'ต้องนอนโรงพยาบาล (Hospitalization)', key: 'hospitalized' },
                { label: 'เข้าห้องฉุกเฉิน (ER)', key: 'erVisit' },
              ].map(({ label, key }) => (
                <label key={key} style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13 }}>
                  <input type="checkbox" checked={!!f.exacerbation[key]}
                    onChange={e => setEx(key, e.target.checked)}
                    style={{ accentColor: C.high, width: 16, height: 16 }} />
                  <span style={{ color: f.exacerbation[key] ? C.high : C.text, fontWeight: f.exacerbation[key] ? 600 : 400 }}>{label}</span>
                </label>
              ))}
            </div>
            <div style={row2}>
              <FormField label="ปัจจัยกระตุ้น (Trigger Factors)">
                <CheckboxGroup options={AppStore.TRIGGER_OPTIONS} selected={f.exacerbation.triggers}
                  onChange={v => setEx('triggers', v)} cols={1} />
              </FormField>
              <FormField label="ความถี่การใช้ยา Rescue (SABA)">
                <Select value={f.exacerbation.rescueMedUse} onChange={v => setEx('rescueMedUse', v)}
                  options={[
                    { value: 'Never',     label: 'ไม่เคยใช้' },
                    { value: 'Rarely',    label: 'นาน ๆ ครั้ง (<2 ครั้ง/สัปดาห์)' },
                    { value: 'Sometimes', label: 'บางครั้ง (2–4 ครั้ง/สัปดาห์)' },
                    { value: 'Often',     label: 'บ่อย (>4 ครั้ง/สัปดาห์)' },
                    { value: 'Daily',     label: 'ทุกวัน' },
                  ]} />
              </FormField>
            </div>
          </Card>

          {/* ③ Validated Assessments — Collapsible, on-demand */}
          {(['COPD', 'Both', 'Asthma'].includes(patient.diagnosis)) && (
            <>
              <SecHd n="3" title="แบบประเมินมาตรฐาน (กดเพื่อทำเมื่อต้องการ)" color="#1848A0"
                right={<span style={{ fontSize: 11, color: C.textMuted, marginLeft: 8 }}>เปิดเฉพาะเคสที่ต้องประเมิน</span>} />
              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {(['COPD', 'Both'].includes(patient.diagnosis)) && (
                  <>
                    <AssessmentCollapsible
                      title="CAT Score (COPD Assessment Test)"
                      subtitle="8 ข้อ คะแนน 0–40 · ใช้จัดกลุ่ม GOLD ABE"
                      icon="📋" color="#1848A0"
                      hasData={a.cat?.allAnswered}
                      summary={a.cat?.allAnswered
                        ? `${a.cat.score}/40 · ${AppStore.interpretCAT(a.cat.score).label}`
                        : null}
                      onClear={() => setAssessment('cat', { answers: [null,null,null,null,null,null,null,null], score: 0, allAnswered: false })}
                    >
                      <CATAssessment value={a.cat} onChange={v => setAssessment('cat', v)} />
                    </AssessmentCollapsible>
                    <AssessmentCollapsible
                      title="mMRC Dyspnea Scale"
                      subtitle="Grade 0–4 · ใช้คู่กับ CAT เพื่อ classify GOLD"
                      icon="💨" color="#1848A0"
                      hasData={a.mmrc?.grade != null}
                      summary={a.mmrc?.grade != null ? `Grade ${a.mmrc.grade}` : null}
                      onClear={() => setAssessment('mmrc', { grade: null })}
                    >
                      <MMRCAssessment value={a.mmrc} onChange={v => setAssessment('mmrc', v)} />
                    </AssessmentCollapsible>
                  </>
                )}
                {(['Asthma', 'Both'].includes(patient.diagnosis)) && (
                  <AssessmentCollapsible
                    title="ACT Score (Asthma Control Test)"
                    subtitle="5 ข้อ คะแนน 5–25 · <20 = ควบคุมไม่ได้"
                    icon="📋" color="#7C3AED"
                    hasData={a.act?.allAnswered}
                    summary={a.act?.allAnswered
                      ? `${a.act.score}/25 · ${AppStore.interpretACT(a.act.score).label}`
                      : null}
                    onClear={() => setAssessment('act', { answers: [null,null,null,null,null], score: 0, allAnswered: false })}
                  >
                    <ACTAssessment value={a.act} onChange={v => setAssessment('act', v)} />
                  </AssessmentCollapsible>
                )}
              </div>
            </>
          )}

          {/* Vitals & Spirometry */}
          <SecHd n="V" title="สัญญาณชีพ & Spirometry" color="#0891B2" />
          <Card>
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12 }}>
              <FormField label="SpO₂ (%)">
                <Input type="number" value={f.vitals?.spO2 ?? ''} onChange={v => setVital('spO2', v)} placeholder="เช่น 96" />
              </FormField>
              <FormField label="RR (/min)">
                <Input type="number" value={f.vitals?.rr ?? ''} onChange={v => setVital('rr', v)} placeholder="เช่น 18" />
              </FormField>
              <FormField label="BP (mmHg)">
                <Input value={f.vitals?.bp ?? ''} onChange={v => setVital('bp', v)} placeholder="เช่น 130/80" />
              </FormField>
              <FormField label="FEV₁ (% predicted)">
                <Input type="number" value={f.vitals?.fev1 ?? ''} onChange={v => setVital('fev1', v)} placeholder="เช่น 65" />
              </FormField>
              <FormField label="Peak Flow (L/min)">
                <Input type="number" value={f.vitals?.peakFlow ?? ''} onChange={v => setVital('peakFlow', v)} placeholder="เช่น 350" />
              </FormField>
            </div>
            {f.vitals?.spO2 && Number(f.vitals.spO2) < 92 && (
              <div style={{ marginTop: 10, padding: '8px 12px', borderRadius: 8, background: C.highBg, border: `1px solid ${C.highBorder}`, fontSize: 12, color: C.high, fontWeight: 600 }}>
                ⚠️ SpO₂ &lt; 92% — พิจารณาประเมินภาวะ hypoxemia และความจำเป็นในการให้ออกซิเจน
              </div>
            )}
          </Card>

          {/* ④ Medications */}
          <SecHd n="4" title="ยาที่ผู้ป่วยใช้อยู่ในปัจจุบัน" color="#0369A1"
            right={lastVisit && (
              <span style={{ fontSize: 11, color: C.textMuted, marginLeft: 8 }}>
                ครั้งก่อน {lastVisit.medications?.length || 0} ตัว · ขณะนี้ {f.medications.length} ตัว
              </span>
            )} />
          <Card>
            {f.medications.length > 0 && (
              <div style={{ marginBottom: 8 }}>
                <div className="rx-med-head" style={{
                  display: 'grid', gridTemplateColumns: 'auto 3fr 1fr 1fr auto',
                  gap: 8, padding: '0 12px', marginBottom: 4,
                }}>
                  {['', 'ชื่อยา', 'Dose', 'Adherence', ''].map((h, i) => (
                    <div key={i} style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: 'uppercase' }}>{h}</div>
                  ))}
                </div>
                {f.medications.map((med, i) => {
                  const status = !med.name ? undefined :
                    lastMedNames.includes(med.name) ? 'same' : 'new';
                  return (
                    <MedRow key={med.id || i} med={med} index={i}
                      onChange={updateMed} onRemove={removeMed}
                      changeStatus={lastVisit ? status : undefined} />
                  );
                })}
              </div>
            )}
            <Btn size="sm" variant="ghost" onClick={addMed}>+ เพิ่มยา</Btn>

            {/* ── Real-time alerts ── */}
            {f.medications.length > 0 && (() => {
              const ixAlerts = checkInteractions(f.medications, patient);
              const beers    = patient.age >= 65 ? checkBeers(patient, f.medications) : [];
              const renal    = getRenalCategory(patient?.eGFR);
              const renalWarn= renal && renal.sev !== 'ok';
              const total    = ixAlerts.length + beers.length + (renalWarn ? 1 : 0);
              if (total === 0) return null;
              return (
                <div style={{ marginTop: 12, display: 'flex', flexDirection: 'column', gap: 7 }}>
                  {ixAlerts.map((a, i) => (
                    <div key={i} style={{
                      display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 13px',
                      borderRadius: 9, background: a.severity === 'High' ? C.highBg : C.mediumBg,
                      border: `1.5px solid ${a.severity === 'High' ? C.highBorder : C.mediumBorder}`,
                    }}>
                      <span style={{ fontSize: 16, flexShrink: 0 }}>⚠️</span>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: a.severity === 'High' ? C.high : C.medium }}>
                          Drug Interaction: {a.drug1} ↔ {a.drug2}
                        </div>
                        <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3, lineHeight: 1.5 }}>{a.mechanism}</div>
                        <div style={{ fontSize: 11, fontWeight: 600, color: a.severity === 'High' ? C.high : C.medium, marginTop: 2 }}>→ {a.action}</div>
                      </div>
                    </div>
                  ))}
                  {beers.map((b, i) => (
                    <div key={i} style={{
                      display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 13px',
                      borderRadius: 9, background: '#FFF7ED', border: '1.5px solid #FED7AA',
                    }}>
                      <span style={{ fontSize: 16, flexShrink: 0 }}>👴</span>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: '#C2410C' }}>Beers Criteria: {b.drug}</div>
                        <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3, lineHeight: 1.5 }}>{b.reason}</div>
                        <div style={{ fontSize: 11, fontWeight: 600, color: '#C2410C', marginTop: 2 }}>→ {b.recommendation}</div>
                      </div>
                    </div>
                  ))}
                  {renalWarn && (
                    <div style={{
                      display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 13px',
                      borderRadius: 9, background: renal.sev === 'alert' ? C.highBg : C.mediumBg,
                      border: `1.5px solid ${renal.sev === 'alert' ? C.highBorder : C.mediumBorder}`,
                    }}>
                      <span style={{ fontSize: 16, flexShrink: 0 }}>🩺</span>
                      <div>
                        <div style={{ fontSize: 12, fontWeight: 700, color: renal.color }}>
                          Renal Impairment: eGFR {patient.eGFR} ({renal.stage} — {renal.label})
                        </div>
                        <div style={{ fontSize: 11, color: C.textMuted, marginTop: 3 }}>
                          ตรวจสอบขนาดยาที่ต้องปรับใน CKD ก่อนสั่งจ่าย
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })()}
          </Card>

          {/* ⑤ Inhaler Technique */}
          <SecHd n="5" title="ประเมินเทคนิคการใช้ยาพ่น (Inhaler Technique)" color="#7C3AED" />
          <Card>
            {f.inhalerTechnique.map((entry, i) => (
              <InhalerChecklistCard key={entry.id || i} entry={entry} index={i} onChange={updateTech} onRemove={removeTech} />
            ))}
            <Btn size="sm" variant="ghost" onClick={addTech}>+ เพิ่มการประเมินอุปกรณ์</Btn>
          </Card>

          {/* ⑥ Adherence */}
          <SecHd n="6" title="ประเมินความร่วมมือในการใช้ยา (Medication Adherence)" color="#059669" />
          <Card>
            <p style={{ margin: '0 0 12px', fontSize: 12, color: C.textMuted }}>
              ให้ผู้ป่วยตอบว่า "ใช่" หรือ "ไม่ใช่" — ข้อที่ตอบ "ใช่" หมายถึงมีปัญหา
            </p>
            <AdherenceSection adherence={f.adherence} onChange={v => set('adherence', v)} />
          </Card>

          {/* ⑦ DRP + PCNE */}
          <SecHd n="7" title="Drug-Related Problems (DRP) — PCNE v9.1" color="#DC2626" />
          <Card>
            <DRPSection drp={f.drp} onChange={v => set('drp', v)} visit={f} patient={patient} />
            {f.drp?.noDRP === false && (
              <div style={{ marginTop: 14, borderTop: `1px solid ${C.border}`, paddingTop: 14 }}>
                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8, marginBottom: 10 }}>
                  <div style={{ fontSize: 12, fontWeight: 800, color: C.primary }}>
                    📋 PCNE v9.1 Classification
                  </div>
                  <Btn size="sm" variant="primary" onClick={() => {
                    const auto = autoPCNE(f, patient);
                    if (!auto) { setShowToast('ยังไม่พบ DRP ให้จัดประเภทอัตโนมัติ'); return; }
                    set('drp', { ...f.drp, pcne: { ...(f.drp?.pcne || {}), ...auto } });
                  }}>⚡ เติม PCNE อัตโนมัติ</Btn>
                </div>
                {f.drp?.pcne?._autoFrom && (
                  <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 8, fontStyle: 'italic' }}>
                    เติมจาก DRP: {f.drp.pcne._autoFrom} — แก้ไขเพิ่มเติมได้ตามต้องการ
                  </div>
                )}
                <PCNEPanel pcne={f.drp?.pcne} onChange={v => set('drp', { ...f.drp, pcne: v })} />
              </div>
            )}
          </Card>

          {/* ⑧ SOAP */}
          <SecHd n="8" title="บันทึก SOAP" color="#0F766E"
            right={<span style={{ fontSize: 11, color: C.textMuted, marginLeft: 8 }}>🏷️ คลิก Templates เพื่อใส่ snippet</span>} />
          <Card>
            <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
              <Btn size="sm" variant="primary" onClick={() => {
                const auto = autoGenerateSOAP(f, patient);
                setF(prev => ({
                  ...prev,
                  soap: {
                    s: auto.s || prev.soap.s,
                    o: auto.o || prev.soap.o,
                    a: auto.a || prev.soap.a,
                    p: auto.p || prev.soap.p,
                  }
                }));
              }}>⚡ สร้าง SOAP อัตโนมัติ</Btn>
              <Btn size="sm" variant="ghost" onClick={() => setF(prev => ({ ...prev, soap: { s: '', o: '', a: '', p: '' } }))}>ล้าง</Btn>
              <span style={{ fontSize: 11, color: C.textMuted }}>สร้างจากข้อมูลที่บันทึกทั้งหมดข้างต้น — แก้ไขเพิ่มเติมได้ตามต้องการ</span>
            </div>
            <SOAPField label="S — Subjective" fieldKey="s"
              value={f.soap.s} onChange={v => setSOAP('s', v)}
              placeholder="อาการที่ผู้ป่วยรายงาน ข้อกังวล ประสบการณ์ใช้ยา..." rows={2} />
            <SOAPField label="O — Objective" fieldKey="o"
              value={f.soap.o} onChange={v => setSOAP('o', v)}
              placeholder="ผลตรวจร่างกาย, lab ที่เกี่ยวข้อง..." rows={2} />
            <SOAPField label="A — Assessment" fieldKey="a"
              value={f.soap.a} onChange={v => setSOAP('a', v)}
              placeholder="การวิเคราะห์ DRPs, ความร่วมมือ, เทคนิค, ความเสี่ยง..." rows={3} />
            <SOAPField label="P — Plan" fieldKey="p"
              value={f.soap.p} onChange={v => setSOAP('p', v)}
              placeholder="แผนการแก้ปัญหา คำแนะนำ การส่งต่อ นัดติดตาม..." rows={3} />
          </Card>

          {/* ⑨ Counseling + Plan */}
          <SecHd n="9" title="หัวข้อการให้คำปรึกษา และแผนติดตาม" color="#D97706" />
          <Card>
            <FormField label="หัวข้อ Counseling">
              <CheckboxGroup options={AppStore.COUNSELING_TOPICS} selected={f.counselingTopics}
                onChange={v => set('counselingTopics', v)} cols={2} />
            </FormField>
            <div style={row2}>
              <FormField label="วันนัดครั้งถัดไป (Next Visit)">
                <Input type="date" value={f.nextVisit} onChange={v => set('nextVisit', v)} />
              </FormField>
            </div>
            <FormField label="บันทึกเพิ่มเติมของเภสัชกร (Auto Telepharmacy Note)">
              <div style={{ display: 'flex', gap: 8, marginBottom: 6 }}>
                <Btn size="sm" variant="primary" onClick={() => {
                  const note = autoPharmacistNote(f, patient);
                  set('pharmacistNote', f.pharmacistNote ? `${f.pharmacistNote}\n\n${note}` : note);
                }}>⚡ สร้างบันทึก Telepharmacy อัตโนมัติ</Btn>
                <Btn size="sm" variant="ghost" onClick={() => set('pharmacistNote', '')}>ล้าง</Btn>
              </div>
              <Textarea value={f.pharmacistNote} onChange={v => set('pharmacistNote', v)}
                placeholder="คลิก ⚡ เพื่อสร้างบันทึก Telepharmacy อัตโนมัติ หรือพิมพ์เองได้เลย..." rows={4} />
            </FormField>
          </Card>

          {/* HA6: Informed Consent — รวมไว้ใน Counseling card เพื่อกรอกง่ายในจุดเดียว */}
          <Card style={{ padding: '12px 18px', background: f.informedConsent ? '#F0FDF4' : '#FFFBEB', border: `1px solid ${f.informedConsent ? C.lowBorder : '#FDE68A'}` }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 12, cursor: 'pointer' }}>
              <input type="checkbox" checked={f.informedConsent || false}
                onChange={e => set('informedConsent', e.target.checked)}
                style={{ accentColor: C.low, width: 20, height: 20, flexShrink: 0 }} />
              <div>
                <div style={{ fontSize: 13, fontWeight: 700, color: f.informedConsent ? C.low : '#92400E' }}>
                  {f.informedConsent ? '✅' : '⬜'} HA PSG.6 Informed Consent — ผู้ป่วย/ผู้แทนยินยอมรับบริบาลเภสัชกรรม
                </div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>
                  {f.informedConsent ? 'ผู้ป่วยได้รับข้อมูลครบถ้วนและยินยอมแล้ว' : 'ยังไม่ได้รับความยินยอม — กรุณาแจ้งผู้ป่วยก่อนบันทึก'}
                </div>
              </div>
            </label>
          </Card>

          {/* Inline validation summary — appears after a save attempt, updates live as fields are fixed */}
          {attemptedSave && (() => {
            const live = validate();
            if (live.length === 0) {
              return (
                <div style={{
                  display: 'flex', alignItems: 'center', gap: 9, margin: '20px 0 0',
                  padding: '11px 15px', borderRadius: 10, fontSize: 13, fontWeight: 600,
                  background: 'rgba(16,185,129,0.10)', border: `1px solid ${C.low}`, color: C.low,
                }}>
                  <span style={{ fontSize: 15 }}>✅</span> ข้อมูลครบถ้วนแล้ว — พร้อมบันทึก
                </div>
              );
            }
            return (
              <div style={{
                margin: '20px 0 0', padding: '13px 16px', borderRadius: 10,
                background: 'rgba(245,158,11,0.09)', border: `1px solid ${C.medium}`,

                <div style={{ display: 'flex', alignItems: 'center', gap: 8, fontSize: 13, fontWeight: 700, color: '#92400E', marginBottom: 8 }}>
                  <span style={{ fontSize: 15 }}>⚠️</span> มีข้อมูลที่อาจตกหล่น {live.length} รายการ
                </div>
                <ul style={{ margin: 0, paddingLeft: 22, display: 'flex', flexDirection: 'column', gap: 4 }}>
                  {live.map((w, i) => (
                    <li key={i} style={{ fontSize: 12.5, color: '#78350F', lineHeight: 1.5 }}>
                      <b>{w.title}</b>{w.detail ? <span style={{ color: '#92400E', opacity: 0.85 }}> — {w.detail}</span> : null}
                    </li>
                  ))}
                </ul>
                <div style={{ fontSize: 11.5, color: '#92400E', opacity: 0.75, marginTop: 8 }}>

                </div>
              </div>

          {/* Buttons */}

            <div>
              {isEditing && (
                <Btn variant="danger" onClick={() => setConfirmDelete(true)}>🗑️ ลบ Visit นี้</Btn>

            <div style={{ display: 'flex', gap: 10 }}>
              <Btn variant="ghost" onClick={guardedLeave}>ยกเลิก</Btn>
              <Btn variant="primary" size="lg" onClick={() => handleSave(false)} disabled={saving}>
                {saving ? <><span className="rx-spinner" /> กำลังบันทึก...</> : (isEditing ? '💾 บันทึกการแก้ไข (⌘+S)' : '💾 บันทึกการบริบาล (⌘+S)')}
              </Btn>
            </div>
          </div>
        </div>

        {/* RIGHT: Sticky panels */}
        <div style={{ position: 'sticky', top: 70, display: 'flex', flexDirection: 'column', gap: 14 }}>
          {/* Risk panel */}
          <Card style={{ border: `2px solid ${riskColor}30`, padding: 16 }}>
            <div style={{ textAlign: 'center', marginBottom: 12 }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 5 }}>
                ระดับความเสี่ยง (Auto)
              </div>
              <RiskBadge level={f.riskLevel} size="lg" />
            </div>
            {f.riskFlags.length > 0 ? (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 5 }}>
                {f.riskFlags.map((flag, i) => (
                  <div key={i} style={{
                    display: 'flex', alignItems: 'flex-start', gap: 6,
                    fontSize: 11, color: C.text, padding: '4px 8px',
                    background: `${riskColor}08`, borderRadius: 5,

          {(['COPD', 'Both'].includes(patient.diagnosis)) && (a.cat?.allAnswered || a.mmrc?.grade != null || f.exacerbation.countThisYear > 0) && (
            <GOLDClassifierCard
              catScore={a.cat?.allAnswered ? a.cat.score : null}

              exYear={f.exacerbation.countThisYear}

          {/* GINA Step Recommendation (Asthma patients) */}
          {(['Asthma', 'Both'].includes(patient.diagnosis)) && a.act?.allAnswered && (
            <GINAClassifierCard actScore={a.act.score} exYear={f.exacerbation.countThisYear} />

          <ClinicalDecisionSupport
            patient={patient}
            medications={f.medications}
            inhalerTechnique={f.inhalerTechnique}
            adherence={f.adherence}
            exacerbation={f.exacerbation}
            assessments={a}
          />

          {/* Beers Criteria for elderly */}
          {patient.age >= 65 && f.medications.length > 0 && (
            <BeersAlert patient={patient} medications={f.medications} />
          )}

          {/* HA3: HAM / LASA Alert */}
          {f.medications.length > 0 && (
            <HAMAlert medications={f.medications} />

          <LastVisitsPanel visits={previousVisits} currentMeds={f.medications} />

          <span style={{ fontSize: 15 }}>{showToast.type === 'success' ? '✅' : showToast.type === 'warning' ? '⚠️' : '⛔'}</span>
          <span>{showToast.msg}</span>
        </div>
      )}

      {/* Draft Recovery Prompt */}
      {showDraftPrompt && (
        <Modal open={true} onClose={() => {
          // Decline: clear and use blank
          clearDraft(patientId, isEditing ? editingVisit.id : null);
          setShowDraftPrompt(null);
        }} title="🔄 พบร่างข้อมูลที่ยังไม่ได้บันทึก" width={460}>
          <p style={{ margin: '0 0 8px', fontSize: 13, color: C.text, lineHeight: 1.6 }}>
            พบร่าง Visit ที่บันทึกไว้เมื่อ {showDraftPrompt.ts ? new Date(showDraftPrompt.ts).toLocaleString('th-TH') : 'ไม่ทราบ'}
          </p>
          <p style={{ margin: '0 0 18px', fontSize: 12, color: C.textMuted }}>
            ถ้ากด "กู้คืนร่าง" ข้อมูลที่ยังไม่ได้ส่งจะถูกโหลดมา ถ้ากด "ยกเลิก" ร่างจะถูกลบถาวร
          </p>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn variant="ghost" onClick={() => {
              clearDraft(patientId, isEditing ? editingVisit.id : null);
              setShowDraftPrompt(null);
            }}>ยกเลิกร่าง</Btn>
            <Btn variant="primary" onClick={() => {
              setF(showDraftPrompt.data);
              setPrefillState('used');
              setShowDraftPrompt(null);
              setShowToast({ msg: '✓ กู้คืนร่างสำเร็จ', type: 'success' });
              setTimeout(() => setShowToast(null), 3000);
            }}>กู้คืนร่าง</Btn>
          </div>
        </Modal>
      )}

      {/* Validation Warning Modal */}
      {showValidation && (
        <Modal open={true} onClose={() => setShowValidation(null)}
          title="⚠️ ตรวจสอบข้อมูลก่อนบันทึก" width={500}>
          <p style={{ margin: '0 0 14px', fontSize: 13, color: C.text, lineHeight: 1.6 }}>
            ตรวจพบข้อมูลที่อาจตกหล่น {showValidation.warnings.length} รายการ — ต้องการระบุเพิ่มหรือไม่?
          </p>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 18 }}>
            {showValidation.warnings.map((w, i) => (
              <div key={i} style={{
                padding: '10px 12px', borderRadius: 7,
                background: C.mediumBg, border: `1px solid ${C.mediumBorder}`,
              }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: '#92400E', marginBottom: 2 }}>⚠ {w.title}</div>
                <div style={{ fontSize: 12, color: '#92400E', lineHeight: 1.5 }}>{w.detail}</div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
            <Btn variant="ghost" onClick={() => setShowValidation(null)}>← กลับไปแก้</Btn>
            <Btn variant="primary" onClick={() => {
              setShowValidation(null);
              handleSave(true);
            }}>บันทึกต่อไป</Btn>
          </div>
        </Modal>
      )}

      {/* Delete confirmation */}
      <ConfirmModal open={confirmDelete} onClose={() => setConfirmDelete(false)}
        onConfirm={handleDelete}
        title="ยืนยันการลบ Visit"
        message={`ลบบันทึกการเยี่ยมวันที่ ${editingVisit?.visitDate}? ข้อมูลทั้งหมดของ Visit นี้จะหายและไม่สามารถกู้คืนได้`}
        danger />
    </div>
  );
}

Object.assign(window, { VisitForm });
