Object.assign(window, {
  downloadCSV, exportPatients, exportVisits, exportTelepharmacy,
  printPatientReport, printMonthlyReport, openPrintWindow, ExportSection,
  printPatientTakeHome,
});
</script>
<script type="text/babel">
// PatientViews.jsx — PatientList + PatientForm
// Requires: window.* from Shared.jsx, AppStore from store.js

const { useState: pvState, useEffect: pvEffect } = React;

// ── PatientForm (Add / Edit) ──────────────────────────
function PatientForm({ patient, onSave, onClose }) {
  const blank = {
    hn: '', prefix: 'นาย', firstName: '', lastName: '',
    age: '', gender: 'M', diagnosis: 'COPD',
    goldGrade: '', asthmaControl: '',
    comorbidities: [], phone: '', insurance: 'UC (บัตรทอง)',
    dateOfBirth: '',
    allergies: ['NKDA (ไม่แพ้ยา)'], allergyDetail: '',
    eGFR: '', weight: '',
    smokingStatus: 'Unknown', packYears: '',
    vaccinations: { flu: '', pcv13: '', ppsv23: '', covid: '' },
  };
  const [f, setF] = pvState(patient ? { ...patient } : blank);
  const [err, setErr] = pvState({});

  const set = (k, v) => setF(prev => ({ ...prev, [k]: v }));

  const validate = () => {
    const e = {};
    if (!f.hn.trim())        e.hn        = 'กรุณากรอก HN';
    if (!f.firstName.trim()) e.firstName = 'กรุณากรอกชื่อ';
    if (!f.lastName.trim())  e.lastName  = 'กรุณากรอกนามสกุล';
    if (!f.age || isNaN(f.age) || f.age < 1) e.age = 'กรุณากรอกอายุ';
    if (!f.phone.trim())     e.phone     = 'กรุณากรอกเบอร์โทร';
    setErr(e);
    return Object.keys(e).length === 0;
  };

  const handleSave = () => {
    if (!validate()) return;
    onSave({
      ...f,
      age: parseInt(f.age),
      eGFR: f.eGFR === '' ? null : parseFloat(f.eGFR),
      weight: f.weight === '' ? null : parseFloat(f.weight),
      packYears: f.packYears === '' ? null : parseFloat(f.packYears),
      goldGrade:     ['COPD', 'Both'].includes(f.diagnosis) ? f.goldGrade   : null,
      asthmaControl: ['Asthma', 'Both'].includes(f.diagnosis) ? f.asthmaControl : null,
    });
  };

  const needGOLD   = ['COPD', 'Both'].includes(f.diagnosis);
  const needAsthma = ['Asthma', 'Both'].includes(f.diagnosis);

  const row2 = { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 };
  const row3 = { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14 };

  return (
    <div>
      {/* Basic Info */}
      <p style={{ margin: '0 0 14px', fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>ข้อมูลพื้นฐาน</p>
      <div style={row2}>
        <FormField label="HN" required error={err.hn}>
          <Input value={f.hn} onChange={v => set('hn', v)} placeholder="67-XXXXXX" error={err.hn} />
        </FormField>
        <FormField label="คำนำหน้า">
          <Select value={f.prefix} onChange={v => set('prefix', v)} options={['นาย','นาง','นางสาว','เด็กชาย','เด็กหญิง']} />
        </FormField>
      </div>
      <div style={row2}>
        <FormField label="ชื่อ" required error={err.firstName}>
          <Input value={f.firstName} onChange={v => set('firstName', v)} placeholder="ชื่อ" />
        </FormField>
        <FormField label="นามสกุล" required error={err.lastName}>
          <Input value={f.lastName} onChange={v => set('lastName', v)} placeholder="นามสกุล" />
        </FormField>
      </div>
      <div style={row3}>
        <FormField label="อายุ (ปี)" required error={err.age}>
          <Input value={f.age} onChange={v => set('age', v)} type="number" placeholder="0" />
        </FormField>
        <FormField label="เพศ">
          <Select value={f.gender} onChange={v => set('gender', v)}
            options={[{ value: 'M', label: 'ชาย' }, { value: 'F', label: 'หญิง' }]} />
        </FormField>
        <FormField label="สิทธิการรักษา">
          <Select value={f.insurance} onChange={v => set('insurance', v)} options={AppStore.INSURANCE_OPTIONS} />
        </FormField>
      </div>

      {/* Diagnosis */}
      <hr style={{ margin: '8px 0 16px', border: 'none', borderTop: `1px solid ${C.border}` }} />
      <p style={{ margin: '0 0 14px', fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>การวินิจฉัย</p>
      <FormField label="โรคหลัก" required>
        <Select value={f.diagnosis} onChange={v => set('diagnosis', v)}
          options={[
            { value: 'COPD',   label: 'COPD' },
            { value: 'Asthma', label: 'Asthma' },
            { value: 'Both',   label: 'COPD + Asthma' },
          ]} />
      </FormField>
      <div style={row2}>
        {needGOLD && (
          <FormField label="COPD Severity (GOLD)">
            <Select value={f.goldGrade} onChange={v => set('goldGrade', v)}
              placeholder="เลือก GOLD Grade"
              options={[
                { value: '1', label: 'GOLD 1 (Mild)' },
                { value: '2', label: 'GOLD 2 (Moderate)' },
                { value: '3', label: 'GOLD 3 (Severe)' },
                { value: '4', label: 'GOLD 4 (Very Severe)' },
              ]} />
          </FormField>
        )}
        {needAsthma && (
          <FormField label="Asthma Control">
            <Select value={f.asthmaControl} onChange={v => set('asthmaControl', v)}
              placeholder="เลือกระดับ"
              options={[
                { value: 'Controlled',    label: 'Controlled (ควบคุมได้)' },
                { value: 'Partly',        label: 'Partly Controlled' },
                { value: 'Uncontrolled',  label: 'Uncontrolled (ควบคุมไม่ได้)' },
              ]} />
          </FormField>
        )}
      </div>
      <FormField label="โรคร่วม (Comorbidities)" hint="เลือกทุกข้อที่เกี่ยวข้อง">
        <CheckboxGroup options={AppStore.COMORBIDITY_OPTIONS} selected={f.comorbidities}
          onChange={v => set('comorbidities', v)} cols={3} />
      </FormField>

      {/* Contact */}
      <hr style={{ margin: '8px 0 16px', border: 'none', borderTop: `1px solid ${C.border}` }} />
      <p style={{ margin: '0 0 14px', fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>ช่องทางติดต่อ</p>
      <div style={row2}>
        <FormField label="เบอร์โทรศัพท์" required error={err.phone}>
          <Input value={f.phone} onChange={v => set('phone', v)} placeholder="0XX-XXX-XXXX" />
        </FormField>
        <FormField label="วันเกิด (DOB)" hint="ใช้เป็น 2nd identifier ตาม HA PSG1">
          <Input type="date" value={f.dateOfBirth} onChange={v => set('dateOfBirth', v)} />
        </FormField>
      </div>

      {/* Safety: Allergies + Renal */}
      <hr style={{ margin: '8px 0 16px', border: 'none', borderTop: `1px solid ${C.border}` }} />
      <p style={{ margin: '0 0 14px', fontSize: 11, fontWeight: 700, color: '#DC2626', textTransform: 'uppercase', letterSpacing: '0.06em' }}>⚠️ ข้อมูลความปลอดภัย</p>
      <FormField label="ประวัติแพ้ยา (Drug Allergies)" hint="เลือก NKDA หากไม่แพ้ยา หรือเลือกตัวยาที่แพ้">
        <CheckboxGroup options={AppStore.ALLERGY_OPTIONS} selected={f.allergies}
          onChange={v => set('allergies', v)} cols={3} />
      </FormField>
      {f.allergies.length > 0 && !f.allergies.every(a => a.startsWith('NKDA')) && (
        <FormField label="รายละเอียดอาการแพ้" hint="เช่น 'PCN → rash, Sulfa → SJS' หรืออาการที่เคยเกิด">
          <Input value={f.allergyDetail} onChange={v => set('allergyDetail', v)} placeholder="ยา → อาการที่เกิดขึ้น" />
        </FormField>
      )}
      <div style={row3}>
        <FormField label="eGFR (mL/min/1.73m²)" hint="ถ้ามีค่า lab ล่าสุด">
          <Input value={f.eGFR} onChange={v => set('eGFR', v)} type="number" placeholder="เช่น 75" />
        </FormField>
        <FormField label="น้ำหนัก (kg)">
          <Input value={f.weight} onChange={v => set('weight', v)} type="number" placeholder="เช่น 65" />
        </FormField>
      </div>

      {/* Smoking + Vaccinations */}
      <hr style={{ margin: '8px 0 16px', border: 'none', borderTop: `1px solid ${C.border}` }} />
      <p style={{ margin: '0 0 14px', fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.06em' }}>🚬 การสูบบุหรี่ & 💉 วัคซีน</p>
      <div style={row2}>
        <FormField label="สถานะการสูบบุหรี่">
          <Select value={f.smokingStatus} onChange={v => set('smokingStatus', v)}
            options={AppStore.SMOKING_OPTIONS} />
        </FormField>
        {(f.smokingStatus === 'Current' || f.smokingStatus === 'Ex') && (
          <FormField label="Pack-Years" hint="จำนวนซองที่สูบต่อวัน × ปีที่สูบ">
            <Input value={f.packYears} onChange={v => set('packYears', v)} type="number" placeholder="เช่น 20" />
          </FormField>
        )}
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 10 }}>
        {AppStore.VACCINATION_TYPES.map(t => (
          <FormField key={t.id} label={t.label.split(' (')[0]}>
            <Input type="date" value={f.vaccinations[t.id] || ''}
              onChange={v => set('vaccinations', { ...f.vaccinations, [t.id]: v })} />
          </FormField>
        ))}
      </div>

      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end', marginTop: 8 }}>
        <Btn variant="ghost" onClick={onClose}>ยกเลิก</Btn>
        <Btn variant="primary" onClick={handleSave}>
          {patient ? 'บันทึกการแก้ไข' : 'เพิ่มผู้ป่วย'}
        </Btn>
      </div>
    </div>
  );
}

// ── PatientList ───────────────────────────────────────
function PatientList({ data, onDataChange, navigate }) {
  const [search, setSearch]     = pvState('');
  const [filterDx, setFilterDx] = pvState('');
  const [filterRisk, setFilterRisk] = pvState('');
  const [addOpen, setAddOpen]   = pvState(false);
  const [editPt, setEditPt]     = pvState(null);
  const [delId, setDelId]       = pvState(null);
  const [csvOpen, setCsvOpen]   = pvState(false);
  const [csvText, setCsvText]   = pvState('');
  const [csvPreview, setCsvPreview] = pvState(null);
  const [csvError, setCsvError] = pvState('');

  const parseCSV = (text) => {
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) return { error: 'ไฟล์ CSV ต้องมีหัวตารางอย่างน้อย 1 แถวข้อมูล' };
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
    const rows = lines.slice(1).map(line => {
      const vals = line.split(',').map(v => v.trim().replace(/"/g, ''));
      const obj = {};
      headers.forEach((h, j) => { obj[h] = vals[j] || ''; });
      return {
        hn:        obj['hn'] || obj['hn_no'] || '',
        prefix:    obj['prefix'] || obj['คำนำหน้า'] || 'นาย',
        firstName: obj['firstname'] || obj['ชื่อ'] || '',
        lastName:  obj['lastname'] || obj['นามสกุล'] || '',
        age:       parseInt(obj['age'] || obj['อายุ']) || 0,
        gender:    (obj['gender'] || 'M').toUpperCase().startsWith('F') ? 'F' : 'M',
        diagnosis: obj['diagnosis'] || obj['โรค'] || 'COPD',
        phone:     obj['phone'] || obj['โทร'] || '',
        insurance: obj['insurance'] || obj['สิทธิ์'] || 'UC (บัตรทอง)',
        comorbidities: [], allergies: ['NKDA (ไม่แพ้ยา)'], allergyDetail: '',
        eGFR: null, weight: null, smokingStatus: 'Unknown', packYears: null,
        vaccinations: { flu: '', pcv13: '', ppsv23: '', covid: '' },
      };
    }).filter(r => r.hn && r.firstName);
    if (rows.length === 0) return { error: 'ไม่พบข้อมูลที่ถูกต้อง — ตรวจสอบว่ามีคอลัมน์ HN และ FirstName' };
    return { rows };
  };

  const handleCSVPreview = () => {
    const result = parseCSV(csvText);
    if (result.error) { setCsvError(result.error); setCsvPreview(null); }
    else { setCsvPreview(result.rows); setCsvError(''); }
  };

  const handleCSVImport = () => {
    if (!csvPreview || csvPreview.length === 0) return;
    const newPts = csvPreview.map(row => ({
      ...row, id: AppStore.generateId(),
      createdAt: new Date().toISOString().slice(0, 10),
      isHighRisk: false, riskLevel: 'Low', riskFlags: [], nextTelepharmacy: null,
    }));
    onDataChange({ ...data, patients: [...data.patients, ...newPts] });
    setCsvOpen(false); setCsvText(''); setCsvPreview(null); setCsvError('');
  };

  const filtered = data.patients.filter(p => {
    const q = search.toLowerCase();
    const nameMatch = (p.firstName + ' ' + p.lastName + ' ' + p.hn).toLowerCase().includes(q);
    const dxMatch   = !filterDx   || p.diagnosis === filterDx;
    const riskMatch = !filterRisk || p.riskLevel  === filterRisk;
    return nameMatch && dxMatch && riskMatch;
  });

  const handleAdd = (formData) => {
    const risk = AppStore.calculateRisk(formData, null);
    const newPt = {
      ...formData,
      id: AppStore.generateId(), createdAt: new Date().toISOString().slice(0, 10),
      isHighRisk: risk.level === 'High', riskLevel: risk.level,
      riskFlags: risk.flags, nextTelepharmacy: null,
    };
    onDataChange({ ...data, patients: [...data.patients, newPt] });
    setAddOpen(false);
  };

  const handleEdit = (formData) => {
    const risk = AppStore.calculateRisk(formData, null);
    const updated = data.patients.map(p => p.id === editPt.id
      ? { ...p, ...formData, isHighRisk: risk.level === 'High', riskLevel: risk.level, riskFlags: risk.flags }
      : p);
    onDataChange({ ...data, patients: updated });
    setEditPt(null);
  };

  const handleDelete = (id) => {
    onDataChange({
      ...data,
      patients:     data.patients.filter(p => p.id !== id),
      visits:       data.visits.filter(v => v.patientId !== id),
      telepharmacy: data.telepharmacy.filter(t => t.patientId !== id),
    });
    setDelId(null);
  };

  const getLastVisit = (id) => {
    const vs = data.visits.filter(v => v.patientId === id).sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    return vs[0]?.visitDate || null;
  };
  const daysAgo = (d) => d ? Math.floor((Date.now() - new Date(d).getTime()) / 86400000) : null;

  const cols = [
    {
      key: 'hn', label: 'HN', width: 110,
      render: p => <span style={{ fontFamily: 'monospace', fontWeight: 600, fontSize: 12 }}>{p.hn}</span>,
    },
    {
      key: 'name', label: 'ชื่อ-นามสกุล',
      render: p => (
        <div>
          <div style={{ fontWeight: 600, color: C.text }}>{p.prefix}{p.firstName} {p.lastName}</div>
          <div style={{ fontSize: 11, color: C.textMuted }}>อายุ {p.age} ปี · {p.gender === 'M' ? 'ชาย' : 'หญิง'}</div>
        </div>
      ),
    },
    {
      key: 'diagnosis', label: 'การวินิจฉัย',
      render: p => (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <DiagBadge diagnosis={p.diagnosis} />
          {p.goldGrade && <span style={{ fontSize: 11, color: C.textMuted }}>GOLD {p.goldGrade}</span>}
          {p.asthmaControl && <span style={{ fontSize: 11, color: C.textMuted }}>{p.asthmaControl}</span>}
        </div>
      ),
    },
    {
      key: 'risk', label: 'ความเสี่ยง', width: 150,
      render: p => <RiskBadge level={p.riskLevel || 'Low'} />,
    },
    {
      key: 'insurance', label: 'สิทธิ์', width: 120,
      render: p => <span style={{ fontSize: 12 }}>{p.insurance}</span>,
    },
    {
      key: 'lastVisit', label: 'เยี่ยมล่าสุด', width: 150,
      render: p => {
        const d = getLastVisit(p.id);
        const da = daysAgo(d);
        if (!d) return <span style={{ fontSize: 11, color: '#0369A1', fontWeight: 600 }}>🆕 ผู้ป่วยใหม่</span>;
        const color = da > 90 ? C.high : da > 30 ? C.medium : C.low;
        return (
          <div>
            <div style={{ fontSize: 12, color: C.text }}>{d}</div>
            <div style={{ fontSize: 11, color, fontWeight: 600 }}>{da} วันก่อน</div>
          </div>
        );
      },
    },
    {
      key: 'actions', label: '', width: 180, align: 'right',
      render: p => (
        <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
          <Btn size="sm" variant="accent" onClick={() => navigate('visit-form', p.id)}>+ บันทึก</Btn>
          <Btn size="sm" variant="ghost"  onClick={() => navigate('history', p.id)}>ประวัติ</Btn>
          <Btn size="sm" variant="ghost"  onClick={() => setEditPt(p)}>แก้ไข</Btn>
          <Btn size="sm" variant="danger" onClick={() => setDelId(p.id)}>ลบ</Btn>
        </div>
      ),
    },
  ];

  const highRiskCount   = data.patients.filter(p => p.riskLevel === 'High').length;
  const mediumRiskCount = data.patients.filter(p => p.riskLevel === 'Medium').length;

  return (
    <div>
      <SectionHeader
        title="ทะเบียนผู้ป่วย"
        subtitle={`ผู้ป่วยทั้งหมด ${data.patients.length} ราย · High Risk ${highRiskCount} ราย · Medium Risk ${mediumRiskCount} ราย`}
        action={<div style={{ display: 'flex', gap: 8 }}>
          <Btn variant="ghost" onClick={() => setCsvOpen(true)}>📥 Import CSV</Btn>
          <Btn variant="primary" onClick={() => setAddOpen(true)}>+ เพิ่มผู้ป่วย</Btn>
        </div>}
      />

      {/* Filters */}
      <Card style={{ marginBottom: 16, padding: '14px 20px' }}>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <Input value={search} onChange={setSearch} placeholder="🔍  ค้นหา HN / ชื่อ-นามสกุล..." />
          </div>
          <Select value={filterDx} onChange={setFilterDx} placeholder="ทุกการวินิจฉัย"
            options={[
              { value: 'COPD', label: 'COPD' },
              { value: 'Asthma', label: 'Asthma' },
              { value: 'Both', label: 'COPD + Asthma' },
            ]}
            style={{ width: 180 }} />
          <Select value={filterRisk} onChange={setFilterRisk} placeholder="ทุกระดับความเสี่ยง"
            options={[
              { value: 'High',   label: 'High Risk' },
              { value: 'Medium', label: 'Medium Risk' },
              { value: 'Low',    label: 'Low Risk' },
            ]}
            style={{ width: 200 }} />
          {(search || filterDx || filterRisk) && (
            <Btn size="sm" variant="ghost" onClick={() => { setSearch(''); setFilterDx(''); setFilterRisk(''); }}>
              ล้างตัวกรอง
            </Btn>
          )}
        </div>
      </Card>

      {/* Table */}
      <Card padding={0}>
        <Table cols={cols} rows={filtered}
          emptyIcon="👤" emptyTitle="ไม่พบผู้ป่วย"
          emptySubtitle={search ? 'ลองค้นหาด้วยคำอื่น' : 'กดปุ่ม "เพิ่มผู้ป่วย" เพื่อเริ่มต้น'} />
      </Card>

      {/* CSV Import Modal */}
      <Modal open={csvOpen} onClose={() => { setCsvOpen(false); setCsvText(''); setCsvPreview(null); setCsvError(''); }}
        title="📥 Import ผู้ป่วยจาก CSV" width={680}>
        <p style={{ margin: '0 0 8px', fontSize: 13, color: C.text }}>
          วางข้อมูล CSV ด้านล่าง (คั่นด้วย comma)
        </p>
        <div style={{ margin: '0 0 8px', padding: '8px 10px', background: '#F8FAFC', borderRadius: 6, fontSize: 11, fontFamily: 'monospace', color: C.textMuted }}>
          หัวตาราง: HN,Prefix,FirstName,LastName,Age,Gender,Diagnosis,Phone,Insurance
        </div>
        <textarea value={csvText} onChange={e => setCsvText(e.target.value)}
          placeholder={'HN,Prefix,FirstName,LastName,Age,Gender,Diagnosis,Phone\n67-001234,นาย,สมชาย,ใจดี,65,M,COPD,081-234-5678'}
          rows={6} style={{
            width: '100%', padding: '8px 10px', borderRadius: 7, border: `1px solid ${C.border}`,
            fontSize: 12, fontFamily: 'monospace', resize: 'vertical', boxSizing: 'border-box', marginBottom: 8,
          }} />
        {csvError && <p style={{ color: C.high, fontSize: 12, margin: '0 0 8px' }}>⚠ {csvError}</p>}
        <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
          <Btn variant="ghost" onClick={handleCSVPreview}>🔍 ดูตัวอย่าง</Btn>
          {csvPreview && csvPreview.length > 0 && (
            <Btn variant="primary" onClick={handleCSVImport}>✅ Import {csvPreview.length} ราย</Btn>
          )}
        </div>
        {csvPreview && csvPreview.length > 0 && (
          <div style={{ overflowX: 'auto', maxHeight: 220, overflowY: 'auto', border: `1px solid ${C.border}`, borderRadius: 7 }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
              <thead><tr style={{ background: '#F8FAFC' }}>
                {['HN','ชื่อ','อายุ','เพศ','โรค','โทร','สิทธิ์'].map(h => (
                  <th key={h} style={{ padding: '7px 10px', textAlign: 'left', borderBottom: `1px solid ${C.border}`, color: C.textMuted, fontWeight: 600, fontSize: 11 }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{csvPreview.map((r, i) => (
                <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                  <td style={{ padding: '6px 10px', fontFamily: 'monospace' }}>{r.hn}</td>
                  <td style={{ padding: '6px 10px' }}>{r.prefix}{r.firstName} {r.lastName}</td>
                  <td style={{ padding: '6px 10px' }}>{r.age}</td>
                  <td style={{ padding: '6px 10px' }}>{r.gender === 'F' ? 'หญิง' : 'ชาย'}</td>
                  <td style={{ padding: '6px 10px' }}>{r.diagnosis}</td>
                  <td style={{ padding: '6px 10px' }}>{r.phone}</td>
                  <td style={{ padding: '6px 10px' }}>{r.insurance}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </Modal>

      {/* Add modal */}
      <Modal open={addOpen} onClose={() => setAddOpen(false)} title="เพิ่มผู้ป่วยใหม่" width={720}>
        <PatientForm onSave={handleAdd} onClose={() => setAddOpen(false)} />
      </Modal>

      {/* Edit modal */}
      <Modal open={!!editPt} onClose={() => setEditPt(null)} title="แก้ไขข้อมูลผู้ป่วย" width={720}>
        {editPt && <PatientForm patient={editPt} onSave={handleEdit} onClose={() => setEditPt(null)} />}
      </Modal>

      {/* Delete confirm */}
      <ConfirmModal open={!!delId} onClose={() => setDelId(null)}
        onConfirm={() => handleDelete(delId)}
        title="ยืนยันการลบผู้ป่วย"
        message="ข้อมูลผู้ป่วย ประวัติการเยี่ยม และบันทึก Telepharmacy ทั้งหมดจะถูกลบ ไม่สามารถกู้คืนได้"
        danger />
    </div>
  );
}

// ── VisitHistory (per patient) ────────────────────────
function VisitHistory({ data, patientId, navigate, onEditVisit }) {
  const patient = data.patients.find(p => p.id === patientId);
  const visits  = data.visits.filter(v => v.patientId === patientId)
    .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
  const tele    = data.telepharmacy.filter(t => t.patientId === patientId)
    .sort((a, b) => b.scheduledDate.localeCompare(a.scheduledDate));

  const [tab, setTab]       = pvState('visits');
  const [visitFilter, setVF] = pvState('all');

  if (!patient) return (
    <EmptyState icon="❓" title="ไม่พบข้อมูลผู้ป่วย" subtitle="กลับไปที่ทะเบียนผู้ป่วย" />
  );

  return (
    <div>
      {/* Allergy banner — always at top */}
      <div style={{ marginBottom: 12 }}>
        <AllergyBanner patient={patient} />
      </div>

      {/* Patient header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        <Btn size="sm" variant="ghost" onClick={() => navigate('patients')}>← กลับ</Btn>
        <div>
          <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: C.primary }}>
            {patient.prefix}{patient.firstName} {patient.lastName}
          </h2>
          <p style={{ margin: '2px 0 0', fontSize: 13, color: C.textMuted }}>
            HN: {patient.hn} · อายุ {patient.age} ปี · {patient.insurance}
          </p>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          <DiagBadge diagnosis={patient.diagnosis} />
          <RiskBadge level={patient.riskLevel || 'Low'} />
          <Btn size="sm" variant="accent" onClick={() => navigate('visit-form', patientId)}>+ บันทึกการเยี่ยมใหม่</Btn>
          {visits[0] && (
            <Btn size="sm" variant="ghost" onClick={() => printPatientTakeHome(patient, visits[0])}>
              🖨️ สรุปกลับบ้าน
            </Btn>
          )}
        </div>
      </div>

      {/* Patient summary card */}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>การวินิจฉัย</div>
            <div style={{ marginTop: 4, fontSize: 13, fontWeight: 600 }}>
              {patient.diagnosis}
              {patient.goldGrade && ` — GOLD ${patient.goldGrade}`}
              {patient.asthmaControl && ` — ${patient.asthmaControl}`}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>โรคร่วม</div>
            <div style={{ marginTop: 4, fontSize: 13 }}>
              {patient.comorbidities?.length > 0 ? patient.comorbidities.join(', ') : '—'}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>เบอร์โทร</div>
            <div style={{ marginTop: 4, fontSize: 13, fontWeight: 600 }}>{patient.phone}</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>ปัจจัยเสี่ยง</div>
            <div style={{ marginTop: 4, display: 'flex', flexDirection: 'column', gap: 3 }}>
              {(patient.riskFlags || []).length > 0
                ? patient.riskFlags.map((f, i) => (
                    <span key={i} style={{ fontSize: 11, color: C.high }}>• {f}</span>
                  ))
                : <span style={{ fontSize: 12, color: C.textMuted }}>ไม่มีปัจจัยเสี่ยง</span>}
            </div>
          </div>
        </div>
        {/* Status row */}
        <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${C.border}`, display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          {patient.eGFR != null && patient.eGFR !== '' && (
            <RenalAlert patient={patient} medications={[]} compact />
          )}
          <SmokingBadge status={patient.smokingStatus} packYears={patient.packYears} compact />
          <VaccinationStatus patient={patient} compact />
        </div>
      </Card>

      {/* Trends */}
      {visits.length >= 2 && <TrendsSection visits={visits} />}

      {/* Tabs */}
      <Tabs
        tabs={[
          { id: 'visits', label: `บันทึกการเยี่ยม (${visits.length})` },
          { id: 'tele',   label: `Telepharmacy (${tele.length})` },
        ]}
        active={tab} onChange={setTab}
      />

      {tab === 'visits' && (
        <>
          {/* Filter bar */}
          {visits.length > 0 && (
            <div style={{ display: 'flex', gap: 6, marginBottom: 12, flexWrap: 'wrap' }}>
              {[
                { v: 'all',          l: `ทั้งหมด (${visits.length})` },
                { v: 'drp',          l: `มี DRP (${visits.filter(x => x.drp?.noDRP === false).length})` },
                { v: 'exacerbation', l: `Exacerbation (${visits.filter(x => (x.exacerbation?.countThisYear || 0) > 0).length})` },
                { v: 'high-risk',    l: `High Risk (${visits.filter(x => x.riskLevel === 'High').length})` },
              ].map(({ v, l }) => (
                <button key={v} onClick={() => setVF(v)} style={{
                  padding: '5px 12px', borderRadius: 6, fontSize: 12, fontWeight: 600,
                  border: `1px solid ${visitFilter === v ? C.primary : C.border}`,
                  background: visitFilter === v ? C.primary : '#fff',
                  color: visitFilter === v ? '#fff' : C.text, cursor: 'pointer', fontFamily: 'inherit',
                }}>{l}</button>
              ))}
            </div>
          )}
          {/* List */}
          {(() => {
            const fv = visitFilter === 'drp'          ? visits.filter(x => x.drp?.noDRP === false)
                     : visitFilter === 'exacerbation' ? visits.filter(x => (x.exacerbation?.countThisYear || 0) > 0)
                     : visitFilter === 'high-risk'    ? visits.filter(x => x.riskLevel === 'High')
                     : visits;
            if (fv.length === 0) return <EmptyState icon="🔍" title="ไม่พบ Visit ที่ตรงกับตัวกรอง" subtitle="ลองเปลี่ยนตัวกรอง" />;
            return (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                {fv.map(v => (
                <Card key={v.id} style={{ padding: '16px 20px' }}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
                    <div>
                      <span style={{ fontSize: 14, fontWeight: 700, color: C.primary }}>{v.visitDate}</span>
                      <span style={{ marginLeft: 10, fontSize: 12, color: C.textMuted }}>{v.pharmacist}</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <RiskBadge level={v.riskLevel} />
                      <Btn size="sm" variant="ghost" onClick={() => onEditVisit && onEditVisit(v.id)}>✏️ แก้ไข</Btn>
                    </div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 12 }}>
                    <div>
                      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>EXACERBATION</div>
                      <div style={{ fontSize: 13 }}>
                        {v.exacerbation?.countThisYear ?? 0} ครั้ง/ปี
                        {v.exacerbation?.hospitalized && <span style={{ marginLeft: 6, color: C.high, fontSize: 11 }}>นอน รพ.</span>}
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>ADHERENCE</div>
                      <AdherenceBadge level={v.adherence?.level} />
                    </div>
                    <div>
                      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>เทคนิคยาพ่น</div>
                      {(v.inhalerTechnique || []).map((t, i) => (
                        <span key={i} style={{ marginRight: 6 }}>
                          <TechniqueBadge score={t.overallScore} />
                        </span>
                      ))}
                      {(!v.inhalerTechnique || v.inhalerTechnique.length === 0) && <span style={{ fontSize: 12, color: C.textMuted }}>—</span>}
                    </div>
                  </div>
                  {v.soap?.a && (
                    <div style={{ background: '#F8FAFC', borderRadius: 7, padding: '10px 14px', fontSize: 13, color: C.text, borderLeft: `3px solid ${C.accent}` }}>
                      <strong style={{ color: C.primary }}>A:</strong> {v.soap.a}
                    </div>
                  )}
                  {v.soap?.p && (
                    <div style={{ marginTop: 6, background: '#F0FDF4', borderRadius: 7, padding: '10px 14px', fontSize: 13, color: C.text, borderLeft: `3px solid ${C.low}`, whiteSpace: 'pre-wrap' }}>
                      <strong style={{ color: C.low }}>P:</strong> {v.soap.p}
                    </div>
                  )}
                  {v.drp?.noDRP === false && v.drp?.items?.length > 0 && (
                    <div style={{ marginTop: 6, padding: '8px 14px', background: C.highBg, borderRadius: 7, borderLeft: `3px solid ${C.high}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: C.high, marginBottom: 4 }}>DRP:</div>
                      {v.drp.items.map((d, i) => (
                        <div key={i} style={{ fontSize: 12, color: C.text, lineHeight: 1.5 }}>⚠ {d}</div>
                      ))}
                    </div>
                  )}
                  {v.riskFlags && v.riskFlags.length > 0 && (
                    <div style={{ marginTop: 10, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {v.riskFlags.map((f, i) => (
                        <span key={i} style={{
                          fontSize: 11, padding: '2px 8px', borderRadius: 20,
                          background: C.highBg, color: C.high, border: `1px solid ${C.highBorder}`,
                        }}>⚠ {f}</span>
                      ))}
                    </div>
                  )}
                </Card>
              ))}
            </div>
            );
          })()}
        </>
      )}

      {tab === 'tele' && (
        tele.length === 0
          ? <EmptyState icon="📞" title="ยังไม่มีบันทึก Telepharmacy" />
          : <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {tele.map(t => (
                <Card key={t.id} style={{ padding: '16px 20px' }}>
                  <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                    <div>
                      <span style={{ fontWeight: 700, color: C.primary }}>นัดโทร: {t.scheduledDate}</span>
                      {t.actualDate && <span style={{ marginLeft: 10, fontSize: 12, color: C.textMuted }}>โทรจริง: {t.actualDate} {t.callTime}</span>}
                    </div>
                    <StatusBadge status={t.status} />
                  </div>
                  {t.status === 'Success' && (
                    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                      {t.symptoms && <div><span style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>อาการ: </span><span style={{ fontSize: 13 }}>{t.symptoms}</span></div>}
                      {t.counseling && <div><span style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>คำแนะนำ: </span><span style={{ fontSize: 13 }}>{t.counseling}</span></div>}
                    </div>
                  )}
                  {t.pharmacistNote && (
                    <div style={{ marginTop: 8, fontSize: 12, color: C.textMuted, fontStyle: 'italic' }}>{t.pharmacistNote}</div>
                  )}
                </Card>
              ))}
            </div>
      )}
    </div>
  );
}

Object.assign(window, { PatientList, PatientForm, VisitHistory });

<script type="text/babel">
// VisitForm.jsx — Clinic-Workflow Optimized + Edit Mode + 2 Previous Visits + SOAP Templates
// Requires: window.* from Shared.jsx, AppStore from store.js, TemplatePicker from SOAPTemplates.jsx

const { useState: vfState, useEffect: vfEffect, useMemo: vfMemo, useRef: vfRef } = React;

// ── Sec header ────────────────────────────────────────
function SecHd({ n, title, color, right }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '24px 0 14px' }}>
      <div style={{
        width: 26, height: 26, borderRadius: '50%', background: color || C.primary,
        color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 12, fontWeight: 700, flexShrink: 0,
      }}>{n}</div>
      <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>{title}</h3>
      <div style={{ flex: 1, height: 1, background: C.border }} />
      {right}
    </div>
  );
}

// ── Inhaler Checklist ─────────────────────────────────
function InhalerChecklistCard({ entry, index, onChange, onRemove }) {
  const cl = AppStore.INHALER_CHECKLISTS;
  const steps = entry.device && cl[entry.device] ? cl[entry.device].steps : [];
  const toggleStep = (i) => {
    const next = [...(entry.stepsCorrect || steps.map(() => false))];
    next[i] = !next[i];
    const cnt = next.filter(Boolean).length;
    const pct = steps.length > 0 ? cnt / steps.length : 0;
    const overallScore = pct >= 0.85 ? 'Good' : pct >= 0.57 ? 'Acceptable' : 'Poor';
    const errors = steps.filter((_, si) => !next[si]);
    onChange(index, { ...entry, stepsCorrect: next, overallScore, errors });
  };
  const markAll = (good) => {
    const next = steps.map(() => good);
    onChange(index, { ...entry, stepsCorrect: next, overallScore: good ? 'Good' : 'Poor', errors: good ? [] : [...steps] });
  };
  const stepsCorrect = entry.stepsCorrect || (steps.length > 0 ? steps.map(() => false) : []);
  const correctCount = stepsCorrect.filter(Boolean).length;
  const deviceOptions = Object.entries(cl).map(([k, v]) => ({ value: k, label: v.label }));

  return (
    <div style={{ border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', marginBottom: 12 }}>
      <div style={{ background: '#F8FAFC', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 200 }}>
          <Select value={entry.device} placeholder="เลือกประเภทอุปกรณ์"
            options={deviceOptions}
            onChange={v => {
              const newSteps = cl[v]?.steps || [];
              onChange(index, { ...entry, device: v, stepsCorrect: newSteps.map(() => false), overallScore: 'Poor', errors: [...newSteps] });
            }} style={{ maxWidth: 260 }} />
        </div>
        {entry.device && (
          <>
            <button onClick={() => markAll(true)} style={{
              padding: '4px 10px', borderRadius: 6, border: `1px solid ${C.lowBorder}`,
              background: C.lowBg, color: C.low, fontSize: 11, fontWeight: 600,
              cursor: 'pointer', fontFamily: 'inherit',
            }}>✓ ถูกทั้งหมด</button>
            <span style={{ fontSize: 12, color: C.textMuted }}>{correctCount}/{steps.length}</span>
            <TechniqueBadge score={entry.overallScore || 'Poor'} />
          </>
        )}
        <button onClick={() => onRemove(index)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textMuted, fontSize: 16, padding: '0 4px' }}>✕</button>
      </div>
      {entry.device && steps.length > 0 && (
        <div style={{ padding: '10px 14px' }}>
          {steps.map((step, si) => (
            <label key={si} style={{
              display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer',
              padding: '5px 8px', borderRadius: 6, marginBottom: 1,
              background: stepsCorrect[si] ? '#F0FDF4' : 'transparent', transition: 'background 0.1s',
            }}>
              <input type="checkbox" checked={!!stepsCorrect[si]} onChange={() => toggleStep(si)}
                style={{ accentColor: '#059669', marginTop: 2, flexShrink: 0, width: 15, height: 15 }} />
              <span style={{ fontSize: 13, color: stepsCorrect[si] ? '#059669' : C.text, lineHeight: 1.5 }}>
                <strong style={{ color: C.textMuted }}>{si + 1}.</strong> {step}
              </span>
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

// ── DRP ──────────────────────────────────────────────
const DRP_OPTIONS = [
  'ยาที่ใช้ไม่เหมาะสมกับข้อบ่งชี้ (Wrong Drug)',
  'ขนาดยาต่ำเกินไป (Sub-therapeutic Dose)',
  'ขนาดยาสูงเกินไป (Dose too High)',
  'ผลข้างเคียงจากยา (ADR)',
  'ปฏิกิริยาระหว่างยา (Drug Interaction)',
  'ความร่วมมือในการใช้ยาต่ำ (Non-adherence)',
  'เทคนิคการใช้ยาพ่นไม่ถูกต้อง (Wrong Technique)',
  'ต้องการยาเพิ่มเติม (Needs Additional Therapy)',
  'ไม่จำเป็นต้องใช้ยา (Unnecessary Drug)',
  'อื่นๆ (Other)',
];

function DRPSection({ drp, onChange }) {
  const noDRP   = drp?.noDRP ?? true;
  const selected = drp?.items || [];
  const note    = drp?.note || '';
  return (
    <div>
      <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
        {[{ label: '✓ ไม่มี DRP', val: true }, { label: '⚠ พบ DRP', val: false }].map(({ label, val }) => (
          <label key={String(val)} style={{
            display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer',
            padding: '8px 18px', borderRadius: 8,
            border: `1px solid ${noDRP === val ? (val ? C.lowBorder : C.highBorder) : C.border}`,
            background: noDRP === val ? (val ? C.lowBg : C.highBg) : C.surface,
            fontWeight: noDRP === val ? 700 : 400, fontSize: 13,
            color: noDRP === val ? (val ? C.low : C.high) : C.textMuted, transition: 'all 0.15s',
          }}>
            <input type="radio" name="drp-status" checked={noDRP === val}
              onChange={() => onChange({ noDRP: val, items: [], note: '' })}
              style={{ accentColor: val ? C.low : C.high, width: 14, height: 14 }} />
            {label}
          </label>
        ))}
      </div>
      {!noDRP && (
        <>
          <FormField label="ประเภท DRP ที่พบ" hint="เลือกทุกข้อที่เกี่ยวข้อง">
            <CheckboxGroup options={DRP_OPTIONS} selected={selected}
              onChange={v => onChange({ ...drp, items: v })} cols={2} />
          </FormField>
          <FormField label="รายละเอียด DRP และแนวทางการแก้ไข">
            <Textarea value={note} onChange={v => onChange({ ...drp, note: v })}
              placeholder="อธิบาย DRP ที่พบ สาเหตุ และแนวทางการแก้ไขสำหรับ Visit นี้..." rows={3} />
          </FormField>
        </>
      )}
    </div>
  );
}

// ── Med Row ───────────────────────────────────────────
function MedRow({ med, index, onChange, onRemove, changeStatus }) {
  return (
    <div style={{
      display: 'grid', gridTemplateColumns: 'auto 3fr 1fr 1fr auto',
      gap: 8, alignItems: 'center', marginBottom: 6,
      background: '#F8FAFC', borderRadius: 8, padding: '8px 12px',
      border: `1px solid ${C.border}`,
    }}>
      {changeStatus === 'new'  && <span style={{ fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 12, background: '#FEF3C7', color: '#92400E' }}>NEW</span>}
      {changeStatus === 'same' && <span style={{ fontSize: 9, fontWeight: 700, padding: '2px 6px', borderRadius: 12, background: '#E0F2FE', color: '#0369A1' }}>เดิม</span>}
      {!changeStatus && <span />}
      <Select value={med.name} placeholder="เลือกยา..."
        options={AppStore.COMMON_MEDICATIONS.map(m => ({ value: m.name, label: m.name }))}
        onChange={v => onChange(index, { ...med, name: v })} />
      <Input value={med.dose} onChange={v => onChange(index, { ...med, dose: v })} placeholder="Dose" />
      <Select value={med.adherence} placeholder="Adherence"
        options={[
          { value: 'Good', label: '✅ ดี' },
          { value: 'Fair', label: '⚠ พอใช้' },
          { value: 'Poor', label: '❌ ต่ำ' },
        ]}
        onChange={v => onChange(index, { ...med, adherence: v })} />
      <button onClick={() => onRemove(index)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textMuted, fontSize: 16, padding: '0 4px' }}>✕</button>
    </div>
  );
}

// ── Adherence ─────────────────────────────────────────
const ADHERENCE_QUESTIONS = [
  'มีการลืมใช้ยาพ่นในช่วง 1 เดือนที่ผ่านมา?',
  'มีบางวันที่ไม่ได้ใช้ยาพ่นตามที่แพทย์สั่ง?',
  'เคยหยุดยาเองเมื่ออาการดีขึ้นหรือรู้สึกว่าหายดีแล้ว?',
  'เคยใช้ยาน้อยกว่าที่แพทย์สั่งเพราะรู้สึกว่ายาไม่ได้ผล?',
];

function AdherenceSection({ adherence, onChange }) {
  const answers = adherence?.answers || [false, false, false, false];
  const score = answers.filter(Boolean).length;
  const level = score === 0 ? 'Good' : score <= 1 ? 'Good' : score <= 2 ? 'Fair' : 'Poor';
  const toggle = (i) => {
    const next = [...answers]; next[i] = !next[i];
    const s = next.filter(Boolean).length;
    const l = s === 0 ? 'Good' : s <= 1 ? 'Good' : s <= 2 ? 'Fair' : 'Poor';
    onChange({ answers: next, score: s, level: l });
  };
  const scoreColor = level === 'Good' ? C.low : level === 'Fair' ? C.medium : C.high;
  return (
    <div>
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8, marginBottom: 14 }}>
        {ADHERENCE_QUESTIONS.map((q, i) => (
          <label key={i} style={{
            display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer',
            padding: '10px 12px', borderRadius: 8, border: `1px solid ${answers[i] ? C.highBorder : C.border}`,
            background: answers[i] ? C.highBg : C.surface, transition: 'all 0.15s',
          }}>
            <input type="checkbox" checked={!!answers[i]} onChange={() => toggle(i)}
              style={{ accentColor: C.high, marginTop: 2, flexShrink: 0, width: 15, height: 15 }} />
            <span style={{ fontSize: 13, color: C.text, lineHeight: 1.5 }}>
              <strong style={{ color: C.textMuted }}>{i + 1}.</strong> {q}
            </span>
          </label>
        ))}
      </div>
      <div style={{ display: 'flex', alignItems: 'center', gap: 14, padding: '10px 14px',
        background: `${scoreColor}10`, borderRadius: 8, border: `1px solid ${scoreColor}30` }}>
        <div style={{ fontSize: 13 }}>ตอบ "ใช่" <strong style={{ color: scoreColor }}>{score}/4</strong> ข้อ</div>
        <div>ระดับ: <AdherenceBadge level={level} /></div>
        <div style={{ fontSize: 12, color: C.textMuted }}>
          {level === 'Good' ? '0–1 ข้อ = ดี' : level === 'Fair' ? '2 ข้อ = พอใช้' : '3–4 ข้อ = ต้องปรับปรุง'}
        </div>
      </div>
    </div>
  );
}

// ── Helpers ───────────────────────────────────────────
const daysAgo = (dateStr) => {
  if (!dateStr) return null;
  return Math.floor((Date.now() - new Date(dateStr).getTime()) / (1000 * 60 * 60 * 24));
};

// ── Collapsible Assessment Card (on-demand) ───────────
function AssessmentCollapsible({ title, subtitle, icon, color, hasData, summary, onClear, children }) {
  const [open, setOpen] = vfState(false);
  return (
    <div style={{
      border: `1px solid ${hasData ? `${color}40` : C.border}`,
      borderRadius: 10, overflow: 'hidden',
      background: hasData ? `${color}05` : C.surface,
    }}>
      <button type="button" onClick={() => setOpen(o => !o)} style={{
        display: 'flex', alignItems: 'center', gap: 12, padding: '12px 16px',
        width: '100%', textAlign: 'left', border: 'none', cursor: 'pointer',
        background: 'transparent', fontFamily: 'inherit',
        transition: 'background 0.15s',
      }}
      onMouseEnter={e => e.currentTarget.style.background = hasData ? `${color}08` : '#F8FAFC'}
      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}>
        <div style={{
          width: 32, height: 32, borderRadius: 8,
          background: hasData ? color : '#F1F5F9',
          color: hasData ? '#fff' : C.textMuted,
          display: 'flex', alignItems: 'center', justifyContent: 'center',
          fontSize: 16, flexShrink: 0,
        }}>{icon}</div>
        <div style={{ flex: 1, minWidth: 0 }}>
          <div style={{ fontSize: 13, fontWeight: 700, color: hasData ? color : C.text }}>{title}</div>
          {hasData && summary
            ? <div style={{ fontSize: 11, color, marginTop: 2, fontWeight: 600 }}>✓ ประเมินแล้ว: {summary}</div>
            : <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{subtitle}</div>
          }
        </div>
        {hasData && (
          <span onClick={(e) => { e.stopPropagation(); onClear(); }}
            style={{
              fontSize: 11, color: C.high, fontWeight: 600,
              padding: '4px 10px', borderRadius: 6, border: `1px solid ${C.highBorder}`,
              background: C.surface, cursor: 'pointer',
            }}>✕ ล้าง</span>
        )}
        <span style={{
          padding: '5px 12px', borderRadius: 6,
          background: open ? color : (hasData ? `${color}15` : '#EFF6FF'),
          color: open ? '#fff' : (hasData ? color : '#1E40AF'),
          fontSize: 11, fontWeight: 600,
          display: 'flex', alignItems: 'center', gap: 5,
        }}>
          {open ? '▼ ปิด' : (hasData ? '✎ แก้ไข' : '+ ทำแบบประเมิน')}
        </span>
      </button>
      {open && (
        <div style={{ padding: '0 16px 16px', borderTop: `1px solid ${color}20` }}>
          <div style={{ paddingTop: 14 }}>{children}</div>
        </div>
      )}
    </div>
  );
}

// ── Mini Visit Card (right panel) ─────────────────────
function MiniVisitCard({ visit, isLatest, currentMedNames }) {
  const days = daysAgo(visit.visitDate);
  const headerBg = isLatest ? '#0F2D5E' : '#475569';
  const labelText = isLatest ? 'Visit ล่าสุด' : 'Visit ก่อนหน้า';
  return (
    <Card style={{ padding: 0, overflow: 'hidden' }}>
      <div style={{
        background: headerBg, color: '#fff', padding: '7px 12px',
        display: 'flex', alignItems: 'center', justifyContent: 'space-between',
      }}>
        <div>
          <div style={{ fontSize: 9, fontWeight: 600, opacity: 0.8, textTransform: 'uppercase', letterSpacing: '0.06em' }}>{labelText}</div>
          <div style={{ fontSize: 12, fontWeight: 700, marginTop: 1 }}>{visit.visitDate}</div>
        </div>
        <div style={{ textAlign: 'right' }}>
          <div style={{ fontSize: 14, fontWeight: 800, lineHeight: 1 }}>{days}</div>
          <div style={{ fontSize: 9, opacity: 0.8 }}>วันก่อน</div>
        </div>
      </div>

      <div style={{ padding: '10px 12px' }}>
        {/* Stats grid */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 5, marginBottom: 8 }}>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>Adherence</div>
            <div style={{ marginTop: 2 }}><AdherenceBadge level={visit.adherence?.level || '—'} /></div>
          </div>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>Exacerbation</div>
            <div style={{ fontSize: 12, fontWeight: 700, marginTop: 1, color: (visit.exacerbation?.countThisYear ?? 0) >= 2 ? C.high : C.text }}>
              {visit.exacerbation?.countThisYear ?? 0} ครั้ง
              {visit.exacerbation?.hospitalized && <span style={{ fontSize: 9, marginLeft: 3 }}>🏥</span>}
            </div>
          </div>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>เทคนิค</div>
            <div style={{ marginTop: 2, display: 'flex', gap: 2, flexWrap: 'wrap' }}>
              {(visit.inhalerTechnique || []).map((t, i) => <TechniqueBadge key={i} score={t.overallScore} />)}
              {(!visit.inhalerTechnique || visit.inhalerTechnique.length === 0) && <span style={{ fontSize: 10, color: C.textMuted }}>—</span>}
            </div>
          </div>
          <div style={{ padding: '5px 7px', background: '#F8FAFC', borderRadius: 5 }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>Risk</div>
            <div style={{ marginTop: 2 }}><RiskBadge level={visit.riskLevel || 'Low'} /></div>
          </div>
        </div>

        {/* Medications */}
        {visit.medications?.length > 0 && (
          <div style={{ marginBottom: 7 }}>
            <div style={{ fontSize: 9, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 3 }}>
              💊 ยา ({visit.medications.length})
            </div>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
              {visit.medications.map((m, i) => (
                <div key={i} style={{ display: 'flex', alignItems: 'center', gap: 4, fontSize: 10, lineHeight: 1.35 }}>
                  {isLatest && currentMedNames && (
                    <span style={{
                      fontSize: 8, fontWeight: 700, padding: '0 4px', borderRadius: 8,
                      background: currentMedNames.includes(m.name) ? '#E0F2FE' : '#FEE2E2',
                      color: currentMedNames.includes(m.name) ? '#0369A1' : '#B91C1C',
                      flexShrink: 0, minWidth: 9, textAlign: 'center',
                    }}>{currentMedNames.includes(m.name) ? '●' : '✕'}</span>
                  )}
                  <span style={{ color: C.text, flex: 1 }}>
                    {m.name.split(' (')[0].split(' DPI')[0].split(' MDI')[0]}
                    <span style={{ color: C.textMuted, marginLeft: 4 }}>{m.dose}</span>
                  </span>
                </div>
              ))}
            </div>
          </div>
        )}

        {/* DRP */}
        {visit.drp?.noDRP === false && visit.drp?.items?.length > 0 && (
          <div style={{ marginBottom: 6 }}>
            <div style={{ fontSize: 9, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', marginBottom: 2 }}>DRP</div>
            {visit.drp.items.map((d, i) => (
              <div key={i} style={{ fontSize: 10, color: C.high, lineHeight: 1.3 }}>⚠ {d.replace(/\s*\(.+\)/, '')}</div>
            ))}
          </div>
        )}

        {/* Plan */}
        {visit.soap?.p && (
          <div style={{ padding: '5px 7px', borderRadius: 4, background: '#EFF6FF', borderLeft: `2px solid ${C.accent}` }}>
            <div style={{ fontSize: 8, fontWeight: 700, color: C.primary, textTransform: 'uppercase' }}>Plan</div>
            <div style={{ fontSize: 10, color: C.text, marginTop: 2, lineHeight: 1.4, whiteSpace: 'pre-wrap' }}>{visit.soap.p}</div>
          </div>
        )}
      </div>
    </Card>
  );
}

// ── Last Visits Panel (up to 2) ───────────────────────
function LastVisitsPanel({ visits, currentMeds }) {
  if (!visits || visits.length === 0) return (
    <Card>
      <div style={{ textAlign: 'center', padding: '14px 8px', color: C.textMuted }}>
        <div style={{ fontSize: 28, marginBottom: 6 }}>🆕</div>
        <div style={{ fontSize: 13, fontWeight: 600, color: C.text }}>ผู้ป่วยใหม่</div>
        <div style={{ fontSize: 11, marginTop: 2 }}>ไม่มีบันทึกการเยี่ยมก่อนหน้า</div>
      </div>
    </Card>
  );
  const currentMedNames = currentMeds.map(m => m.name).filter(Boolean);
  const recent = visits.slice(0, 2);
  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
      {recent.map((v, i) => (

}

// ── Main VisitForm (with edit support) ────────────────
function VisitForm({ data, patientId, editingVisit, onSave, onDelete, navigate, currentUser }) {
  const patient = data.patients.find(p => p.id === patientId);
  const isEditing = !!editingVisit;
  const today = new Date().toISOString().slice(0, 10);
  const defaultPharmacist = currentUser ? `${currentUser.prefix}${currentUser.name}` : '';

  // Previous visits — exclude the visit being edited
  const previousVisits = vfMemo(() => {
    let visits = data.visits.filter(v => v.patientId === patientId);
    if (isEditing) visits = visits.filter(v => v.id !== editingVisit.id);
    return visits.sort((a, b) => b.visitDate.localeCompare(a.visitDate));
  }, [data.visits, patientId, isEditing, editingVisit?.id]);

  const lastVisit = previousVisits[0] || null;

  const [prefillState, setPrefillState] = vfState(isEditing ? 'used' : null);
  const [saving, setSaving] = vfState(false);
  const [showToast, setShowToast] = vfState(null);
  const [confirmDelete, setConfirmDelete] = vfState(false);
  const [showDraftPrompt, setShowDraftPrompt] = vfState(null);  // {draft, ts} or null
  const [showValidation, setShowValidation] = vfState(null);    // {warnings:[]} or null

  const initial = isEditing ? { ...editingVisit } : {
    patientId, visitDate: today, pharmacist: defaultPharmacist,
    chiefComplaint: '',
    exacerbation: { countThisYear: 0, lastDate: '', severity: 'None', hospitalized: false, erVisit: false, triggers: [], rescueMedUse: 'Never' },
    medications: [],
    inhalerTechnique: [],
    adherence: { answers: [false, false, false, false], score: 0, level: 'Good' },
    assessments: {
      cat:  { answers: [null,null,null,null,null,null,null,null], score: 0, allAnswered: false },
      mmrc: { grade: null },
      act:  { answers: [null,null,null,null], score: 0, allAnswered: false },
    },
    soap: { s: '', o: '', a: '', p: '' },
    drp: { noDRP: true, items: [], note: '' },
    riskLevel: 'Low', riskFlags: [],
    counselingTopics: [],
    pharmacistNote: '',
    nextVisit: '',
  };
  const [f, setF] = vfState(initial);

  // Check for existing draft on mount
  vfEffect(() => {
    const editId = isEditing ? editingVisit.id : null;
    const draft = loadDraft(patientId, editId);
    if (draft && draft.data) {
      setShowDraftPrompt(draft);
    }
    // eslint-disable-next-line
  }, []);

  // Auto-save draft (debounced ~1s)
  vfEffect(() => {
    const editId = isEditing ? editingVisit.id : null;
    const handle = setTimeout(() => {
      // Only save if form has meaningful content
      const meaningful = f.chiefComplaint || f.medications.length > 0 ||
        f.inhalerTechnique.length > 0 || f.adherence.score > 0 ||
        f.soap.s || f.soap.a || f.soap.p || (f.drp.items || []).length > 0;
      if (meaningful) saveDraft(patientId, editId, f);
    }, 1000);
    return () => clearTimeout(handle);
  }, [f, patientId, isEditing, editingVisit?.id]);

  // Auto-calculate risk
  vfEffect(() => {
    if (!patient) return;
    const risk = AppStore.calculateRisk(patient, f);
    setF(prev => ({ ...prev, riskLevel: risk.level, riskFlags: risk.flags }));
  }, [f.exacerbation, f.adherence, f.inhalerTechnique, patient]);

  // Ctrl+S
  vfEffect(() => {
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's') { e.preventDefault(); handleSave(false); }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  });

  const set = (k, v) => setF(prev => ({ ...prev, [k]: v }));
  const setEx = (k, v) => setF(prev => ({ ...prev, exacerbation: { ...prev.exacerbation, [k]: v } }));
  const setSOAP = (k, v) => setF(prev => ({ ...prev, soap: { ...prev.soap, [k]: v } }));
  const setAssessment = (k, v) => setF(prev => ({
    ...prev,
    assessments: { ...(prev.assessments || {}), [k]: v },
  }));
  const a = f.assessments || { cat: {}, mmrc: {}, act: {} };

  const addMed = () => setF(prev => ({ ...prev, medications: [...prev.medications, { id: AppStore.generateId(), name: '', dose: '', adherence: '' }] }));
  const updateMed = (i, val) => { const next = [...f.medications]; next[i] = val; set('medications', next); };
  const removeMed = (i) => set('medications', f.medications.filter((_, idx) => idx !== i));

  const addTech = () => setF(prev => ({ ...prev, inhalerTechnique: [...prev.inhalerTechnique, { id: AppStore.generateId(), device: '', stepsCorrect: [], overallScore: 'Poor', errors: [] }] }));
  const updateTech = (i, val) => { const next = [...f.inhalerTechnique]; next[i] = val; set('inhalerTechnique', next); };
  const removeTech = (i) => set('inhalerTechnique', f.inhalerTechnique.filter((_, idx) => idx !== i));

  const applyPrefill = () => {
    if (!lastVisit) return;
    setF(prev => ({
      ...prev,
      medications: (lastVisit.medications || []).map(m => ({ ...m, id: AppStore.generateId(), adherence: '' })),
      inhalerTechnique: (lastVisit.inhalerTechnique || []).map(t => ({
        id: AppStore.generateId(), device: t.device,
        stepsCorrect: [], overallScore: 'Poor', errors: [],
      })),
      exacerbation: {
        ...prev.exacerbation,
        triggers: lastVisit.exacerbation?.triggers || [],
        rescueMedUse: lastVisit.exacerbation?.rescueMedUse || 'Never',
      },
    }));
    setPrefillState('used');
    setShowToast({ msg: `✓ คัดลอกข้อมูลจาก Visit ${lastVisit.visitDate} แล้ว — กรุณาประเมิน Adherence และเทคนิคใหม่`, type: 'success' });
    setTimeout(() => setShowToast(null), 4000);
  };

  const validate = () => {
    const warnings = [];
    if (f.medications.length > 0 && f.inhalerTechnique.length === 0) {
      warnings.push({
        title: 'มียาพ่นแต่ยังไม่ได้ประเมินเทคนิค',
        detail: 'ผู้ป่วยมียา ' + f.medications.length + ' ตัว แต่ยังไม่ได้ประเมินเทคนิคยาพ่นสักตัว — ควรประเมินเพื่อหา DRP',
      });
    }
    if (!f.soap.p || f.soap.p.trim() === '') {
      warnings.push({
        title: 'SOAP Plan ยังว่าง',
        detail: 'ไม่ได้ระบุแผนการรักษา (P) — ควรมีรายละเอียด plan สำหรับผู้ป่วย',
      });
    }
    if (f.drp?.noDRP === false && (f.drp.items || []).length === 0) {
      warnings.push({
        title: 'เลือก "พบ DRP" แต่ไม่ได้ระบุประเภท',
        detail: 'ระบุไว้ว่าพบ DRP แต่ยังไม่ได้ติ๊กประเภท DRP ใด',
      });
    }
    if (!f.adherence || f.adherence.answers.every(a => a === false) && f.adherence.score === 0) {
      // Only warn if there's no other indication
      const hasMeds = f.medications.length > 0;
      if (hasMeds) {
        warnings.push({
          title: 'ยังไม่ได้ประเมิน Adherence',
          detail: 'ยังไม่ได้ตอบคำถาม Adherence ทั้ง 4 ข้อ — ถ้าผู้ป่วยร่วมมือดี ยืนยันจริงหรือไม่',
        });
      }
    }
    return warnings;
  };

  const handleSave = (skipValidation) => {
    if (saving) return;
    if (!skipValidation) {
      const warnings = validate();
      if (warnings.length > 0) {
        setShowValidation({ warnings });
        return;
      }
    }
    setSaving(true);
    const risk = AppStore.calculateRisk(patient, f);
    const visit = { ...f, id: isEditing ? editingVisit.id : AppStore.generateId(), riskLevel: risk.level, riskFlags: risk.flags };

    let updatedVisits;
    if (isEditing) {
      updatedVisits = data.visits.map(v => v.id === editingVisit.id ? visit : v);
    } else {
      updatedVisits = [...data.visits, visit];
    }

    // Update patient risk based on latest visit (most recent visitDate)
    const allForPt = updatedVisits.filter(v => v.patientId === patientId)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    const latestRisk = allForPt[0] ? { level: allForPt[0].riskLevel, flags: allForPt[0].riskFlags || [] } : { level: 'Low', flags: [] };

    const updatedPatients = data.patients.map(p => p.id === patientId
      ? { ...p, riskLevel: latestRisk.level, riskFlags: latestRisk.flags, isHighRisk: latestRisk.level === 'High' }
      : p);
    let newData = { ...data, visits: updatedVisits, patients: updatedPatients };
    // Audit log
    newData = appendAudit(newData, {
      user: currentUser ? `${currentUser.prefix}${currentUser.name}` : 'unknown',
      action: isEditing ? 'edit-visit' : 'create-visit',
      patientId, visitId: visit.id,
      summary: `${isEditing ? 'แก้ไข' : 'สร้าง'} Visit ${visit.visitDate} (${patient.prefix}${patient.firstName} ${patient.lastName})`,
    });
    // Clear draft on successful save
    clearDraft(patientId, isEditing ? editingVisit.id : null);
    onSave(newData);
    setTimeout(() => navigate('history', patientId), 100);
  };

  const handleDelete = () => {
    if (!isEditing) return;
    const updatedVisits = data.visits.filter(v => v.id !== editingVisit.id);
    const remaining = updatedVisits.filter(v => v.patientId === patientId)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    const latestRisk = remaining[0] ? { level: remaining[0].riskLevel, flags: remaining[0].riskFlags || [] } : { level: 'Low', flags: [] };
    const updatedPatients = data.patients.map(p => p.id === patientId
      ? { ...p, riskLevel: latestRisk.level, riskFlags: latestRisk.flags, isHighRisk: latestRisk.level === 'High' }
      : p);
    let newData = { ...data, visits: updatedVisits, patients: updatedPatients };
    newData = appendAudit(newData, {
      user: currentUser ? `${currentUser.prefix}${currentUser.name}` : 'unknown',
      action: 'delete-visit',
      patientId, visitId: editingVisit.id,
      summary: `ลบ Visit ${editingVisit.visitDate} (${patient.prefix}${patient.firstName} ${patient.lastName})`,
    });
    clearDraft(patientId, editingVisit.id);
    onSave(newData);
    navigate('history', patientId);
  };

  if (!patient) return <EmptyState icon="❓" title="ไม่พบข้อมูลผู้ป่วย" />;

  const riskColor = { High: C.high, Medium: C.medium, Low: C.low }[f.riskLevel] || C.low;
  const row2 = { display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14 };
  const row3 = { display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 14 };

  const lastMedNames = (lastVisit?.medications || []).map(m => m.name);

  return (
    <div>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 16 }}>
        <Btn size="sm" variant="ghost" onClick={() => navigate('history', patientId)}>← กลับ</Btn>
        <div style={{ flex: 1 }}>
          <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: C.primary }}>
            {isEditing ? '✏️ แก้ไขบันทึกการบริบาล' : 'บันทึกการบริบาลเภสัชกรรม'}
          </h2>
          <p style={{ margin: '2px 0 0', fontSize: 13, color: C.textMuted }}>
            {patient.prefix}{patient.firstName} {patient.lastName} · HN: {patient.hn} · อายุ {patient.age} ปี
            {isEditing && <span style={{ marginLeft: 8, color: C.medium, fontWeight: 600 }}>· กำลังแก้ไข Visit {editingVisit.visitDate}</span>}
          </p>
        </div>
        <DiagBadge diagnosis={patient.diagnosis} />
        <span style={{
          padding: '4px 10px', borderRadius: 20, background: '#F1F5F9',
          fontSize: 11, color: C.textMuted, fontWeight: 600,
        }}>⌘+S เพื่อบันทึก</span>
      </div>

      {/* Allergy banner */}
      <div style={{ marginBottom: 12 }}>
        <AllergyBanner patient={patient} />
      </div>

      {/* Pre-fill banner */}
      {!isEditing && lastVisit && prefillState !== 'used' && prefillState !== 'declined' && (
        <div style={{
          background: 'linear-gradient(135deg, #EFF6FF 0%, #DBEAFE 100%)',
          border: '1px solid #93C5FD', borderRadius: 10, padding: '12px 16px',
          marginBottom: 16, display: 'flex', alignItems: 'center', gap: 12,
        }}>
          <div style={{ fontSize: 22 }}>🔄</div>
          <div style={{ flex: 1 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: '#1E40AF' }}>
              พบ Visit ก่อนหน้าเมื่อ {daysAgo(lastVisit.visitDate)} วันก่อน ({lastVisit.visitDate})
            </div>
            <div style={{ fontSize: 11, color: '#1E40AF', marginTop: 2, opacity: 0.85 }}>
              คัดลอก <strong>ยา ({lastVisit.medications?.length||0} ตัว)</strong> · <strong>เทคนิคยาพ่น</strong> · <strong>Trigger factors</strong> จากครั้งก่อน เพื่อให้แก้เฉพาะจุดที่เปลี่ยน
            </div>
          </div>
          <Btn variant="primary" size="sm" onClick={applyPrefill}>✓ ใช้ข้อมูลครั้งก่อน</Btn>
          <Btn variant="ghost" size="sm" onClick={() => setPrefillState('declined')}>เริ่มจากศูนย์</Btn>
        </div>
      )}

      {!isEditing && prefillState === 'used' && (
        <div style={{
          background: C.lowBg, border: `1px solid ${C.lowBorder}`, borderRadius: 10,
          padding: '10px 14px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10,
          fontSize: 12, color: C.low, fontWeight: 600,
        }}>
          ✓ ใช้ข้อมูลจาก Visit {lastVisit?.visitDate} — กรุณาประเมิน Adherence และเทคนิคยาพ่นใหม่
        </div>
      )}

      {isEditing && (
        <div style={{
          background: '#FFFBEB', border: '1px solid #FDE68A', borderRadius: 10,
          padding: '10px 14px', marginBottom: 16, display: 'flex', alignItems: 'center', gap: 10,
          fontSize: 12, color: '#92400E', fontWeight: 600,
        }}>
          ✏️ คุณกำลังแก้ไข Visit ที่บันทึกไปแล้วเมื่อ {editingVisit.visitDate} — การบันทึกจะทับข้อมูลเดิม
        </div>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 330px', gap: 18, alignItems: 'start' }}>
        {/* LEFT: form */}
        <div>
          {/* ① Visit Info */}
          <SecHd n="1" title="ข้อมูลการเยี่ยม" />
          <Card>
            <div style={row2}>
              <FormField label="วันที่บันทึก" required>
                <Input type="date" value={f.visitDate} onChange={v => set('visitDate', v)} />
              </FormField>
              <FormField label="ชื่อเภสัชกร" required>
                <Input value={f.pharmacist} onChange={v => set('pharmacist', v)} placeholder="ภก./ภกญ. ชื่อ นามสกุล" />
              </FormField>
            </div>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
              <label style={{ fontSize: 12, fontWeight: 600, color: C.text }}>Chief Complaint / อาการนำ</label>
              <TemplatePicker field="cc"
                onInsert={(text) => set('chiefComplaint', f.chiefComplaint ? `${f.chiefComplaint}\n${text}` : text)} />
            </div>
            <Textarea value={f.chiefComplaint} onChange={v => set('chiefComplaint', v)}
              placeholder="อาการหลักที่ผู้ป่วยมา / ข้อกังวล..." rows={2} />
          </Card>

          {/* ② Exacerbation */}
          <SecHd n="2" title="ประเมิน Exacerbation" color="#DC2626" />
          <Card>
            <div style={row3}>
              <FormField label="ครั้ง Exacerbation ใน 6 เดือนล่าสุด">
                <Input type="number" value={f.exacerbation.countThisYear}
                  onChange={v => setEx('countThisYear', parseInt(v) || 0)} />
              </FormField>
              <FormField label="ครั้งล่าสุดที่ Exacerbate">
                <Input type="date" value={f.exacerbation.lastDate}
                  onChange={v => setEx('lastDate', v)} />
              </FormField>
              <FormField label="ระดับความรุนแรง">
                <Select value={f.exacerbation.severity} onChange={v => setEx('severity', v)}
                  options={[
                    { value: 'None',     label: 'None (ไม่มี)' },
                    { value: 'Mild',     label: 'Mild (เพิ่มยาที่บ้าน)' },
                    { value: 'Moderate', label: 'Moderate (ต้องรับการรักษา)' },
                    { value: 'Severe',   label: 'Severe (นอน รพ./ICU)' },
                  ]} />
              </FormField>
            </div>
            <div style={{ display: 'flex', gap: 24, marginBottom: 14, flexWrap: 'wrap' }}>
              {[
                { label: 'ต้องนอนโรงพยาบาล (Hospitalization)', key: 'hospitalized' },
                { label: 'เข้าห้องฉุกเฉิน (ER)', key: 'erVisit' },
              ].map(({ label, key }) => (
                <label key={key} style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13 }}>
                  <input type="checkbox" checked={!!f.exacerbation[key]}
                    onChange={e => setEx(key, e.target.checked)}
                    style={{ accentColor: C.high, width: 16, height: 16 }} />
                  <span style={{ color: f.exacerbation[key] ? C.high : C.text, fontWeight: f.exacerbation[key] ? 600 : 400 }}>{label}</span>
                </label>
              ))}
            </div>
            <div style={row2}>
              <FormField label="ปัจจัยกระตุ้น (Trigger Factors)">
                <CheckboxGroup options={AppStore.TRIGGER_OPTIONS} selected={f.exacerbation.triggers}
                  onChange={v => setEx('triggers', v)} cols={1} />
              </FormField>
              <FormField label="ความถี่การใช้ยา Rescue (SABA)">
                <Select value={f.exacerbation.rescueMedUse} onChange={v => setEx('rescueMedUse', v)}

                    { value: 'Sometimes', label: 'บางครั้ง (2–4 ครั้ง/สัปดาห์)' },
                    { value: 'Often',     label: 'บ่อย (>4 ครั้ง/สัปดาห์)' },
                    { value: 'Daily',     label: 'ทุกวัน' },

              <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
                {(['COPD', 'Both'].includes(patient.diagnosis)) && (
                  <>
                    <AssessmentCollapsible
                      title="CAT Score (COPD Assessment Test)"
                      subtitle="8 ข้อ คะแนน 0–40 · ใช้จัดกลุ่ม GOLD ABE"
                      icon="📋" color="#1848A0"
                      hasData={a.cat?.allAnswered}
                      summary={a.cat?.allAnswered
                        ? `${a.cat.score}/40 · ${AppStore.interpretCAT(a.cat.score).label}`
                        : null}
                      onClear={() => setAssessment('cat', { answers: [null,null,null,null,null,null,null,null], score: 0, allAnswered: false })}
                    >
                      <CATAssessment value={a.cat} onChange={v => setAssessment('cat', v)} />
                    </AssessmentCollapsible>
                    <AssessmentCollapsible
                      title="mMRC Dyspnea Scale"
                      subtitle="Grade 0–4 · ใช้คู่กับ CAT เพื่อ classify GOLD"
                      icon="🫁" color="#1848A0"
                      hasData={a.mmrc?.grade != null}
                      summary={a.mmrc?.grade != null ? `Grade ${a.mmrc.grade}` : null}
                      onClear={() => setAssessment('mmrc', { grade: null })}
                    >
                      <MMRCAssessment value={a.mmrc} onChange={v => setAssessment('mmrc', v)} />
                    </AssessmentCollapsible>
                  </>
                )}
                {(['Asthma', 'Both'].includes(patient.diagnosis)) && (
                  <AssessmentCollapsible
                    title="ACT Score (Asthma Control Test)"
                    subtitle="5 ข้อ คะแนน 5–25 · <20 = ควบคุมไม่ได้"
                    icon="📋" color="#7C3AED"
                    hasData={a.act?.allAnswered}
                    summary={a.act?.allAnswered
                      ? `${a.act.score}/25 · ${AppStore.interpretACT(a.act.score).label}`
                      : null}
                    onClear={() => setAssessment('act', { answers: [null,null,null,null,null], score: 0, allAnswered: false })}
                  >
                    <ACTAssessment value={a.act} onChange={v => setAssessment('act', v)} />
                  </AssessmentCollapsible>

          {/* ④ Medications */}
          <SecHd n="4" title="ยาที่ผู้ป่วยใช้อยู่ในปัจจุบัน" color="#0369A1"

                    <div key={i} style={{ fontSize: 11, fontWeight: 600, color: C.textMuted, textTransform: 'uppercase' }}>{h}</div>
                  ))}
                </div>
                {f.medications.map((med, i) => {
                  const status = !med.name ? undefined :
                    lastMedNames.includes(med.name) ? 'same' : 'new';
                  return (
                    <MedRow key={med.id || i} med={med} index={i}
                      onChange={updateMed} onRemove={removeMed}
                      changeStatus={lastVisit ? status : undefined} />

                })}
              </div>

            <Btn size="sm" variant="ghost" onClick={addMed}>+ เพิ่มยา</Btn>

          {/* ⑤ Inhaler Technique */}
          <SecHd n="5" title="ประเมินเทคนิคการใช้ยาพ่น (Inhaler Technique)" color="#7C3AED" />

            {f.inhalerTechnique.map((entry, i) => (
              <InhalerChecklistCard key={entry.id || i} entry={entry} index={i} onChange={updateTech} onRemove={removeTech} />
            ))}
            <Btn size="sm" variant="ghost" onClick={addTech}>+ เพิ่มการประเมินอุปกรณ์</Btn>

            </p>
            <AdherenceSection adherence={f.adherence} onChange={v => set('adherence', v)} />
          </Card>

          {/* ⑦ DRP + PCNE */}
          <SecHd n="7" title="Drug-Related Problems (DRP) — PCNE v9.1" color="#DC2626" />
          <Card>
            <DRPSection drp={f.drp} onChange={v => set('drp', v)} />
            {f.drp?.noDRP === false && (
              <div style={{ marginTop: 14, borderTop: `1px solid ${C.border}`, paddingTop: 14 }}>
                <div style={{ fontSize: 12, fontWeight: 800, color: C.primary, marginBottom: 10 }}>
                  📋 PCNE v9.1 Classification
                </div>
                <PCNEPanel pcne={f.drp?.pcne} onChange={v => set('drp', { ...f.drp, pcne: v })} />
              </div>

          </Card>

          {/* ⑧ SOAP */}
          <SecHd n="8" title="บันทึก SOAP" color="#0F766E"
            right={<span style={{ fontSize: 11, color: C.textMuted, marginLeft: 8 }}>🏷️ คลิก Templates เพื่อใส่ snippet</span>} />
          <Card>

            <SOAPField label="O — Objective" fieldKey="o"

            <SOAPField label="A — Assessment" fieldKey="a"
              value={f.soap.a} onChange={v => setSOAP('a', v)}
              placeholder="การวิเคราะห์ DRPs, ความร่วมมือ, เทคนิค, ความเสี่ยง..." rows={3} />
            <SOAPField label="P — Plan" fieldKey="p"
              value={f.soap.p} onChange={v => setSOAP('p', v)}
              placeholder="แผนการแก้ปัญหา คำแนะนำ การส่งต่อ นัดติดตาม..." rows={3} />

            <FormField label="หัวข้อ Counseling">
              <CheckboxGroup options={AppStore.COUNSELING_TOPICS} selected={f.counselingTopics}

            <div style={row2}>

            </div>
            <FormField label="บันทึกเพิ่มเติมของเภสัชกร">
              <Textarea value={f.pharmacistNote} onChange={v => set('pharmacistNote', v)}
