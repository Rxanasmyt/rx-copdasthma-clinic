}

// ── Dashboard ─────────────────────────────────────────
function Dashboard({ data, navigate }) {
  const pts = data.patients;
  const vis = data.visits;
  const tel = data.telepharmacy;

  const todayStr = new Date().toISOString().slice(0, 10);

  // วันคลินิกวันนี้: scheduled visits today (from previous visits' nextVisit field)
  const scheduledToday = useMemo(() => {
    return pts.filter(p => {
      const ptVisits = vis.filter(v => v.patientId === p.id);
      // Latest scheduled "nextVisit" for any past visit equals today
      return ptVisits.some(v => v.nextVisit === todayStr);
    }).map(p => ({
      patient: p,
      checkedIn: vis.some(v => v.patientId === p.id && v.visitDate === todayStr),
    }));
  }, [pts, vis, todayStr]);

  const checkedInCount = scheduledToday.filter(x => x.checkedIn).length;
  const waitingCount   = scheduledToday.length - checkedInCount;

  // Audio beep on mount if high-risk patients scheduled today
  useEffect(() => {
    const hasHighRiskToday = scheduledToday.some(x => x.patient.riskLevel === 'High' && !x.checkedIn);
    if (hasHighRiskToday) {
      // Delay a bit to ensure audio is allowed
      setTimeout(() => alertBeep(), 600);
    }
    // eslint-disable-next-line
  }, []);

  const highRisk = pts.filter(p => p.riskLevel === 'High');
  const pending  = tel.filter(t => t.status === 'Pending')
    .sort((a, b) => a.scheduledDate.localeCompare(b.scheduledDate)).slice(0, 4);
  const recentV  = [...vis].sort((a, b) => b.visitDate.localeCompare(a.visitDate)).slice(0, 5);
  const getPt    = id => pts.find(p => p.id === id);
  const today    = new Date().toLocaleDateString('th-TH', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });

  return (
    <div>
      <div style={{ marginBottom: 22 }}>
        <h1 style={{ margin: 0, fontSize: 21, fontWeight: 800, color: C.primary }}>สวัสดี 👋 ยินดีต้อนรับสู่ Rx-COPD/Asthma Clinic</h1>
        <p style={{ margin: '4px 0 0', fontSize: 13, color: C.textMuted }}>{today}</p>
      </div>

      {/* "วันคลินิกวันนี้" Section */}
      {scheduledToday.length > 0 && (
        <Card style={{ marginBottom: 20, padding: 0, overflow: 'hidden', border: `2px solid ${C.accent}30` }}>
          <div style={{
            background: 'linear-gradient(135deg, #0EA5C9 0%, #1848A0 100%)',
            color: '#fff', padding: '14px 20px',
            display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          }}>
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, opacity: 0.85, textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                📅 วันคลินิกวันนี้
              </div>
              <div style={{ fontSize: 17, fontWeight: 800, marginTop: 2 }}>
                ผู้ป่วยนัด {scheduledToday.length} คน
              </div>
            </div>
            <div style={{ display: 'flex', gap: 16, fontSize: 12, textAlign: 'right' }}>
              <div>
                <div style={{ fontSize: 20, fontWeight: 800 }}>{checkedInCount}</div>
                <div style={{ opacity: 0.85 }}>มาแล้ว</div>
              </div>
              <div>
                <div style={{ fontSize: 20, fontWeight: 800 }}>{waitingCount}</div>
                <div style={{ opacity: 0.85 }}>รอ</div>
              </div>
            </div>
          </div>
          <div style={{ padding: '12px 16px' }}>
            <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
              {scheduledToday.map(({ patient: p, checkedIn }) => (
                <div key={p.id} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '8px 12px',
                  background: checkedIn ? C.lowBg : C.surface,
                  border: `1px solid ${checkedIn ? C.lowBorder : C.border}`,
                  borderRadius: 8,
                  opacity: checkedIn ? 0.75 : 1,
                }}>
                  <div style={{
                    width: 32, height: 32, borderRadius: '50%',
                    background: checkedIn ? C.low : (p.riskLevel === 'High' ? C.high : C.primary),
                    color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 13, fontWeight: 700, flexShrink: 0,
                  }}>{checkedIn ? '✓' : p.firstName.charAt(0)}</div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                      <span style={{ fontWeight: 600, fontSize: 13, color: C.text }}>
                        {p.prefix}{p.firstName} {p.lastName}
                      </span>
                      <DiagBadge diagnosis={p.diagnosis} />
                      <RiskBadge level={p.riskLevel || 'Low'} />
                      {(p.allergies || []).filter(a => !a.startsWith('NKDA')).length > 0 && (
                        <span style={{ fontSize: 10, fontWeight: 700, color: C.high, background: C.highBg, padding: '1px 7px', borderRadius: 12, border: `1px solid ${C.highBorder}` }}>
                          ⚠ แพ้ยา
                        </span>
                      )}
                    </div>
                    <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>
                      HN: {p.hn} · {p.phone} · นัดวันนี้
                    </div>
                  </div>
                  {checkedIn ? (
                    <Btn size="sm" variant="ghost" onClick={() => navigate('history', p.id)}>ดูประวัติ</Btn>
                  ) : (
                    <Btn size="sm" variant="accent" onClick={() => navigate('visit-form', p.id)}>📥 เช็คอิน</Btn>
                  )}
                </div>
              ))}
            </div>
          </div>
        </Card>
      )}

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 22 }}>
        <StatCard label="ผู้ป่วยทั้งหมด" value={pts.length}              icon="👥" />
        <StatCard label="High Risk"       value={highRisk.length} color={C.high}  icon="🔴" sub="ต้องติดตามด่วน" />
        <StatCard label="รอ Telepharmacy" value={pending.length}  color="#0369A1" icon="📞" sub="Pending calls" />
        <StatCard label="บันทึกทั้งหมด"  value={vis.length}      color="#7C3AED" icon="📋" sub="Visit records" />
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20, marginBottom: 20 }}>
        {/* High risk */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>🔴 ผู้ป่วย High Risk</h3>
            <Btn size="sm" variant="ghost" onClick={() => navigate('risk')}>ดูทั้งหมด</Btn>
          </div>
          {highRisk.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '20px 0', color: C.textMuted, fontSize: 13 }}>✓ ไม่มีผู้ป่วย High Risk</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {highRisk.slice(0, 4).map(p => (
                <div key={p.id} style={{
                  display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px',
                  background: C.highBg, borderRadius: 8, border: `1px solid ${C.highBorder}`,
                  cursor: 'pointer',
                }} onClick={() => navigate('history', p.id)}>
                  <div style={{ width: 36, height: 36, borderRadius: '50%', background: C.high, color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 13, fontWeight: 700, flexShrink: 0 }}>
                    {p.firstName.charAt(0)}
                  </div>
                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 600, fontSize: 13 }}>{p.prefix}{p.firstName} {p.lastName}</div>
                    <div style={{ fontSize: 11, color: C.textMuted }}>HN: {p.hn} · {p.diagnosis}</div>
                  </div>
                  <DiagBadge diagnosis={p.diagnosis} />
                </div>
              ))}
              {highRisk.length > 4 && (
                <button onClick={() => navigate('risk')} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 12, color: C.primary, fontWeight: 600, padding: '6px 0', textAlign: 'center' }}>
                  ดูอีก {highRisk.length - 4} ราย →
                </button>
              )}
            </div>
          )}
        </Card>

        {/* Pending tele */}
        <Card>
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
            <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>📞 Telepharmacy ที่รอโทร</h3>
            <Btn size="sm" variant="ghost" onClick={() => navigate('telepharmacy')}>ดูทั้งหมด</Btn>
          </div>
          {pending.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '20px 0', color: C.textMuted, fontSize: 13 }}>✓ ไม่มีนัดรอโทร</div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
              {pending.map(t => {
                const pt = getPt(t.patientId);
                const overdue = t.scheduledDate < new Date().toISOString().slice(0,10);
                return (
                  <div key={t.id} style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 12px', background: overdue ? C.highBg : '#EFF6FF', borderRadius: 8, border: `1px solid ${overdue ? C.highBorder : '#BFDBFE'}` }}>
                    <span style={{ fontSize: 22 }}>📋</span>
                    <div style={{ flex: 1, minWidth: 0 }}>
                      <div style={{ fontWeight: 600, fontSize: 13 }}>{pt ? `${pt.prefix}${pt.firstName} ${pt.lastName}` : '—'}</div>
                      <div style={{ fontSize: 11, color: C.textMuted }}>{pt?.hn}</div>
                    </div>
                    <div style={{ textAlign: 'right', flexShrink: 0 }}>
                      <div style={{ fontSize: 12, fontWeight: 600, color: overdue ? C.high : '#0369A1' }}>{t.scheduledDate}</div>
                      {overdue && <div style={{ fontSize: 10, color: C.high }}>เกินกำหนด</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>

      {/* Recent visits */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>📋 บันทึกการบริบาลล่าสุด</h3>
          <Btn size="sm" variant="ghost" onClick={() => navigate('patients')}>ดูทั้งหมด</Btn>
        </div>
        {recentV.length === 0 ? (
          <EmptyState icon="📋" title="ยังไม่มีบันทึกการเยี่ยม" subtitle="เริ่มต้นโดยเพิ่มผู้ป่วยและบันทึกการบริบาล" />
        ) : (
          <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
            <thead>
              <tr>{['วันที่','ผู้ป่วย','การวินิจฉัย','Exacerbation','Adherence','เทคนิคยาพ่น','Risk'].map(h => (
                <th key={h} style={{ padding:'8px 12px', background:'#F8FAFC', borderBottom:`1px solid ${C.border}`, textAlign:'left', fontSize:11, color:C.textMuted, fontWeight:600, textTransform:'uppercase', letterSpacing:'0.04em' }}>{h}</th>
              ))}</tr>
            </thead>
            <tbody>
              {recentV.map(v => {
                const pt = getPt(v.patientId);
                return (
                  <tr key={v.id} style={{ borderBottom:`1px solid ${C.border}`, cursor:'pointer' }}
                    onClick={() => navigate('history', v.patientId)}
                    onMouseEnter={e => e.currentTarget.style.background='#F8FAFC'}
                    onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                    <td style={{ padding:'10px 12px', fontFamily:'monospace', fontSize:12 }}>{v.visitDate}</td>
                    <td style={{ padding:'10px 12px' }}>
                      <div style={{ fontWeight:600 }}>{pt ? `${pt.prefix}${pt.firstName} ${pt.lastName}` : '—'}</div>
                      <div style={{ fontSize:11, color:C.textMuted }}>{pt?.hn}</div>
                    </td>
                    <td style={{ padding:'10px 12px' }}><DiagBadge diagnosis={pt?.diagnosis} /></td>
                    <td style={{ padding:'10px 12px', fontSize:12 }}>
                      {v.exacerbation?.countThisYear ?? 0} ครั้ง/ปี
                      {v.exacerbation?.hospitalized && <span style={{ marginLeft:6, color:C.high, fontSize:11 }}>นอน รพ.</span>}
                    </td>
                    <td style={{ padding:'10px 12px' }}><AdherenceBadge level={v.adherence?.level} /></td>
                    <td style={{ padding:'10px 12px' }}>
                      {(v.inhalerTechnique||[]).map((t,i) => <span key={i} style={{ marginRight:4 }}><TechniqueBadge score={t.overallScore} /></span>)}
                      {(!v.inhalerTechnique||v.inhalerTechnique.length===0) && <span style={{ color:C.textMuted }}>—</span>}
                    </td>
                    <td style={{ padding:'10px 12px' }}><RiskBadge level={v.riskLevel} /></td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        )}
      </Card>
    </div>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  // Auth
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem('copd_user_v1')); } catch { return null; }
  });
  // Data
  const [data, setData] = useState(() => AppStore.load());
  const firebaseSynced = useRef(false); // true หลัง Firebase โหลดสำเร็จครั้งแรก

  // Firebase
  const [syncStatus, setSyncStatus] = useState('offline');
  const dbRef   = useRef(null);
  const unsubRef = useRef(null);

  // Nav
  const [view,        setView]        = useState('dashboard');
  const [selectedPtId, setSelectedPtId] = useState(null);
  const [teleAddPtId,  setTeleAddPtId]  = useState(null);
  const [searchOpen,   setSearchOpen]   = useState(false);
  const [editVisitId,  setEditVisitId]  = useState(null);
  const [isOnline,     setIsOnline]     = useState(navigator.onLine);

  // Online/offline indicator
  useEffect(() => {
    const goOnline  = () => setIsOnline(true);
    const goOffline = () => setIsOnline(false);
    window.addEventListener('online',  goOnline);
    window.addEventListener('offline', goOffline);
    return () => {
      window.removeEventListener('online',  goOnline);
      window.removeEventListener('offline', goOffline);
    };
  }, []);

  // Persist session
  useEffect(() => {
    if (currentUser) sessionStorage.setItem('copd_user_v1', JSON.stringify(currentUser));
    else             sessionStorage.removeItem('copd_user_v1');
  }, [currentUser]);

  // Firebase init — merge by timestamp, retry on failure
  const retryRef = useRef(null);

  // ฟังก์ชัน apply data จาก Firebase → state (ใช้ทั้งใน initial load และ onSnapshot)
  const applyRemoteData = useCallback((remote, db) => {
    const local = AppStore.load();
    // merge patient/visit data by timestamp
    const merged = AppStore.merge(local, remote);

    setData(merged);
    AppStore.save(merged);

    return merged;
  }, []);

  const initFirebase = useCallback(async (config, attempt = 0) => {
    if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
    clearTimeout(retryRef.current);
    if (!config) { dbRef.current = null; setSyncStatus('offline'); return false; }
    if (typeof firebase === 'undefined') { setSyncStatus('error'); return false; }
    try {
      if (!firebase.apps.length) firebase.initializeApp(config);
      else firebase.app();
      const db = firebase.firestore();
      dbRef.current = db;
      setSyncStatus('syncing');

      const snap = await db.collection('clinic').doc('main').get();
      if (snap.exists) applyRemoteData(snap.data(), db);

      firebaseSynced.current = true;
      setSyncStatus('synced');

      unsubRef.current = db.collection('clinic').doc('main').onSnapshot(
        doc => {
          if (!doc.exists) return;
          applyRemoteData(doc.data(), db);
          setSyncStatus('synced');
        },
        err => {
          console.error('Firebase error:', err);
          setSyncStatus('error');
          if (attempt < 5) {
            const delay = Math.min(2000 * Math.pow(2, attempt), 32000);
            retryRef.current = setTimeout(() => initFirebase(config, attempt + 1), delay);
          }
        }
      );
      return true;
    } catch (e) {
      console.error('Firebase init error:', e);
      setSyncStatus('error');
      if (attempt < 5) {
        const delay = Math.min(2000 * Math.pow(2, attempt), 32000);
        retryRef.current = setTimeout(() => initFirebase(config, attempt + 1), delay);
      }
      return false;
    }
  }, [applyRemoteData]);

  // Load Firebase on startup if config saved
  useEffect(() => {
    const cfg = loadFBConfig();
    if (cfg) initFirebase(cfg);
  }, []);

  // Persist data (localStorage + Firebase)
  const saveTimer = useRef(null);
  const isFirstRender = useRef(true);
  useEffect(() => {
    if (isFirstRender.current) { isFirstRender.current = false; return; }
    AppStore.save(data);
    // ห้ามเขียน Firebase จนกว่าจะ sync ครั้งแรกเสร็จ (ป้องกัน sample data เขียนทับข้อมูลจริง)
    if (dbRef.current && firebaseSynced.current) {
      clearTimeout(saveTimer.current);
      saveTimer.current = setTimeout(() => {
        setSyncStatus('syncing');
        const payload = { ...data, _savedAt: Date.now() };
        dbRef.current.collection('clinic').doc('main').set(payload)
          .then(() => setSyncStatus('synced'))
          .catch(err => {
            console.error('Firebase save error:', err);
            setSyncStatus('error');
          });
      }, 800);
    }
  }, [data]);

  const navigate = useCallback((target, patientId = null, extra = null) => {
    if (target === 'telepharmacy-add') {
      setTeleAddPtId(patientId); setView('telepharmacy');
    } else if (target === 'visit-form-edit') {
      setEditVisitId(extra);
      setSelectedPtId(patientId);
      setView('visit-form');
    } else {
      setView(target); setSelectedPtId(patientId);
      if (target !== 'visit-form') setEditVisitId(null);
      if (target !== 'telepharmacy') setTeleAddPtId(null);
    }
    document.getElementById('main-scroll')?.scrollTo({ top: 0 });
  }, []);

  const handleDataChange = useCallback(nd => setData(nd), []);
  const handleLogout = () => { sessionStorage.removeItem('copd_user_v1'); setCurrentUser(null); };

  // Ctrl+K / Cmd+K to open QuickSearch
  useEffect(() => {
    if (!currentUser) return;
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        setSearchOpen(true);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [currentUser]);

  // ── Login gate ────────────────────────────────────
  if (!currentUser) {
    return <LoginScreen onLogin={u => setCurrentUser(u)} data={data} onDataChange={handleDataChange} syncStatus={syncStatus} />;
  }

  // ── Render view ───────────────────────────────────
  const renderView = () => {
    switch (view) {
      case 'dashboard':
        return <Dashboard data={data} navigate={navigate} />;
      case 'patients':
        return <PatientList data={data} onDataChange={handleDataChange} navigate={navigate} />;
      case 'history':
        return selectedPtId
          ? <VisitHistory data={data} patientId={selectedPtId} navigate={navigate}
              onEditVisit={(vid) => navigate('visit-form-edit', selectedPtId, vid)} />
          : <PatientList data={data} onDataChange={handleDataChange} navigate={navigate} />;
      case 'visit-form':
        return selectedPtId
          ? <VisitForm data={data} patientId={selectedPtId}
              editingVisit={editVisitId ? data.visits.find(v => v.id === editVisitId) : null}
              onSave={handleDataChange} navigate={navigate} currentUser={currentUser} />
          : <PatientList data={data} onDataChange={handleDataChange} navigate={navigate} />;
      case 'risk':
        return <RiskScreeningView data={data} navigate={navigate} />;
      case 'telepharmacy':
        return <TelepharmacyView data={data} onDataChange={handleDataChange} navigate={navigate} initPatientId={teleAddPtId} />;
      case 'reports':
        return <ReportsView data={data} navigate={navigate} />;
      case 'analytics':
        return <AnalyticsDashboard data={data} />;
      case 'ha':
        return <HAComplianceDashboard data={data} onDataChange={handleDataChange} currentUser={currentUser} />;
      case 'training':
        return <TrainingModeDashboard />;
      case 'research':
        return <ResearchExportDashboard data={data} />;
      case 'settings':
        return <SettingsView data={data} onDataChange={handleDataChange}
          currentUser={currentUser} onSwitch={u => setCurrentUser(u)}
          onConfigSave={initFirebase} syncStatus={syncStatus} />;
      default:
        return <Dashboard data={data} navigate={navigate} />;
    }
  };

  // ── Breadcrumb ────────────────────────────────────
  const crumbMap = {
    dashboard: 'Dashboard', patients: 'ทะเบียนผู้ป่วย', risk: 'คัดกรองความเสี่ยง',
    telepharmacy: 'Telepharmacy', history: 'ประวัติการเยี่ยม',
    reports: 'รายงาน & Export', analytics: 'Analytics', ha: 'HA Compliance',
    training: 'Training Mode', research: 'Research Export',
    settings: 'ตั้งค่า', 'visit-form': 'บันทึกการบริบาล',
  };
  const crumb = crumbMap[view] || '';

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <Sidebar view={view} navigate={navigate} data={data} syncStatus={syncStatus} currentUser={currentUser} />

      <main id="main-scroll" style={{ flex: 1, overflowY: 'auto', background: '#F0F4F8' }}>
        {/* Top bar */}
        <div style={{
          position: 'sticky', top: 0, zIndex: 100,
          background: 'rgba(240,244,248,0.94)', backdropFilter: 'blur(8px)',
          borderBottom: `1px solid ${C.border}`, padding: '0 28px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 52,
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
            <span style={{ fontSize: 13, color: C.textMuted }}>{NAV.find(n=>n.id===view)?.icon || '📄'}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: C.primary }}>{crumb}</span>
          </div>
          <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
            <button onClick={() => setSearchOpen(true)} style={{
              display: 'flex', alignItems: 'center', gap: 8,
              padding: '5px 10px 5px 12px', borderRadius: 7,
              background: '#fff', border: `1px solid ${C.border}`,
              cursor: 'pointer', fontFamily: 'Sarabun, sans-serif',
              fontSize: 12, color: C.textMuted, transition: 'all 0.15s', minWidth: 240,
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = C.accent; e.currentTarget.style.background='#F0F9FF'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.background='#fff'; }}>
              <span>🔍</span>
              <span style={{ flex: 1, textAlign: 'left' }}>ค้นหา HN / ชื่อผู้ป่วย...</span>
              <span style={{
                fontSize: 10, fontWeight: 600, padding: '2px 7px', borderRadius: 4,
                background: '#F1F5F9', color: C.textMuted, fontFamily: 'monospace',
              }}>⌘K</span>
            </button>
            {!isOnline && (
              <span style={{
                fontSize: 11, fontWeight: 600, padding: '3px 10px', borderRadius: 20,
                background: C.mediumBg, color: C.medium, border: `1px solid ${C.mediumBorder}`,
              }}>⚫ ออฟไลน์ — บันทึกไว้ในเครื่อง</span>
            )}
            {syncStatus !== 'offline' && (
              <span style={{
                fontSize: 11, fontWeight: 600, padding: '3px 10px', borderRadius: 20,
                background: syncStatus==='synced'?C.lowBg : syncStatus==='syncing'?'#EFF6FF':C.highBg,
                color:      syncStatus==='synced'?C.low   : syncStatus==='syncing'?'#0369A1':C.high,
              }}>
                {syncStatus==='synced'?'☁ ซิงค์แล้ว':syncStatus==='syncing'?'🔄 กำลังซิงค์...':'⚠ ซิงค์ผิดพลาด'}
              </span>
            )}
            <span style={{ fontSize: 12, color: C.textMuted }}>
              {new Date().toLocaleDateString('th-TH',{year:'numeric',month:'short',day:'numeric'})}
            </span>
            <div style={{ display:'flex', alignItems:'center', gap:7, padding:'4px 12px 4px 6px', borderRadius:20, background:'#EFF6FF', border:'1px solid #BFDBFE' }}>
              <div style={{ width:26,height:26,borderRadius:'50%',background:C.primary,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700 }}>
                {currentUser.name.charAt(0)}
              </div>
              <span style={{ fontSize:12,fontWeight:600,color:C.primary }}>{currentUser.prefix}{currentUser.name}</span>
            </div>
            <button onClick={handleLogout} style={{
              background:'none', border:`1px solid ${C.border}`, borderRadius:7, cursor:'pointer',
              padding:'5px 11px', fontSize:12, color:C.textMuted, fontFamily:'Sarabun,sans-serif',
              transition:'all 0.15s',
            }}
            onMouseEnter={e=>e.currentTarget.style.background='#FEF2F2'}
            onMouseLeave={e=>e.currentTarget.style.background='none'}>
              ออกจากระบบ
            </button>
          </div>
        </div>

        {/* Content */}
        <div style={{ padding: '24px 28px' }}>{renderView()}</div>
      </main>

      <QuickSearch data={data} navigate={navigate}
        isOpen={searchOpen} onClose={() => setSearchOpen(false)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

// Register PWA Service Worker
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(
      (reg) => console.log('SW registered:', reg.scope),
      (err) => console.warn('SW registration failed:', err)
    );
  });
}
</script>
</body>
</html>
