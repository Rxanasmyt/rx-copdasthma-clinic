};

// ============ Technique Mastery Curve ============
const TechniqueMasteryCurve = ({ data }) => {
  const mastery = useMemo(() => {
    const patients = data.patients || [];
    const results = [];
    
    patients.forEach(p => {
      const visits = (data.visits || [])
        .filter(v => v.patientId === p.id && v.inhalerTechnique && v.inhalerTechnique.length > 0)
        .sort((a, b) => a.visitDate.localeCompare(b.visitDate));
      
      if (visits.length >= 2) {
        const scores = visits.map(v => {
          const techniques = v.inhalerTechnique || [];
          if (techniques.length === 0) return null;
          const avg = techniques.reduce((sum, t) => sum + t.overallScore, 0) / techniques.length;
          return avg;
        }).filter(s => s != null);
        
        if (scores.length >= 2) {
          results.push({
            hn: p.hn,
            firstName: p.firstName,
            visitCount: scores.length,
            firstScore: scores[0],
            lastScore: scores[scores.length - 1],
            improvement: scores[scores.length - 1] - scores[0],
          });
        }
      }
    });
    
    return results.sort((a, b) => b.improvement - a.improvement).slice(0, 10);
  }, [data]);

  return (
    <Card>
      <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>📈 Technique Mastery Curve (Top 10)</h3>
      {mastery.length === 0 ? (
        <EmptyState icon="📊" title="ยังไม่มีข้อมูล" subtitle="ต้องมี ≥2 visits พร้อมประเมินเทคนิค" />
      ) : (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {mastery.map((m, i) => (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 12, padding: '8px 12px',
              background: m.improvement >= 2 ? '#F0FDF4' : '#F8FAFC',
              borderRadius: 8, border: `1px solid ${m.improvement >= 2 ? C.lowBorder : C.border}`,
            }}>
              <div style={{
                minWidth: 28, height: 28, borderRadius: '50%',
                background: m.improvement >= 2 ? C.low : C.primary,
                color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: 12, fontWeight: 700,
              }}>{i + 1}</div>
              <div style={{ flex: 1 }}>
                <div style={{ fontSize: 13, fontWeight: 600 }}>{m.hn} {m.firstName}</div>
                <div style={{ fontSize: 11, color: C.textMuted }}>{m.visitCount} visits</div>
              </div>
              <div style={{ textAlign: 'right' }}>
                <div style={{ fontSize: 11, color: C.textMuted }}>
                  {m.firstScore.toFixed(1)} → {m.lastScore.toFixed(1)}
                </div>
                <div style={{
                  fontSize: 14, fontWeight: 700,
                  color: m.improvement >= 2 ? C.low : m.improvement >= 1 ? C.accent : C.textMuted,
                }}>
                  {m.improvement >= 0 ? '+' : ''}{m.improvement.toFixed(1)}
                </div>
              </div>
            </div>
          ))}
        </div>
      )}
    </Card>
  );
};

// ============ QUALITY KPIs COMPONENT ============
// 6 ตัวชี้วัดคุณภาพคลินิก COPD/Asthma (HA Accreditation KPIs)

const calculateQualityKPIs = (data, startDate, endDate) => {
  const allVisits = data.visits || [];
  const patients  = data.patients || [];

  // วิสิตในช่วงเวลา
  const periodVisits = allVisits.filter(v =>
    v.visitDate && v.visitDate >= startDate && v.visitDate <= endDate
  );

  // latest visit ต่อผู้ป่วย (ใช้ทั้งหมด ไม่จำกัดช่วง)
  const latestVisit = {};
  allVisits.forEach(v => {
    if (!latestVisit[v.patientId] || v.visitDate > latestVisit[v.patientId].visitDate)
      latestVisit[v.patientId] = v;
  });

  const copdPts   = patients.filter(p => p.diagnosis === 'COPD' || p.diagnosis === 'Both');
  const asthmaPts = patients.filter(p => p.diagnosis === 'Asthma' || p.diagnosis === 'Both');
  const asthmaIds = new Set(asthmaPts.map(p => p.id));

  // ─── KPI 1: COPD Exacerbation Rate (เป้า < 110 /100 ผู้ป่วย) ─────────────────
  // ใช้ countThisYear จาก latest visit ของผู้ป่วย COPD แต่ละคน
  let copdExacerbCount = 0;
  copdPts.forEach(p => {
    const v = latestVisit[p.id];
    copdExacerbCount += (v?.exacerbation?.countThisYear || 0);
  });
  const copdExacerbRate = copdPts.length > 0
    ? ((copdExacerbCount / copdPts.length) * 100).toFixed(1) : '0';
  const copdExacerbStatus = parseFloat(copdExacerbRate) < 110 ? 'pass' : 'warn';

  // ─── KPI 2: Asthma ER/OPD/Hospitalized Rate (เป้า < 20 /100 ผู้ป่วย) ──────────
  // นับ visit ที่มี erVisit=true หรือ hospitalized=true ของผู้ป่วย Asthma
  const srcVisits = periodVisits.length > 0 ? periodVisits : allVisits;
  const asthmaErVisits = srcVisits.filter(v =>
    asthmaIds.has(v.patientId) &&
    (v.exacerbation?.erVisit === true || v.exacerbation?.hospitalized === true)
  );
  const asthmaErCount = asthmaErVisits.length;
  const asthmaErRate  = asthmaPts.length > 0
    ? ((asthmaErCount / asthmaPts.length) * 100).toFixed(1) : '0';
  const asthmaErStatus = parseFloat(asthmaErRate) < 20 ? 'pass' : 'warn';

  // ─── KPI 3: Asthma + ICS ≥ 80% ───────────────────────────────────────────────
  const ICS_KW = ['budesonide','fluticasone','beclomethasone','ciclesonide','mometasone',
                  'symbicort','seretide','trelegy','foster','flixotide','pulmicort'];
  const hasICS = (meds) => (meds||[]).some(m => {
    const n = (m.name||'').toLowerCase();
    return ICS_KW.some(k => n.includes(k));
  });
  const asthmaWithICS = asthmaPts.filter(p => hasICS(latestVisit[p.id]?.medications)).length;
  const asthmaIcsPct  = asthmaPts.length > 0
    ? ((asthmaWithICS / asthmaPts.length) * 100).toFixed(1) : '0';
  const asthmaIcsStatus = parseFloat(asthmaIcsPct) >= 80 ? 'pass' : 'warn';

  // ─── KPI 4: COPD ที่มีประวัติกำเริบ ได้รับ LABA/LAMA/Combo ≥ 80% ──────────────
  const LABA_KW = ['salmeterol','formoterol','vilanterol','olodaterol','indacaterol','seretide','symbicort','anoro','trelegy'];
  const LAMA_KW = ['umeclidinium','tiotropium','glycopyrronium','aclidinium','anoro','trelegy'];
  const hasAppropriate = (meds) => {
    const names = (meds||[]).map(m => (m.name||'').toLowerCase());
    const laba = names.some(n => LABA_KW.some(k => n.includes(k)));
    const lama = names.some(n => LAMA_KW.some(k => n.includes(k)));
    return laba || lama;
  };
  const copdWithExacerb = copdPts.filter(p => {
    const v = latestVisit[p.id];
    return v && ((v.exacerbation?.countThisYear||0) > 0 || v.exacerbation?.hospitalized);
  });
  const copdExacerbBase = copdWithExacerb.length > 0 ? copdWithExacerb.length : copdPts.length;
  const copdAppropriate = (copdWithExacerb.length > 0 ? copdWithExacerb : copdPts)
    .filter(p => hasAppropriate(latestVisit[p.id]?.medications)).length;
  const copdTherapyPct  = copdExacerbBase > 0
    ? ((copdAppropriate / copdExacerbBase) * 100).toFixed(1) : '0';
  const copdTherapyStatus = parseFloat(copdTherapyPct) >= 80 ? 'pass' : 'warn';

  // ─── KPI 5: ผู้ป่วยผ่านเกณฑ์เทคนิคยาพ่น MDI/DPI ≥ 80% ──────────────────────
  // "ผ่านเกณฑ์" = overallScore เป็น 'Good' หรือ 'Acceptable'
  const techVisits  = srcVisits.filter(v => v.inhalerTechnique && v.inhalerTechnique.length > 0);
  const techPassed  = techVisits.filter(v =>
    v.inhalerTechnique.some(t => t.overallScore === 'Good' || t.overallScore === 'Acceptable')
  ).length;
  const techniquePct   = techVisits.length > 0
    ? ((techPassed / techVisits.length) * 100).toFixed(1) : '0';
  const techniqueStatus = parseFloat(techniquePct) >= 80 ? 'pass' : 'warn';

  // ─── KPI 6: ผู้ป่วยได้รับการบริบาลเภสัชกรรม ≥ 80% ───────────────────────────
  const visitedIds = new Set(allVisits.map(v => v.patientId));
  const teleIds    = new Set((data.telepharmacy||[]).map(t => t.patientId));
  const caredCount = patients.filter(p => visitedIds.has(p.id) || teleIds.has(p.id)).length;
  const carePct    = patients.length > 0
    ? ((caredCount / patients.length) * 100).toFixed(1) : '0';
  const careStatus  = parseFloat(carePct) >= 80 ? 'pass' : 'warn';

  return {
    copdExacerbRate:   { value: copdExacerbRate,  target: 110, unit: '/100 ผู้ป่วย', status: copdExacerbStatus,  label: 'COPD Exacerbation Rate',      num: copdExacerbCount,  den: copdPts.length,       lowerBetter: true  },
    asthmaErRate:      { value: asthmaErRate,      target: 20,  unit: '/100 ผู้ป่วย', status: asthmaErStatus,     label: 'Asthma ER/Admit Rate',         num: asthmaErCount,     den: asthmaPts.length,     lowerBetter: true  },
    asthmaIcsPercent:  { value: asthmaIcsPct,      target: 80,  unit: '%',            status: asthmaIcsStatus,    label: 'Asthma + ICS',                 num: asthmaWithICS,     den: asthmaPts.length,     lowerBetter: false },
    copdTherapyPercent:{ value: copdTherapyPct,    target: 80,  unit: '%',            status: copdTherapyStatus,  label: 'COPD LABA/LAMA/Combo',         num: copdAppropriate,   den: copdExacerbBase,      lowerBetter: false },
    techniquePercent:  { value: techniquePct,      target: 80,  unit: '%',            status: techniqueStatus,    label: 'Inhaler Technique ผ่านเกณฑ์',  num: techPassed,        den: techVisits.length,    lowerBetter: false },
    carePercent:       { value: carePct,           target: 80,  unit: '%',            status: careStatus,         label: 'ผู้ป่วยได้รับบริบาลเภสัชกรรม', num: caredCount,        den: patients.length,      lowerBetter: false },
    visitCount:  srcVisits.length,
    patientCount: patients.length,
    copdCount:   copdPts.length,
    asthmaCount: asthmaPts.length,
  };
};

// ─── KPI Card ─────────────────────────────────────────────────────────────────
const QualityKPICard = ({ metric, icon, desc, targetLabel }) => {
  const isPass = metric.status === 'pass';
  const passColor  = '#059669';
  const warnColor  = '#DC2626';
  const borderColor = isPass ? passColor : warnColor;
  const bgGrad     = isPass
    ? 'linear-gradient(135deg,#F0FDF4 0%,#DCFCE7 100%)'
    : 'linear-gradient(135deg,#FEF2F2 0%,#FECACA 100%)';

  // Progress bar: for lower-is-better KPIs, full bar = value/target (< target = good)
  //               for higher-is-better KPIs, full bar = value/target (> target = good)
  const numVal = parseFloat(metric.value);
  let barPct;
  if (metric.lowerBetter) {
    barPct = metric.target > 0 ? Math.min((numVal / metric.target) * 100, 150) : 0;
  } else {
    barPct = Math.min(numVal, 100);
  }
  const barColor = isPass ? passColor : warnColor;

  return (
    <div style={{
      background: bgGrad, border: `2px solid ${borderColor}30`,
      borderLeft: `5px solid ${borderColor}`,
      borderRadius: 12, padding: '16px 18px',
      display: 'flex', flexDirection: 'column', gap: 12,
      boxShadow: isPass ? '0 2px 8px rgba(5,150,105,0.12)' : '0 2px 8px rgba(220,38,38,0.12)',
    }}>
      {/* Header */}
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 8 }}>
        <div style={{ flex: 1 }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: '#6B7280', textTransform: 'uppercase', letterSpacing: '0.05em', marginBottom: 4 }}>
            {icon} {metric.label}
          </div>
          <div style={{ display: 'flex', alignItems: 'baseline', gap: 6 }}>
            <span style={{ fontSize: 34, fontWeight: 800, color: borderColor, lineHeight: 1 }}>{metric.value}</span>
            <span style={{ fontSize: 14, color: '#6B7280', fontWeight: 600 }}>{metric.unit}</span>
          </div>
          {metric.den > 0 && (
            <div style={{ fontSize: 11, color: '#9CA3AF', marginTop: 3 }}>
              {metric.num} / {metric.den} {metric.unit.includes('%') ? 'ราย' : 'ครั้ง/ราย'}
            </div>
          )}
        </div>
        <div style={{
          padding: '5px 11px', borderRadius: 20,
          background: isPass ? '#059669' : '#DC2626',
          color: '#fff', fontSize: 11, fontWeight: 700, whiteSpace: 'nowrap', flexShrink: 0,
        }}>
          {isPass ? '✅ ผ่าน' : '⚠ ต้องปรับ'}
        </div>
      </div>

      {/* Progress bar */}
      <div>
        <div style={{ height: 8, borderRadius: 99, background: '#E5E7EB', overflow: 'hidden' }}>
          <div style={{
            height: '100%', borderRadius: 99,
            width: `${Math.min(barPct, 100)}%`,
            background: barColor, transition: 'width 0.6s ease',
          }} />
        </div>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginTop: 4, fontSize: 10, color: '#9CA3AF' }}>
          <span>0</span>
          <span style={{ fontWeight: 700, color: '#6B7280' }}>เป้า: {targetLabel}</span>
        </div>
      </div>

      {/* Description */}
      {desc && (
        <div style={{
          fontSize: 11, color: '#374151', lineHeight: 1.6,
          borderTop: `1px solid ${borderColor}20`, paddingTop: 10,
        }}>
          {desc}
        </div>
      )}
    </div>
  );
};

// ── Animated count-up number ──
const AnimatedNumber = ({ value, duration = 900, decimals = 0, suffix = '', prefix = '' }) => {
  const [disp, setDisp] = React.useState(0);
  React.useEffect(() => {
    const target = Number(value) || 0;
    let raf, start;
    const step = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic
      setDisp(target * eased);
      if (p < 1) raf = requestAnimationFrame(step);
    };
    raf = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf);
  }, [value, duration]);
  return <span>{prefix}{disp.toFixed(decimals)}{suffix}</span>;
};

// ── Circular progress ring ──
const ProgressRing = ({ pct, size = 84, stroke = 9, color = '#2563EB', label, sub }) => {
  const r = (size - stroke) / 2;
  const circ = 2 * Math.PI * r;
  const off = circ - (Math.min(100, Math.max(0, pct)) / 100) * circ;
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="#E2E8F0" strokeWidth={stroke} />
        <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
          strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={off}
          style={{ transition: 'stroke-dashoffset 1s cubic-bezier(0.16,1,0.3,1)' }} />
      </svg>
      <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ fontSize: size > 70 ? 19 : 15, fontWeight: 800, color }}><AnimatedNumber value={pct} decimals={0} suffix="%" /></div>
        {sub && <div style={{ fontSize: 9, color: C.textMuted, marginTop: 1 }}>{sub}</div>}
      </div>
    </div>
  );
};

// ── Compute all insights (memoized) ──
const computeInsights = (data) => {
  const patients = data.patients || [];
  const visits   = (data.visits || []).slice().sort((a,b) => (a.visitDate||'').localeCompare(b.visitDate||''));
  const tele     = data.telepharmacy || [];
  const today    = new Date().toISOString().slice(0, 10);
  const ptById   = Object.fromEntries(patients.map(p => [p.id, p]));

  // ── DRP Intelligence: run detectDRP across all visits ──
  const drpByCat = {};       // categoryTh → count
  const drpBySev = { High: 0, Medium: 0, Low: 0 };
  const drpByCode = {};      // PCNE code → count
  const interactionPairs = {};
  let totalDRP = 0;
  visits.forEach(v => {
    const pt = ptById[v.patientId];
    if (!pt || typeof window.detectDRP !== 'function') return;
    const drps = window.detectDRP(v, pt);
    drps.forEach(d => {
      totalDRP++;
      drpByCat[d.categoryTh] = (drpByCat[d.categoryTh] || 0) + 1;
      if (drpBySev[d.severity] != null) drpBySev[d.severity]++;
      drpByCode[d.code] = (drpByCode[d.code] || 0) + 1;
    });
    // drug interactions
    if (typeof window.checkInteractions === 'function') {
      window.checkInteractions(v.medications || [], pt).forEach(ix => {
        const key = `${ix.drug1} ↔ ${ix.drug2}`;
        interactionPairs[key] = (interactionPairs[key] || 0) + 1;
      });
    }
  });
  const drpCatList = Object.entries(drpByCat).map(([k,v]) => ({ label: k, value: v })).sort((a,b) => b.value - a.value);
  const topInteractions = Object.entries(interactionPairs).map(([k,v]) => ({ label: k, value: v })).sort((a,b) => b.value - a.value).slice(0, 6);
  const drpCodeList = Object.entries(drpByCode).map(([k,v]) => ({ label: k, value: v })).sort((a,b) => b.value - a.value).slice(0, 8);

  // manual DRP resolution rate
  const manualDRP = visits.filter(v => v.drp?.noDRP === false);
  const resolved  = manualDRP.filter(v => v.drp?.resolved === true || v.drp?.pcne?.resolved === true).length;
  const drpResolveRate = manualDRP.length ? Math.round((resolved / manualDRP.length) * 100) : 0;

  // ── Clinical Outcomes ──
  // Technique improvement: among patients with ≥2 visits, % whose latest technique improved from first Poor
  let techImproved = 0, techEligible = 0;
  let adhImproved = 0, adhEligible = 0;
  const adhRank = { Poor: 0, Fair: 1, Good: 2 };
  patients.forEach(p => {
    const pv = visits.filter(v => v.patientId === p.id);
    if (pv.length < 2) return;
    const first = pv[0], last = pv[pv.length - 1];
    const firstPoorTech = (first.inhalerTechnique || []).some(t => t.overallScore === 'Poor');
    const lastPoorTech  = (last.inhalerTechnique || []).some(t => t.overallScore === 'Poor');
    if (firstPoorTech) { techEligible++; if (!lastPoorTech) techImproved++; }
    const fa = adhRank[first.adherence?.level], la = adhRank[last.adherence?.level];
    if (fa != null && la != null) { adhEligible++; if (la > fa) adhImproved++; }
  });
  const techImprovePct = techEligible ? Math.round((techImproved / techEligible) * 100) : 0;
  const adhImprovePct  = adhEligible ? Math.round((adhImproved / adhEligible) * 100) : 0;

  // Exacerbation: avg per patient (latest visit)
  let exSum = 0, exN = 0;
  patients.forEach(p => {
    const pv = visits.filter(v => v.patientId === p.id);
    if (!pv.length) return;
    exSum += Number(pv[pv.length - 1].exacerbation?.countThisYear) || 0; exN++;
  });
  const avgExacerb = exN ? (exSum / exN) : 0;

  // Adherence distribution (latest visit per patient)
  const adhDist = { Good: 0, Fair: 0, Poor: 0 };
  patients.forEach(p => {
    const pv = visits.filter(v => v.patientId === p.id);
    if (!pv.length) return;
    const lvl = pv[pv.length - 1].adherence?.level;
    if (adhDist[lvl] != null) adhDist[lvl]++;
  });

  // ── Workflow / Productivity ──
  const pharmMap = {};
  visits.forEach(v => {
    const name = v.pharmacist || '—';
    if (!pharmMap[name]) pharmMap[name] = { visits: 0, drp: 0 };
    pharmMap[name].visits++;
    if (v.drp?.noDRP === false) pharmMap[name].drp += (v.drp.items?.length || 1);
  });
  const pharmList = Object.entries(pharmMap).map(([k,v]) => ({ name: k, ...v })).sort((a,b) => b.visits - a.visits);

  // Follow-up compliance (telepharmacy)
  const teleDone   = tele.filter(t => t.status === 'Completed' || t.status === 'Done').length;
  const teleOverdue= tele.filter(t => t.status === 'Scheduled' && t.scheduledDate < today).length;
  const teleTotal  = tele.length;
  const followupRate = teleTotal ? Math.round((teleDone / teleTotal) * 100) : 0;

  // Overdue high-risk
  const thirtyAgo = new Date(Date.now() - 30*864e5).toISOString().slice(0,10);
  const overdueHighRisk = patients.filter(p => p.riskLevel === 'High').filter(p => {
    const pv = visits.filter(v => v.patientId === p.id).sort((a,b) => b.visitDate.localeCompare(a.visitDate));
    return !pv[0] || pv[0].visitDate < thirtyAgo;
  });

  return {
    patientCount: patients.length, visitCount: visits.length, totalDRP,
    drpCatList, topInteractions, drpCodeList, drpBySev, drpResolveRate,
    techImprovePct, techImproved, techEligible,
    adhImprovePct, adhImproved, adhEligible, avgExacerb, adhDist,
    pharmList, followupRate, teleDone, teleOverdue, teleTotal, overdueHighRisk,
  };
};

  const drpWithPCNE   = visits.filter(v => v.drp?.noDRP === false).length;

  const teleSuccess   = (data.telepharmacy || []).filter(t => t.status === 'Success').length;

  const indicators = [
    { category: 'Documentation (PCT.4)', items: [
      { label: 'SOAP Complete (S+A+P)', value: pct(soapComplete), n: soapComplete, d: total, ok: soapComplete/total >= 0.8 },
      { label: 'Informed Consent บันทึกแล้ว', value: pct(hasConsent), n: hasConsent, d: total, ok: hasConsent/total >= 0.9 },
      { label: 'DRP Documentation ครบ', value: pct(hasDRP), n: hasDRP, d: total, ok: hasDRP/total >= 0.95 },
      { label: 'PCNE Classification (visits with DRP)', value: drpWithPCNE > 0 ? pct(hasPCNE) : 'N/A', n: hasPCNE, d: drpWithPCNE, ok: drpWithPCNE === 0 || hasPCNE/drpWithPCNE >= 0.7 },

      { label: 'Referral with Feedback', value: (ha.referrals||[]).length > 0 ? (((ha.referrals||[]).filter(r=>r.feedbackReceived).length/(ha.referrals||[]).length)*100).toFixed(0)+'%' : '—', n: (ha.referrals||[]).filter(r=>r.feedbackReceived).length, d: (ha.referrals||[]).length, ok: true },

    { category: 'Patient Safety (PSGs)', items: [

<script type="text/babel">
// Notifications.jsx — Smart Notification Center
const { useState, useMemo } = React;

// ============ Calculate Notifications ============
const calculateNotifications = (data) => {
  const today = new Date().toISOString().slice(0, 10);
  const thirtyDaysAgo = new Date(Date.now() - 30 * 24 * 60 * 60 * 1000).toISOString().slice(0, 10);

  const notifications = [];

  // 1. Overdue Telepharmacy
  (data.telepharmacy || []).forEach(t => {
    if (t.status === 'Scheduled' && t.scheduledDate < today) {
      const patient = data.patients.find(p => p.id === t.patientId);
      notifications.push({
        id: `tele-${t.id}`,
        type: 'overdue-tele',
        severity: 'high',
        icon: '📞',
        title: 'Telepharmacy เลยกำหนด',
        message: `${patient?.hn || '—'} ${patient?.firstName || ''} นัดโทร ${t.scheduledDate}`,
        patientId: t.patientId,
        actionLabel: 'เปิด Telepharmacy',
        action: () => window.AppNavigate && window.AppNavigate('telepharmacy'),
      });
    }
  });

  // 2. Missing Follow-up (High Risk ไม่มี Visit >30 วัน)
  data.patients.filter(p => p.riskLevel === 'High').forEach(p => {
    const visits = (data.visits || []).filter(v => v.patientId === p.id).sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    const lastVisit = visits[0];
    if (!lastVisit || lastVisit.visitDate < thirtyDaysAgo) {
      notifications.push({
        id: `followup-${p.id}`,
        type: 'missing-followup',
        severity: 'medium',
        icon: '⏰',
        title: 'High Risk ไม่มี Follow-up',
        message: `${p.hn} ${p.firstName} — Visit ล่าสุด ${lastVisit ? lastVisit.visitDate : 'ไม่มี'}`,
        patientId: p.id,
        actionLabel: 'ดูผู้ป่วย',
        action: () => window.AppNavigate && window.AppNavigate('visit-history', p.id),
      });
    }
  });

  // 3. Vaccine Due (Flu: ทุก 1 ปี, PCV13/PPSV23: ครั้งเดียว, COVID: ทุก 6 เดือน)
  const currentYear = new Date().getFullYear();
  data.patients.forEach(p => {
    const vacc = p.vaccinations || {};
    // Flu
    if (!vacc.flu || parseInt(vacc.flu) < currentYear) {
      notifications.push({
        id: `vaccine-flu-${p.id}`,
        type: 'vaccine-due',
        severity: 'low',
        icon: '💉',
        title: 'ครบกำหนดวัคซีน Flu',
        message: `${p.hn} ${p.firstName} — ฉีด Flu ล่าสุด ${vacc.flu || 'ไม่เคย'}`,
        patientId: p.id,
        actionLabel: 'ดูผู้ป่วย',
        action: () => window.AppNavigate && window.AppNavigate('visit-history', p.id),
      });
    }
    // PCV13/PPSV23
    if (!vacc.pcv13 && p.age >= 65) {
      notifications.push({
        id: `vaccine-pcv13-${p.id}`,
        type: 'vaccine-due',
        severity: 'low',
        icon: '💉',
        title: 'แนะนำวัคซีน PCV13',
        message: `${p.hn} ${p.firstName} (อายุ ${p.age} ปี) — ยังไม่ได้ฉีด PCV13`,
        patientId: p.id,
        actionLabel: 'ดูผู้ป่วย',
        action: () => window.AppNavigate && window.AppNavigate('visit-history', p.id),
      });
    }
  });

  return notifications;
};

// ============ NotificationBadge (for Sidebar) ============
const NotificationBadge = ({ count }) => {
  if (count === 0) return null;
  return (
    <span style={{
      background: C.high, color: '#fff', fontSize: 10, fontWeight: 700,
      borderRadius: '50%', width: 18, height: 18, display: 'inline-flex',
      alignItems: 'center', justifyContent: 'center', marginLeft: 6,
    }}>{count > 9 ? '9+' : count}</span>
  );
};

// ============ NotificationItem ============
const NotificationItem = ({ notif, onDismiss }) => {
  const severityColor = notif.severity === 'high' ? C.high : notif.severity === 'medium' ? C.accent : C.primary;
  const severityBg = notif.severity === 'high' ? C.highBg : notif.severity === 'medium' ? C.accentBg : C.primaryBg;

  return (
    <div style={{
      background: '#fff', border: `1px solid ${C.border}`, borderLeft: `4px solid ${severityColor}`,
      borderRadius: 8, padding: '12px 16px', display: 'flex', alignItems: 'flex-start', gap: 12,
    }}>
      <div style={{
        fontSize: 24, width: 40, height: 40, borderRadius: 8, background: severityBg,
        display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0,
      }}>{notif.icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 2 }}>{notif.title}</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 8 }}>{notif.message}</div>
        <div style={{ display: 'flex', gap: 8 }}>
          {notif.action && (
            <Btn size="sm" variant="ghost" onClick={notif.action}>{notif.actionLabel || 'ดูรายละเอียด'}</Btn>
          )}
          <Btn size="sm" variant="ghost" onClick={() => onDismiss(notif.id)} style={{ color: C.textMuted }}>ซ่อน</Btn>
        </div>
      </div>
    </div>
  );
};

// ============ NotificationCenter (Modal) ============
const NotificationCenter = ({ data, open, onClose }) => {
  const [dismissed, setDismissed] = useState([]);
  
  const notifications = useMemo(() => {
    const all = calculateNotifications(data);
    return all.filter(n => !dismissed.includes(n.id));
  }, [data, dismissed]);

  const handleDismiss = (id) => {
    setDismissed([...dismissed, id]);
  };

  const handleClearAll = () => {
    setDismissed(notifications.map(n => n.id));
  };

  return (
    <Modal open={open} onClose={onClose} title="🔔 Notifications" width={680}>
      {notifications.length === 0 ? (
        <EmptyState icon="✅" title="ไม่มีการแจ้งเตือน" subtitle="ทุกอย่างเรียบร้อยดี!" />
      ) : (
        <>
          <div style={{ marginBottom: 12, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <div style={{ fontSize: 13, color: C.textMuted }}>{notifications.length} รายการ</div>
            <Btn size="sm" variant="ghost" onClick={handleClearAll}>ซ่อนทั้งหมด</Btn>
          </div>
          <div style={{ display: 'flex', flexDirection: 'column', gap: 10, maxHeight: 500, overflowY: 'auto' }}>
            {notifications.map(n => (
              <NotificationItem key={n.id} notif={n} onDismiss={handleDismiss} />
            ))}
          </div>
        </>
      )}
    </Modal>
  );
};

// ============ NotificationPreview (for Dashboard) ============
const NotificationPreview = ({ data, onOpenFull }) => {
  const notifications = useMemo(() => calculateNotifications(data).slice(0, 3), [data]);

  if (notifications.length === 0) {
    return (
      <Card>
        <div style={{ textAlign: 'center', padding: '20px 0' }}>
          <div style={{ fontSize: 40, marginBottom: 8 }}>✅</div>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.text }}>ไม่มีการแจ้งเตือน</div>
          <div style={{ fontSize: 12, color: C.textMuted, marginTop: 4 }}>ทุกอย่างเรียบร้อย!</div>
        </div>
      </Card>
    );
  }

  return (
    <Card>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>🔔 Notifications</h3>
        <Btn size="sm" variant="ghost" onClick={onOpenFull}>ดูทั้งหมด</Btn>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
        {notifications.map(n => (
          <NotificationItem key={n.id} notif={n} onDismiss={() => {}} />
        ))}
      </div>
      {calculateNotifications(data).length > 3 && (
        <div style={{ marginTop: 10, textAlign: 'center' }}>
          <Btn size="sm" variant="ghost" onClick={onOpenFull}>
            ดูอีก {calculateNotifications(data).length - 3} รายการ
          </Btn>
        </div>
      )}
    </Card>
  );
};

// Export
window.NotificationCenter = NotificationCenter;
window.NotificationPreview = NotificationPreview;
window.NotificationBadge = NotificationBadge;
window.calculateNotifications = calculateNotifications;
</script>

<script type="text/babel">
// SmartRecommendations.jsx — AI-powered suggestions
const { useMemo } = React;

// ============ Calculate Recommendations ============
const generateRecommendations = (data, patientId = null) => {
  const recommendations = [];
  const patients = patientId ? data.patients.filter(p => p.id === patientId) : data.patients;

  patients.forEach(p => {
    const visits = (data.visits || [])
      .filter(v => v.patientId === p.id)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    
    const lastVisit = visits[0];
    const prevVisit = visits[1];

    // 1. Next Action — Telepharmacy needed
    if (p.riskLevel === 'High' && lastVisit) {
      const daysSinceVisit = Math.floor((Date.now() - new Date(lastVisit.visitDate)) / (1000 * 60 * 60 * 24));
      if (daysSinceVisit >= 14 && daysSinceVisit <= 21) {
        const tele = (data.telepharmacy || []).find(t => t.patientId === p.id && t.status === 'Scheduled');
        if (!tele) {
          recommendations.push({
            id: `tele-${p.id}`,
            type: 'next-action',
            priority: 'high',
            icon: '📞',
            patient: p,
            title: 'แนะนำนัด Telepharmacy',
            message: `${p.hn} ${p.firstName} — High Risk, Visit ล่าสุด ${daysSinceVisit} วันที่แล้ว`,
            action: 'นัดโทรติดตามภายใน 7 วัน',
            reason: 'ผู้ป่วย High Risk ควรได้รับการติดตามอย่างใกล้ชิด (2-4 สัปดาห์)',
          });
        }
      }
    }

    // 2. Risk Prediction — CAT score increasing
    if (lastVisit?.cat?.score != null && prevVisit?.cat?.score != null) {
      const delta = lastVisit.cat.score - prevVisit.cat.score;
      if (delta >= 5) {
        recommendations.push({
          id: `cat-${p.id}`,
          type: 'risk-prediction',
          priority: 'high',
          icon: '⚠️',
          patient: p,
          title: 'CAT Score เพิ่มขึ้นมาก',
          message: `${p.hn} ${p.firstName} — CAT เพิ่ม +${delta} (${prevVisit.cat.score} → ${lastVisit.cat.score})`,
          action: 'ตรวจสอบเทคนิคการใช้ยาพ่น + Adherence + ประเมิน exacerbation',
          reason: 'CAT เพิ่ม ≥5 คะแนนบ่งชี้ว่าอาการแย่ลงอย่างมีนัยสำคัญ',
        });
      }
    }

    // 3. Auto-tag — New Smoker
    if (lastVisit && prevVisit) {
      const wasNonSmoker = prevVisit.smokingStatus === 'Never' || prevVisit.smokingStatus === 'Ex-smoker';
      const nowSmoker = lastVisit.smokingStatus === 'Current';
      if (wasNonSmoker && nowSmoker) {
        recommendations.push({
          id: `smoke-${p.id}`,
          type: 'auto-tag',
          priority: 'medium',
          icon: '🚬',
          patient: p,
          title: 'ตรวจพบสถานะสูบบุหรี่เปลี่ยน',
          message: `${p.hn} ${p.firstName} — เปลี่ยนจาก ${prevVisit.smokingStatus} → Current smoker`,
          action: 'ให้คำปรึกษาเลิกบุหรี่ + แนะนำ Smoking Cessation Clinic',
          reason: 'สูบบุหรี่ต่อเนื่องเป็นปัจจัยเสี่ยงสำคัญต่อ exacerbation',
        });
      }
    }

    // 4. Technique re-check
    if (lastVisit?.inhalerTechnique) {
      const lowScores = lastVisit.inhalerTechnique.filter(t => t.overallScore < 7);
      if (lowScores.length > 0 && visits.length >= 2) {
        recommendations.push({
          id: `tech-${p.id}`,
          type: 'next-action',
          priority: 'medium',
          icon: '🌬️',
          patient: p,
          title: 'เทคนิคยาพ่นยังไม่ดีพอ',
          message: `${p.hn} ${p.firstName} — ${lowScores.length} อุปกรณ์ที่คะแนน <7`,
          action: 'สอนเทคนิคซ้ำ + นัดประเมินอีกครั้งใน 2 สัปดาห์',
          reason: 'เทคนิคไม่ถูกต้องทำให้ยาไม่ถึงปอด → อาการควบคุมได้ไม่ดี',
        });
      }
    }

    // 5. Vaccine Overdue
    const currentYear = new Date().getFullYear();
    if (p.vaccinations?.flu && parseInt(p.vaccinations.flu) < currentYear - 1) {
      recommendations.push({
        id: `vacc-${p.id}`,
        type: 'auto-tag',
        priority: 'low',
        icon: '💉',
        patient: p,
        title: 'วัคซีน Flu เลยกำหนด',
        message: `${p.hn} ${p.firstName} — ฉีดล่าสุด ${p.vaccinations.flu}`,
        action: 'แนะนำฉีดวัคซีน Flu (ทุกปี)',
        reason: 'Flu vaccine ลดความเสี่ยง exacerbation ใน COPD/Asthma',
      });
    }

    // 6. Adherence trend down
    if (visits.length >= 3) {
      const recent3 = visits.slice(0, 3).filter(v => v.adherence?.selfScore != null);
      if (recent3.length === 3) {
        const scores = recent3.map(v => v.adherence.selfScore);
        const trend = (scores[0] - scores[2]); // latest - oldest
        if (trend <= -2) {
          recommendations.push({
            id: `adh-${p.id}`,
            type: 'risk-prediction',
            priority: 'medium',
            icon: '📉',
            patient: p,
            title: 'Adherence ลดลงต่อเนื่อง',
            message: `${p.hn} ${p.firstName} — Adherence: ${scores[2]} → ${scores[1]} → ${scores[0]}`,
            action: 'สอบถามอุปสรรคในการใช้ยา + ปรับ regimen หากจำเป็น',
            reason: 'Adherence ลดลงต่อเนื่อง บ่งชี้ความร่วมมือลดลง',
          });
        }
      }
    }
  });

  return recommendations.sort((a, b) => {
    const priorityOrder = { high: 3, medium: 2, low: 1 };
    return priorityOrder[b.priority] - priorityOrder[a.priority];
  });
};

// ============ RecommendationCard ============
const RecommendationCard = ({ rec, onDismiss, onAction }) => {
  const priorityColor = rec.priority === 'high' ? C.high : rec.priority === 'medium' ? C.accent : C.primary;
  const priorityBg = rec.priority === 'high' ? C.highBg : rec.priority === 'medium' ? C.accentBg : C.primaryBg;

  return (
    <div style={{
      background: '#fff', border: `1px solid ${C.border}`,
      borderLeft: `4px solid ${priorityColor}`,
      borderRadius: 8, padding: '14px 16px', display: 'flex', gap: 12,
    }}>
      <div style={{
        fontSize: 28, width: 48, height: 48, borderRadius: 10,
        background: priorityBg, display: 'flex', alignItems: 'center',
        justifyContent: 'center', flexShrink: 0,
      }}>{rec.icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 3 }}>{rec.title}</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 6 }}>{rec.message}</div>
        <div style={{
          background: '#F8FAFC', padding: '8px 10px', borderRadius: 6,
          fontSize: 12, color: C.text, marginBottom: 6, borderLeft: `3px solid ${C.accent}`,
        }}>
          <strong>แนะนำ:</strong> {rec.action}
        </div>
        <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 8 }}>
          <strong>เหตุผล:</strong> {rec.reason}
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {onAction && (
            <Btn size="sm" variant="primary" onClick={() => onAction(rec)}>ดำเนินการ</Btn>
          )}
          <Btn size="sm" variant="ghost" onClick={() => onDismiss(rec.id)}>ซ่อน</Btn>
        </div>
      </div>
    </div>
  );
};

// ============ SmartRecommendations Panel ============
const SmartRecommendations = ({ data, patientId = null }) => {
  const recommendations = useMemo(() => generateRecommendations(data, patientId), [data, patientId]);
  const [dismissed, setDismissed] = React.useState([]);

  const visible = recommendations.filter(r => !dismissed.includes(r.id));

  const handleDismiss = (id) => setDismissed([...dismissed, id]);
  
  const handleAction = (rec) => {
    alert(`ดำเนินการ: ${rec.action}\n\n(ฟีเจอร์นี้เชื่อมต่อกับ Visit Form / Telepharmacy ได้ในอนาคต)`);
    handleDismiss(rec.id);
  };

  if (visible.length === 0) {
    return (
      <Card>
        <div style={{ textAlign: 'center', padding: '30px 20px' }}>
          <div style={{ fontSize: 48, marginBottom: 10 }}>✅</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: C.text }}>ไม่มีคำแนะนำในขณะนี้</div>
          <div style={{ fontSize: 13, color: C.textMuted, marginTop: 6 }}>
            {patientId ? 'ผู้ป่วยรายนี้ทุกอย่างเรียบร้อย' : 'ทุกผู้ป่วยได้รับการดูแลอย่างเหมาะสม'}
          </div>
        </div>
      </Card>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      {!patientId && (
        <div style={{
          background: '#EFF6FF', border: `1px solid ${C.primaryBorder}`,
          borderRadius: 8, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <span style={{ fontSize: 20 }}>💡</span>
          <div style={{ fontSize: 13, color: C.text }}>
            <strong>Smart Recommendations</strong> — ระบบแนะนำการดำเนินการอัตโนมัติจากข้อมูลผู้ป่วย
          </div>
        </div>
      )}
      {visible.map(rec => (
        <RecommendationCard key={rec.id} rec={rec} onDismiss={handleDismiss} onAction={handleAction} />
      ))}
    </div>
  );
};

// Export
window.SmartRecommendations = SmartRecommendations;
window.generateRecommendations = generateRecommendations;
</script>

<script type="text/babel">
// MobileUX.jsx — Voice Input, Offline Queue, Camera Scan Stub
const { useState, useEffect, useRef } = React;

// ============ Voice Input for SOAP ============
const VoiceInputSOAP = ({ onTranscript }) => {
  const [isListening, setIsListening] = useState(false);
  const [transcript, setTranscript] = useState('');
  const recognitionRef = useRef(null);

  useEffect(() => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognitionRef.current = new SpeechRecognition();
    recognitionRef.current.continuous = true;
    recognitionRef.current.interimResults = true;
    recognitionRef.current.lang = 'th-TH';

    recognitionRef.current.onresult = (event) => {
      let interimTranscript = '';
      let finalTranscript = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcriptPart = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcriptPart + ' ';
        } else {
          interimTranscript += transcriptPart;
        }
      }

      setTranscript(finalTranscript + interimTranscript);
      if (finalTranscript) {
        onTranscript(finalTranscript.trim());
      }
    };

    recognitionRef.current.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
      setIsListening(false);
    };

    recognitionRef.current.onend = () => {
      setIsListening(false);
    };

    return () => {
      if (recognitionRef.current) {
        recognitionRef.current.stop();
      }
    };
  }, [onTranscript]);

  const toggleListening = () => {
    if (!recognitionRef.current) {
      alert('⚠️ เบราว์เซอร์นี้ไม่รองรับ Voice Input (ต้องใช้ Chrome/Edge)');
      return;
    }

    if (isListening) {
      recognitionRef.current.stop();
      setIsListening(false);
    } else {
      setTranscript('');
      recognitionRef.current.start();
      setIsListening(true);
    }
  };

  const supported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;

  return (
    <div style={{
      padding: '12px 16px', background: isListening ? '#FEF3C7' : '#F8FAFC',
      border: `1px solid ${isListening ? '#F59E0B' : C.border}`,
      borderRadius: 8, display: 'flex', alignItems: 'center', gap: 12,
    }}>
      <button
        onClick={toggleListening}
        disabled={!supported}
        style={{
          width: 48, height: 48, borderRadius: '50%',
          background: isListening ? '#DC2626' : C.primary,
          color: '#fff', border: 'none', cursor: supported ? 'pointer' : 'not-allowed',
          fontSize: 20, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}
      >
        {isListening ? '⏸' : '🎤'}
      </button>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted }}>
          {supported ? (isListening ? '🔴 กำลังฟัง...' : 'กดไมค์เพื่อพูด') : '⚠️ เบราว์เซอร์ไม่รองรับ'}
        </div>
        {transcript && (
          <div style={{ fontSize: 13, color: C.text, marginTop: 4 }}>"{transcript}"</div>
        )}
      </div>
    </div>
  );
};

// ============ Offline Queue Manager ============
const OfflineQueueManager = () => {
  const [queue, setQueue] = useState([]);
  const [isOnline, setIsOnline] = useState(navigator.onLine);

  useEffect(() => {
    const handleOnline = () => setIsOnline(true);
    const handleOffline = () => setIsOnline(false);
    
    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);

    // Load queue from localStorage
    const stored = localStorage.getItem('offline_queue');
    if (stored) {
      try {
        setQueue(JSON.parse(stored));
      } catch {}
    }

    return () => {
      window.removeEventListener('online', handleOnline);
      window.removeEventListener('offline', handleOffline);
    };
  }, []);

  const addToQueue = (action) => {
    const newQueue = [...queue, { id: Date.now(), timestamp: new Date().toISOString(), ...action }];
    setQueue(newQueue);
    localStorage.setItem('offline_queue', JSON.stringify(newQueue));
  };

  const syncQueue = async () => {
    if (!isOnline || queue.length === 0) return;

    alert(`🔄 กำลัง Sync ${queue.length} รายการ...\n\n(ในเวอร์ชันจริงจะส่งไปยัง Firebase/Backend)`);
    
    // Stub: In production, send to backend
    setTimeout(() => {
      setQueue([]);
      localStorage.removeItem('offline_queue');
      alert('✅ Sync สำเร็จ!');
    }, 1000);
  };

  const clearQueue = () => {
    if (confirm('ล้างคิวทั้งหมด? การเปลี่ยนแปลงที่ยังไม่ sync จะหายไป')) {
      setQueue([]);
      localStorage.removeItem('offline_queue');
    }
  };

  // Expose to window for app to use
  useEffect(() => {
    window.OfflineQueue = { addToQueue, isOnline };
  }, [queue, isOnline]);

  return (
    <Card>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>📶 Offline Queue</h3>
        <div style={{
          padding: '4px 10px', borderRadius: 20, fontSize: 11, fontWeight: 600,
          background: isOnline ? C.lowBg : C.highBg,
          color: isOnline ? C.low : C.high,
        }}>
          {isOnline ? '🟢 Online' : '🔴 Offline'}
        </div>
      </div>

      {queue.length === 0 ? (
        <EmptyState icon="✅" title="ไม่มีรายการรอ Sync" subtitle={isOnline ? 'ทุกอย่างพร้อมแล้ว' : 'เมื่อ offline จะบันทึกไว้ที่นี่'} />
      ) : (
        <>
          <div style={{ marginBottom: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
            {queue.map(item => (
              <div key={item.id} style={{
                padding: '10px 12px', background: '#F8FAFC', borderRadius: 7,
                border: `1px solid ${C.border}`, fontSize: 12,
              }}>
                <div style={{ fontWeight: 600, marginBottom: 3 }}>{item.type || 'Action'}</div>
                <div style={{ color: C.textMuted }}>{new Date(item.timestamp).toLocaleString('th-TH')}</div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn variant="primary" onClick={syncQueue} disabled={!isOnline}>
              🔄 Sync ทั้งหมด ({queue.length})
            </Btn>
            <Btn variant="ghost" onClick={clearQueue}>ล้างคิว</Btn>
          </div>
        </>
      )}
    </Card>
  );
};

// ============ Camera Inhaler Scanner (Stub) ============
const CameraInhalerScanner = ({ onDetected }) => {
  const [scanning, setScanning] = useState(false);
  const videoRef = useRef(null);

  const startScan = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.play();
        setScanning(true);
        
        // Stub: In production, use TensorFlow.js or ML model to detect device
        setTimeout(() => {
          const detectedDevice = 'turbuhaler'; // Mock detection
          onDetected(detectedDevice);
          stopScan();
        }, 3000);
      }
    } catch (err) {
      alert('⚠️ ไม่สามารถเปิดกล้องได้: ' + err.message);
    }
  };

  const stopScan = () => {
    if (videoRef.current && videoRef.current.srcObject) {
      videoRef.current.srcObject.getTracks().forEach(track => track.stop());
    }
    setScanning(false);
  };

  return (
    <Card>
      <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>📷 Camera Inhaler Scanner</h3>
      <p style={{ margin: '0 0 12px', fontSize: 13, color: C.textMuted }}>
        ถ่ายรูป inhaler device เพื่อตรวจจับชนิดอัตโนมัติ (ใช้ ML model)
      </p>

      {scanning ? (
        <div>
          <video ref={videoRef} style={{ width: '100%', borderRadius: 8, background: '#000' }} />
          <Btn variant="ghost" onClick={stopScan} style={{ marginTop: 8 }}>หยุดสแกน</Btn>
          <div style={{ marginTop: 8, fontSize: 12, color: C.textMuted }}>
            🔍 กำลังวิเคราะห์... (ใช้ TensorFlow.js / ML model)
          </div>
        </div>
      ) : (
        <Btn variant="primary" onClick={startScan}>📷 เปิดกล้องสแกน</Btn>
      )}

      <div style={{ marginTop: 12, padding: '10px 12px', background: '#FEF3C7', borderRadius: 7, fontSize: 11 }}>
        ⚠️ <strong>Note:</strong> ฟีเจอร์นี้ต้องใช้ ML model (เช่น MobileNet + Custom classifier) เพื่อ detect pMDI, Turbuhaler, Diskus ฯลฯ
      </div>
    </Card>
  );
};

// ============ Mobile UX Dashboard ============
const MobileUXDashboard = () => {
  const [soapText, setSoapText] = useState('');
  const [detectedDevice, setDetectedDevice] = useState(null);

  const handleVoiceTranscript = (text) => {
    setSoapText(prev => prev + ' ' + text);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <PageHeader title="📱 Mobile UX Enhancements" subtitle="Voice Input · Offline Mode · Camera Scan" />

      {/* Voice Input */}
      <Card>
        <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>🎤 Voice Input for SOAP</h3>
        <VoiceInputSOAP onTranscript={handleVoiceTranscript} />
        {soapText && (
          <div style={{ marginTop: 12 }}>
            <label style={{ display: 'block', fontSize: 12, fontWeight: 600, marginBottom: 4 }}>Transcript:</label>
            <textarea
              value={soapText}
              onChange={e => setSoapText(e.target.value)}
              rows={4}
              style={{
                width: '100%', padding: '8px 10px', borderRadius: 7, border: `1px solid ${C.border}`,
                fontSize: 13, resize: 'vertical', boxSizing: 'border-box',
              }}
            />
          </div>
        )}
      </Card>

      {/* Offline Queue */}
      <OfflineQueueManager />

      {/* Camera Scanner */}
      <CameraInhalerScanner onDetected={setDetectedDevice} />
      {detectedDevice && (
        <Card style={{ background: C.lowBg, border: `1px solid ${C.lowBorder}` }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.low }}>✅ ตรวจพบ: {detectedDevice}</div>
        </Card>
      )}
    </div>
  );
};

// Export
window.MobileUXDashboard = MobileUXDashboard;
window.VoiceInputSOAP = VoiceInputSOAP;

const QuizMode = () => {
  const [currentQ, setCurrentQ] = useState(0);
  const [answers, setAnswers] = useState({});
  const [showResult, setShowResult] = useState(false);

  const q = QUIZ_QUESTIONS[currentQ];
  const userAnswer = answers[q.id];

  const handleAnswer = (optionIdx) => {
    setAnswers({ ...answers, [q.id]: optionIdx });
  };

  const handleNext = () => {
    if (currentQ < QUIZ_QUESTIONS.length - 1) {
      setCurrentQ(currentQ + 1);
    } else {
      setShowResult(true);
    }
  };

  const score = useMemo(() => {
    return QUIZ_QUESTIONS.filter(q => answers[q.id] === q.correct).length;
  }, [answers]);

  if (showResult) {
    const percent = ((score / QUIZ_QUESTIONS.length) * 100).toFixed(0);
    return (
      <Card>
        <div style={{ textAlign: 'center', padding: '30px 20px' }}>
          <div style={{ fontSize: 64, marginBottom: 16 }}>{percent >= 80 ? '🏆' : percent >= 60 ? '👍' : '📚'}</div>

          <div style={{ fontSize: 16, color: C.textMuted }}>{percent}%</div>
          <Btn variant="primary" onClick={() => { setCurrentQ(0); setAnswers({}); setShowResult(false); }} style={{ marginTop: 20 }}>
            ทำใหม่
          </Btn>
        </div>
      </Card>
    );
  }

  return (
    <Card>
      <div style={{ marginBottom: 16 }}>
        <div style={{ fontSize: 12, color: C.textMuted, marginBottom: 8 }}>คำถามที่ {currentQ + 1}/{QUIZ_QUESTIONS.length} · {q.category}</div>
        <div style={{ fontSize: 16, fontWeight: 600, color: C.text, lineHeight: 1.5 }}>{q.question}</div>
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 10, marginBottom: 16 }}>
        {q.options.map((opt, idx) => {
          const isSelected = userAnswer === idx;
          const isCorrect = idx === q.correct;
          const showFeedback = userAnswer != null;
          return (
            <button
              key={idx}
              onClick={() => handleAnswer(idx)}
              disabled={userAnswer != null}
              style={{
                padding: '12px 16px', borderRadius: 8, textAlign: 'left', fontSize: 14,
                border: `2px solid ${isSelected && showFeedback ? (isCorrect ? C.low : C.high) : (isSelected ? C.primary : C.border)}`,
                background: isSelected && showFeedback ? (isCorrect ? C.lowBg : C.highBg) : (isSelected ? C.primaryBg : '#fff'),
                color: C.text, cursor: userAnswer != null ? 'default' : 'pointer', fontFamily: 'inherit',
              }}
            >
              {opt}
              {showFeedback && isCorrect && <span style={{ marginLeft: 8 }}>✅</span>}
              {showFeedback && isSelected && !isCorrect && <span style={{ marginLeft: 8 }}>❌</span>}
            </button>
          );
        })}
      </div>
      {userAnswer != null && (
        <div style={{ padding: '12px 16px', background: '#F0FDF4', borderRadius: 8, marginBottom: 12, borderLeft: `4px solid ${C.low}` }}>
          <strong style={{ color: C.low }}>คำอธิบาย:</strong> {q.explanation}

        {currentQ < QUIZ_QUESTIONS.length - 1 ? 'ข้อถัดไป →' : 'ดูคะแนน'}
      </Btn>
    </Card>
  );

<script type="text/babel">
// ResearchExport.jsx — De-identified Dataset, Stats, Citation-ready Reports
const { useState, useMemo } = React;

// ============ De-identify Patient Data ============
const deIdentifyData = (data) => {
  return {
    patients: data.patients.map((p, i) => ({
      id: `PT${String(i + 1).padStart(3, '0')}`,
      age: p.age,
      gender: p.gender,
      diagnosis: p.diagnosis,
      comorbidities: p.comorbidities || [],
      smokingStatus: p.smokingStatus,
      packYears: p.packYears,
      eGFR: p.eGFR,
      riskLevel: p.riskLevel,
    })),
    visits: data.visits.map((v, i) => {
      const ptIndex = data.patients.findIndex(p => p.id === v.patientId);
      return {
        id: `V${String(i + 1).padStart(4, '0')}`,
        patientId: `PT${String(ptIndex + 1).padStart(3, '0')}`,
        visitDate: v.visitDate,
        riskLevel: v.riskLevel,
        adherence: v.adherence,
        exacerbation: v.exacerbation,
        cat: v.cat,
        act: v.act,
        mMRC: v.mMRC,
        inhalerTechnique: v.inhalerTechnique?.map(t => ({ device: t.device, score: t.overallScore })),
        drp: v.drp ? { noDRP: v.drp.noDRP, itemCount: v.drp.items?.length || 0 } : null,
      };
    }),
  };
};

// ============ Calculate Statistics ============
const calculateStats = (data) => {
  const patients = data.patients || [];
  const visits = data.visits || [];

  const stats = {
    // Demographics
    totalPatients: patients.length,
    meanAge: patients.length > 0 ? (patients.reduce((sum, p) => sum + p.age, 0) / patients.length).toFixed(1) : '—',
    sdAge: patients.length > 1 
      ? Math.sqrt(patients.reduce((sum, p) => sum + Math.pow(p.age - (patients.reduce((s, x) => s + x.age, 0) / patients.length), 2), 0) / (patients.length - 1)).toFixed(1)
      : '—',
    genderDistribution: {
      male: patients.filter(p => p.gender === 'M').length,
      female: patients.filter(p => p.gender === 'F').length,
    },
    
    // Clinical
    diagnosisDistribution: {},
    meanAdherence: '—',
    sdAdherence: '—',
    exacerbationRate: '—',
    drpPrevalence: '—',
    
    // Technique
    meanTechniqueScore: '—',
    
    // Outcomes
    catImprovement: '—',
  };

  // Diagnosis
  patients.forEach(p => {
    stats.diagnosisDistribution[p.diagnosis] = (stats.diagnosisDistribution[p.diagnosis] || 0) + 1;
  });

  // Adherence
  const adherenceScores = visits.filter(v => v.adherence?.selfScore != null).map(v => v.adherence.selfScore);
  if (adherenceScores.length > 0) {
    const mean = adherenceScores.reduce((a, b) => a + b, 0) / adherenceScores.length;
    stats.meanAdherence = mean.toFixed(2);
    if (adherenceScores.length > 1) {
      stats.sdAdherence = Math.sqrt(adherenceScores.reduce((sum, x) => sum + Math.pow(x - mean, 2), 0) / (adherenceScores.length - 1)).toFixed(2);
    }
  }

  // Exacerbation
  const totalExacerb = visits.reduce((sum, v) => sum + (v.exacerbation?.countThisYear || 0), 0);
  stats.exacerbationRate = patients.length > 0 ? (totalExacerb / patients.length).toFixed(2) : '—';

  // DRP
  const visitsWithDRP = visits.filter(v => v.drp?.noDRP === false);
  stats.drpPrevalence = visits.length > 0 ? ((visitsWithDRP.length / visits.length) * 100).toFixed(1) + '%' : '—';

  // Technique
  const techScores = visits.flatMap(v => (v.inhalerTechnique || []).map(t => t.overallScore));
  if (techScores.length > 0) {
    stats.meanTechniqueScore = (techScores.reduce((a, b) => a + b, 0) / techScores.length).toFixed(2);
  }

  return stats;
};

// ============ Export De-ID CSV ============
const exportDeIDCSV = (data) => {
  const deID = deIdentifyData(data);
  
  // Patients CSV
  const ptHeader = 'ID,Age,Gender,Diagnosis,Comorbidities,SmokingStatus,PackYears,eGFR,RiskLevel\n';
  const ptRows = deID.patients.map(p => 
    `${p.id},${p.age},${p.gender},${p.diagnosis},"${(p.comorbidities || []).join('; ')}",${p.smokingStatus || ''},${p.packYears || ''},${p.eGFR || ''},${p.riskLevel}`
  ).join('\n');
  
  // Visits CSV
  const visitHeader = 'VisitID,PatientID,VisitDate,RiskLevel,Adherence,Exacerbation,CAT,ACT,mMRC,TechniqueScore,DRP\n';
  const visitRows = deID.visits.map(v => {
    const techScore = v.inhalerTechnique && v.inhalerTechnique.length > 0
      ? (v.inhalerTechnique.reduce((s, t) => s + t.score, 0) / v.inhalerTechnique.length).toFixed(1)
      : '';
    return `${v.id},${v.patientId},${v.visitDate},${v.riskLevel},${v.adherence?.selfScore || ''},${v.exacerbation?.countThisYear || ''},${v.cat?.score || ''},${v.act?.score || ''},${v.mMRC?.grade || ''},${techScore},${v.drp?.noDRP === false ? 'Yes' : 'No'}`;
  }).join('\n');

  const blob1 = new Blob([ptHeader + ptRows], { type: 'text/csv' });
  const blob2 = new Blob([visitHeader + visitRows], { type: 'text/csv' });
  
  const url1 = URL.createObjectURL(blob1);
  const url2 = URL.createObjectURL(blob2);
  
  const a1 = document.createElement('a');
  a1.href = url1;
  a1.download = 'research_patients_deidentified.csv';
  a1.click();
  
  setTimeout(() => {
    const a2 = document.createElement('a');
    a2.href = url2;
    a2.download = 'research_visits_deidentified.csv';
    a2.click();
  }, 500);
};

];

const HAM_DRUGS = ['Theophylline','Aminophylline','Warfarin','Insulin','Oral Steroid','Prednisolone','Dexamethasone','Methylprednisolone','Methotrexate','LMWH','Heparin'];

const LASA_PAIRS = [

];

// ──────────────────────────────────────────────────────────────
// HA3: HAM Alert Banner
// ──────────────────────────────────────────────────────────────
function HAMAlert({ medications }) {
  const meds = medications || [];
  const hamFound = meds.filter(m => HAM_DRUGS.some(h => m.name?.toLowerCase().includes(h.toLowerCase())));
  const lasaFound = [];
  meds.forEach(m => {
    LASA_PAIRS.forEach(([a, b]) => {
      const hasA = m.name?.toLowerCase().includes(a.toLowerCase());
      const hasB = m.name?.toLowerCase().includes(b.toLowerCase());
      if (hasA && !lasaFound.find(l => l.a === a)) lasaFound.push({ a, b });
    });
  });

  if (hamFound.length === 0 && lasaFound.length === 0) return null;

  return (
    <div style={{ marginBottom: 14 }}>
      {hamFound.length > 0 && (
        <div style={{
          background: '#FFF7ED', border: '2px solid #F97316', borderRadius: 8,
          padding: '10px 14px', marginBottom: 6,
        }}>
          <div style={{ fontWeight: 800, fontSize: 12, color: '#9A3412', marginBottom: 4 }}>
            🚨 HIGH ALERT MEDICATION (HAM) — ต้องการ Double Check
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {hamFound.map((m, i) => (
              <span key={i} style={{
                background: '#FED7AA', color: '#7C2D12', fontSize: 11, fontWeight: 700,
                padding: '2px 8px', borderRadius: 4,
              }}>⚠ {m.name}</span>
            ))}
          </div>
        </div>
      )}
      {lasaFound.length > 0 && (
        <div style={{
          background: '#FEF9C3', border: '1px solid #FBBF24', borderRadius: 8, padding: '8px 14px',
        }}>
          <div style={{ fontWeight: 700, fontSize: 11, color: '#78350F', marginBottom: 3 }}>
            ⚡ LASA Alert — ยาที่ออกเสียงหรือมีลักษณะคล้ายกัน
          </div>
          {lasaFound.map((l, i) => (
            <div key={i} style={{ fontSize: 12, color: '#92400E' }}>
              <strong>{l.a}</strong> ↔ <strong>{l.b}</strong>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function MedReconciliationModal({ open, onClose, patient, onSave }) {
  const empty = { drug: '', dose: '', frequency: '', route: '', inHospital: true, discrepancy: 'none', reason: '' };

              <tr key={i} style={{ borderBottom: `1px solid ${C.border}`, background: row.discrepancy !== 'none' ? C.highBg : 'transparent' }}>

                </td>
                <td style={{ padding: '4px 6px' }}>

  const toggle = (id) => setChecked(c => ({ ...c, [id]: !c[id] }));

  const handleSave = () => {
    onSave({
      id: AppStore.generateId(), patientId: patient.id,

        <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: 'hidden' }}>

            style={{ width: '100%', padding: '8px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 13, fontFamily: 'inherit', resize: 'vertical' }} />
        </div>
      </div>

      <label style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16, cursor: 'pointer', padding: '10px 14px', borderRadius: 8, background: consent ? '#F0FDF4' : '#FEF9C3', border: `2px solid ${consent ? C.low : '#FBBF24'}` }}>

function HAComplianceDashboard({ data, onDataChange, currentUser }) {
  const [selected, setSelected] = useState(null); // patient selected for forms
  const [medRecOpen, setMedRecOpen] = useState(false);
  const [adrOpen, setAdrOpen] = useState(false);
  const [referralOpen, setReferralOpen] = useState(false);
  const [dischargeOpen, setDischargeOpen] = useState(false);
  const [rcaOpen, setRcaOpen] = useState(false);
  const [rcaTrigger, setRcaTrigger] = useState('');

  const ha = data.haCompliance || { medRec: [], adr: [], referrals: [], discharge: [], rca: [] };
  const saveHA = (field, record) => {
    const updated = { ...ha, [field]: [...(ha[field] || []), record] };
    onDataChange({ ...data, haCompliance: updated });
  };

  const stats = useMemo(() => ({
    medRec: ha.medRec?.length || 0,
    adr: ha.adr?.length || 0,
    referrals: ha.referrals?.length || 0,
    discharge: ha.discharge?.length || 0,
    rca: ha.rca?.length || 0,
    unresReferrals: (ha.referrals || []).filter(r => !r.feedbackReceived).length,
    severeADR: (ha.adr || []).filter(r => r.severity === 'severe' || r.severity === 'fatal').length,

// ── Soft floating-orb background for main app area ────
function AppBgCanvas() {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    let w, h, raf, t = 0;
    const orbs = [
      { px:0.12, py:0.15, r:340, col:'#93C5FD', spd:0.00028 },
      { px:0.82, py:0.10, r:300, col:'#C4B5FD', spd:0.00022 },
      { px:0.50, py:0.62, r:380, col:'#6EE7B7', spd:0.00018 },
      { px:0.90, py:0.78, r:260, col:'#FDE68A', spd:0.00032 },
      { px:0.05, py:0.88, r:240, col:'#F9A8D4', spd:0.00026 },
      { px:0.60, py:0.38, r:200, col:'#BAE6FD', spd:0.00020 },
    ];
    const resize = () => {
      const off = window.innerWidth <= 900 ? 0 : 236; // ไม่มี sidebar บนมือถือ → เต็มจอ
      canvas.style.left = off + 'px';
      w = window.innerWidth - off; h = window.innerHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);
    const draw = () => {
      t += 0.6;
      ctx.clearRect(0, 0, w, h);
      orbs.forEach((o, i) => {
        const cx = (o.px + Math.sin(t * o.spd + i * 1.4) * 0.10) * w;
        const cy = (o.py + Math.cos(t * o.spd * 0.8 + i * 0.9) * 0.08) * h;
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, o.r);
        g.addColorStop(0, o.col + '38'); // ~22% opacity
        g.addColorStop(1, o.col + '00');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(cx, cy, o.r, 0, Math.PI * 2); ctx.fill();
      });
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return (
    <canvas ref={ref} style={{
      position: 'fixed', top: 0, left: 236, pointerEvents: 'none', zIndex: 0,
    }} />
  );
}

// ── Animated counter (counts up from 0 on mount) ──────
function AnimatedNumber({ target, duration = 900 }) {
  const [val, setVal] = useState(0);
  const rafRef = useRef(null);
  useEffect(() => {
    let start = null;
    const step = (ts) => {
      if (!start) start = ts;
      const prog = Math.min((ts - start) / duration, 1);
      const eased = 1 - Math.pow(1 - prog, 3);
      setVal(Math.round(target * eased));
      if (prog < 1) rafRef.current = requestAnimationFrame(step);
    };
    rafRef.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(rafRef.current);
  }, [target, duration]);
  return val;
}

// ── Donut chart (canvas) ──────────────────────────────
function DonutChart({ segments, size = 120, strokeWidth = 20, centerLabel, centerSub }) {
  const ref = useRef(null);
  useEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = size * dpr; canvas.height = size * dpr;
    canvas.style.width = size + 'px'; canvas.style.height = size + 'px';
    const ctx = canvas.getContext('2d');
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    const cx = size / 2, cy = size / 2, r = (size - strokeWidth * 2.2) / 2;
    const total = (segments || []).reduce((a, s) => a + (s.value || 0), 0);
    ctx.strokeStyle = '#E2E8F0'; ctx.lineWidth = strokeWidth;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.stroke();
    if (!total) return;
    let angle = -Math.PI / 2;
    ctx.lineCap = 'round';
    (segments || []).forEach((seg, i) => {
      if (!seg.value) return;
      const sweep = (seg.value / total) * Math.PI * 2 * 0.97;
      ctx.shadowColor = seg.color + '66'; ctx.shadowBlur = 8;
      ctx.strokeStyle = seg.color; ctx.lineWidth = strokeWidth;
      ctx.beginPath(); ctx.arc(cx, cy, r, angle, angle + sweep); ctx.stroke();
      ctx.shadowBlur = 0;
      angle += (seg.value / total) * Math.PI * 2;
    });
  }, [segments, size, strokeWidth]);
  return (
    <div style={{ position: 'relative', width: size, height: size, flexShrink: 0 }}>
      <canvas ref={ref} style={{ display: 'block' }} />
      {centerLabel !== undefined && (
        <div style={{ position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', pointerEvents: 'none' }}>
          <div style={{ fontSize: size > 100 ? 22 : 16, fontWeight: 800, color: C.primary, lineHeight: 1 }}>{centerLabel}</div>
          {centerSub && <div style={{ fontSize: 9, color: C.textMuted, marginTop: 3, textAlign: 'center' }}>{centerSub}</div>}
        </div>
      )}
    </div>
  );
}

// ── Visit trend bar chart (CSS bars) ─────────────────
function VisitTrendBars({ visits }) {
  const months = useMemo(() => {
    const result = [];
    for (let i = 5; i >= 0; i--) {
      const d = new Date(); d.setDate(1); d.setMonth(d.getMonth() - i);
      const key = d.toISOString().slice(0, 7);
      const count = visits.filter(v => (v.visitDate || '').startsWith(key)).length;
      result.push({ label: d.toLocaleDateString('th-TH', { month: 'short' }), count });
    }
    return result;
  }, [visits]);
  const max = Math.max(...months.map(m => m.count), 1);
  return (
    <div style={{ display: 'flex', alignItems: 'flex-end', gap: 6, height: 70, padding: '0 4px' }}>
      {months.map((m, i) => (
        <div key={i} style={{ flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 4 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.text, opacity: m.count > 0 ? 1 : 0 }}>{m.count}</div>
          <div style={{
            width: '100%', borderRadius: '4px 4px 0 0',
            height: Math.max(4, (m.count / max) * 44),
            background: i === 5
              ? 'linear-gradient(180deg,#2563EB,#1E40AF)'
              : 'linear-gradient(180deg,#93C5FD,#BFDBFE)',
            transition: 'height 0.6s cubic-bezier(0.34,1.56,0.64,1)',
            transitionDelay: i * 0.08 + 's',
          }} />
          <div style={{ fontSize: 9, color: C.textMuted, whiteSpace: 'nowrap' }}>{m.label}</div>
        </div>
      ))}
    </div>
  );
}
