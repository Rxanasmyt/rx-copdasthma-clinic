    </table>`;

  openPrintWindow(html, `รายงานสรุปคลินิก ${label}`);
}

// ── ExportSection Component ───────────────────────────
function ExportSection({ data, onDataChange }) {
  const [selPt,      setSelPt]      = React.useState('');
  const [selMonth,   setSelMonth]   = React.useState(new Date().toISOString().slice(0,7));
  const [selQYear,   setSelQYear]   = React.useState(new Date().getFullYear());
  const [selQuarter, setSelQuarter] = React.useState(Math.ceil((new Date().getMonth()+1)/3));
  const [restoreInfo, setRestoreInfo] = React.useState(null); // {parsed, counts} หลังเลือกไฟล์ → รอยืนยัน
  const [restoreErr,  setRestoreErr]  = React.useState('');
  const fileRef = React.useRef(null);

  const months = Array.from(new Set(
    data.visits.map(v => v.visitDate.slice(0,7))
  )).sort().reverse();
  if (!months.includes(selMonth)) months.unshift(selMonth);

  // ── Backup: ดาวน์โหลดข้อมูลทั้งหมดเป็น JSON ──
  const exportBackup = () => {
    const payload = {
      _meta: { app: 'Rx-COPD/Asthma Clinic', exportedAt: new Date().toISOString(), schema: 1 },
      clinicCode: data.clinicCode || '',
      users: data.users || [],
      patients: data.patients || [],
      visits: data.visits || [],
      telepharmacy: data.telepharmacy || [],
      haCompliance: data.haCompliance || {},
    };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a = Object.assign(document.createElement('a'), {
      href: url, download: `RxClinic_Backup_${new Date().toISOString().slice(0,10)}.json`,
    });
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  // ── Restore: อ่านไฟล์ → ตรวจสอบ → แสดงสรุปเพื่อยืนยัน ──
  const onFilePick = (e) => {
    setRestoreErr(''); setRestoreInfo(null);
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const parsed = JSON.parse(reader.result);
        if (!parsed || typeof parsed !== 'object' || !Array.isArray(parsed.patients)) {
          setRestoreErr('ไฟล์ไม่ถูกต้อง — ต้องเป็นไฟล์ Backup ที่ export จากแอพนี้ (ไม่พบ patients)');
          return;
        }
        setRestoreInfo({
          parsed,
          counts: {
            patients: (parsed.patients || []).length,
            visits: (parsed.visits || []).length,
            telepharmacy: (parsed.telepharmacy || []).length,
            users: (parsed.users || []).length,
          },
          exportedAt: parsed._meta?.exportedAt,
        });
      } catch (err) {
        setRestoreErr('อ่านไฟล์ไม่ได้ — ไฟล์อาจเสียหายหรือไม่ใช่ JSON');
      }
    };
    reader.readAsText(file);
    e.target.value = ''; // reset เพื่อให้เลือกไฟล์เดิมซ้ำได้
  };

  const confirmRestore = () => {
    if (!restoreInfo) return;
    const p = restoreInfo.parsed;
    const merged = {
      ...data,
      clinicCode:   p.clinicCode ?? data.clinicCode ?? '',
      users:        p.users || [],
      patients:     p.patients || [],
      visits:       p.visits || [],
      telepharmacy: p.telepharmacy || [],
      haCompliance: p.haCompliance || data.haCompliance || {},
    };
    onDataChange(merged);
    setRestoreInfo(null);
    setRestoreErr('');
    alert('✓ กู้คืนข้อมูลสำเร็จ — ข้อมูลถูกซิงค์ขึ้น Cloud แล้ว');
  };

  return (
    <Card style={{ marginTop: 20 }}>
      <h4 style={{ margin: '0 0 18px', fontSize: 14, fontWeight: 700, color: C.primary }}>📤 Export ข้อมูล</h4>

      {/* CSV */}
      <div style={{ marginBottom: 20 }}>

// ── PDF: SOAP note รายครั้ง ────────────────────────────
function printVisitSOAP(patient, visit) {
  if (!patient || !visit) return;
  const rc   = { High:'#DC2626', Medium:'#D97706', Low:'#059669' }[visit.riskLevel] || '#059669';
  const meds = (visit.medications || []).map(m =>
    `<tr><td>${m.name||'—'}</td><td>${m.dose||'—'}</td><td>${m.frequency||'—'}</td><td style="color:${m.adherence==='Good'?'#059669':m.adherence==='Fair'?'#D97706':'#DC2626'}">${m.adherence||'—'}</td></tr>`
  ).join('');
  const tech = (visit.inhalerTechnique || []).map(t =>
    `<tr><td>${t.device||'—'}</td><td style="color:${t.overallScore==='Good'?'#059669':t.overallScore==='Fair'?'#D97706':'#DC2626'}">${t.overallScore||'—'}</td><td>${(t.errors||[]).join(', ')||'ไม่มีข้อผิดพลาด'}</td></tr>`
  ).join('');
  const catScore = visit.assessments?.cat?.allAnswered ? visit.assessments.cat.score : null;
  const actScore = visit.assessments?.act?.allAnswered ? visit.assessments.act.score : null;
  const detected = (typeof window.detectDRP === 'function') ? window.detectDRP(visit, patient) : [];
  const drpRows  = detected.map(d =>
    `<tr><td>${d.code||'—'}</td><td>${d.categoryTh||d.categoryEn||'—'}</td><td style="color:${d.severity==='High'?'#DC2626':d.severity==='Medium'?'#D97706':'#059669'};font-weight:700">${d.severity||'—'}</td><td>${d.action||'—'}</td></tr>`
  ).join('');
  const today = new Date().toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' });

  const html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:3px solid #0F2D5E;">
      <div>
        <h1 style="font-size:16px;margin-bottom:2px">${patient.prefix}${patient.firstName} ${patient.lastName}</h1>
        <div class="meta">HN: ${patient.hn} · อายุ ${patient.age} ปี · ${patient.insurance} · Visit: <strong>${visit.visitDate}</strong></div>
      </div>
      <div style="text-align:right">
        <div style="font-size:10px;color:#64748B">พิมพ์: ${today}</div>
        <div style="font-size:12px;font-weight:700;color:${rc}">● ${visit.riskLevel||'Low'} Risk</div>
        <div style="font-size:11px;color:#64748B;margin-top:2px">เภสัชกร: ${visit.pharmacist||'—'}</div>
      </div>
    </div>

    <div class="grid4" style="margin-bottom:14px">
      ${catScore!==null?`<div class="item"><label>CAT Score</label><div style="font-size:20px;font-weight:800;color:${catScore>=20?'#DC2626':catScore>=10?'#D97706':'#059669'}">${catScore}</div></div>`:''}
      ${actScore!==null?`<div class="item"><label>ACT Score</label><div style="font-size:20px;font-weight:800;color:${actScore<15?'#DC2626':actScore<20?'#D97706':'#059669'}">${actScore}</div></div>`:''}
      <div class="item"><label>SpO₂ / RR / BP</label><div>${visit.vitals?.spO2||'—'} / ${visit.vitals?.rr||'—'} / ${visit.vitals?.bp||'—'}</div></div>
      <div class="item"><label>Exacerbation</label><div>${visit.exacerbation?.countThisYear??0} ครั้ง/ปี${visit.exacerbation?.hospitalized?' · นอน รพ.':''}${visit.exacerbation?.erVisit?' · ER':''}</div></div>
    </div>

    <h2>SOAP Note</h2>
    ${visit.soap?.s?`<div class="soap-box"><strong>S (Subjective):</strong><br>${visit.soap.s}</div>`:''}
    ${visit.soap?.o?`<div class="soap-box" style="border-left-color:#059669"><strong>O (Objective):</strong><br>${visit.soap.o}</div>`:''}
    ${visit.soap?.a?`<div class="soap-box" style="border-left-color:#7C3AED"><strong>A (Assessment):</strong><br>${visit.soap.a}</div>`:''}
    ${visit.soap?.p?`<div class="soap-box" style="border-left-color:#0EA5C9"><strong>P (Plan):</strong><br>${visit.soap.p}</div>`:''}

    ${meds?`<h2>รายการยา (${visit.medications.length} รายการ)</h2>
    <table><thead><tr><th>ยา</th><th>ขนาด</th><th>ความถี่</th><th>Adherence</th></tr></thead><tbody>${meds}</tbody></table>`:''}

    ${tech?`<h2>เทคนิคการพ่นยา</h2>
    <table><thead><tr><th>อุปกรณ์</th><th>ผล</th><th>ข้อผิดพลาด</th></tr></thead><tbody>${tech}</tbody></table>`:''}

    ${drpRows?`<h2>ปัญหาที่เกี่ยวข้องกับยา (DRP) — ${detected.length} รายการ</h2>
    <table><thead><tr><th>PCNE Code</th><th>ประเภท</th><th>ความรุนแรง</th><th>แนวทาง</th></tr></thead><tbody>${drpRows}</tbody></table>`:''}

    ${visit.pharmacistNote?`<h2>บันทึกเภสัชกร</h2><div style="background:#F0F9FF;border-left:3px solid #0369A1;padding:10px 14px;border-radius:0 6px 6px 0;font-size:12px;line-height:1.6">${visit.pharmacistNote}</div>`:''}
  `;
  openPrintWindow(html, `SOAP — ${patient.firstName} ${patient.lastName} (${visit.visitDate})`);
}

// ── PDF: รายงาน DRP รายผู้ป่วย ─────────────────────────
function printDRPReport(patient, visits) {
  if (!patient) return;
  const ptV = (visits || []).filter(v => v.patientId === patient.id)
    .sort((a, b) => a.visitDate.localeCompare(b.visitDate));
  const today = new Date().toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' });

  const rows = ptV.flatMap(v => {
    const drps = (typeof window.detectDRP === 'function') ? window.detectDRP(v, patient) : [];
    return drps.map(d => ({
      date: v.visitDate,
      code: d.code, cat: d.categoryTh || d.categoryEn,
      sev: d.severity, action: d.action || '—',
    }));
  });

  const totalH = rows.filter(r => r.sev === 'High').length;
  const totalM = rows.filter(r => r.sev === 'Medium').length;
  const totalL = rows.filter(r => r.sev === 'Low').length;

  const tableRows = rows.map(r =>
    `<tr><td>${r.date}</td><td>${r.code||'—'}</td><td>${r.cat||'—'}</td>
     <td style="color:${r.sev==='High'?'#DC2626':r.sev==='Medium'?'#D97706':'#059669'};font-weight:700">${r.sev||'—'}</td>
     <td>${r.action}</td></tr>`
  ).join('');

  const html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid #0F2D5E;">
      <div>
        <h1>รายงาน DRP — ${patient.prefix}${patient.firstName} ${patient.lastName}</h1>
        <div class="meta">HN: ${patient.hn} · ${patient.diagnosis} · พิมพ์: ${today}</div>
      </div>
    </div>
    <div class="stat-row" style="margin-bottom:16px">
      <div class="stat"><div class="n">${ptV.length}</div><div class="l">จำนวน Visit</div></div>
      <div class="stat"><div class="n">${rows.length}</div><div class="l">DRP ทั้งหมด</div></div>
      <div class="stat"><div class="n" style="color:#DC2626">${totalH}</div><div class="l">High Severity</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${totalM}</div><div class="l">Medium Severity</div></div>
      <div class="stat"><div class="n" style="color:#059669">${totalL}</div><div class="l">Low Severity</div></div>
    </div>
    ${tableRows
      ? `<table><thead><tr><th>วันที่</th><th>PCNE Code</th><th>ประเภท DRP</th><th>ความรุนแรง</th><th>แนวทางแก้ไข</th></tr></thead><tbody>${tableRows}</tbody></table>`
      : '<p style="text-align:center;color:#64748B;padding:20px">ไม่พบ DRP ในการเยี่ยมทั้งหมด</p>'}
  `;
  openPrintWindow(html, `รายงาน DRP — ${patient.prefix}${patient.firstName} ${patient.lastName}`);
}

// ── PDF: รายงานไตรมาส (HA) ────────────────────────────
function printQuarterlyReport(data, year, quarter) {
  const qMap = { '1':['01','02','03'], '2':['04','05','06'], '3':['07','08','09'], '4':['10','11','12'] };
  const months = qMap[String(quarter)] || [];
  const pts = data.patients;
  const vis = data.visits.filter(v => months.some(m => v.visitDate.startsWith(`${year}-${m}`)));
  const tel = data.telepharmacy.filter(t => months.some(m => (t.actualDate||t.scheduledDate||'').startsWith(`${year}-${m}`)));
  const today = new Date().toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' });

  const uniqPts   = [...new Set(vis.map(v => v.patientId))].length;
  const highRisk  = pts.filter(p => p.riskLevel === 'High').length;
  const exTotal   = vis.reduce((s,v) => s+(v.exacerbation?.countThisYear||0),0);
  const hospCount = vis.filter(v => v.exacerbation?.hospitalized).length;
  const poorAdh   = vis.filter(v => v.adherence?.level==='Poor').length;
  const teleSucc  = tel.filter(t => t.status==='Success').length;
  const teleTotal = tel.filter(t => t.status!=='Pending').length;

  const drpByVisit = vis.map(v => {
    const pt = pts.find(p => p.id === v.patientId);
    const drps = (typeof window.detectDRP === 'function' && pt) ? window.detectDRP(v, pt) : [];
    return drps;
  });
  const totalDRP   = drpByVisit.reduce((s, d) => s + d.length, 0);
  const highDRP    = drpByVisit.reduce((s, d) => s + d.filter(x => x.severity==='High').length, 0);

  const visRows = vis.slice(0, 60).map(v => {
    const pt = pts.find(p => p.id === v.patientId);
    const rc = { High:'risk-H', Medium:'risk-M', Low:'risk-L' }[v.riskLevel]||'risk-L';
    return `<tr>
      <td>${v.visitDate}</td>
      <td>${pt?.hn||''}</td>
      <td>${pt?`${pt.prefix}${pt.firstName} ${pt.lastName}`:''}</td>
      <td class="${rc}">${v.riskLevel||'Low'}</td>
      <td>${v.exacerbation?.countThisYear??0}${v.exacerbation?.hospitalized?' (นอน)':''}</td>
      <td>${v.adherence?.level||'—'}</td>
      <td>${v.pharmacist||'—'}</td>
    </tr>`;
  }).join('');

  const html = `
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;padding-bottom:10px;border-bottom:2px solid #0F2D5E;">
      <div>
        <h1>รายงานคลินิก COPD/Asthma — ไตรมาส ${quarter}/${parseInt(year)+543}</h1>
        <div class="meta">เดือน ${months.map(m=>['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][parseInt(m)]).join(', ')} ${parseInt(year)+543} · พิมพ์: ${today}</div>
      </div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="n">${uniqPts}</div><div class="l">ผู้ป่วยรับบริการ</div></div>
      <div class="stat"><div class="n">${vis.length}</div><div class="l">ครั้งการเยี่ยม</div></div>
      <div class="stat"><div class="n" style="color:#DC2626">${highRisk}</div><div class="l">High Risk (ทั้งหมด)</div></div>
      <div class="stat"><div class="n">${hospCount}</div><div class="l">Hospitalized</div></div>
      <div class="stat"><div class="n">${teleTotal>0?Math.round(teleSucc/teleTotal*100):0}%</div><div class="l">Tele Success Rate</div></div>
    </div>
    <div class="stat-row" style="margin-bottom:16px">
      <div class="stat"><div class="n">${exTotal}</div><div class="l">Exacerbation รวม</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${poorAdh}</div><div class="l">Poor Adherence</div></div>
      <div class="stat"><div class="n">${totalDRP}</div><div class="l">DRP ตรวจพบ</div></div>
      <div class="stat"><div class="n" style="color:#DC2626">${highDRP}</div><div class="l">High-severity DRP</div></div>
      <div class="stat"><div class="n">${tel.length}</div><div class="l">Telepharmacy รวม</div></div>
    </div>
    ${vis.length?`<h2>รายการเยี่ยม (${vis.length} ครั้ง)</h2>
    <table><thead><tr><th>วันที่</th><th>HN</th><th>ชื่อผู้ป่วย</th><th>Risk</th><th>Exacerb.</th><th>Adherence</th><th>เภสัชกร</th></tr></thead>
    <tbody>${visRows}</tbody></table>${vis.length>60?`<p style="font-size:11px;color:#64748B;margin-top:6px">แสดง 60 รายการแรกจาก ${vis.length} รายการ</p>`:''}`:
    '<p style="text-align:center;color:#64748B;padding:16px">ไม่มีข้อมูลในช่วงเวลานี้</p>'}
  `;
  openPrintWindow(html, `รายงานไตรมาส ${quarter}/${parseInt(year)+543}`);
}

// ── PDF: QR Patient Card (พิมพ์บัตรผู้ป่วย QR) ──────────
function printPatientQRCard(patient) {
  if (!patient) return;
  const link = `${location.origin}${location.pathname}?hn=${encodeURIComponent(patient.hn)}`;
  const qrURL = `https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(link)}`;
  const rc = { High:'#DC2626', Medium:'#D97706', Low:'#059669' }[patient.riskLevel] || '#059669';
  const html = `
    <div style="display:flex;justify-content:center;padding:10px">
      <div style="width:340px;border:2px solid #0F2D5E;border-radius:14px;overflow:hidden;font-family:'Sarabun',sans-serif">
        <div style="background:linear-gradient(135deg,#0F2D5E,#1848A0);color:#fff;padding:12px 16px;text-align:center">
          <div style="font-size:11px;opacity:0.85;letter-spacing:0.05em">คลินิก COPD / Asthma</div>
          <div style="font-size:16px;font-weight:800;margin-top:2px">บัตรประจำตัวผู้ป่วย</div>
        </div>
        <div style="padding:16px;text-align:center">
          <img src="${qrURL}" alt="QR" style="width:200px;height:200px" />
          <div style="font-size:18px;font-weight:800;color:#0F2D5E;margin-top:10px">${patient.prefix}${patient.firstName} ${patient.lastName}</div>
          <div style="font-size:13px;color:#475569;margin-top:2px">HN: <strong>${patient.hn}</strong></div>
          <div style="font-size:12px;color:#475569;margin-top:4px">อายุ ${patient.age} ปี · ${patient.diagnosis}</div>
          <div style="display:inline-block;margin-top:8px;font-size:12px;font-weight:700;color:${rc}">● ${patient.riskLevel||'Low'} Risk</div>
          <div style="font-size:10px;color:#94A3B8;margin-top:10px">สแกนเพื่อเปิดประวัติผู้ป่วยในระบบ</div>
        </div>
      </div>
    </div>`;
  openPrintWindow(html, `บัตร QR — ${patient.firstName} ${patient.lastName}`);
}

// ── LINE message templates (copy to clipboard, no API key) ──
function buildLineAppointment(patient, rec, clinicName) {
  if (!patient) return '';
  const d = rec?.scheduledDate || '';
  const thDate = d ? new Date(d).toLocaleDateString('th-TH', { weekday:'long', year:'numeric', month:'long', day:'numeric' }) : '—';
  return [
    `🏥 ${clinicName || 'คลินิก COPD/Asthma'}`,
    ``,
    `เรียน คุณ${patient.firstName} ${patient.lastName}`,
    `(HN: ${patient.hn})`,
    ``,
    `📞 นัดติดตามการใช้ยาทางโทรศัพท์ (Telepharmacy)`,
    `🗓️ วันที่: ${thDate}`,
    rec?.pharmacistNote ? `📋 เรื่อง: ${rec.pharmacistNote}` : '',
    ``,
    `กรุณาเตรียมยาที่ใช้อยู่ทั้งหมดไว้ใกล้ตัว`,
    `และสะดวกรับสายในวันเวลาดังกล่าว`,
    ``,
    `หากไม่สะดวก กรุณาแจ้งล่วงหน้าเพื่อเลื่อนนัด`,
    `ขอบคุณค่ะ/ครับ 🙏`,
  ].filter(l => l !== '').join('\n');
}

function buildLineFollowup(patient, visit, clinicName) {
  if (!patient) return '';
  const meds = (visit?.medications || []).filter(m => m.name).map(m => `• ${m.name}${m.dose?' '+m.dose:''}`).join('\n');
  const nextV = visit?.nextVisit ? new Date(visit.nextVisit).toLocaleDateString('th-TH', { year:'numeric', month:'long', day:'numeric' }) : '';
  return [
    `🏥 ${clinicName || 'คลินิก COPD/Asthma'}`,
    ``,
    `เรียน คุณ${patient.firstName} ${patient.lastName} (HN: ${patient.hn})`,
    ``,
    `สรุปการรับยาวันนี้ 💊`,
    meds || '• (ไม่มีรายการยา)',
    ``,
    visit?.soap?.p ? `📝 คำแนะนำ:\n${visit.soap.p}` : '',
    nextV ? `🗓️ นัดครั้งถัดไป: ${nextV}` : '',
    ``,
    `หากมีอาการผิดปกติ เช่น หอบเหนื่อยมากขึ้น`,
    `กรุณาติดต่อคลินิกหรือไปโรงพยาบาลทันที 🚨`,
    ``,
    `ดูแลสุขภาพนะคะ/ครับ 🙏`,
  ].filter(l => l !== '').join('\n');
}

async function copyLineMessage(text) {
  try {
    await navigator.clipboard.writeText(text);
    window.rxToast?.('คัดลอกข้อความ LINE แล้ว — วางในแชทได้เลย', 'success');
  } catch {
    window.rxToast?.('คัดลอกไม่สำเร็จ — กรุณาคัดลอกด้วยตนเอง', 'error');
  }
}

Object.assign(window, {

  printPatientTakeHome, printVisitSOAP, printDRPReport, printQuarterlyReport,

});

  const set = (k, v) => setF(prev => ({ ...prev, [k]: v }));

  const validate = () => {
    const e = {};

    if (!f.phone.trim())     e.phone     = 'กรุณากรอกเบอร์โทร';
    setErr(e);
    return Object.keys(e).length === 0;
  };

  const handleSave = () => {
    if (!validate()) return;
    onSave({
      ...f,
      age: parseInt(f.age),
      eGFR: f.eGFR === '' ? null : parseFloat(f.eGFR),
      weight: f.weight === '' ? null : parseFloat(f.weight),
      packYears: f.packYears === '' ? null : parseFloat(f.packYears),
      goldGrade:     ['COPD', 'Both'].includes(f.diagnosis) ? f.goldGrade   : null,
      asthmaControl: ['Asthma', 'Both'].includes(f.diagnosis) ? f.asthmaControl : null,
    });

  const needAsthma = ['Asthma', 'Both'].includes(f.diagnosis);

  return (

        </FormField>
      </div>
      <div style={row3}>

          <Input value={f.age} onChange={v => set('age', v)} type="number" placeholder="0" />
        </FormField>
        <FormField label="เพศ">
