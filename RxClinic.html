<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rx-COPD/Asthma Clinic</title>
<meta name="theme-color" content="#0B1D45" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  /* ── Theme variables (light default + dark override) ── */
  :root {
    --c-high:#DC2626; --c-highBg:#FEF2F2; --c-highBorder:#FECACA;
    --c-medium:#D97706; --c-mediumBg:#FFFBEB; --c-mediumBorder:#FDE68A;
    --c-low:#059669; --c-lowBg:#F0FDF4; --c-lowBorder:#A7F3D0;
    --c-primary:#1E3A8A; --c-primaryLight:#2563EB; --c-primaryDark:#1E40AF;
    --c-accent:#0891B2; --c-accentLight:#06B6D4;
    --c-text:#0F172A; --c-textMuted:#64748B; --c-textLight:#94A3B8;
    --c-border:#E2E8F0; --c-borderLight:#F8FAFC;
    --c-surface:#FFFFFF; --c-bg:#F1F5F9; --c-bgAlt:#F8FAFC;
  }
  [data-theme="dark"] {
    --c-high:#F87171; --c-highBg:#3B1A1A; --c-highBorder:#7F2D2D;
    --c-medium:#FBBF24; --c-mediumBg:#3A2E12; --c-mediumBorder:#7C5E1E;
    --c-low:#34D399; --c-lowBg:#0F2E22; --c-lowBorder:#1F5C44;
    --c-primary:#93C5FD; --c-primaryLight:#60A5FA; --c-primaryDark:#3B82F6;
    --c-accent:#22D3EE; --c-accentLight:#67E8F9;
    --c-text:#E2E8F0; --c-textMuted:#94A3B8; --c-textLight:#64748B;
    --c-border:#2A3650; --c-borderLight:#1B2436;
    --c-surface:#16202F; --c-bg:#0B1220; --c-bgAlt:#1B2436;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { height: 100%; }
  body { font-family: 'Sarabun', sans-serif; font-size: 14px; color: var(--c-text); background: var(--c-bg); -webkit-font-smoothing: antialiased; transition: background 0.3s, color 0.3s; }
  input, select, textarea, button { font-family: 'Sarabun', sans-serif; }
  [data-theme="dark"] input, [data-theme="dark"] select, [data-theme="dark"] textarea { background: var(--c-bgAlt); color: var(--c-text); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #CBD5E1; border-radius: 10px; }
  ::-webkit-scrollbar-thumb:hover { background: #94A3B8; }

  /* Date pickers */
  input[type=date]::-webkit-calendar-picker-indicator,
  input[type=month]::-webkit-calendar-picker-indicator { opacity: 0.5; cursor: pointer; }

  /* Focus ring — inputs */
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #2563EB !important;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.14) !important;
  }

  /* Animations */
  @keyframes rxFadeUp {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes rxSlideIn {
    from { opacity: 0; transform: translateX(-6px); }
    to   { opacity: 1; transform: translateX(0); }
  }
  @keyframes rxPulse {
    0%, 100% { opacity: 1; }
    50%       { opacity: 0.5; }
  }
  .rx-fade    { animation: rxFadeUp  0.22s ease both; }
  .rx-slide   { animation: rxSlideIn 0.22s ease both; }
  .rx-pulse   { animation: rxPulse   1.5s  ease infinite; }

  /* Hover lift for cards */
  .rx-card-hover { transition: box-shadow 0.2s, transform 0.2s; }
  .rx-card-hover:hover { box-shadow: 0 8px 28px rgba(15,23,42,0.12) !important; transform: translateY(-1px); }

  /* Smooth transitions */
  button { transition: all 0.15s ease; }
  a { transition: color 0.15s; }

  /* Table row hover */
  tr.rx-row:hover td { background: #F8FAFC; }

  /* ── Login page decorations ── */
  @keyframes rxBlobFloat {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33%      { transform: translate(40px, -30px) scale(1.12); }
    66%      { transform: translate(-30px, 24px) scale(0.92); }
  }
  @keyframes rxBreathe {
    0%, 100% { transform: scale(1);    box-shadow: 0 8px 32px rgba(37,99,235,0.55); }
    50%      { transform: scale(1.06); box-shadow: 0 12px 44px rgba(37,99,235,0.75); }
  }
  @keyframes rxShimmer {
    0%   { background-position: -200% center; }
    100% { background-position: 200% center; }
  }
  .rx-blob {
    position: absolute; border-radius: 50%; filter: blur(64px);
    opacity: 0.5; z-index: 0; pointer-events: none;
  }
  .rx-blob-1 { width: 360px; height: 360px; background: radial-gradient(circle, #1D4ED8, transparent 70%); top: -90px; left: -70px; animation: rxBlobFloat 18s ease-in-out infinite; }
  .rx-blob-2 { width: 320px; height: 320px; background: radial-gradient(circle, #06B6D4, transparent 70%); bottom: -70px; right: -50px; animation: rxBlobFloat 23s ease-in-out infinite reverse; }
  .rx-blob-3 { width: 280px; height: 280px; background: radial-gradient(circle, #7C3AED, transparent 70%); top: 42%; left: 48%; animation: rxBlobFloat 27s ease-in-out infinite; }
  .rx-login-hero { animation: rxFadeUp 0.5s ease both; }
  .rx-login-card { animation: rxFadeUp 0.4s ease both; }
  .rx-login-mobilelogo { display: none; }
  .rx-breathe { animation: rxBreathe 4s ease-in-out infinite; }
  .rx-shimmer {
    background: linear-gradient(110deg, #fff 35%, #93C5FD 50%, #fff 65%);
    background-size: 200% auto; -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent; animation: rxShimmer 5s linear infinite;
  }
  @media (max-width: 900px) {
    .rx-login-hero      { display: none !important; }
    .rx-login-mobilelogo { display: block !important; }
  }

  /* ── App interior background ── */
  @keyframes rxOrbDrift {
    0%   { transform: translate(0, 0)    scale(1); }
    33%  { transform: translate(30px,-20px) scale(1.08); }
    66%  { transform: translate(-20px,25px) scale(0.94); }
    100% { transform: translate(0, 0)    scale(1); }
  }
  /* Stat card entrance */
  @keyframes rxCardIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .rx-stat-card { animation: rxCardIn 0.45s ease both; }
  .rx-stat-card:nth-child(1) { animation-delay: 0.05s; }
  .rx-stat-card:nth-child(2) { animation-delay: 0.12s; }
  .rx-stat-card:nth-child(3) { animation-delay: 0.19s; }
  .rx-stat-card:nth-child(4) { animation-delay: 0.26s; }

  /* ── Mobile drawer sidebar ── */
  .rx-drawer-overlay {
    position: fixed; inset: 0; background: rgba(5,11,30,0.55);
    backdrop-filter: blur(2px); -webkit-backdrop-filter: blur(2px);
    z-index: 1400; opacity: 0; pointer-events: none; transition: opacity 0.25s;
  }
  .rx-drawer-overlay.open { opacity: 1; pointer-events: auto; }
  @keyframes rxSlideDrawer { from { transform: translateX(-100%); } to { transform: translateX(0); } }

  /* ── Responsive: phones & small tablets ── */
  @media (max-width: 900px) {
    /* stack multi-column card grids → single column (tables excluded: they start with 'auto') */
    #main-scroll [style*="grid-template-columns: repeat"],
    #main-scroll [style*="grid-template-columns:repeat"],
    #main-scroll [style*="grid-template-columns: 1fr 1fr"],
    #main-scroll [style*="grid-template-columns:1fr 1fr"],
    #main-scroll [style*="grid-template-columns: 1fr 330px"],
    #main-scroll [style*="grid-template-columns: 1fr 1.4fr"] {
      grid-template-columns: 1fr !important;
    }
    /* keep small fixed numpad-style grids intact is fine; tables scroll horizontally */
  }
  @media (max-width: 640px) {
    #main-scroll { padding-left: 0 !important; padding-right: 0 !important; }
    .rx-page-pad { padding-left: 14px !important; padding-right: 14px !important; }
    /* touch targets ≥44px on mobile */
    .rx-btn { min-height: 44px; }
    /* roomier modal/card padding on narrow screens */
    .rx-modal-card { padding-left: 18px !important; padding-right: 18px !important; }
  }

  /* ── Horizontal scroll affordance for wide tables ── */
  .rx-scroll-x {
    position: relative;
    background:
      linear-gradient(to right, var(--rx-surface,#fff) 30%, rgba(255,255,255,0)) left center / 28px 100% no-repeat,
      linear-gradient(to left,  var(--rx-surface,#fff) 30%, rgba(255,255,255,0)) right center / 28px 100% no-repeat,
      linear-gradient(to right, rgba(15,23,42,0.10), rgba(255,255,255,0)) left center / 14px 100% no-repeat,
      linear-gradient(to left,  rgba(15,23,42,0.10), rgba(255,255,255,0)) right center / 14px 100% no-repeat;
    background-attachment: local, local, scroll, scroll;
  }

  /* ── Input / Select / Textarea focus ring ── */
  .rx-field:focus {
    outline: none;
    border-color: #2563EB !important;
    box-shadow: 0 0 0 3px rgba(37,99,235,0.15) !important;
  }

  /* ── Page view transition ── */
  @keyframes rxViewIn {
    from { opacity: 0; transform: translateY(12px) scale(0.995); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
  }
  .rx-view { animation: rxViewIn 0.34s cubic-bezier(0.16,1,0.3,1) both; }

  /* ── Collapsible sidebar ── */
  .rx-sidebar-collapsed { width: 64px !important; }
  .rx-sidebar-collapsed .rx-nav-label,
  .rx-sidebar-collapsed .rx-nav-sub,
  .rx-sidebar-collapsed .rx-logo-text,
  .rx-sidebar-collapsed .rx-user-chip,
  .rx-sidebar-collapsed .rx-footer-stats,
  .rx-sidebar-collapsed .rx-nav-badge,
  .rx-sidebar-collapsed .rx-nav-section { display: none !important; }
  .rx-sidebar-collapsed .rx-nav-btn {
    justify-content: center !important;
    padding: 10px 0 !important;
  }
  .rx-sidebar-collapsed .rx-logo { justify-content: center !important; padding: 14px 0 !important; }
  .rx-sidebar-collapsed .rx-collapse-btn { justify-content: center; }

  /* ── Skeleton loader ── */
  @keyframes rxSkelShimmer { from { background-position: -400px 0; } to { background-position: 400px 0; } }
  .rx-skeleton {
    background: linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%);
    background-size: 400px 100%;
    animation: rxSkelShimmer 1.4s ease infinite;
    border-radius: 6px;
  }

  /* ── Floating Action Button ── */
  .rx-fab {
    position: fixed; bottom: 24px; right: 20px; z-index: 900;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg,#1E40AF,#2563EB);
    color: #fff; font-size: 24px; border: none; cursor: pointer;
    box-shadow: 0 4px 20px rgba(37,99,235,0.45);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .rx-fab:active { transform: scale(0.92); }
  @media (min-width: 901px) { .rx-fab { display: none !important; } }

  /* ── Quick-actions speed dial (all screens) ── */
  .rx-qa-fab {
    position: fixed; bottom: 26px; right: 24px; z-index: 1200;
    width: 56px; height: 56px; border-radius: 50%;
    background: linear-gradient(135deg,#1E40AF,#2563EB);
    color: #fff; font-size: 26px; border: none; cursor: pointer;
    box-shadow: 0 6px 24px rgba(37,99,235,0.5);
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.22s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s;
  }
  .rx-qa-fab:hover { box-shadow: 0 8px 30px rgba(37,99,235,0.6); transform: translateY(-2px); }
  .rx-qa-fab.open { transform: rotate(135deg); }
  .rx-qa-item {
    display: flex; align-items: center; gap: 10px;
    animation: rxQaItemIn 0.26s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes rxQaItemIn { from { opacity: 0; transform: translateY(12px) scale(0.9); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .rx-qa-overlay { position: fixed; inset: 0; z-index: 1150; background: rgba(11,29,69,0.18); backdrop-filter: blur(2px); animation: rxFadeUp 0.2s ease both; }

  /* ── Keyboard shortcuts modal ── */
  @keyframes rxKbIn {
    from { opacity: 0; transform: translate(-50%,-48%) scale(0.96); }
    to   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  }

  /* ── High-risk overdue alert banner ── */
  @keyframes rxAlertPulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.3); }
    50%      { box-shadow: 0 0 0 6px rgba(220,38,38,0); }
  }
  .rx-alert-pulse { animation: rxAlertPulse 2.2s ease infinite; }

  /* ── Insights dashboard ── */
  @keyframes rxBarGrow { from { transform: scaleX(0); } to { transform: scaleX(1); } }
  @keyframes rxRingFill { from { stroke-dashoffset: var(--rx-circ); } }
  @keyframes rxPopIn { from { opacity: 0; transform: scale(0.9) translateY(8px); } to { opacity: 1; transform: scale(1) translateY(0); } }
  .rx-insight-card {
    animation: rxPopIn 0.5s cubic-bezier(0.16,1,0.3,1) backwards;
    transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s;
  }
  .rx-insight-card:hover { transform: translateY(-4px); box-shadow: 0 12px 32px rgba(15,23,42,0.12); }
  .rx-bar-grow { transform-origin: left center; animation: rxBarGrow 0.9s cubic-bezier(0.16,1,0.3,1) backwards; }
  .rx-hero-shimmer {
    background: linear-gradient(110deg, rgba(255,255,255,0) 30%, rgba(255,255,255,0.18) 50%, rgba(255,255,255,0) 70%);
    background-size: 200% 100%;
    animation: rxShimmer 3s linear infinite;
  }
  @media (max-width: 760px) {
    .rx-insights-grid { grid-template-columns: 1fr !important; }
  }

  /* ── Smart Alert Banner ── */
  @keyframes rxAlertSlide { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
  .rx-smart-alert { animation: rxAlertSlide 0.3s ease both; }
  .rx-smart-alert-item { transition: background 0.15s; }
  .rx-smart-alert-item:hover { background: rgba(220,38,38,0.08) !important; }

  /* ── Patient Trend Chart (sparkline) ── */
  .rx-sparkline { transition: opacity 0.2s; }
  .rx-sparkline:hover { opacity: 0.8; }

  /* ── Glassmorphism hero ── */
  .rx-glass-hero {
    position: relative; overflow: hidden;
    background: linear-gradient(135deg, rgba(30,64,175,0.92), rgba(37,99,235,0.88) 55%, rgba(6,182,212,0.82));
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.18);
  }
  .rx-glass-hero::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(circle at 78% 18%, rgba(255,255,255,0.22), transparent 42%);
  }

  /* ── Toast stack ── */
  @keyframes rxToastPop {
    from { opacity: 0; transform: translateX(24px) scale(0.96); }
    to   { opacity: 1; transform: translateX(0) scale(1); }
  }
  @keyframes rxToastOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(24px); }
  }
  .rx-toast { animation: rxToastPop 0.32s cubic-bezier(0.16,1,0.3,1) both; }
  .rx-toast.leaving { animation: rxToastOut 0.25s ease forwards; }

  /* ── Toast slide-in ── */
  @keyframes rxToastIn { from { opacity: 0; transform: translate(-50%, 16px); } to { opacity: 1; transform: translate(-50%, 0); } }

  /* ── Spinner ── */
  @keyframes rxSpin { to { transform: rotate(360deg); } }
  .rx-spin-icon { animation: rxSpin 0.8s linear infinite; }
  .rx-spinner {
    display: inline-block; width: 14px; height: 14px; border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.35); border-top-color: #fff;
    animation: rxSpin 0.6s linear infinite; vertical-align: -2px;
  }

  /* ══════════════════════════════════════════════════════
     ✨ Global animation polish layer (Wave 6)
     ══════════════════════════════════════════════════════ */

  /* Smooth entrance utilities */
  @keyframes rxFadeIn   { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rxScaleIn  { from { opacity: 0; transform: scale(0.96); } to { opacity: 1; transform: scale(1); } }
  @keyframes rxRise     { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rxRiseSm   { from { opacity: 0; transform: translateY(7px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes rxFloatY   { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
  @keyframes rxWiggle   { 0%,100% { transform: rotate(0); } 25% { transform: rotate(-7deg); } 75% { transform: rotate(7deg); } }
  @keyframes rxGlowPulse{ 0%,100% { box-shadow: 0 0 0 0 rgba(37,99,235,0.35); } 50% { box-shadow: 0 0 0 6px rgba(37,99,235,0); } }

  /* Staggered children — add .rx-stagger to a container */
  .rx-stagger > * { animation: rxRiseSm 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  .rx-stagger > *:nth-child(1){animation-delay:.03s} .rx-stagger > *:nth-child(2){animation-delay:.06s}
  .rx-stagger > *:nth-child(3){animation-delay:.09s} .rx-stagger > *:nth-child(4){animation-delay:.12s}
  .rx-stagger > *:nth-child(5){animation-delay:.15s} .rx-stagger > *:nth-child(6){animation-delay:.18s}
  .rx-stagger > *:nth-child(7){animation-delay:.21s} .rx-stagger > *:nth-child(8){animation-delay:.24s}
  .rx-stagger > *:nth-child(9){animation-delay:.27s} .rx-stagger > *:nth-child(n+10){animation-delay:.30s}

  /* Table row entrance + theme-aware hover */
  tbody tr.rx-trow { animation: rxFadeIn 0.35s ease both; }
  tbody tr.rx-trow:nth-child(1){animation-delay:.02s} tbody tr.rx-trow:nth-child(2){animation-delay:.05s}
  tbody tr.rx-trow:nth-child(3){animation-delay:.08s} tbody tr.rx-trow:nth-child(4){animation-delay:.11s}
  tbody tr.rx-trow:nth-child(5){animation-delay:.14s} tbody tr.rx-trow:nth-child(6){animation-delay:.17s}
  tbody tr.rx-trow:nth-child(7){animation-delay:.20s} tbody tr.rx-trow:nth-child(n+8){animation-delay:.22s}
  tbody tr.rx-trow { transition: background 0.16s ease, transform 0.16s ease; }
  tbody tr.rx-trow:hover { background: var(--c-bgAlt) !important; }
  tr.rx-row:hover td { background: var(--c-bgAlt); }

  /* Button micro-interactions: press + sheen */
  .rx-btn { position: relative; overflow: hidden; }
  .rx-btn:active:not(:disabled) { transform: scale(0.96) !important; }
  .rx-btn::after {
    content: ''; position: absolute; top: 0; left: -120%; width: 60%; height: 100%;
    background: linear-gradient(115deg, transparent, rgba(255,255,255,0.28), transparent);
    transform: skewX(-20deg); transition: left 0.55s ease; pointer-events: none;
  }
  .rx-btn:hover::after { left: 130%; }

  /* Card entrance + lift (theme-aware shadow) */
  .rx-anim-card { animation: rxScaleIn 0.4s cubic-bezier(0.16,1,0.3,1) both; }
  .rx-card-hover { transition: transform 0.2s cubic-bezier(0.16,1,0.3,1), box-shadow 0.2s; }
  .rx-card-hover:hover { transform: translateY(-3px); box-shadow: 0 14px 36px rgba(15,23,42,0.14) !important; }
  [data-theme="dark"] .rx-card-hover:hover { box-shadow: 0 14px 36px rgba(0,0,0,0.5) !important; }

  /* Tab active pop */
  @keyframes rxTabPop { from { transform: scale(0.92); } to { transform: scale(1); } }
  .rx-tab-active { animation: rxTabPop 0.22s cubic-bezier(0.34,1.56,0.64,1) both; }

  /* Modal: backdrop fade + content spring */
  @keyframes rxModalBg { from { opacity: 0; } to { opacity: 1; } }
  @keyframes rxModalIn { from { opacity: 0; transform: translateY(18px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
  .rx-modal-bg { animation: rxModalBg 0.22s ease both; }
  .rx-modal-card { animation: rxModalIn 0.34s cubic-bezier(0.16,1,0.3,1) both; }

  /* Icon hover effects */
  .rx-icon-wiggle:hover { animation: rxWiggle 0.4s ease; }
  .rx-float { animation: rxFloatY 3s ease-in-out infinite; }

  /* Badge pop-in */
  @keyframes rxBadgePop { 0% { transform: scale(0); } 70% { transform: scale(1.15); } 100% { transform: scale(1); } }
  .rx-badge-pop { animation: rxBadgePop 0.34s cubic-bezier(0.34,1.56,0.64,1) both; }

  /* Link underline grow */
  a.rx-link { position: relative; text-decoration: none; }
  a.rx-link::after { content:''; position:absolute; left:0; bottom:-2px; width:100%; height:1.5px;
    background: currentColor; transform: scaleX(0); transform-origin: left; transition: transform 0.22s ease; }
  a.rx-link:hover::after { transform: scaleX(1); }

  /* Print: force light theme + remove animations/shadows */
  @media print {
    [data-theme="dark"] {
      --c-text:#0F172A; --c-textMuted:#475569; --c-textLight:#94A3B8;
      --c-border:#E2E8F0; --c-borderLight:#F8FAFC;
      --c-surface:#FFFFFF; --c-bg:#FFFFFF; --c-bgAlt:#F8FAFC;
      --c-primary:#1E3A8A; --c-primaryLight:#2563EB;
    }
    body { background: #fff !important; }
    *, *::before, *::after { animation: none !important; transition: none !important; box-shadow: none !important; }
  }

  /* Respect user motion preferences (accessibility) */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      animation-iteration-count: 1 !important;
      transition-duration: 0.001ms !important;
      scroll-behavior: auto !important;
    }
  }

  /* ── Medication row: reflow to stacked layout on phones ── */
  @media (max-width: 640px) {
    .rx-med-head { display: none !important; }
    .rx-med-row {

const calculateRisk = (patient, visitData) => {
  const flags = [];
  let highRisk = false;

  if (visitData) {
    const ex = visitData.exacerbation || {};
    if (ex.countThisYear >= 2 || ex.hospitalized) {
      flags.push('Exacerbation ≥2 ครั้ง/ปี หรือ นอน รพ.');
      highRisk = true;
    }
    if (visitData.adherence && visitData.adherence.level === 'Poor') {
      flags.push('ความร่วมมือในการใช้ยาต่ำ');
    }
    if ((visitData.inhalerTechnique || []).some(t => t.overallScore === 'Poor')) {
      flags.push('เทคนิคการใช้ยาพ่นไม่ถูกต้อง');
    }
  }
  if (patient && patient.asthmaControl === 'Uncontrolled') {
    flags.push('Asthma ควบคุมไม่ได้');
    highRisk = true;
  }
  if (patient && ['3', '4'].includes(patient.goldGrade)) {
    flags.push('COPD GOLD Grade 3–4');
    highRisk = true;
  }
  if (patient && (patient.comorbidities || []).length >= 3) {
    flags.push('มีโรคร่วม ≥3 โรค');
  }
  if (patient && patient.age >= 65) {
    flags.push('ผู้สูงอายุ (≥65 ปี)');
  }

  let level = 'Low';
  if (highRisk) level = 'High';
  else if (flags.length >= 2) level = 'Medium';
  else if (flags.length === 1) level = 'Medium';

  return { level, flags };
};

  generateId,

  COMORBIDITY_OPTIONS,

  interpretACT,
  classifyGOLD,
  classifyGINA,

  getDefault() {
    return {
      patients: SAMPLE_PATIENTS,
      visits: SAMPLE_VISITS,
      telepharmacy: SAMPLE_TELEPHARMACY,
      haCompliance: { medRec: [], adr: [], referrals: [], discharge: [], rca: [] },
      _savedAt: 0,      // ข้อมูลตัวอย่าง — เก่าที่สุดเสมอ เพื่อให้ข้อมูลจริงจาก Firebase ชนะตอน merge
      _isSample: true,  // ธงบอกว่าเป็นข้อมูลตัวอย่าง ยังไม่เคยถูกผู้ใช้แก้ไข
    };
  },

  load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    // เครื่องใหม่: คืนค่า default โดย "ไม่" บันทึกลง localStorage (ไม่ประทับ _savedAt)
    // เพื่อให้ข้อมูลจริงจาก Firebase ชนะตอน merge เสมอ ผู้ใช้จึงไม่ต้องสมัครใหม่
    return this.getDefault();
  },

  save(data) {
    try {
      const payload = { ...data, _savedAt: Date.now() };
      delete payload._isSample; // เมื่อบันทึกจริงแล้วถือว่าไม่ใช่ข้อมูลตัวอย่างอีกต่อไป
      localStorage.setItem(STORE_KEY, JSON.stringify(payload));
    } catch (e) {
      console.error('AppStore.save error:', e);
    }
  },

  // เก็บข้อมูลจาก Firebase ลง localStorage โดย "คง" _savedAt เดิมไว้
  // (ห้ามประทับเวลาใหม่ ไม่งั้นการเทียบ timestamp ครั้งต่อไปจะเพี้ยน → sync ผิด)
  cacheRemote(data) {
    try { localStorage.setItem(STORE_KEY, JSON.stringify(data)); } catch (e) { /* ignore */ }
  },

  // Returns the data that is newer based on _savedAt timestamp.
  // If Firebase data is newer → use Firebase; otherwise keep local.
  merge(local, remote) {
    if (!remote) return local;
    if (!local)  return remote;
    // ถ้า local ยังเป็นข้อมูลตัวอย่าง (ยังไม่เคยถูกแก้) → ใช้ข้อมูลจริงจาก Firebase เสมอ
    if (local._isSample) return remote;
    if (remote._isSample) return local;
    const localTs  = local._savedAt  || 0;
    const remoteTs = remote._savedAt || 0;
    return remoteTs >= localTs ? remote : local;
  },

  reset() {
    localStorage.removeItem(STORE_KEY);
    return this.load();
  }
};

// ── Global Toast System ───────────────────────────────
// Usage anywhere: window.rxToast('บันทึกสำเร็จ', 'success')
function RxToastHost() {
  const [toasts, setToasts] = React.useState([]);
  React.useEffect(() => {
    const onToast = (e) => {
      const { msg, type = 'info', duration = 3200 } = e.detail || {};
      const id = Date.now() + Math.random();
      setToasts(t => [...t, { id, msg, type, leaving: false }]);
      setTimeout(() => {
        setToasts(t => t.map(x => x.id === id ? { ...x, leaving: true } : x));
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 280);
      }, duration);
    };
    window.addEventListener('rx-toast', onToast);
    return () => window.removeEventListener('rx-toast', onToast);
  }, []);

  const cfg = {
    success: { icon: '✅', bg: '#ECFDF5', border: '#A7F3D0', color: '#065F46', bar: '#10B981' },
    error:   { icon: '⛔', bg: '#FEF2F2', border: '#FECACA', color: '#991B1B', bar: '#EF4444' },
    warn:    { icon: '⚠️', bg: '#FFFBEB', border: '#FDE68A', color: '#92400E', bar: '#F59E0B' },
    info:    { icon: 'ℹ️', bg: '#EFF6FF', border: '#BFDBFE', color: '#1E40AF', bar: '#3B82F6' },
  };

  return (
    <div style={{ position: 'fixed', top: 16, right: 16, zIndex: 3000, display: 'flex', flexDirection: 'column', gap: 10, pointerEvents: 'none' }}>
      {toasts.map(t => {
        const c = cfg[t.type] || cfg.info;
        return (
          <div key={t.id} className={`rx-toast${t.leaving ? ' leaving' : ''}`} style={{
            display: 'flex', alignItems: 'center', gap: 10, minWidth: 260, maxWidth: 380,
            padding: '12px 16px', borderRadius: 12, background: c.bg, border: `1px solid ${c.border}`,
            boxShadow: '0 8px 28px rgba(15,23,42,0.16)', pointerEvents: 'auto',
            borderLeft: `4px solid ${c.bar}`,
          }}>
            <span style={{ fontSize: 18, flexShrink: 0 }}>{c.icon}</span>
            <span style={{ fontSize: 13, fontWeight: 600, color: c.color, lineHeight: 1.4 }}>{t.msg}</span>
          </div>
        );
      })}
    </div>
  );
}
// Global helper
if (typeof window !== 'undefined') {
  window.rxToast = (msg, type = 'info', duration = 3200) =>

    <div style={{ display: 'grid', gridTemplateColumns: `repeat(${cols}, 1fr)`, gap: '6px 12px' }}>

<script type="text/babel">
// ClinicHelpers.jsx — Auto-save Drafts · Audit Log · Beep · Beers Criteria
// Requires: window.* from Shared.jsx, AppStore from store.js

// ── Draft System (localStorage, per patient + edit) ───
const DRAFT_PREFIX = 'copd_draft_';
const DRAFT_EXPIRE_HOURS = 48;  // drafts older than 48h are stale

function draftKey(patientId, editVisitId) {
  return `${DRAFT_PREFIX}${patientId}_${editVisitId || 'new'}`;
}

function saveDraft(patientId, editVisitId, formData) {
  try {
    const payload = { ts: Date.now(), data: formData };
    localStorage.setItem(draftKey(patientId, editVisitId), JSON.stringify(payload));
  } catch (e) { /* localStorage full or disabled */ }
}

function loadDraft(patientId, editVisitId) {
  try {
    const raw = localStorage.getItem(draftKey(patientId, editVisitId));
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    const ageHours = (Date.now() - parsed.ts) / 3600000;
    if (ageHours > DRAFT_EXPIRE_HOURS) {
      localStorage.removeItem(draftKey(patientId, editVisitId));
      return null;
    }
    return parsed;
  } catch { return null; }
}

function clearDraft(patientId, editVisitId) {
  try { localStorage.removeItem(draftKey(patientId, editVisitId)); } catch {}
}

function listAllDrafts() {
  const drafts = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(DRAFT_PREFIX)) {
      try {
        const parsed = JSON.parse(localStorage.getItem(k));
        const m = k.slice(DRAFT_PREFIX.length).split('_');
        drafts.push({ key: k, patientId: m[0], editId: m.slice(1).join('_'), ts: parsed.ts, data: parsed.data });
      } catch {}
    }
  }
  return drafts.sort((a, b) => b.ts - a.ts);
}

// ── Audit Log ────────────────────────────────────────
function appendAudit(data, entry) {
  const log = data.auditLog || [];
  const fullEntry = {
    id: AppStore.generateId(),
    ts: Date.now(),
    ...entry,
  };
  // Keep only last 1000 entries
  const trimmed = [fullEntry, ...log].slice(0, 1000);
  return { ...data, auditLog: trimmed };
}

// ── Beep (Web Audio API) ────────────────────────────
let _beepCtx = null;
function beep(freq = 880, duration = 150, volume = 0.1) {
  try {
    if (!_beepCtx) _beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _beepCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    setTimeout(() => { try { osc.stop(); } catch {} }, duration);
  } catch (e) { /* audio not available */ }
}

function alertBeep() {
  // Two short beeps for attention
  beep(880, 120, 0.08);
  setTimeout(() => beep(1320, 120, 0.08), 160);
}

// ── Beers Criteria (Elderly ≥65) ────────────────────
const BEERS_DRUGS = [
  { keywords: ['tiotropium', 'spiriva'],
    risk: 'Anticholinergic',
    detail: 'หลีกเลี่ยงในผู้สูงอายุที่มี delirium / dementia / BPH — เพิ่มความเสี่ยง cognitive impairment, urinary retention',
    severity: 'Medium' },
  { keywords: ['ipratropium', 'berodual', 'combivent'],
    risk: 'Anticholinergic',
    detail: 'ระวังในผู้สูงอายุที่มี glaucoma หรือ BPH — เพิ่มความเสี่ยง intraocular pressure, urinary retention',
    severity: 'Medium' },
  { keywords: ['umeclidinium', 'anoro', 'incruse', 'trelegy'],
    risk: 'Anticholinergic (LAMA)',
    detail: 'ใช้ได้อย่างระมัดระวังในผู้สูงอายุ — เฝ้าระวัง dry mouth, urinary retention, cognitive effects',
    severity: 'Low' },
  { keywords: ['theophylline'],
    risk: 'Narrow Therapeutic Index',
    detail: 'หลีกเลี่ยงในผู้สูงอายุ — มีความเสี่ยงสูงต่อ tachyarrhythmia และ CNS toxicity, ขับออกช้าลงตามอายุ',
    severity: 'High' },
  { keywords: ['prednisolone', 'prednisone', 'methylprednisolone'],
    risk: 'Systemic Corticosteroid',
    detail: 'หลีกเลี่ยงการใช้เรื้อรังในผู้สูงอายุ — เพิ่มความเสี่ยง osteoporosis, DM, infection, mood changes',
    severity: 'Medium' },
];

function checkBeers(patient, medications) {
  if (!patient || patient.age == null || patient.age < 65) return [];
  if (!medications || medications.length === 0) return [];
  const alerts = [];
  const medNames = medications.map(m => (m.name || '').toLowerCase());
  BEERS_DRUGS.forEach(b => {
    const match = b.keywords.find(k => medNames.some(n => n.includes(k)));
    if (match) {
      // Find which med matched
      const matchedMed = medications.find(m => (m.name || '').toLowerCase().includes(match));
      alerts.push({ ...b, drug: matchedMed?.name || match });
    }
  });
  return alerts;
}

function BeersAlert({ patient, medications, compact }) {
  const alerts = checkBeers(patient, medications);
  if (alerts.length === 0) return null;
  const sevColor = { High: '#DC2626', Medium: '#D97706', Low: '#0369A1' };
  const sevBg    = { High: '#FEF2F2', Medium: '#FFFBEB', Low: '#EFF6FF' };
  const sevBorder= { High: '#FECACA', Medium: '#FDE68A', Low: '#BFDBFE' };

  if (compact) {
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 10px', borderRadius: 6, background: '#FFFBEB',
        color: '#D97706', fontSize: 11, fontWeight: 600, border: '1px solid #FDE68A',
      }}>👴 Beers Alert ({alerts.length})</div>
    );
  }

  return (
    <Card style={{ border: '2px solid #FDE68A', padding: 0, overflow: 'hidden' }}>
      <div style={{ background: '#D97706', color: '#fff', padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 18 }}>👴</span>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700 }}>Beers Criteria — ผู้สูงอายุ ({patient.age} ปี)</div>
          <div style={{ fontSize: 10, opacity: 0.85 }}>ยาที่ต้องระวังในผู้สูงอายุ {alerts.length} รายการ</div>
        </div>
      </div>
      <div style={{ padding: '8px 12px' }}>
        {alerts.map((a, i) => (
          <div key={i} style={{
            padding: '8px 10px', borderRadius: 6, marginBottom: 5,
            background: sevBg[a.severity], border: `1px solid ${sevBorder[a.severity]}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
              <span style={{
                fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 12,
                background: sevColor[a.severity], color: '#fff',
              }}>{a.risk}</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{a.drug}</span>
            </div>
            <div style={{ fontSize: 11, color: C.textMuted, lineHeight: 1.5 }}>{a.detail}</div>
          </div>
        ))}
      </div>
    </Card>
  );
}

Object.assign(window, {
  saveDraft, loadDraft, clearDraft, listAllDrafts,
  appendAudit,
  beep, alertBeep,
  checkBeers, BeersAlert, BEERS_DRUGS,
});

          { v: 'p',   l: 'P — Plan' },
        ].map(({ v, l }) => (
          <button key={v} onClick={() => setFilter(v)} style={{
            padding: '5px 10px', borderRadius: 6, fontSize: 12, fontWeight: 600,
            border: `1px solid ${filter === v ? C.primary : C.border}`,

            color: filter === v ? '#fff' : C.text, cursor: 'pointer', fontFamily: 'inherit',
          }}>{l}</button>

      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {filtered.map(t => (
          <div key={t.id} style={{
            padding: '10px 12px', borderRadius: 8, border: `1px solid ${C.border}`,

          }}>
            <div style={{ display: 'flex', alignItems: 'flex-start', gap: 10, marginBottom: 4 }}>
              <span style={{

              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 13, color: C.text }}>{t.name}</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2, lineHeight: 1.5, whiteSpace: 'pre-wrap' }}>{t.text}</div>
              </div>
              <div style={{ display: 'flex', gap: 4 }}>
                <Btn size="sm" variant="ghost" onClick={() => setEdit(t)}>แก้ไข</Btn>
                <Btn size="sm" variant="danger" onClick={() => handleDelete(t.id)}>ลบ</Btn>
              </div>
            </div>
          </div>
        ))}
        {filtered.length === 0 && <EmptyState icon="🏷️" title="ไม่มี Template ในหมวดนี้" />}
      </div>

      {/* Edit/Add modal */}
      <Modal open={!!edit} onClose={() => setEdit(null)}
        title={edit?.id ? 'แก้ไข Template' : 'เพิ่ม Template ใหม่'} width={520}>
        {edit && (
          <div>
            <FormField label="หมวด (Field)" required>
              <Select value={edit.field} onChange={v => setEdit({ ...edit, field: v })}
                options={[
                  { value: 'cc', label: 'CC — Chief Complaint' },
                  { value: 's',  label: 'S — Subjective' },
                  { value: 'o',  label: 'O — Objective' },
                  { value: 'a',  label: 'A — Assessment' },
                  { value: 'p',  label: 'P — Plan' },
                ]} />
            </FormField>
            <FormField label="ชื่อ Template" required>
              <Input value={edit.name} onChange={v => setEdit({ ...edit, name: v })}
                placeholder="เช่น 'อาการคงที่', 'นัด Telepharmacy'" />
            </FormField>
            <FormField label="ข้อความ" required hint="ใช้ ___ ตรงจุดที่ต้องเติมเองตอนใช้งาน">
              <Textarea value={edit.text} onChange={v => setEdit({ ...edit, text: v })}
                placeholder="ข้อความสำเร็จรูป..." rows={6} />
            </FormField>
            <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
              <Btn variant="ghost" onClick={() => setEdit(null)}>ยกเลิก</Btn>
              <Btn variant="primary" onClick={handleSave}>บันทึก</Btn>
            </div>
          </div>
        )}
      </Modal>
    </Card>
  );
}

Object.assign(window, { TemplatePicker, TemplateManager, loadTemplates, DEFAULT_TEMPLATES });
</script>
<script type="text/babel">
// TrendCharts.jsx — Mini SVG sparklines for patient trends
// Adherence trend, Exacerbation trend over visits

function Sparkline({ data, color, height = 50, width = 200, label, unit, formatVal, interventions }) {
  if (!data || data.length === 0) {
    return (
      <div style={{ height, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: C.textMuted }}>
        ไม่มีข้อมูล
      </div>
    );
  }

  const vals = data.map(d => d.value);
  const min  = Math.min(...vals, 0);
  const max  = Math.max(...vals, 1);
  const range = max - min || 1;

  const padX = 12, padY = 10;
  const innerW = width - padX * 2;
  const innerH = height - padY * 2;

  const points = data.map((d, i) => {
    const x = padX + (data.length === 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
    const y = padY + innerH - ((d.value - min) / range) * innerH;
    return { x, y, ...d };
  });

  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const areaPath = `${path} L ${points[points.length-1].x} ${padY + innerH} L ${points[0].x} ${padY + innerH} Z`;

  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`grad-${label}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#grad-${label})`} />
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (
        <g key={i}>
          {interventions && interventions[i] && (
            <g>
              <line x1={p.x} y1={padY - 2} x2={p.x} y2={p.y - 5} stroke="#D97706" strokeWidth="1.5" strokeDasharray="2 2" />
              <circle cx={p.x} cy={padY - 2} r="4" fill="#D97706" />
              <text x={p.x} y={padY + 1} fontSize="7" textAnchor="middle" fill="#fff" fontWeight="700">⚡</text>
              <title>{`Intervention — ${p.date}`}</title>
            </g>
          )}
          <circle cx={p.x} cy={p.y} r="3" fill={color} />
          <title>{`${p.date}: ${formatVal ? formatVal(p.value) : p.value}${unit || ''}`}</title>
        </g>
      ))}
    </svg>
  );
}

// ── Trends Section ────────────────────────────────────
function TrendsSection({ visits }) {
  if (!visits || visits.length === 0) return null;
  const sorted = [...visits].sort((a, b) => a.visitDate.localeCompare(b.visitDate));

  // Detect interventions: SOAP P contains key intervention keywords OR DRP found
  const interventions = sorted.map(v => {
    const p = v.soap?.p || '';
    const hasDRP = v.drp?.noDRP === false && (v.drp?.items || []).length > 0;
    return /สอน|ปรับ|เพิ่ม|ลด|step.?up|step.?down|นัด|telepharmacy|กระตุ้น/i.test(p) || hasDRP;
  });

  // Adherence: Good=3, Fair=2, Poor=1, none=0
  const adhMap = { Good: 3, Fair: 2, Poor: 1 };
  const adhData = sorted.map(v => ({
    date: v.visitDate,
    value: adhMap[v.adherence?.level] || 0,
  }));

  const exData = sorted.map(v => ({
    date: v.visitDate,
    value: v.exacerbation?.countThisYear || 0,
  }));

  const techData = sorted.map(v => {
    const techs = v.inhalerTechnique || [];
    if (techs.length === 0) return { date: v.visitDate, value: 0 };
    const scoreMap = { Good: 3, Acceptable: 2, Poor: 1 };
    const avg = techs.reduce((s, t) => s + (scoreMap[t.overallScore] || 0), 0) / techs.length;
    return { date: v.visitDate, value: avg };
  });

  const catData = sorted.map(v => ({
    date: v.visitDate,
    value: v.assessments?.cat?.allAnswered ? v.assessments.cat.score : null,
  })).filter(d => d.value !== null);

  const actData = sorted.map(v => ({
    date: v.visitDate,
    value: v.assessments?.act?.allAnswered ? v.assessments.act.score : null,
  })).filter(d => d.value !== null);

  const adhLabels = { 3: 'ดี', 2: 'พอใช้', 1: 'ต่ำ', 0: '—' };
  const techLabels = { 3: 'ดี', 2: 'พอใช้', 1: 'ต่ำ', 0: '—' };

  const lastAdh  = adhData[adhData.length - 1]?.value;
  const prevAdh  = adhData[adhData.length - 2]?.value;
  const lastEx   = exData[exData.length - 1]?.value;
  const prevEx   = exData[exData.length - 2]?.value;

  const adhTrend = prevAdh !== undefined ? (lastAdh - prevAdh) : 0;
  const exTrend  = prevEx  !== undefined ? (lastEx  - prevEx)  : 0;

  const TrendArrow = ({ delta, good = 'up' }) => {
    if (delta === 0 || delta === undefined) return <span style={{ color: C.textMuted }}>—</span>;
    const isGood = (good === 'up' && delta > 0) || (good === 'down' && delta < 0);
    const color  = isGood ? C.low : C.high;
    const arrow  = delta > 0 ? '▲' : '▼';
    return <span style={{ color, fontWeight: 700, fontSize: 11 }}>{arrow} {Math.abs(delta)}</span>;
  };

  const Chart = ({ title, data, color, formatVal, currentLabel, trendArrow }) => (
    <div style={{
      padding: '12px 14px', borderRadius: 8, border: `1px solid ${C.border}`,
      background: '#fff',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{title}</div>
          <div style={{ fontSize: 18, fontWeight: 800, color, marginTop: 2, lineHeight: 1.1 }}>{currentLabel}</div>
        </div>
        <div style={{ fontSize: 11, textAlign: 'right' }}>
          <div style={{ color: C.textMuted, fontSize: 10 }}>เทียบครั้งก่อน</div>
          <div>{trendArrow}</div>
        </div>
      </div>
      <Sparkline data={data} color={color} width={240} height={48} label={title} formatVal={formatVal} interventions={interventions} />
    </div>
  );

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <h4 style={{ margin: 0, fontSize: 13, fontWeight: 700, color: C.primary }}>
          📊 Trend ผลลัพธ์ทางคลินิก ({sorted.length} ครั้ง)
        </h4>
        <span style={{ fontSize: 11, color: C.textMuted }}>
          <span style={{ color: '#D97706', fontWeight: 700 }}>⚡</span> = Intervention / DRP
        </span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
        <Chart title="Adherence" data={adhData} color={C.low}
          currentLabel={adhLabels[lastAdh] || '—'}
          trendArrow={<TrendArrow delta={adhTrend} good="up" />}
          formatVal={v => adhLabels[v] || '—'} />
        <Chart title="Exacerbation / ปี" data={exData} color={C.high}
          currentLabel={`${lastEx ?? 0} ครั้ง`}
          trendArrow={<TrendArrow delta={exTrend} good="down" />}
          formatVal={v => `${v} ครั้ง`} />
        <Chart title="เทคนิคยาพ่น" data={techData} color="#7C3AED"
          currentLabel={techLabels[Math.round(techData[techData.length-1]?.value || 0)] || '—'}
          trendArrow={<span style={{ color: C.textMuted }}>—</span>}
          formatVal={v => techLabels[Math.round(v)] || '—'} />
      </div>
      {/* CAT & ACT score trends — shown only when data available */}
      {(catData.length >= 2 || actData.length >= 2) && (
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12, marginTop: 12 }}>
          {catData.length >= 2 && (() => {
            const last = catData[catData.length - 1].value;
            const prev = catData[catData.length - 2].value;
            return (
              <Chart title="CAT Score (0–40)" data={catData} color="#0369A1"
                currentLabel={`${last} คะแนน`}
                trendArrow={<TrendArrow delta={last - prev} good="down" />}
                formatVal={v => `${v} คะแนน`} />
            );
          })()}
          {actData.length >= 2 && (() => {
            const last = actData[actData.length - 1].value;
            const prev = actData[actData.length - 2].value;
            return (
              <Chart title="ACT Score (5–25)" data={actData} color="#7C3AED"
                currentLabel={`${last} คะแนน`}
                trendArrow={<TrendArrow delta={last - prev} good="up" />}
                formatVal={v => `${v} คะแนน`} />
            );
          })()}
        </div>
      )}
    </Card>
  );
}

Object.assign(window, { Sparkline, TrendsSection });
</script>

// ── Clinical Decision Support ─────────────────────────
// สังเคราะห์ข้อมูล visit + ผู้ป่วย → รายการ "สิ่งที่ควรทำ" เรียงตามความสำคัญ
// ตามหลัก GOLD/GINA: ก่อน step-up ต้องตรวจ technique + adherence + trigger ก่อนเสมอ
function buildCDS({ patient, medications, inhalerTechnique, adherence, exacerbation, assessments }) {
  const items = [];
  const a = assessments || {};
  const ex = exacerbation || {};
  const dx = patient?.diagnosis;
  const techPoor = (inhalerTechnique || []).filter(t => t.overallScore === 'Poor');
  const adhLevel = adherence?.level;
  const adhPoor  = adhLevel === 'Poor';
  const adhFair  = adhLevel === 'Fair' || adhLevel === 'Acceptable';
  const hasMeds  = (medications || []).length > 0;
  const exYear   = Number(ex.countThisYear) || 0;
  const hosp     = !!ex.hospitalized;

  // ระดับการควบคุมโรค
  const goldGroup = (dx === 'COPD' || dx === 'Both')
    ? AppStore.classifyGOLD({ catScore: a.cat?.allAnswered ? a.cat.score : null, mmrcGrade: a.mmrc?.grade, exYear, hospitalized: hosp }).group
    : null;
  const gina = (dx === 'Asthma' || dx === 'Both') && a.act?.allAnswered
    ? AppStore.classifyGINA({ actScore: a.act.score, exYear }) : null;
  const uncontrolled = goldGroup === 'E' || (gina && gina.label === 'ควบคุมไม่ได้');
  const optimized = techPoor.length === 0 && !adhPoor && !adhFair; // technique+adherence ดีแล้ว

  // 1) เทคนิคยาพ่นไม่ดี — ต้องสอนซ้ำก่อน step-up เสมอ
  if (techPoor.length > 0) {
    items.push({ p: 1, icon: '🌬️', color: C.high,
      title: 'สอนเทคนิคยาพ่นซ้ำ (Re-education)',
      detail: `พบเทคนิคไม่ผ่าน ${techPoor.length} อุปกรณ์: ${techPoor.map(t => AppStore.INHALER_CHECKLISTS[t.device]?.label || t.device).join(', ')} — แก้ก่อนพิจารณาปรับยา` });
  }
  // 2) Adherence
  if (adhPoor) {
    items.push({ p: 1, icon: '💊', color: C.high,
      title: 'แก้ปัญหา Adherence (ความร่วมมือต่ำ)',
      detail: 'ค้นหาสาเหตุ (ลืม/ผลข้างเคียง/ค่าใช้จ่าย/ความเข้าใจ) ก่อน step-up — พิจารณา simplify regimen, pill box, นัด Telepharmacy' });
  } else if (adhFair) {
    items.push({ p: 2, icon: '💊', color: C.medium,
      title: 'เสริมแรง Adherence',
      detail: 'ความร่วมมือปานกลาง — ย้ำความสำคัญของยาควบคุม (controller) และติดตามใกล้ชิด' });
  }
  // 3) Step up / down
  if (uncontrolled && optimized) {
    items.push({ p: 1, icon: '⬆️', color: C.high,
      title: 'พิจารณา Step-up การรักษา',
      detail: dx === 'Asthma' || (dx === 'Both' && gina)
        ? (gina?.rx || 'เพิ่มขนาด ICS-LABA ตาม GINA')
        : 'COPD Group E: LABA+LAMA (±ICS ถ้า eos ≥300 หรือ asthma overlap)' });
  } else if (uncontrolled && !optimized) {
    items.push({ p: 1, icon: '🔍', color: C.high,
      title: 'ยังควบคุมไม่ได้ — ทบทวนก่อน step-up',
      detail: 'ตาม GOLD/GINA ต้องแก้ technique + adherence + trigger ให้ครบก่อน จึงค่อยเพิ่มยา' });
  }
  if (gina && gina.step === 'คงระดับยา') {
    items.push({ p: 3, icon: '⬇️', color: C.low,
      title: 'พิจารณา Step-down',
      detail: gina.rx });
  }
  // 4) Smoking cessation
  if (patient?.smokingStatus === 'Current') {
    items.push({ p: 1, icon: '🚭', color: C.high,
      title: 'แนะนำเลิกบุหรี่ (สำคัญที่สุดใน COPD)',
      detail: 'ให้คำปรึกษา 5A, พิจารณา NRT/ยาเลิกบุหรี่, ส่งคลินิกเลิกบุหรี่ — ชะลอการเสื่อมของปอดได้มากที่สุด' });
  }
  // 5) Exacerbation follow-up
  if (exYear >= 2 || hosp) {
    items.push({ p: 2, icon: '📞', color: C.medium,
      title: 'ติดตามใกล้ชิด (Exacerbation บ่อย)',
      detail: `${exYear} ครั้ง/ปี${hosp ? ' + เคยนอน รพ.' : ''} — นัด Telepharmacy, ทบทวน action plan, พิจารณายา rescue สำรองที่บ้าน` });
  }
  // 6) Vaccination
  const vac = patient?.vaccinations || {};
  const today = Date.now();
  const overdueVac = (AppStore.VACCINATION_TYPES || []).filter(t => {
    const d = vac[t.id];
    if (!d) return t.id === 'flu' || t.id === 'pcv13' || t.id === 'ppsv23';
    if (!t.recommendInterval) return false;
    return (today - new Date(d).getTime()) / 86400000 >= t.recommendInterval;
  });
  if (overdueVac.length > 0) {
    items.push({ p: 2, icon: '💉', color: C.medium,
      title: 'แนะนำวัคซีน',
      detail: `ควรได้รับ/กระตุ้น: ${overdueVac.map(v => v.label.split(' (')[0]).join(', ')} — ลด exacerbation จากการติดเชื้อ` });
  }
  // 7) Referral
  if (uncontrolled && optimized && (exYear >= 2 || hosp)) {
    items.push({ p: 2, icon: '🏥', color: C.medium,
      title: 'พิจารณาส่งต่อแพทย์เฉพาะทาง',
      detail: 'ควบคุมไม่ได้แม้ optimize ยา + technique + adherence แล้ว — ปรึกษาอายุรแพทย์ระบบหายใจ' });
  }

  return items.sort((x, y) => x.p - y.p);
}

function ClinicalDecisionSupport({ patient, medications, inhalerTechnique, adherence, exacerbation, assessments }) {
  const items = buildCDS({ patient, medications, inhalerTechnique, adherence, exacerbation, assessments });
  if (items.length === 0) {
    return (

        </div>
      </Card>

  }
  const pLabel = { 1: 'ด่วน', 2: 'ควรทำ', 3: 'ทางเลือก' };
  return (
    <Card style={{ padding: 0, overflow: 'hidden', border: `2px solid #7C3AED30` }}>
      <div style={{ background: 'linear-gradient(135deg,#7C3AED,#5B21B6)', color: '#fff', padding: '10px 16px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>

      </div>
      <div style={{ padding: '10px 12px', display: 'flex', flexDirection: 'column', gap: 7 }}>
        {items.map((it, i) => (
          <div key={i} style={{ display: 'flex', gap: 10, padding: '9px 11px', background: `${it.color}08`, border: `1px solid ${it.color}25`, borderRadius: 9, borderLeft: `3px solid ${it.color}` }}>
            <span style={{ fontSize: 18, flexShrink: 0 }}>{it.icon}</span>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6, marginBottom: 2 }}>
                <span style={{ fontSize: 12.5, fontWeight: 700, color: C.text }}>{it.title}</span>
                <span style={{ fontSize: 9, fontWeight: 700, color: it.color, background: `${it.color}18`, padding: '1px 6px', borderRadius: 10 }}>{pLabel[it.p]}</span>
              </div>
              <div style={{ fontSize: 11.5, color: C.textMuted, lineHeight: 1.45 }}>{it.detail}</div>
            </div>
          </div>
        ))}
      </div>
      <div style={{ padding: '7px 14px', borderTop: `1px solid ${C.border}`, fontSize: 10, color: C.textMuted }}>
        * คำแนะนำอ้างอิง GOLD/GINA — เป็นเครื่องมือช่วยตัดสินใจ ไม่ทดแทนวิจารณญาณทางคลินิก
      </div>
    </Card>
  );
}

// ── Drug Interaction Checker ────────────────────────
function checkInteractions(medications, patient) {
  if (!medications || medications.length === 0) return [];
  const medNames = medications.map(m => (m.name || '').toLowerCase());
  const comorbidMeds = []; // could extract from comorbidities in future

  const alerts = [];
  AppStore.DRUG_INTERACTIONS.forEach(rule => {
    const drug1Match = rule.drugs.find(d => medNames.some(n => n.includes(d.toLowerCase())));
    if (!drug1Match) return;
    const drug2Match = rule.with.find(d => medNames.some(n => n.includes(d.toLowerCase())));
    if (drug2Match) {
      alerts.push({
        ...rule,
        drug1: drug1Match,
        drug2: drug2Match,
        type: 'med-med',
      });
    }
  });

  // Smoking + Theophylline check
  if (patient?.smokingStatus === 'Current' && medNames.some(n => n.includes('theophylline'))) {
    alerts.push({
      severity: 'Medium',
      drug1: 'Theophylline', drug2: 'การสูบบุหรี่',
      mechanism: 'บุหรี่ induce CYP1A2 → ↓ Theophylline level ~50%',
      action: 'ผู้ป่วยสูบบุหรี่อาจต้องใช้ Theophylline dose สูงกว่าปกติ — ตรวจ level และพิจารณาแนะนำเลิกบุหรี่',
      type: 'med-smoking',
    });
  }

  return alerts;
}

// ── Renal Function Alert ─────────────────────────────
function getRenalCategory(eGFR) {
  if (eGFR == null || eGFR === '') return null;
  const v = parseFloat(eGFR);
  if (isNaN(v)) return null;
  if (v >= 90)  return { label: 'Normal',      stage: 'G1', color: '#059669', sev: 'ok' };
  if (v >= 60)  return { label: 'Mild ↓',      stage: 'G2', color: '#059669', sev: 'ok' };
  if (v >= 45)  return { label: 'Moderate ↓ (a)', stage: 'G3a', color: '#D97706', sev: 'warn' };
  if (v >= 30)  return { label: 'Moderate ↓ (b)', stage: 'G3b', color: '#D97706', sev: 'warn' };
  if (v >= 15)  return { label: 'Severe ↓',    stage: 'G4', color: '#DC2626', sev: 'alert' };
  return          { label: 'Kidney Failure',stage: 'G5', color: '#991B1B', sev: 'alert' };
}

        drug: 'Fluoroquinolones',
        action: 'ปรับขนาดยาตาม CrCl (CrCl <50: 50% dose)',

  if (compact) {
    if (renal.sev === 'ok') return null;
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 10px', borderRadius: 6,

        border: `1px solid ${renal.sev === 'alert' ? C.highBorder : C.mediumBorder}`,

          <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>การทำงานของไต</div>

          padding: '4px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700,
          background: `${renal.color}15`, color: renal.color, border: `1px solid ${renal.color}40`,
        }}>{renal.stage} · {renal.label}</div>
      </div>

      {renalRisks.length > 0 && (
        <div style={{ marginTop: 8 }}>

          {renalRisks.map((r, i) => (

// ── Vaccination Status ──────────────────────────────
function VaccinationStatus({ patient, compact }) {
  const vac = patient?.vaccinations || {};
  const today = new Date();

  const items = AppStore.VACCINATION_TYPES.map(t => {

        {items.map((it, i) => {

              <span style={{ fontSize: 10, color: c, fontWeight: 600 }}>
