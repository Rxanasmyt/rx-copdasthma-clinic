// ── SmartAlertBanner ─────────────────────────────────
function SmartAlertBanner({ data, navigate }) {
  const [expanded, setExpanded] = pvState(false);
  const today = new Date();
  const daysDiff = (dateStr) => {
    if (!dateStr) return 9999;
    return Math.floor((today - new Date(dateStr)) / 86400000);
  };

  // Build alert items
  const alerts = [];
  data.patients.forEach(p => {
    const ptVisits = (data.visits || []).filter(v => v.patientId === p.id)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    const lastVisit = ptVisits[0];
    const daysSince = lastVisit ? daysDiff(lastVisit.visitDate) : 9999;
    const overdueThreshold = p.riskLevel === 'High' ? 90 : p.riskLevel === 'Medium' ? 180 : 365;
    if (daysSince > overdueThreshold) {
      alerts.push({
        type: 'overdue',
        severity: p.riskLevel === 'High' ? 'high' : 'medium',
        icon: p.riskLevel === 'High' ? '🔴' : '🟡',
        title: `${p.prefix}${p.firstName} ${p.lastName}`,
        detail: `ไม่ได้รับการติดตาม ${daysSince < 9999 ? daysSince + ' วัน' : 'ยังไม่เคยรับบริการ'} (${p.riskLevel} Risk — ควรติดตามทุก ${overdueThreshold} วัน)`,
        patientId: p.id,
      });
    }
    if (lastVisit && typeof window.detectDRP === 'function') {
      const drps = window.detectDRP(lastVisit, p).filter(d => d.severity === 'High');
      if (drps.length > 0) {
        alerts.push({
          type: 'drp',
          severity: 'high',
          icon: '⚠️',
          title: `${p.prefix}${p.firstName} ${p.lastName}`,
          detail: `พบ DRP High ${drps.length} รายการ จาก visit ${lastVisit.visitDate}: ${drps.map(d => d.problemTh).join(' | ')}`,
          patientId: p.id,
        });
      }
    }
  });

  const highCount = alerts.filter(a => a.severity === 'high').length;
  if (alerts.length === 0) return null;

  return (
    <div className="rx-smart-alert" style={{
      background: highCount > 0 ? 'linear-gradient(135deg,#FEF2F2,#FFF5F5)' : '#FFFBEB',
      border: `1px solid ${highCount > 0 ? '#FECACA' : '#FDE68A'}`,
      borderRadius: 12, marginBottom: 16, overflow: 'hidden',
    }}>
      <button onClick={() => setExpanded(e => !e)} style={{
        width: '100%', background: 'none', border: 'none', cursor: 'pointer',
        display: 'flex', alignItems: 'center', gap: 10, padding: '12px 16px',
      }}>
        <span className={highCount > 0 ? 'rx-alert-pulse' : ''} style={{
          display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
          width: 32, height: 32, borderRadius: '50%',
          background: highCount > 0 ? '#DC2626' : '#D97706', fontSize: 15,
        }}>🔔</span>
        <div style={{ flex: 1, textAlign: 'left' }}>
          <div style={{ fontWeight: 700, fontSize: 13, color: highCount > 0 ? '#991B1B' : '#92400E' }}>
            Smart Alert — {alerts.length} รายการที่ต้องดำเนินการ
          </div>
          <div style={{ fontSize: 11, color: '#6B7280', marginTop: 1 }}>
            {highCount > 0 ? `⚠ ${highCount} รายการ High Priority` : 'ดูรายละเอียด'}
          </div>
        </div>
        <span style={{ fontSize: 12, color: '#9CA3AF', transform: expanded ? 'rotate(180deg)' : 'rotate(0deg)', transition: 'transform 0.2s' }}>▼</span>
      </button>
      {expanded && (
        <div style={{ borderTop: `1px solid ${highCount > 0 ? '#FECACA' : '#FDE68A'}`, maxHeight: 300, overflowY: 'auto' }}>
          {alerts.map((al, i) => (
            <div key={i} className="rx-smart-alert-item" onClick={() => navigate('history', al.patientId)}
              style={{
                display: 'flex', alignItems: 'flex-start', gap: 10, padding: '10px 16px',
                borderBottom: i < alerts.length - 1 ? `1px solid ${highCount > 0 ? '#FEE2E2' : '#FEF3C7'}` : 'none',
                cursor: 'pointer',
              }}>
              <span style={{ fontSize: 16, marginTop: 1 }}>{al.icon}</span>
              <div style={{ flex: 1 }}>
                <div style={{ fontWeight: 600, fontSize: 12, color: '#1F2937' }}>{al.title}
                  <span style={{ marginLeft: 6, fontSize: 10, fontWeight: 500, color: al.type === 'drp' ? '#DC2626' : '#D97706',
                    background: al.type === 'drp' ? '#FEE2E2' : '#FEF3C7', borderRadius: 4, padding: '1px 5px' }}>
                    {al.type === 'drp' ? 'DRP' : 'Overdue'}
                  </span>
                </div>
                <div style={{ fontSize: 11, color: '#6B7280', marginTop: 2, lineHeight: 1.4 }}>{al.detail}</div>
              </div>
              <span style={{ fontSize: 10, color: '#2563EB', fontWeight: 600, whiteSpace: 'nowrap', marginTop: 2 }}>ดูข้อมูล →</span>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ── PatientTrendChart (sparkline for CAT/ACT) ─────────
function PatientTrendChart({ visits, diagnosis }) {
  if (!visits || visits.length < 2) return null;
  const sorted = [...visits].sort((a, b) => a.visitDate.localeCompare(b.visitDate));
  const showCAT = diagnosis === 'COPD' || diagnosis === 'Both';
  const showACT = diagnosis === 'Asthma' || diagnosis === 'Both';
  const catPts = sorted.map(v => v.assessments?.cat?.allAnswered ? v.assessments.cat.score : null);
  const actPts = sorted.map(v => v.assessments?.act?.allAnswered ? v.assessments.act.score : null);
  const hasCAT = catPts.some(s => s !== null);
  const hasACT = actPts.some(s => s !== null);
  if (!hasCAT && !hasACT) return null;

  const W = 200, H = 52, pad = 8;
  const buildPath = (pts, minV, maxV) => {
    const valid = pts.map((v, i) => v !== null ? [i, v] : null).filter(Boolean);
    if (valid.length < 2) return '';
    const xScale = (i) => pad + (i / (pts.length - 1)) * (W - pad * 2);
    const yScale = (v) => H - pad - ((v - minV) / (maxV - minV + 0.001)) * (H - pad * 2);
    return valid.map((p, j) => `${j === 0 ? 'M' : 'L'}${xScale(p[0]).toFixed(1)},${yScale(p[1]).toFixed(1)}`).join(' ');
  };

  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
      <svg width={W} height={H} className="rx-sparkline" style={{ overflow: 'visible' }}>
        {/* CAT line (orange, max 40) */}
        {showCAT && hasCAT && (
          <path d={buildPath(catPts, 0, 40)} fill="none" stroke="#F59E0B" strokeWidth={1.8}
            strokeLinecap="round" strokeLinejoin="round" />
        )}
        {/* ACT line (blue, inverted — higher is better, max 25) */}
        {showACT && hasACT && (
          <path d={buildPath(actPts, 5, 25)} fill="none" stroke="#3B82F6" strokeWidth={1.8}
            strokeLinecap="round" strokeLinejoin="round" />
        )}
        {/* Latest value dots */}
        {showCAT && hasCAT && (() => {
          const last = catPts.map((v, i) => v !== null ? [i, v] : null).filter(Boolean).pop();
          if (!last) return null;
          const x = pad + (last[0] / (catPts.length - 1)) * (W - pad * 2);
          const y = H - pad - ((last[1] / 40)) * (H - pad * 2);
          return <circle cx={x} cy={y} r={3} fill="#F59E0B" />;
        })()}
        {showACT && hasACT && (() => {
          const last = actPts.map((v, i) => v !== null ? [i, v] : null).filter(Boolean).pop();
          if (!last) return null;
          const x = pad + (last[0] / (actPts.length - 1)) * (W - pad * 2);
          const y = H - pad - (((last[1] - 5) / 20)) * (H - pad * 2);
          return <circle cx={x} cy={y} r={3} fill="#3B82F6" />;
        })()}
      </svg>
      <div style={{ fontSize: 10, color: '#6B7280', lineHeight: 1.8 }}>
        {showCAT && hasCAT && <div style={{ color: '#D97706' }}>CAT {catPts.filter(Boolean).at(-1)}</div>}
        {showACT && hasACT && <div style={{ color: '#3B82F6' }}>ACT {actPts.filter(Boolean).at(-1)}</div>}
        <div style={{ color: '#9CA3AF', fontSize: 9 }}>{sorted.length} visits</div>
      </div>
    </div>
  );
}

// ── PatientList ───────────────────────────────────────
function PatientList({ data, onDataChange, navigate }) {
  const [search, setSearch]     = pvState('');
  const [filterDx, setFilterDx] = pvState('');
  const [filterRisk, setFilterRisk] = pvState('');
  const [sortKey, setSortKey]   = pvState('name');
  const [sortAsc, setSortAsc]   = pvState(true);
  const [addOpen, setAddOpen]   = pvState(false);
  const [editPt, setEditPt]     = pvState(null);
  const [delId, setDelId]       = pvState(null);
  const [csvOpen, setCsvOpen]   = pvState(false);
  const [csvText, setCsvText]   = pvState('');
  const [csvPreview, setCsvPreview] = pvState(null);
  const [csvError, setCsvError] = pvState('');
  const [page, setPage]         = pvState(1);
  const PAGE_SIZE = 20;

  const parseCSV = (text) => {
    const lines = text.trim().split('\n').filter(l => l.trim());
    if (lines.length < 2) return { error: 'ไฟล์ CSV ต้องมีหัวตารางอย่างน้อย 1 แถวข้อมูล' };
    const headers = lines[0].split(',').map(h => h.trim().replace(/"/g, '').toLowerCase());
    const rows = lines.slice(1).map(line => {
      const vals = line.split(',').map(v => v.trim().replace(/"/g, ''));
      const obj = {};
      headers.forEach((h, j) => { obj[h] = vals[j] || ''; });
      return {
        hn:        obj['hn'] || obj['hn_no'] || '',
        prefix:    obj['prefix'] || obj['คำนำหน้า'] || 'นาย',
        firstName: obj['firstname'] || obj['ชื่อ'] || '',
        lastName:  obj['lastname'] || obj['นามสกุล'] || '',
        age:       parseInt(obj['age'] || obj['อายุ']) || 0,
        gender:    (obj['gender'] || 'M').toUpperCase().startsWith('F') ? 'F' : 'M',
        diagnosis: obj['diagnosis'] || obj['โรค'] || 'COPD',
        phone:     obj['phone'] || obj['โทร'] || '',
        insurance: obj['insurance'] || obj['สิทธิ์'] || 'UC (บัตรทอง)',
        comorbidities: [], allergies: ['NKDA (ไม่แพ้ยา)'], allergyDetail: '',
        eGFR: null, weight: null, smokingStatus: 'Unknown', packYears: null,
        vaccinations: { flu: '', pcv13: '', ppsv23: '', covid: '' },
      };
    }).filter(r => r.hn && r.firstName);
    if (rows.length === 0) return { error: 'ไม่พบข้อมูลที่ถูกต้อง — ตรวจสอบว่ามีคอลัมน์ HN และ FirstName' };
    return { rows };
  };

  const handleCSVPreview = () => {
    const result = parseCSV(csvText);
    if (result.error) { setCsvError(result.error); setCsvPreview(null); }
    else { setCsvPreview(result.rows); setCsvError(''); }
  };

  const handleCSVImport = () => {
    if (!csvPreview || csvPreview.length === 0) return;
    // กรอง HN ที่ซ้ำกับในระบบ และซ้ำกันเองในไฟล์
    const existingHN = new Set(data.patients.map(p => (p.hn || '').trim()));
    const seen = new Set();
    const accepted = [], skipped = [];
    csvPreview.forEach(row => {
      const hn = (row.hn || '').trim();
      if (existingHN.has(hn) || seen.has(hn)) { skipped.push(hn); return; }
      seen.add(hn); accepted.push(row);
    });
    const newPts = accepted.map(row => ({
      ...row, id: AppStore.generateId(),
      createdAt: new Date().toISOString().slice(0, 10),
      isHighRisk: false, riskLevel: 'Low', riskFlags: [], nextTelepharmacy: null,
    }));
    onDataChange({ ...data, patients: [...data.patients, ...newPts] });
    setCsvOpen(false); setCsvText(''); setCsvPreview(null); setCsvError('');
    const msg = skipped.length > 0
      ? `นำเข้า ${newPts.length} ราย · ข้าม ${skipped.length} ราย (HN ซ้ำ)`
      : `นำเข้า ${newPts.length} ผู้ป่วยจาก CSV สำเร็จ`;
    window.rxToast?.(msg, skipped.length > 0 ? 'warning' : 'success', 4500);
  };

  const filtered = data.patients.filter(p => {
    const q = search.toLowerCase();
    const nameMatch = (p.firstName + ' ' + p.lastName + ' ' + p.hn).toLowerCase().includes(q);
    const dxMatch   = !filterDx   || p.diagnosis === filterDx;
    const riskMatch = !filterRisk || p.riskLevel  === filterRisk;
    return nameMatch && dxMatch && riskMatch;
  });
  // Reset page when filters change (via useEffect equivalent — computed value)
  const filterSig = search + filterDx + filterRisk;

  const riskOrder = { High: 0, Medium: 1, Low: 2 };
  const sorted = [...filtered].sort((a, b) => {
    let av, bv;
    if (sortKey === 'name')      { av = a.firstName; bv = b.firstName; }
    else if (sortKey === 'hn')   { av = a.hn;        bv = b.hn; }
    else if (sortKey === 'risk') { av = riskOrder[a.riskLevel] ?? 3; bv = riskOrder[b.riskLevel] ?? 3; }
    else if (sortKey === 'last') {
      const vs = id => data.visits.filter(v => v.patientId === id).sort((x,y) => y.visitDate.localeCompare(x.visitDate));
      av = vs(a.id)[0]?.visitDate || '0000'; bv = vs(b.id)[0]?.visitDate || '0000';
    }
    if (typeof av === 'number') return sortAsc ? av - bv : bv - av;
    return sortAsc ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
  });

  pvEffect(() => { setPage(1); }, [filterSig, sortKey]);
  const totalPages = Math.max(1, Math.ceil(sorted.length / PAGE_SIZE));
  const paginated  = sorted.slice((page - 1) * PAGE_SIZE, page * PAGE_SIZE);
  const toggleSort = (key) => { if (sortKey === key) setSortAsc(v => !v); else { setSortKey(key); setSortAsc(true); } };
  const SortIcon = ({ k }) => sortKey !== k ? <span style={{ opacity: 0.3, marginLeft: 3 }}>↕</span>
    : <span style={{ marginLeft: 3 }}>{sortAsc ? '↑' : '↓'}</span>;

  const handleAdd = (formData) => {
    // กัน HN ซ้ำ
    const dup = data.patients.find(p => p.hn && formData.hn && p.hn.trim() === formData.hn.trim());
    if (dup) {
      window.rxToast?.(`HN ${formData.hn} มีอยู่แล้ว (${dup.prefix}${dup.firstName} ${dup.lastName})`, 'error', 4500);
      return;
    }
    const risk = AppStore.calculateRisk(formData, null);
    const newPt = {
      ...formData,
      id: AppStore.generateId(), createdAt: new Date().toISOString().slice(0, 10),
      isHighRisk: risk.level === 'High', riskLevel: risk.level,
      riskFlags: risk.flags, nextTelepharmacy: null,
    };
    onDataChange({ ...data, patients: [...data.patients, newPt] });
    setAddOpen(false);
    window.rxToast?.(`เพิ่มผู้ป่วย ${formData.prefix}${formData.firstName} ${formData.lastName} สำเร็จ`, 'success');
  };

  const handleEdit = (formData) => {
    // กัน HN ซ้ำกับผู้ป่วยรายอื่น
    const dup = data.patients.find(p => p.id !== editPt.id && p.hn && formData.hn && p.hn.trim() === formData.hn.trim());
    if (dup) {
      window.rxToast?.(`HN ${formData.hn} ซ้ำกับ ${dup.prefix}${dup.firstName} ${dup.lastName}`, 'error', 4500);
      return;
    }
    const risk = AppStore.calculateRisk(formData, null);
    const updated = data.patients.map(p => p.id === editPt.id
      ? { ...p, ...formData, isHighRisk: risk.level === 'High', riskLevel: risk.level, riskFlags: risk.flags }
      : p);
    onDataChange({ ...data, patients: updated });
    setEditPt(null);
    window.rxToast?.(`แก้ไขข้อมูล ${formData.prefix}${formData.firstName} ${formData.lastName} สำเร็จ`, 'success');
  };

  const handleDelete = (id) => {
    onDataChange({
      ...data,
      patients:     data.patients.filter(p => p.id !== id),
      visits:       data.visits.filter(v => v.patientId !== id),
      telepharmacy: data.telepharmacy.filter(t => t.patientId !== id),
    });
    setDelId(null);
  };

  const getLastVisit = (id) => {
    const vs = data.visits.filter(v => v.patientId === id).sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    return vs[0]?.visitDate || null;
  };
  const daysAgo = (d) => d ? Math.floor((Date.now() - new Date(d).getTime()) / 86400000) : null;

  const cols = [
    {
      key: 'hn', label: <span style={{ cursor: 'pointer', userSelect: 'none' }} onClick={() => toggleSort('hn')}>HN<SortIcon k="hn" /></span>, width: 110,
      render: p => <span style={{ fontFamily: 'monospace', fontWeight: 600, fontSize: 12 }}>{p.hn}</span>,
    },
    {
      key: 'name', label: <span style={{ cursor: 'pointer', userSelect: 'none' }} onClick={() => toggleSort('name')}>ชื่อ-นามสกุล<SortIcon k="name" /></span>,
      render: p => (
        <div>
          <div style={{ fontWeight: 600, color: C.text }}>{p.prefix}{p.firstName} {p.lastName}</div>
          <div style={{ fontSize: 11, color: C.textMuted }}>อายุ {p.age} ปี · {p.gender === 'M' ? 'ชาย' : 'หญิง'}</div>
        </div>
      ),
    },
    {
      key: 'diagnosis', label: 'การวินิจฉัย',
      render: p => (
        <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
          <DiagBadge diagnosis={p.diagnosis} />
          {p.goldGrade && <span style={{ fontSize: 11, color: C.textMuted }}>GOLD {p.goldGrade}</span>}
          {p.asthmaControl && <span style={{ fontSize: 11, color: C.textMuted }}>{p.asthmaControl}</span>}
        </div>
      ),
    },
    {
      key: 'risk', label: <span style={{ cursor: 'pointer', userSelect: 'none' }} onClick={() => toggleSort('risk')}>ความเสี่ยง<SortIcon k="risk" /></span>, width: 150,
      render: p => <RiskBadge level={p.riskLevel || 'Low'} />,
    },
    {
      key: 'insurance', label: 'สิทธิ์', width: 120,
      render: p => <span style={{ fontSize: 12 }}>{p.insurance}</span>,
    },
    {
      key: 'trend', label: 'Trend', width: 230,
      render: p => {
        const ptVisits = (data.visits || []).filter(v => v.patientId === p.id);
        return <PatientTrendChart visits={ptVisits} diagnosis={p.diagnosis} />;
      },
    },
    {
      key: 'lastVisit', label: <span style={{ cursor: 'pointer', userSelect: 'none' }} onClick={() => toggleSort('last')}>เยี่ยมล่าสุด<SortIcon k="last" /></span>, width: 150,
      render: p => {
        const d = getLastVisit(p.id);
        const da = daysAgo(d);
        if (!d) return <span style={{ fontSize: 11, color: '#0369A1', fontWeight: 600 }}>🆕 ผู้ป่วยใหม่</span>;
        const color = da > 90 ? C.high : da > 30 ? C.medium : C.low;
        return (
          <div>
            <div style={{ fontSize: 12, color: C.text }}>{d}</div>
            <div style={{ fontSize: 11, color, fontWeight: 600 }}>{da} วันก่อน</div>
          </div>
        );
      },
    },
    {
      key: 'actions', label: '', width: 180, align: 'right',
      render: p => (
        <div style={{ display: 'flex', gap: 6, justifyContent: 'flex-end' }}>
          <Btn size="sm" variant="accent" onClick={() => navigate('visit-form', p.id)}>+ บันทึก</Btn>
          <Btn size="sm" variant="ghost"  onClick={() => navigate('history', p.id)}>ประวัติ</Btn>
          <Btn size="sm" variant="ghost"  onClick={() => setEditPt(p)}>แก้ไข</Btn>
          <Btn size="sm" variant="danger" onClick={() => setDelId(p.id)}>ลบ</Btn>
        </div>
      ),
    },
  ];

  const highRiskCount   = data.patients.filter(p => p.riskLevel === 'High').length;
  const mediumRiskCount = data.patients.filter(p => p.riskLevel === 'Medium').length;

  return (
    <div>
      <SmartAlertBanner data={data} navigate={navigate} />
      <SectionHeader
        title="ทะเบียนผู้ป่วย"
        subtitle={`ผู้ป่วยทั้งหมด ${data.patients.length} ราย · High Risk ${highRiskCount} ราย · Medium Risk ${mediumRiskCount} ราย`}
        action={<div style={{ display: 'flex', gap: 8 }}>
          <Btn variant="ghost" onClick={() => setCsvOpen(true)}>📥 Import CSV</Btn>
          <Btn variant="primary" onClick={() => setAddOpen(true)}>+ เพิ่มผู้ป่วย</Btn>
        </div>}
      />

      {/* Filters */}
      <Card style={{ marginBottom: 16, padding: '14px 20px' }}>
        <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'center' }}>
          <div style={{ flex: 1, minWidth: 200 }}>
            <Input value={search} onChange={setSearch} placeholder="🔍  ค้นหา HN / ชื่อ-นามสกุล..." />
          </div>
          <Select value={filterDx} onChange={setFilterDx} placeholder="ทุกการวินิจฉัย"
            options={[
              { value: 'COPD', label: 'COPD' },
              { value: 'Asthma', label: 'Asthma' },
              { value: 'Both', label: 'COPD + Asthma' },
            ]}
            style={{ width: 180 }} />
          <Select value={filterRisk} onChange={setFilterRisk} placeholder="ทุกระดับความเสี่ยง"
            options={[
              { value: 'High',   label: 'High Risk' },
              { value: 'Medium', label: 'Medium Risk' },
              { value: 'Low',    label: 'Low Risk' },
            ]}
            style={{ width: 200 }} />
          {(search || filterDx || filterRisk) && (
            <Btn size="sm" variant="ghost" onClick={() => { setSearch(''); setFilterDx(''); setFilterRisk(''); }}>
              ล้างตัวกรอง
            </Btn>
          )}
        </div>
        {/* Quick risk filter chips */}
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginTop: 12 }}>
          {[
            { v: '',       label: `ทั้งหมด ${data.patients.length}`, c: C.textMuted },
            { v: 'High',   label: `🔴 เสี่ยงสูง ${highRiskCount}`,   c: C.high },
            { v: 'Medium', label: `🟠 ปานกลาง ${mediumRiskCount}`,   c: C.medium },
            { v: 'Low',    label: `🟢 เสี่ยงต่ำ ${data.patients.filter(p => p.riskLevel === 'Low').length}`, c: C.low },
          ].map(chip => {
            const active = filterRisk === chip.v;
            return (
              <button key={chip.v} onClick={() => setFilterRisk(chip.v)} style={{
                padding: '5px 13px', borderRadius: 20, fontSize: 12, fontWeight: 600, cursor: 'pointer',
                fontFamily: 'Sarabun, sans-serif', transition: 'all 0.15s',
                background: active ? chip.c : '#fff',
                color: active ? '#fff' : chip.c,
                border: `1.5px solid ${active ? chip.c : C.border}`,
              }}>{chip.label}</button>
            );
          })}
        </div>
      </Card>

      {/* Table */}
      <Card padding={0}>
        <Table cols={cols} rows={paginated}
          emptyIcon="👤" emptyTitle={search || filterDx || filterRisk ? 'ไม่พบผู้ป่วยที่ตรงกับตัวกรอง' : 'ยังไม่มีผู้ป่วยในระบบ'}
          emptySubtitle={search || filterDx || filterRisk ? 'ลองเปลี่ยนคำค้นหาหรือล้างตัวกรอง' : 'เริ่มต้นโดยเพิ่มผู้ป่วยรายแรกของคุณ'}
          emptyAction={search || filterDx || filterRisk
            ? <Btn variant="ghost" onClick={() => { setSearch(''); setFilterDx(''); setFilterRisk(''); }}>ล้างตัวกรอง</Btn>
            : <Btn variant="primary" onClick={() => setAddOpen(true)}>+ เพิ่มผู้ป่วยรายแรก</Btn>} />
        {totalPages > 1 && (
          <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, padding: '10px 16px', borderTop: `1px solid ${C.border}` }}>
            <button onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1}
              style={{ padding: '5px 12px', borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface, color: page===1?C.textMuted:C.text, cursor: page===1?'default':'pointer', fontFamily: 'inherit', fontSize: 12 }}>← ก่อนหน้า</button>
            {Array.from({ length: totalPages }, (_, i) => i+1).filter(p => p===1 || p===totalPages || Math.abs(p-page)<=1).reduce((acc, p, i, arr) => {
              if (i > 0 && arr[i-1] < p-1) acc.push(<span key={`e${p}`} style={{ fontSize: 12, color: C.textMuted }}>…</span>);
              acc.push(<button key={p} onClick={() => setPage(p)} style={{ width: 32, height: 32, borderRadius: 6, border: `1px solid ${p===page?C.primary:C.border}`, background: p===page?C.primary:C.surface, color: p===page?'#fff':C.text, cursor: 'pointer', fontWeight: p===page?700:400, fontSize: 12 }}>{p}</button>);
              return acc;
            }, [])}
            <button onClick={() => setPage(p => Math.min(totalPages, p+1))} disabled={page === totalPages}
              style={{ padding: '5px 12px', borderRadius: 6, border: `1px solid ${C.border}`, background: C.surface, color: page===totalPages?C.textMuted:C.text, cursor: page===totalPages?'default':'pointer', fontFamily: 'inherit', fontSize: 12 }}>ถัดไป →</button>
            <span style={{ fontSize: 11, color: C.textMuted, marginLeft: 6 }}>{(page-1)*PAGE_SIZE+1}–{Math.min(page*PAGE_SIZE, sorted.length)} จาก {sorted.length}</span>
          </div>
        )}
      </Card>

      {/* CSV Import Modal */}
      <Modal open={csvOpen} onClose={() => { setCsvOpen(false); setCsvText(''); setCsvPreview(null); setCsvError(''); }}
        title="📥 Import ผู้ป่วยจาก CSV" width={680}>
        <p style={{ margin: '0 0 8px', fontSize: 13, color: C.text }}>
          วางข้อมูล CSV ด้านล่าง (คั่นด้วย comma)
        </p>
        <div style={{ margin: '0 0 8px', padding: '8px 10px', background: '#F8FAFC', borderRadius: 6, fontSize: 11, fontFamily: 'monospace', color: C.textMuted }}>
          หัวตาราง: HN,Prefix,FirstName,LastName,Age,Gender,Diagnosis,Phone,Insurance
        </div>
        <textarea value={csvText} onChange={e => setCsvText(e.target.value)}
          placeholder={'HN,Prefix,FirstName,LastName,Age,Gender,Diagnosis,Phone\n67-001234,นาย,สมชาย,ใจดี,65,M,COPD,081-234-5678'}
          rows={6} style={{
            width: '100%', padding: '8px 10px', borderRadius: 7, border: `1px solid ${C.border}`,
            fontSize: 12, fontFamily: 'monospace', resize: 'vertical', boxSizing: 'border-box', marginBottom: 8,
          }} />
        {csvError && <p style={{ color: C.high, fontSize: 12, margin: '0 0 8px' }}>⚠ {csvError}</p>}
        <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
          <Btn variant="ghost" onClick={handleCSVPreview}>🔍 ดูตัวอย่าง</Btn>
          {csvPreview && csvPreview.length > 0 && (
            <Btn variant="primary" onClick={handleCSVImport}>✅ Import {csvPreview.length} ราย</Btn>
          )}
        </div>
        {csvPreview && csvPreview.length > 0 && (
          <div style={{ overflowX: 'auto', maxHeight: 220, overflowY: 'auto', border: `1px solid ${C.border}`, borderRadius: 7 }}>
            <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
              <thead><tr style={{ background: '#F8FAFC' }}>
                {['HN','ชื่อ','อายุ','เพศ','โรค','โทร','สิทธิ์'].map(h => (
                  <th key={h} style={{ padding: '7px 10px', textAlign: 'left', borderBottom: `1px solid ${C.border}`, color: C.textMuted, fontWeight: 600, fontSize: 11 }}>{h}</th>
                ))}
              </tr></thead>
              <tbody>{csvPreview.map((r, i) => (
                <tr key={i} style={{ borderBottom: `1px solid ${C.border}` }}>
                  <td style={{ padding: '6px 10px', fontFamily: 'monospace' }}>{r.hn}</td>
                  <td style={{ padding: '6px 10px' }}>{r.prefix}{r.firstName} {r.lastName}</td>
                  <td style={{ padding: '6px 10px' }}>{r.age}</td>
                  <td style={{ padding: '6px 10px' }}>{r.gender === 'F' ? 'หญิง' : 'ชาย'}</td>
                  <td style={{ padding: '6px 10px' }}>{r.diagnosis}</td>
                  <td style={{ padding: '6px 10px' }}>{r.phone}</td>
                  <td style={{ padding: '6px 10px' }}>{r.insurance}</td>
                </tr>
              ))}</tbody>
            </table>
          </div>
        )}
      </Modal>

      {/* Add modal */}
      <Modal open={addOpen} onClose={() => setAddOpen(false)} title="เพิ่มผู้ป่วยใหม่" width={720}>
        <PatientForm onSave={handleAdd} onClose={() => setAddOpen(false)} />
      </Modal>

      {/* Edit modal */}
      <Modal open={!!editPt} onClose={() => setEditPt(null)} title="แก้ไขข้อมูลผู้ป่วย" width={720}>
        {editPt && <PatientForm patient={editPt} onSave={handleEdit} onClose={() => setEditPt(null)} />}
      </Modal>

      {/* Delete confirm */}
      <ConfirmModal open={!!delId} onClose={() => setDelId(null)}
        onConfirm={() => handleDelete(delId)}
        title="ยืนยันการลบผู้ป่วย"
        message="ข้อมูลผู้ป่วย ประวัติการเยี่ยม และบันทึก Telepharmacy ทั้งหมดจะถูกลบ ไม่สามารถกู้คืนได้"
        danger />
    </div>
  );
}

// ── VisitHistory (per patient) ────────────────────────
function VisitHistory({ data, patientId, navigate, onEditVisit }) {
  const patient = data.patients.find(p => p.id === patientId);
  const visits  = data.visits.filter(v => v.patientId === patientId)
    .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
  const tele    = data.telepharmacy.filter(t => t.patientId === patientId)
    .sort((a, b) => b.scheduledDate.localeCompare(a.scheduledDate));

  const [tab, setTab]       = pvState('visits');
  const [visitFilter, setVF] = pvState('all');
  const [visitSearch, setVisitSearch] = pvState('');

  if (!patient) return (
    <EmptyState icon="❓" title="ไม่พบข้อมูลผู้ป่วย" subtitle="กลับไปที่ทะเบียนผู้ป่วย" />
  );

  return (
    <div>
      {/* Allergy banner — always at top */}
      <div style={{ marginBottom: 12 }}>
        <AllergyBanner patient={patient} />
      </div>

      {/* Patient header */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 20 }}>
        <Btn size="sm" variant="ghost" onClick={() => navigate('patients')}>← กลับ</Btn>
        <div>
          <h2 style={{ margin: 0, fontSize: 20, fontWeight: 700, color: C.primary }}>
            {patient.prefix}{patient.firstName} {patient.lastName}
          </h2>
          <p style={{ margin: '2px 0 0', fontSize: 13, color: C.textMuted }}>
            HN: {patient.hn} · อายุ {patient.age} ปี · {patient.insurance}
          </p>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', gap: 8, alignItems: 'center' }}>
          <DiagBadge diagnosis={patient.diagnosis} />
          <RiskBadge level={patient.riskLevel || 'Low'} />
          <Btn size="sm" variant="accent" onClick={() => navigate('visit-form', patientId)}>+ บันทึกการเยี่ยมใหม่</Btn>
          <Btn size="sm" variant="ghost" onClick={() => printPatientReport(patient, data.visits, data.telepharmacy)}>
            🖨️ สรุปผู้ป่วย
          </Btn>
          {visits[0] && (
            <Btn size="sm" variant="ghost" onClick={() => printPatientTakeHome(patient, visits[0])}>
              📄 สรุปกลับบ้าน
            </Btn>
          )}
          <Btn size="sm" variant="ghost" onClick={() => typeof window.printDRPReport === 'function' && window.printDRPReport(patient, data.visits)}>
            📊 DRP Report
          </Btn>
          {visits[0] && (
            <Btn size="sm" variant="ghost" onClick={() => window.copyLineMessage?.(window.buildLineFollowup(patient, visits[0], data.clinicCode))}>
              💬 LINE สรุป
            </Btn>
          )}
          <Btn size="sm" variant="ghost" onClick={() => window.printPatientQRCard?.(patient)}>
            🏷️ บัตร QR
          </Btn>
        </div>
      </div>

      {/* Patient summary card */}
      <Card style={{ marginBottom: 20 }}>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 20 }}>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>การวินิจฉัย</div>
            <div style={{ marginTop: 4, fontSize: 13, fontWeight: 600 }}>
              {patient.diagnosis}
              {patient.goldGrade && ` — GOLD ${patient.goldGrade}`}
              {patient.asthmaControl && ` — ${patient.asthmaControl}`}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>โรคร่วม</div>
            <div style={{ marginTop: 4, fontSize: 13 }}>
              {patient.comorbidities?.length > 0 ? patient.comorbidities.join(', ') : '—'}
            </div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>เบอร์โทร</div>
            <div style={{ marginTop: 4, fontSize: 13, fontWeight: 600 }}>{patient.phone}</div>
          </div>
          <div>
            <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, textTransform: 'uppercase', letterSpacing: '0.04em' }}>ปัจจัยเสี่ยง</div>
            <div style={{ marginTop: 4, display: 'flex', flexDirection: 'column', gap: 3 }}>
              {(patient.riskFlags || []).length > 0
                ? patient.riskFlags.map((f, i) => (
                    <span key={i} style={{ fontSize: 11, color: C.high }}>• {f}</span>
                  ))
                : <span style={{ fontSize: 12, color: C.textMuted }}>ไม่มีปัจจัยเสี่ยง</span>}
            </div>
          </div>
        </div>
        {/* Status row */}
        <div style={{ marginTop: 14, paddingTop: 12, borderTop: `1px solid ${C.border}`, display: 'flex', gap: 10, alignItems: 'center', flexWrap: 'wrap' }}>
          {patient.eGFR != null && patient.eGFR !== '' && (
            <RenalAlert patient={patient} medications={[]} compact />
          )}
          <SmokingBadge status={patient.smokingStatus} packYears={patient.packYears} compact />
          <VaccinationStatus patient={patient} compact />
        </div>
      </Card>

      {/* Trends */}
      {visits.length >= 2 && <TrendsSection visits={visits} />}

      {/* Tabs */}
      <Tabs
        tabs={[
          { id: 'visits',   label: `บันทึกการเยี่ยม (${visits.length})` },
          { id: 'outcomes', label: '📊 ผลลัพธ์' },
          { id: 'medtimeline', label: '💊 Timeline ยา' },
          { id: 'tele',     label: `Telepharmacy (${tele.length})` },
        ]}
        active={tab} onChange={setTab}
      />

      {tab === 'visits' && (
        <>
          {/* Search within visits */}
          {visits.length > 0 && (
            <div style={{ marginBottom: 10 }}>
              <Input value={visitSearch} onChange={setVisitSearch}
                placeholder="🔍  ค้นหาใน SOAP, ยา, DRP, อาการ (เช่น 'exacerbation', 'Salbutamol')..." />
            </div>
          )}
          {/* Filter bar */}
          {visits.length > 0 && (
            <div style={{ display: 'flex', gap: 6, marginBottom: 12, flexWrap: 'wrap' }}>
              {[
                { v: 'all',          l: `ทั้งหมด (${visits.length})` },
                { v: 'drp',          l: `มี DRP (${visits.filter(x => x.drp?.noDRP === false).length})` },
                { v: 'exacerbation', l: `Exacerbation (${visits.filter(x => (x.exacerbation?.countThisYear || 0) > 0).length})` },
                { v: 'high-risk',    l: `High Risk (${visits.filter(x => x.riskLevel === 'High').length})` },
              ].map(({ v, l }) => (
                <button key={v} onClick={() => setVF(v)} style={{
                  padding: '5px 12px', borderRadius: 6, fontSize: 12, fontWeight: 600,
                  border: `1px solid ${visitFilter === v ? C.primary : C.border}`,
                  background: visitFilter === v ? C.primary : '#fff',
                  color: visitFilter === v ? '#fff' : C.text, cursor: 'pointer', fontFamily: 'inherit',
                }}>{l}</button>
              ))}
            </div>
          )}
          {/* List */}
          {(() => {
            let fv = visitFilter === 'drp'          ? visits.filter(x => x.drp?.noDRP === false)
                     : visitFilter === 'exacerbation' ? visits.filter(x => (x.exacerbation?.countThisYear || 0) > 0)
                     : visitFilter === 'high-risk'    ? visits.filter(x => x.riskLevel === 'High')
                     : visits;
            if (visitSearch.trim()) {
              const q = visitSearch.toLowerCase();
              fv = fv.filter(v => {
                const hay = [
                  v.chiefComplaint, v.soap?.s, v.soap?.o, v.soap?.a, v.soap?.p, v.pharmacistNote,
                  ...(v.medications || []).map(m => m.name),
                  ...(v.drp?.items || []),
                ].filter(Boolean).join(' ').toLowerCase();
                return hay.includes(q);
              });
            }
            if (fv.length === 0) return <EmptyState icon="🔍" title="ไม่พบ Visit ที่ตรงกับการค้นหา" subtitle="ลองเปลี่ยนคำค้นหาหรือตัวกรอง" />;
            return (
              <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
                {fv.map(v => (
                <Card key={v.id} style={{ padding: '16px 20px' }}>
                  <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', marginBottom: 12 }}>
                    <div>
                      <span style={{ fontSize: 14, fontWeight: 700, color: C.primary }}>{v.visitDate}</span>
                      <span style={{ marginLeft: 10, fontSize: 12, color: C.textMuted }}>{v.pharmacist}</span>
                    </div>
                    <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                      <RiskBadge level={v.riskLevel} />
                      <Btn size="sm" variant="ghost" onClick={() => typeof window.printVisitSOAP === 'function' && window.printVisitSOAP(patient, v)} title="พิมพ์ SOAP note">🖨️</Btn>
                      <Btn size="sm" variant="ghost" onClick={() => onEditVisit && onEditVisit(v.id)}>✏️ แก้ไข</Btn>
                    </div>
                  </div>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 12 }}>
                    <div>
                      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>EXACERBATION</div>
                      <div style={{ fontSize: 13 }}>
                        {v.exacerbation?.countThisYear ?? 0} ครั้ง/ปี
                        {v.exacerbation?.hospitalized && <span style={{ marginLeft: 6, color: C.high, fontSize: 11 }}>นอน รพ.</span>}
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>ADHERENCE</div>
                      <AdherenceBadge level={v.adherence?.level} />
                    </div>
                    <div>
                      <div style={{ fontSize: 11, color: C.textMuted, fontWeight: 600, marginBottom: 3 }}>เทคนิคยาพ่น</div>
                      {(v.inhalerTechnique || []).map((t, i) => (
                        <span key={i} style={{ marginRight: 6 }}>
                          <TechniqueBadge score={t.overallScore} />
                        </span>
                      ))}
                      {(!v.inhalerTechnique || v.inhalerTechnique.length === 0) && <span style={{ fontSize: 12, color: C.textMuted }}>—</span>}
                    </div>
                  </div>
                  {v.soap?.a && (
                    <div style={{ background: '#F8FAFC', borderRadius: 7, padding: '10px 14px', fontSize: 13, color: C.text, borderLeft: `3px solid ${C.accent}` }}>
                      <strong style={{ color: C.primary }}>A:</strong> {v.soap.a}
                    </div>
                  )}
                  {v.soap?.p && (
                    <div style={{ marginTop: 6, background: '#F0FDF4', borderRadius: 7, padding: '10px 14px', fontSize: 13, color: C.text, borderLeft: `3px solid ${C.low}`, whiteSpace: 'pre-wrap' }}>
                      <strong style={{ color: C.low }}>P:</strong> {v.soap.p}
                    </div>
                  )}
                  {v.drp?.noDRP === false && v.drp?.items?.length > 0 && (
                    <div style={{ marginTop: 6, padding: '8px 14px', background: C.highBg, borderRadius: 7, borderLeft: `3px solid ${C.high}` }}>
                      <div style={{ fontSize: 11, fontWeight: 700, color: C.high, marginBottom: 4 }}>DRP:</div>
                      {v.drp.items.map((d, i) => (
                        <div key={i} style={{ fontSize: 12, color: C.text, lineHeight: 1.5 }}>⚠ {d}</div>
                      ))}
                    </div>
                  )}
                  {v.riskFlags && v.riskFlags.length > 0 && (
                    <div style={{ marginTop: 10, display: 'flex', gap: 6, flexWrap: 'wrap' }}>
                      {v.riskFlags.map((f, i) => (
                        <span key={i} style={{
                          fontSize: 11, padding: '2px 8px', borderRadius: 20,
                          background: C.highBg, color: C.high, border: `1px solid ${C.highBorder}`,
                        }}>⚠ {f}</span>
                      ))}
                    </div>
                  )}
                </Card>
              ))}
            </div>
            );
          })()}
        </>
      )}

      {tab === 'medtimeline' && (() => {
        // Build unique drug list across all visits (sorted oldest→newest)
        const sorted2 = [...visits].sort((a, b) => a.visitDate.localeCompare(b.visitDate));
        const allDrugs = [...new Set(sorted2.flatMap(v => (v.medications || []).map(m => m.name).filter(Boolean)))].sort();
        if (allDrugs.length === 0) return <EmptyState icon="💊" title="ยังไม่มีข้อมูลยา" subtitle="บันทึก Visit พร้อมรายการยาเพื่อดู timeline" />;
        return (
          <Card padding={0}>
            <div style={{ overflowX: 'auto' }}>
              <table style={{ borderCollapse: 'collapse', fontSize: 12, minWidth: '100%' }}>
                <thead>
                  <tr style={{ background: '#F8FAFC' }}>
                    <th style={{ padding: '10px 14px', textAlign: 'left', borderBottom: `1px solid ${C.border}`, fontWeight: 700, color: C.primary, whiteSpace: 'nowrap', position: 'sticky', left: 0, background: '#F8FAFC', zIndex: 1, minWidth: 160 }}>💊 ยา</th>
                    {sorted2.map(v => (
                      <th key={v.id} style={{ padding: '8px 10px', textAlign: 'center', borderBottom: `1px solid ${C.border}`, fontWeight: 600, color: C.textMuted, whiteSpace: 'nowrap', minWidth: 90 }}>{v.visitDate}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {allDrugs.map(drug => {
                    const firstIdx = sorted2.findIndex(v => (v.medications || []).some(m => m.name === drug));
                    return (
                      <tr key={drug} style={{ borderBottom: `1px solid ${C.border}` }}>
                        <td style={{ padding: '8px 14px', fontWeight: 600, color: C.text, position: 'sticky', left: 0, background: '#fff', zIndex: 1, whiteSpace: 'nowrap' }}>{drug}</td>
                        {sorted2.map((v, vi) => {
                          const med = (v.medications || []).find(m => m.name === drug);
                          const prevMed = vi > 0 ? (sorted2[vi-1].medications || []).find(m => m.name === drug) : null;
                          const isNew  = med && !prevMed && vi > firstIdx;
                          const isStopped = !med && prevMed;
                          const adh = med?.adherence;
                          const adhColor = { Good: C.low, Fair: C.medium, Poor: C.high }[adh] || C.textMuted;
                          return (
                            <td key={v.id} style={{ padding: '6px 8px', textAlign: 'center' }}>
                              {med ? (
                                <div title={`${med.dose || ''}${adh ? ` · Adherence: ${adh}` : ''}`} style={{
                                  display: 'inline-flex', flexDirection: 'column', alignItems: 'center', gap: 2,
                                }}>
                                  <span style={{
                                    display: 'inline-block', width: 24, height: 24, borderRadius: '50%',
                                    background: isNew ? '#FEF3C7' : '#DBEAFE',
                                    border: `2px solid ${isNew ? '#F59E0B' : '#3B82F6'}`,
                                    fontSize: 12, lineHeight: '20px', fontWeight: 700, color: isNew ? '#92400E' : '#1E40AF',
                                  }}>{isNew ? '★' : '●'}</span>
                                  {adh && <span style={{ fontSize: 9, color: adhColor, fontWeight: 700 }}>{adh[0]}</span>}
                                  {med.dose && <span style={{ fontSize: 9, color: C.textMuted, maxWidth: 60, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{med.dose}</span>}
                                </div>
                              ) : isStopped ? (
                                <span style={{ color: C.high, fontSize: 16, fontWeight: 700 }} title="หยุดยา">✕</span>
                              ) : (
                                <span style={{ color: C.borderLight }}>—</span>
                              )}
                            </td>
                          );
                        })}
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>
            <div style={{ padding: '10px 16px', borderTop: `1px solid ${C.border}`, display: 'flex', gap: 16, fontSize: 11, color: C.textMuted }}>
              <span><span style={{ color: '#1E40AF', fontWeight: 700 }}>●</span> ใช้ต่อเนื่อง</span>
              <span><span style={{ color: '#92400E', fontWeight: 700 }}>★</span> เพิ่มใหม่</span>
              <span><span style={{ color: C.high, fontWeight: 700 }}>✕</span> หยุดยา</span>
              <span><span style={{ color: C.low }}>G</span>=Good <span style={{ color: C.medium }}>F</span>=Fair <span style={{ color: C.high }}>P</span>=Poor adherence</span>
            </div>
          </Card>
        );
      })()}

      {tab === 'outcomes' && (() => {
        if (visits.length === 0) return <EmptyState icon="📊" title="ยังไม่มีข้อมูล" subtitle="บันทึกการเยี่ยมอย่างน้อย 1 ครั้งเพื่อดูผลลัพธ์" />;
        const sorted = [...visits].sort((a, b) => a.visitDate.localeCompare(b.visitDate));
        // Collect all DRPs per visit
        const drpHistory = sorted.map(v => ({
          date: v.visitDate,
          drps: (typeof window.detectDRP === 'function') ? window.detectDRP(v, patient) : [],
          riskLevel: v.riskLevel,
        }));
        const highDRPVisits = drpHistory.filter(x => x.drps.some(d => d.severity === 'High'));
        const totalDRPsEver = drpHistory.reduce((s, x) => s + x.drps.length, 0);
        const avgDRPPerVisit = sorted.length > 0 ? (totalDRPsEver / sorted.length).toFixed(1) : 0;
        const lastDRPs = drpHistory[drpHistory.length - 1]?.drps || [];

        // CAT/ACT trend data
        const catPts = sorted.map(v => ({ date: v.visitDate, v: v.assessments?.cat?.allAnswered ? v.assessments.cat.score : null })).filter(x => x.v !== null);
        const actPts = sorted.map(v => ({ date: v.visitDate, v: v.assessments?.act?.allAnswered ? v.assessments.act.score : null })).filter(x => x.v !== null);
        // Lab/vitals trend data (FEV1, SpO2, eGFR)
        const numOrNull = (x) => { const n = Number(x); return (x !== '' && x != null && !isNaN(n)) ? n : null; };
        const spo2Pts = sorted.map(v => ({ date: v.visitDate, v: numOrNull(v.vitals?.spO2) })).filter(x => x.v !== null);
        const fev1Pts = sorted.map(v => ({ date: v.visitDate, v: numOrNull(v.vitals?.fev1) })).filter(x => x.v !== null);
        const pefPts  = sorted.map(v => ({ date: v.visitDate, v: numOrNull(v.vitals?.peakFlow) })).filter(x => x.v !== null);

        // Full SVG line chart with zone bands
        const LineChart = ({ pts, minV, maxV, color, zones, title, unit, W = 520, H = 110 }) => {
          const pad = { t: 14, b: 28, l: 36, r: 14 };
          const cW = W - pad.l - pad.r, cH = H - pad.t - pad.b;
          const xOf = (i) => pad.l + (pts.length > 1 ? (i / (pts.length - 1)) * cW : cW / 2);
          const yOf = (v) => pad.t + cH - ((v - minV) / Math.max(maxV - minV, 1)) * cH;
          const pathD = pts.map((p, i) => `${i === 0 ? 'M' : 'L'}${xOf(i).toFixed(1)},${yOf(p.v).toFixed(1)}`).join(' ');
          const areaD = pts.length > 1
            ? `${pathD} L${xOf(pts.length - 1).toFixed(1)},${(pad.t + cH).toFixed(1)} L${xOf(0).toFixed(1)},${(pad.t + cH).toFixed(1)} Z`
            : '';
          const ticks = [minV, Math.round((minV + maxV) / 2), maxV];
          return (
            <div style={{ position: 'relative' }}>
              <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.04em', marginBottom: 6 }}>{title}</div>
              <svg width={W} height={H} style={{ overflow: 'visible', display: 'block' }}>
                {/* Zone bands */}
                {(zones || []).map((z, i) => (
                  <rect key={i}
                    x={pad.l} y={yOf(z.max)}
                    width={cW} height={Math.max(0, yOf(z.min) - yOf(z.max))}
                    fill={z.color} opacity={0.12} />
                ))}
                {/* Grid lines */}
                {ticks.map((t, i) => (
                  <g key={i}>
                    <line x1={pad.l} y1={yOf(t)} x2={pad.l + cW} y2={yOf(t)} stroke={C.border} strokeWidth={1} strokeDasharray="4,3" />
                    <text x={pad.l - 4} y={yOf(t) + 4} textAnchor="end" fontSize={9} fill={C.textMuted}>{t}</text>
                  </g>
                ))}
                {/* Area fill */}
                {areaD && <path d={areaD} fill={color} opacity={0.08} />}
                {/* Line */}
                {pts.length > 1 && <path d={pathD} fill="none" stroke={color} strokeWidth={2.5} strokeLinecap="round" strokeLinejoin="round" />}
                {/* Dots + labels */}
                {pts.map((p, i) => (
                  <g key={i}>
                    <circle cx={xOf(i)} cy={yOf(p.v)} r={4} fill={color} stroke="#fff" strokeWidth={1.5} />
                    <text x={xOf(i)} y={yOf(p.v) - 8} textAnchor="middle" fontSize={9} fill={color} fontWeight="700">{p.v}</text>
                    <text x={xOf(i)} y={H - 2} textAnchor="middle" fontSize={8} fill={C.textMuted}>{p.date.slice(5)}</text>
                  </g>
                ))}
                {/* X axis */}
                <line x1={pad.l} y1={pad.t + cH} x2={pad.l + cW} y2={pad.t + cH} stroke={C.border} strokeWidth={1} />
              </svg>
              {/* Zone legend */}
              {zones && (
                <div style={{ display: 'flex', gap: 12, marginTop: 4 }}>
                  {zones.map((z, i) => (
                    <span key={i} style={{ fontSize: 10, color: z.textColor || C.textMuted, display: 'flex', alignItems: 'center', gap: 4 }}>
                      <span style={{ width: 10, height: 10, borderRadius: 2, background: z.color, display: 'inline-block', opacity: 0.7 }} />
                      {z.label}
                    </span>
                  ))}
                </div>
              )}
            </div>
          );
        };

        return (
          <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
            {/* KPI row */}
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>
              {[
                { icon: '📋', label: 'Visits ทั้งหมด', value: sorted.length, color: C.primary },
                { icon: '⚠️', label: 'DRP สะสม (ทุก visit)', value: totalDRPsEver, color: C.high },
                { icon: '📉', label: 'DRP เฉลี่ย/visit', value: avgDRPPerVisit, color: C.medium },
                { icon: '🔴', label: 'Visit ที่พบ High DRP', value: highDRPVisits.length, color: C.high },
              ].map((k, i) => (
                <div key={i} style={{ padding: '12px 16px', borderRadius: 10, background: `${k.color}08`, border: `1px solid ${k.color}25` }}>
                  <div style={{ fontSize: 18 }}>{k.icon}</div>
                  <div style={{ fontSize: 22, fontWeight: 800, color: k.color, marginTop: 4 }}>{k.value}</div>
                  <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{k.label}</div>
                </div>
              ))}
            </div>

            {/* CAT Chart */}
            {catPts.length > 0 && (
              <Card>
                <LineChart pts={catPts} minV={0} maxV={40} color="#F59E0B" title="CAT Score — COPD Assessment Test (ต่ำ = ดี)" unit="คะแนน"
                  zones={[
                    { min: 0, max: 10, color: '#059669', label: '<10 ผลกระทบต่ำ', textColor: '#059669' },
                    { min: 10, max: 20, color: '#D97706', label: '10–19 ปานกลาง', textColor: '#D97706' },
                    { min: 20, max: 30, color: '#DC2626', label: '20–29 สูง', textColor: '#DC2626' },
                    { min: 30, max: 40, color: '#7F1D1D', label: '30–40 สูงมาก', textColor: '#991B1B' },
                  ]} />
              </Card>
            )}

            {/* ACT Chart */}
            {actPts.length > 0 && (
              <Card>
                <LineChart pts={actPts} minV={5} maxV={25} color="#3B82F6" title="ACT Score — Asthma Control Test (สูง = ดี)" unit="คะแนน"
                  zones={[
                    { min: 5, max: 15, color: '#DC2626', label: '<15 ควบคุมไม่ได้', textColor: '#DC2626' },
                    { min: 15, max: 20, color: '#D97706', label: '15–19 ควบคุมได้บางส่วน', textColor: '#D97706' },
                    { min: 20, max: 25, color: '#059669', label: '≥20 ควบคุมได้ดี', textColor: '#059669' },
                  ]} />
              </Card>
            )}

            {/* Lab Trend — SpO₂ */}
            {spo2Pts.length > 0 && (
              <Card>
                <LineChart pts={spo2Pts} minV={85} maxV={100} color="#0891B2" title="SpO₂ (%) — ความอิ่มตัวออกซิเจน (สูง = ดี)" unit="%"
                  zones={[
                    { min: 85, max: 92, color: '#DC2626', label: '<92 Hypoxemia', textColor: '#DC2626' },
                    { min: 92, max: 95, color: '#D97706', label: '92–94 เฝ้าระวัง', textColor: '#D97706' },
                    { min: 95, max: 100, color: '#059669', label: '≥95 ปกติ', textColor: '#059669' },
                  ]} />
              </Card>
            )}

            {/* Lab Trend — FEV₁ */}
            {fev1Pts.length > 0 && (
              <Card>
                <LineChart pts={fev1Pts} minV={0} maxV={100} color="#7C3AED" title="FEV₁ (% predicted) — สมรรถภาพปอด (สูง = ดี)" unit="%"
                  zones={[
                    { min: 0, max: 30, color: '#7F1D1D', label: '<30 GOLD 4 (Very severe)', textColor: '#991B1B' },
                    { min: 30, max: 50, color: '#DC2626', label: '30–49 GOLD 3 (Severe)', textColor: '#DC2626' },
                    { min: 50, max: 80, color: '#D97706', label: '50–79 GOLD 2 (Moderate)', textColor: '#D97706' },
                    { min: 80, max: 100, color: '#059669', label: '≥80 GOLD 1 (Mild)', textColor: '#059669' },
                  ]} />
              </Card>
            )}

            {/* Lab Trend — Peak Flow */}
            {pefPts.length > 0 && (
              <Card>
                <LineChart pts={pefPts} minV={0} maxV={600} color="#0369A1" title="Peak Flow (L/min) — อัตราการไหลสูงสุด (สูง = ดี)" unit="L/min" />
              </Card>
            )}

            {/* DRP History Timeline */}
            <Card>
              <h4 style={{ margin: '0 0 14px', fontSize: 13, fontWeight: 700, color: C.primary }}>⚠️ ประวัติ DRP ตามการเยี่ยม</h4>
              {drpHistory.every(x => x.drps.length === 0)
                ? <div style={{ color: C.textMuted, fontSize: 13, textAlign: 'center', padding: 24 }}>ไม่พบ DRP ในทุก visit</div>
                : (
                  <div style={{ display: 'flex', flexDirection: 'column', gap: 0 }}>
                    {[...drpHistory].reverse().map((vh, idx) => (
                      <div key={idx} style={{ display: 'flex', gap: 14, paddingBottom: 16, position: 'relative' }}>
                        {/* Timeline spine */}
                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', flexShrink: 0 }}>
                          <div style={{
                            width: 32, height: 32, borderRadius: '50%', display: 'flex', alignItems: 'center', justifyContent: 'center',
                            background: vh.drps.length === 0 ? '#ECFDF5' : vh.drps.some(d => d.severity === 'High') ? '#FEE2E2' : '#FFFBEB',
                            border: `2px solid ${vh.drps.length === 0 ? '#A7F3D0' : vh.drps.some(d => d.severity === 'High') ? '#FCA5A5' : '#FDE68A'}`,
                            fontSize: 14, fontWeight: 700,
                          }}>{vh.drps.length === 0 ? '✓' : vh.drps.length}</div>
                          {idx < drpHistory.length - 1 && <div style={{ width: 2, flex: 1, minHeight: 12, background: C.border, marginTop: 4 }} />}
                        </div>
                        <div style={{ flex: 1, paddingTop: 4 }}>
                          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: vh.drps.length > 0 ? 8 : 0 }}>
                            <span style={{ fontWeight: 700, fontSize: 13, color: C.primary }}>{vh.date}</span>
                            <RiskBadge level={vh.riskLevel || 'Low'} />
                            {vh.drps.length === 0 && <span style={{ fontSize: 11, color: '#059669', fontWeight: 600 }}>✓ ไม่พบ DRP</span>}
                          </div>
                          {vh.drps.map((d, di) => (
                            <div key={di} style={{
                              display: 'flex', gap: 8, alignItems: 'flex-start',
                              padding: '6px 10px', borderRadius: 6, marginBottom: 4,
                              background: d.severity === 'High' ? '#FEF2F2' : d.severity === 'Medium' ? '#FFFBEB' : '#F8FAFC',
                              border: `1px solid ${d.severity === 'High' ? '#FECACA' : d.severity === 'Medium' ? '#FDE68A' : C.border}`,
                            }}>
                              <span style={{ fontSize: 9, fontWeight: 800, padding: '2px 6px', borderRadius: 4, whiteSpace: 'nowrap', marginTop: 1,
                                background: d.severity === 'High' ? '#DC2626' : d.severity === 'Medium' ? '#D97706' : '#64748B',
                                color: '#fff' }}>{d.code}</span>
                              <div style={{ flex: 1, fontSize: 12, color: C.text }}>{d.problemTh}</div>
                              <span style={{ fontSize: 9, fontWeight: 700, color: d.severity === 'High' ? '#DC2626' : d.severity === 'Medium' ? '#D97706' : '#64748B', whiteSpace: 'nowrap' }}>{d.severity}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                )
              }
            </Card>
          </div>
        );
      })()}

      {tab === 'tele' && (
        tele.length === 0
          ? <EmptyState icon="📞" title="ยังไม่มีบันทึก Telepharmacy" />
          : <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
              {tele.map(t => {
                const copyText = [
                  `[Telepharmacy] ${t.actualDate || t.scheduledDate} ${t.callTime || ''}`,
                  `Pt: ${patient.prefix}${patient.firstName} ${patient.lastName} HN:${patient.hn}`,
                  t.symptoms ? `อาการ: ${t.symptoms}` : '',
                  t.exacerbation ? '⚠ มี Exacerbation' : '',
                  t.rescueUse && t.rescueUse !== 'None' ? `Rescue: ${t.rescueUse}` : '',
                  t.medicationProblems ? `ปัญหายา: ${t.medicationProblems}` : '',
                  t.counseling ? `แนะนำ: ${t.counseling}` : '',
                  t.nextFollowup ? `นัดต่อ: ${t.nextFollowup}` : '',
                  t.callDuration > 0 ? `ระยะเวลาโทร: ${Math.floor(t.callDuration/60)}:${String(t.callDuration%60).padStart(2,'0')} นาที` : '',
                ].filter(Boolean).join('\n');
                return (
                  <Card key={t.id} style={{ padding: '16px 20px' }}>
                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
                      <div>
                        <span style={{ fontWeight: 700, color: C.primary }}>นัดโทร: {t.scheduledDate}</span>
                        {t.actualDate && <span style={{ marginLeft: 10, fontSize: 12, color: C.textMuted }}>โทรจริง: {t.actualDate} {t.callTime}</span>}
                        {t.callDuration > 0 && <span style={{ marginLeft: 8, fontSize: 11, color: C.textMuted }}>⏱ {Math.floor(t.callDuration/60)}:{String(t.callDuration%60).padStart(2,'0')} นาที</span>}
                      </div>
                      <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
                        <StatusBadge status={t.status} />
                        <button onClick={() => { navigator.clipboard?.writeText(copyText); }}
                          style={{ padding: '3px 10px', borderRadius: 6, border: `1px solid ${C.border}`, background: '#fff', cursor: 'pointer', fontSize: 11, color: C.textMuted, fontFamily: 'inherit' }}
                          title="คัดลอกสรุปการโทร">📋 Copy</button>
                      </div>
                    </div>
                    {t.status === 'Success' && (
                      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12 }}>
                        {t.symptoms && <div><span style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>อาการ: </span><span style={{ fontSize: 13 }}>{t.symptoms}</span></div>}
                        {t.exacerbation && <div style={{ color: C.high, fontSize: 12, fontWeight: 600 }}>⚠ มี Exacerbation</div>}
                        {t.rescueUse && t.rescueUse !== 'None' && <div><span style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>Rescue: </span><span style={{ fontSize: 13 }}>{t.rescueUse}</span></div>}
                        {t.medicationProblems && <div><span style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>ปัญหายา: </span><span style={{ fontSize: 13 }}>{t.medicationProblems}</span></div>}
                        {t.counseling && <div><span style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>คำแนะนำ: </span><span style={{ fontSize: 13 }}>{t.counseling}</span></div>}
                        {t.nextFollowup && <div><span style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>นัดต่อ: </span><span style={{ fontSize: 13, color: C.primary, fontWeight: 600 }}>{t.nextFollowup}</span></div>}
                      </div>
                    )}
                    {t.pharmacistNote && (
                      <div style={{ marginTop: 8, fontSize: 12, color: C.textMuted, fontStyle: 'italic' }}>{t.pharmacistNote}</div>
                    )}
                  </Card>
                );
              })}
            </div>
      )}
    </div>
  );
}

Object.assign(window, { PatientList, PatientForm, VisitHistory, SmartAlertBanner, PatientTrendChart });
</script>
<script type="text/babel">
// VisitForm.jsx — Clinic-Workflow Optimized + Edit Mode + 2 Previous Visits + SOAP Templates
// Requires: window.* from Shared.jsx, AppStore from store.js, TemplatePicker from SOAPTemplates.jsx

const { useState: vfState, useEffect: vfEffect, useMemo: vfMemo, useRef: vfRef } = React;

// ── Sec header ────────────────────────────────────────
function SecHd({ n, title, color, right }) {
  return (
    <div style={{ display: 'flex', alignItems: 'center', gap: 10, margin: '24px 0 14px' }}>
      <div style={{
        width: 26, height: 26, borderRadius: '50%', background: color || C.primary,
        color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: 12, fontWeight: 700, flexShrink: 0,
      }}>{n}</div>
      <h3 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>{title}</h3>
      <div style={{ flex: 1, height: 1, background: C.border }} />
      {right}
    </div>
  );
}

// ── Inhaler Checklist ─────────────────────────────────
function InhalerChecklistCard({ entry, index, onChange, onRemove }) {
  const cl = AppStore.INHALER_CHECKLISTS;
  const steps = entry.device && cl[entry.device] ? cl[entry.device].steps : [];
  const toggleStep = (i) => {
    const next = [...(entry.stepsCorrect || steps.map(() => false))];
    next[i] = !next[i];
    const cnt = next.filter(Boolean).length;
    const pct = steps.length > 0 ? cnt / steps.length : 0;
    const overallScore = pct >= 0.85 ? 'Good' : pct >= 0.57 ? 'Acceptable' : 'Poor';
    const errors = steps.filter((_, si) => !next[si]);
    onChange(index, { ...entry, stepsCorrect: next, overallScore, errors });
  };
  const markAll = (good) => {
    const next = steps.map(() => good);
    onChange(index, { ...entry, stepsCorrect: next, overallScore: good ? 'Good' : 'Poor', errors: good ? [] : [...steps] });
  };
  const stepsCorrect = entry.stepsCorrect || (steps.length > 0 ? steps.map(() => false) : []);
  const correctCount = stepsCorrect.filter(Boolean).length;
  const deviceOptions = Object.entries(cl).map(([k, v]) => ({ value: k, label: v.label }));

  return (
    <div style={{ border: `1px solid ${C.border}`, borderRadius: 10, overflow: 'hidden', marginBottom: 12 }}>
      <div style={{ background: '#F8FAFC', padding: '10px 14px', display: 'flex', alignItems: 'center', gap: 10, flexWrap: 'wrap' }}>
        <div style={{ flex: 1, minWidth: 200 }}>
          <Select value={entry.device} placeholder="เลือกประเภทอุปกรณ์"
            options={deviceOptions}
            onChange={v => {
              const newSteps = cl[v]?.steps || [];
              onChange(index, { ...entry, device: v, stepsCorrect: newSteps.map(() => false), overallScore: 'Poor', errors: [...newSteps] });
            }} style={{ maxWidth: 260 }} />
        </div>
        {entry.device && (
          <>
            <button onClick={() => markAll(true)} style={{
              padding: '4px 10px', borderRadius: 6, border: `1px solid ${C.lowBorder}`,
              background: C.lowBg, color: C.low, fontSize: 11, fontWeight: 600,
              cursor: 'pointer', fontFamily: 'inherit',
            }}>✓ ถูกทั้งหมด</button>
            <span style={{ fontSize: 12, color: C.textMuted }}>{correctCount}/{steps.length}</span>
            <TechniqueBadge score={entry.overallScore || 'Poor'} />
          </>
        )}
        <button onClick={() => onRemove(index)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textMuted, fontSize: 16, padding: '0 4px' }}>✕</button>
      </div>
      {entry.device && steps.length > 0 && (
        <div style={{ padding: '10px 14px' }}>
          {steps.map((step, si) => (
            <label key={si} style={{
              display: 'flex', alignItems: 'flex-start', gap: 10, cursor: 'pointer',
              padding: '5px 8px', borderRadius: 6, marginBottom: 1,
              background: stepsCorrect[si] ? '#F0FDF4' : 'transparent', transition: 'background 0.1s',
            }}>
              <input type="checkbox" checked={!!stepsCorrect[si]} onChange={() => toggleStep(si)}
                style={{ accentColor: '#059669', marginTop: 2, flexShrink: 0, width: 15, height: 15 }} />
              <span style={{ fontSize: 13, color: stepsCorrect[si] ? '#059669' : C.text, lineHeight: 1.5 }}>
                <strong style={{ color: C.textMuted }}>{si + 1}.</strong> {step}
              </span>
            </label>
          ))}
        </div>
      )}
    </div>
  );
}

// ── DRP ──────────────────────────────────────────────
const DRP_OPTIONS = [
  'ยาที่ใช้ไม่เหมาะสมกับข้อบ่งชี้ (Wrong Drug)',
  'ขนาดยาต่ำเกินไป (Sub-therapeutic Dose)',
  'ขนาดยาสูงเกินไป (Dose too High)',
  'ผลข้างเคียงจากยา (ADR)',
  'ปฏิกิริยาระหว่างยา (Drug Interaction)',
  'ความร่วมมือในการใช้ยาต่ำ (Non-adherence)',
  'เทคนิคการใช้ยาพ่นไม่ถูกต้อง (Wrong Technique)',
  'ต้องการยาเพิ่มเติม (Needs Additional Therapy)',
  'ไม่จำเป็นต้องใช้ยา (Unnecessary Drug)',
  'อื่นๆ (Other)',
];

// แปลงหมวด DRP ที่ตรวจจับได้ → ตัวเลือกใน DRP_OPTIONS (เพื่อ map เข้า checkbox)
function drpCategoryToOption(d) {
  const c = (d.categoryEn || '').toLowerCase();
  if (c.includes('inhaler') || c.includes('technique')) return 'เทคนิคการใช้ยาพ่นไม่ถูกต้อง (Wrong Technique)';
  if (c.includes('adherence'))      return 'ความร่วมมือในการใช้ยาต่ำ (Non-adherence)';
  if (c.includes('interaction'))    return 'ปฏิกิริยาระหว่างยา (Drug Interaction)';
  if (c.includes('adverse'))        return 'ผลข้างเคียงจากยา (ADR)';
  if (c.includes('additional') || c.includes('untreated')) return 'ต้องการยาเพิ่มเติม (Needs Additional Therapy)';
  if (c.includes('unnecessary') || c.includes('duplicate')) return 'ไม่จำเป็นต้องใช้ยา (Unnecessary Drug)';
  if (c.includes('dosage') && c.includes('high')) return 'ขนาดยาสูงเกินไป (Dose too High)';
  if (c.includes('dosage'))         return 'ขนาดยาสูงเกินไป (Dose too High)';
  return 'อื่นๆ (Other)';
}

function AutoDRPPanel({ visit, patient, drp, onChange }) {
  const detected = (typeof detectDRP === 'function') ? detectDRP(visit, patient) : [];
  if (detected.length === 0) {
    return (
      <div style={{ padding: '10px 14px', borderRadius: 8, background: C.lowBg, border: `1px solid ${C.lowBorder}`, fontSize: 12, color: C.low, fontWeight: 600, marginBottom: 14 }}>
        🤖 ระบบตรวจอัตโนมัติ: ยังไม่พบ DRP จากข้อมูลที่บันทึก (Auto-scan: no DRP detected)
      </div>
    );
  }
  const sevColor  = { High: '#DC2626', Medium: '#D97706', Low: '#0369A1' };
  const sevBg     = { High: '#FEF2F2', Medium: '#FFFBEB', Low: '#EFF6FF' };
  const sevBorder = { High: '#FECACA', Medium: '#FDE68A', Low: '#BFDBFE' };
  const sevTh     = { High: 'สูง', Medium: 'ปานกลาง', Low: 'ต่ำ' };

  const acceptAll = () => {
    const opts = [...new Set(detected.map(drpCategoryToOption))];
    const merged = [...new Set([...(drp?.items || []), ...opts])];
    const autoNote = detected.map(d => `• [${d.severity}] ${d.categoryEn} (${d.categoryTh}): ${d.problemEn} → ${d.actionEn}`).join('\n');
    const prevNote = drp?.note || '';
    onChange({ ...drp, noDRP: false, items: merged,
      note: prevNote ? prevNote + '\n' + autoNote : autoNote });
  };

  return (
    <div style={{ marginBottom: 16, border: `2px solid ${C.highBorder}`, borderRadius: 10, overflow: 'hidden' }}>
      <div style={{ background: C.high, color: '#fff', padding: '8px 14px', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
          <span style={{ fontSize: 16 }}>🤖</span>
          <div>
            <div style={{ fontSize: 12, fontWeight: 700 }}>Auto-Detected DRP ({detected.length})</div>
            <div style={{ fontSize: 10, opacity: 0.85 }}>ระบบตรวจจับ DRP อัตโนมัติจากข้อมูล Visit</div>
          </div>
        </div>
        <Btn size="sm" variant="ghost" onClick={acceptAll}
          style={{ background: 'rgba(255,255,255,0.18)', color: '#fff', border: '1px solid rgba(255,255,255,0.4)' }}>
          ✓ รับทั้งหมด
        </Btn>
      </div>
      <div style={{ padding: 10, display: 'flex', flexDirection: 'column', gap: 8 }}>
        {detected.map((d, i) => (
          <div key={i} style={{ padding: '9px 12px', borderRadius: 8, background: sevBg[d.severity], border: `1px solid ${sevBorder[d.severity]}` }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
              <span style={{ fontSize: 9, fontWeight: 800, padding: '2px 7px', borderRadius: 12, background: sevColor[d.severity], color: '#fff' }}>
                {d.code} · {sevTh[d.severity]}
              </span>
              <span style={{ fontSize: 12, fontWeight: 700, color: sevColor[d.severity] }}>{d.categoryEn}</span>
              <span style={{ fontSize: 10, color: C.textMuted }}>({d.categoryTh})</span>
            </div>
            <div style={{ fontSize: 12, color: '#1F2937', lineHeight: 1.5 }}>{d.problemEn}</div>
            <div style={{ fontSize: 11, color: C.textMuted, lineHeight: 1.5 }}>{d.problemTh}</div>
            <div style={{ fontSize: 11, color: sevColor[d.severity], fontWeight: 600, marginTop: 3 }}>
              → {d.actionEn} <span style={{ color: C.textMuted, fontWeight: 400 }}>/ {d.actionTh}</span>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

function DRPSection({ drp, onChange, visit, patient }) {
  const noDRP   = drp?.noDRP ?? true;
  const selected = drp?.items || [];
  const note    = drp?.note || '';
  return (
    <div>
      {visit && <AutoDRPPanel visit={visit} patient={patient} drp={drp} onChange={onChange} />}
      <div style={{ display: 'flex', gap: 10, marginBottom: 14 }}>
        {[{ label: '✓ ไม่มี DRP', val: true }, { label: '⚠ พบ DRP', val: false }].map(({ label, val }) => (
          <label key={String(val)} style={{
            display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer',
            padding: '8px 18px', borderRadius: 8,
            border: `1px solid ${noDRP === val ? (val ? C.lowBorder : C.highBorder) : C.border}`,
            background: noDRP === val ? (val ? C.lowBg : C.highBg) : C.surface,
            fontWeight: noDRP === val ? 700 : 400, fontSize: 13,
            color: noDRP === val ? (val ? C.low : C.high) : C.textMuted, transition: 'all 0.15s',
          }}>
            <input type="radio" name="drp-status" checked={noDRP === val}
              onChange={() => onChange({ noDRP: val, items: [], note: '' })}
              style={{ accentColor: val ? C.low : C.high, width: 14, height: 14 }} />
            {label}
          </label>
        ))}
      </div>
      {!noDRP && (
        <>
          <FormField label="ประเภท DRP ที่พบ" hint="เลือกทุกข้อที่เกี่ยวข้อง">
            <CheckboxGroup options={DRP_OPTIONS} selected={selected}
              onChange={v => onChange({ ...drp, items: v })} cols={2} />
          </FormField>
          <FormField label="รายละเอียด DRP และแนวทางการแก้ไข">
            <Textarea value={note} onChange={v => onChange({ ...drp, note: v })}
              placeholder="อธิบาย DRP ที่พบ สาเหตุ และแนวทางการแก้ไขสำหรับ Visit นี้..." rows={3} />
          </FormField>
          {/* DRP Resolution status */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 4 }}>
            <label style={{ display: 'flex', alignItems: 'center', gap: 7, cursor: 'pointer', fontSize: 13, fontWeight: 600, color: drp.resolved ? C.low : C.textMuted }}>
              <input type="checkbox" checked={!!drp.resolved}
                onChange={e => onChange({ ...drp, resolved: e.target.checked })}
                style={{ accentColor: C.low, width: 15, height: 15 }} />
              ✅ DRP ได้รับการแก้ไขแล้ว (Resolved)
            </label>
          </div>
        </>
      )}
    </div>
  );
}
