// CAT interpretation
const interpretCAT = (score) => {
  if (score < 10) return { level: 'Low',    label: 'ผลกระทบต่ำ',     color: '#059669' };
  if (score < 20) return { level: 'Medium', label: 'ผลกระทบปานกลาง', color: '#D97706' };
  if (score < 30) return { level: 'High',   label: 'ผลกระทบสูง',     color: '#DC2626' };
  return            { level: 'VeryHigh', label: 'ผลกระทบสูงมาก',   color: '#991B1B' };
};

// ACT interpretation
const interpretACT = (score) => {
  if (score >= 25) return { level: 'Total',        label: 'ควบคุมได้สมบูรณ์', color: '#059669' };
  if (score >= 20) return { level: 'Well',         label: 'ควบคุมได้ดี',     color: '#059669' };
  return              { level: 'Uncontrolled', label: 'ควบคุมไม่ได้',   color: '#DC2626' };
};

// GOLD ABE grouping (2023)
const classifyGOLD = ({ catScore, mmrcGrade, exYear, hospitalized }) => {
  const moreSx = (catScore !== null && catScore !== undefined && catScore >= 10)
              || (mmrcGrade !== null && mmrcGrade !== undefined && mmrcGrade >= 2);
  const highEx = (exYear || 0) >= 2 || !!hospitalized;
  if (highEx)  return { group: 'E', label: 'Group E', desc: 'มี Exacerbation ≥2 ครั้ง/ปี หรือนอน รพ.',
                        rx: 'LABA + LAMA  (พิจารณาเพิ่ม ICS ถ้า blood eos ≥300/μL หรือมีประวัติ Asthma overlap)', color: '#DC2626' };
  if (moreSx)  return { group: 'B', label: 'Group B', desc: 'อาการมาก (CAT ≥10 หรือ mMRC ≥2) แต่ Exacerbation น้อย',
                        rx: 'LABA + LAMA', color: '#D97706' };
               return { group: 'A', label: 'Group A', desc: 'อาการน้อย และ Exacerbation น้อย',
                        rx: 'Bronchodilator (LAMA หรือ LABA ตัวใดตัวหนึ่ง)', color: '#059669' };
};

// GINA Step (Asthma 2023) - simplified rec based on ACT control + current step
const classifyGINA = ({ actScore, exYear }) => {
  if (actScore == null) return null;
  if (actScore >= 20 && (exYear || 0) === 0) {
    return { step: 'คงระดับยา', label: 'ควบคุมได้ดี', desc: 'พิจารณา step-down หากควบคุมได้ดี ≥3 เดือน',
             rx: 'พิจารณาลด ICS dose ลง 25–50% และติดตาม', color: '#059669' };
  }
  if (actScore >= 16 && actScore < 20) {
    return { step: 'Step Up 1 ขั้น', label: 'ควบคุมได้บางส่วน', desc: 'ทบทวนการใช้ยา ปัจจัยกระตุ้น เทคนิคการใช้ยาพ่นก่อน step-up',
             rx: 'เพิ่ม dose ICS หรือเพิ่ม LABA / LAMA', color: '#D97706' };
  }
  return { step: 'Step Up + ทบทวนยา', label: 'ควบคุมไม่ได้', desc: 'ต้องทบทวน adherence, เทคนิค, comorbidities, trigger factors ทันที',
           rx: 'High-dose ICS-LABA, พิจารณาเพิ่ม LAMA, ส่งต่อ specialist หากยังควบคุมไม่ได้', color: '#DC2626' };
};

  'Macrolides', 'Quinolones', 'ICS', 'LABA', 'Theophylline',
  'Iodine/Contrast', 'อื่นๆ (ระบุ)',
];

const SMOKING_OPTIONS = [
  { value: 'Never',  label: 'ไม่เคยสูบ (Never smoker)' },

  { id: 'covid', label: 'COVID-19',                  recommendInterval: 365 },
];

const calculateRisk = (patient, visitData) => {
  const flags = [];
  let highRisk = false;

  if (visitData) {
    const ex = visitData.exacerbation || {};
    if (ex.countThisYear >= 2 || ex.hospitalized) {
      flags.push('Exacerbation ≥2 ครั้ง/ปี หรือ นอน รพ.');
      highRisk = true;
    }
    if (visitData.adherence && visitData.adherence.level === 'Poor') {
      flags.push('ความร่วมมือในการใช้ยาต่ำ');
    }
    if ((visitData.inhalerTechnique || []).some(t => t.overallScore === 'Poor')) {
      flags.push('เทคนิคการใช้ยาพ่นไม่ถูกต้อง');
    }
  }
  if (patient && patient.asthmaControl === 'Uncontrolled') {
    flags.push('Asthma ควบคุมไม่ได้');
    highRisk = true;
  }
  if (patient && ['3', '4'].includes(patient.goldGrade)) {
    flags.push('COPD GOLD Grade 3–4');
    highRisk = true;
  }
  if (patient && (patient.comorbidities || []).length >= 3) {
    flags.push('มีโรคร่วม ≥3 โรค');
  }
  if (patient && patient.age >= 65) {
    flags.push('ผู้สูงอายุ (≥65 ปี)');
  }

  let level = 'Low';
  if (highRisk) level = 'High';
  else if (flags.length >= 2) level = 'Medium';
  else if (flags.length === 1) level = 'Medium';

  return { level, flags };
};

// ── Sample data ────────────────────────────────────────
const SAMPLE_PATIENTS = [];
const SAMPLE_VISITS = [];
const SAMPLE_TELEPHARMACY = [];

// ── AppStore ────────────────────────────────────────
const STORE_KEY = 'copd_asthma_clinic_v4';

const AppStore = {
  generateId,
  INHALER_CHECKLISTS,
  COMMON_MEDICATIONS,
  TRIGGER_OPTIONS,
  COMORBIDITY_OPTIONS,
  INSURANCE_OPTIONS,
  COUNSELING_TOPICS,
  CAT_QUESTIONS,
  ACT_QUESTIONS,
  MMRC_LEVELS,
  DRUG_INTERACTIONS,
  ALLERGY_OPTIONS,
  SMOKING_OPTIONS,
  VACCINATION_TYPES,
  calculateRisk,
  interpretCAT,
  interpretACT,
  classifyGOLD,
  classifyGINA,

  getDefault() {
    return {
      patients: SAMPLE_PATIENTS,
      visits: SAMPLE_VISITS,
      telepharmacy: SAMPLE_TELEPHARMACY,
      haCompliance: { medRec: [], adr: [], referrals: [], discharge: [], rca: [] },
    };
  },

  load() {
    try {
      const raw = localStorage.getItem(STORE_KEY);
      if (raw) return JSON.parse(raw);
    } catch (e) { /* ignore */ }
    const def = this.getDefault();
    this.save(def);
    return def;
  },

  save(data) {
    try {
      const payload = { ...data, _savedAt: Date.now() };
      localStorage.setItem(STORE_KEY, JSON.stringify(payload));
    } catch (e) {
      console.error('AppStore.save error:', e);
    }
  },

  // Returns the data that is newer based on _savedAt timestamp.
  // If Firebase data is newer → use Firebase; otherwise keep local.
  merge(local, remote) {
    const localTs  = local?._savedAt  || 0;
    const remoteTs = remote?._savedAt || 0;
    return remoteTs >= localTs ? remote : local;
  },

  reset() {
    localStorage.removeItem(STORE_KEY);
    return this.load();
  }
};

<script type="text/babel">
// ClinicHelpers.jsx — Auto-save Drafts · Audit Log · Beep · Beers Criteria
// Requires: window.* from Shared.jsx, AppStore from store.js

// ── Draft System (localStorage, per patient + edit) ───
const DRAFT_PREFIX = 'copd_draft_';
const DRAFT_EXPIRE_HOURS = 48;  // drafts older than 48h are stale

function draftKey(patientId, editVisitId) {
  return `${DRAFT_PREFIX}${patientId}_${editVisitId || 'new'}`;
}

function saveDraft(patientId, editVisitId, formData) {
  try {
    const payload = { ts: Date.now(), data: formData };
    localStorage.setItem(draftKey(patientId, editVisitId), JSON.stringify(payload));
  } catch (e) { /* localStorage full or disabled */ }
}

function loadDraft(patientId, editVisitId) {
  try {
    const raw = localStorage.getItem(draftKey(patientId, editVisitId));
    if (!raw) return null;
    const parsed = JSON.parse(raw);
    const ageHours = (Date.now() - parsed.ts) / 3600000;
    if (ageHours > DRAFT_EXPIRE_HOURS) {
      localStorage.removeItem(draftKey(patientId, editVisitId));
      return null;
    }
    return parsed;
  } catch { return null; }
}

function clearDraft(patientId, editVisitId) {
  try { localStorage.removeItem(draftKey(patientId, editVisitId)); } catch {}
}

function listAllDrafts() {
  const drafts = [];
  for (let i = 0; i < localStorage.length; i++) {
    const k = localStorage.key(i);
    if (k && k.startsWith(DRAFT_PREFIX)) {
      try {
        const parsed = JSON.parse(localStorage.getItem(k));
        const m = k.slice(DRAFT_PREFIX.length).split('_');
        drafts.push({ key: k, patientId: m[0], editId: m.slice(1).join('_'), ts: parsed.ts, data: parsed.data });
      } catch {}
    }
  }
  return drafts.sort((a, b) => b.ts - a.ts);
}

// ── Audit Log ────────────────────────────────────────
function appendAudit(data, entry) {
  const log = data.auditLog || [];
  const fullEntry = {
    id: AppStore.generateId(),
    ts: Date.now(),
    ...entry,
  };
  // Keep only last 1000 entries
  const trimmed = [fullEntry, ...log].slice(0, 1000);
  return { ...data, auditLog: trimmed };
}

// ── Beep (Web Audio API) ────────────────────────────
let _beepCtx = null;
function beep(freq = 880, duration = 150, volume = 0.1) {
  try {
    if (!_beepCtx) _beepCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = _beepCtx;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.value = volume;
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    setTimeout(() => { try { osc.stop(); } catch {} }, duration);
  } catch (e) { /* audio not available */ }
}

function alertBeep() {
  // Two short beeps for attention
  beep(880, 120, 0.08);
  setTimeout(() => beep(1320, 120, 0.08), 160);
}

// ── Beers Criteria (Elderly ≥65) ────────────────────
const BEERS_DRUGS = [
  { keywords: ['tiotropium', 'spiriva'],
    risk: 'Anticholinergic',
    detail: 'หลีกเลี่ยงในผู้สูงอายุที่มี delirium / dementia / BPH — เพิ่มความเสี่ยง cognitive impairment, urinary retention',
    severity: 'Medium' },
  { keywords: ['ipratropium', 'berodual', 'combivent'],
    risk: 'Anticholinergic',
    detail: 'ระวังในผู้สูงอายุที่มี glaucoma หรือ BPH — เพิ่มความเสี่ยง intraocular pressure, urinary retention',
    severity: 'Medium' },
  { keywords: ['umeclidinium', 'anoro', 'incruse', 'trelegy'],
    risk: 'Anticholinergic (LAMA)',
    detail: 'ใช้ได้อย่างระมัดระวังในผู้สูงอายุ — เฝ้าระวัง dry mouth, urinary retention, cognitive effects',
    severity: 'Low' },
  { keywords: ['theophylline'],
    risk: 'Narrow Therapeutic Index',
    detail: 'หลีกเลี่ยงในผู้สูงอายุ — มีความเสี่ยงสูงต่อ tachyarrhythmia และ CNS toxicity, ขับออกช้าลงตามอายุ',
    severity: 'High' },
  { keywords: ['prednisolone', 'prednisone', 'methylprednisolone'],
    risk: 'Systemic Corticosteroid',
    detail: 'หลีกเลี่ยงการใช้เรื้อรังในผู้สูงอายุ — เพิ่มความเสี่ยง osteoporosis, DM, infection, mood changes',
    severity: 'Medium' },
];

function checkBeers(patient, medications) {
  if (!patient || patient.age == null || patient.age < 65) return [];
  if (!medications || medications.length === 0) return [];
  const alerts = [];
  const medNames = medications.map(m => (m.name || '').toLowerCase());
  BEERS_DRUGS.forEach(b => {
    const match = b.keywords.find(k => medNames.some(n => n.includes(k)));
    if (match) {
      // Find which med matched
      const matchedMed = medications.find(m => (m.name || '').toLowerCase().includes(match));
      alerts.push({ ...b, drug: matchedMed?.name || match });
    }
  });
  return alerts;
}

function BeersAlert({ patient, medications, compact }) {
  const alerts = checkBeers(patient, medications);
  if (alerts.length === 0) return null;
  const sevColor = { High: '#DC2626', Medium: '#D97706', Low: '#0369A1' };
  const sevBg    = { High: '#FEF2F2', Medium: '#FFFBEB', Low: '#EFF6FF' };
  const sevBorder= { High: '#FECACA', Medium: '#FDE68A', Low: '#BFDBFE' };

  if (compact) {
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 10px', borderRadius: 6, background: '#FFFBEB',
        color: '#D97706', fontSize: 11, fontWeight: 600, border: '1px solid #FDE68A',
      }}>👴 Beers Alert ({alerts.length})</div>
    );
  }

  return (
    <Card style={{ border: '2px solid #FDE68A', padding: 0, overflow: 'hidden' }}>
      <div style={{ background: '#D97706', color: '#fff', padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 18 }}>👴</span>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700 }}>Beers Criteria — ผู้สูงอายุ ({patient.age} ปี)</div>
          <div style={{ fontSize: 10, opacity: 0.85 }}>ยาที่ต้องระวังในผู้สูงอายุ {alerts.length} รายการ</div>
        </div>
      </div>
      <div style={{ padding: '8px 12px' }}>
        {alerts.map((a, i) => (
          <div key={i} style={{
            padding: '8px 10px', borderRadius: 6, marginBottom: 5,
            background: sevBg[a.severity], border: `1px solid ${sevBorder[a.severity]}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 3 }}>
              <span style={{
                fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 12,
                background: sevColor[a.severity], color: '#fff',
              }}>{a.risk}</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.text }}>{a.drug}</span>
            </div>
            <div style={{ fontSize: 11, color: C.textMuted, lineHeight: 1.5 }}>{a.detail}</div>
          </div>
        ))}
      </div>
    </Card>
  );
}

Object.assign(window, {
  saveDraft, loadDraft, clearDraft, listAllDrafts,
  appendAudit,
  beep, alertBeep,
  checkBeers, BeersAlert, BEERS_DRUGS,
});

<script type="text/babel">
// TrendCharts.jsx — Mini SVG sparklines for patient trends
// Adherence trend, Exacerbation trend over visits

function Sparkline({ data, color, height = 50, width = 200, label, unit, formatVal, interventions }) {
  if (!data || data.length === 0) {
    return (
      <div style={{ height, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 11, color: C.textMuted }}>
        ไม่มีข้อมูล
      </div>
    );
  }

  const vals = data.map(d => d.value);
  const min  = Math.min(...vals, 0);
  const max  = Math.max(...vals, 1);
  const range = max - min || 1;

  const padX = 12, padY = 10;
  const innerW = width - padX * 2;
  const innerH = height - padY * 2;

  const points = data.map((d, i) => {
    const x = padX + (data.length === 1 ? innerW / 2 : (i / (data.length - 1)) * innerW);
    const y = padY + innerH - ((d.value - min) / range) * innerH;
    return { x, y, ...d };
  });

  const path = points.map((p, i) => `${i === 0 ? 'M' : 'L'} ${p.x} ${p.y}`).join(' ');
  const areaPath = `${path} L ${points[points.length-1].x} ${padY + innerH} L ${points[0].x} ${padY + innerH} Z`;

  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <defs>
        <linearGradient id={`grad-${label}`} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stopColor={color} stopOpacity="0.25" />
          <stop offset="100%" stopColor={color} stopOpacity="0" />
        </linearGradient>
      </defs>
      <path d={areaPath} fill={`url(#grad-${label})`} />
      <path d={path} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" />
      {points.map((p, i) => (
        <g key={i}>
          {interventions && interventions[i] && (
            <g>
              <line x1={p.x} y1={padY - 2} x2={p.x} y2={p.y - 5} stroke="#D97706" strokeWidth="1.5" strokeDasharray="2 2" />
              <circle cx={p.x} cy={padY - 2} r="4" fill="#D97706" />
              <text x={p.x} y={padY + 1} fontSize="7" textAnchor="middle" fill="#fff" fontWeight="700">⚡</text>
              <title>{`Intervention — ${p.date}`}</title>
            </g>
          )}
          <circle cx={p.x} cy={p.y} r="3" fill={color} />
          <title>{`${p.date}: ${formatVal ? formatVal(p.value) : p.value}${unit || ''}`}</title>
        </g>
      ))}
    </svg>
  );
}

// ── Trends Section ────────────────────────────────────
function TrendsSection({ visits }) {
  if (!visits || visits.length === 0) return null;
  const sorted = [...visits].sort((a, b) => a.visitDate.localeCompare(b.visitDate));

  // Detect interventions: SOAP P contains key intervention keywords OR DRP found
  const interventions = sorted.map(v => {
    const p = v.soap?.p || '';
    const hasDRP = v.drp?.noDRP === false && (v.drp?.items || []).length > 0;
    return /สอน|ปรับ|เพิ่ม|ลด|step.?up|step.?down|นัด|telepharmacy|กระตุ้น/i.test(p) || hasDRP;
  });

  // Adherence: Good=3, Fair=2, Poor=1, none=0
  const adhMap = { Good: 3, Fair: 2, Poor: 1 };
  const adhData = sorted.map(v => ({
    date: v.visitDate,
    value: adhMap[v.adherence?.level] || 0,
  }));

  const exData = sorted.map(v => ({
    date: v.visitDate,
    value: v.exacerbation?.countThisYear || 0,
  }));

  const techData = sorted.map(v => {
    const techs = v.inhalerTechnique || [];
    if (techs.length === 0) return { date: v.visitDate, value: 0 };
    const scoreMap = { Good: 3, Acceptable: 2, Poor: 1 };
    const avg = techs.reduce((s, t) => s + (scoreMap[t.overallScore] || 0), 0) / techs.length;
    return { date: v.visitDate, value: avg };
  });

  const adhLabels = { 3: 'ดี', 2: 'พอใช้', 1: 'ต่ำ', 0: '—' };
  const techLabels = { 3: 'ดี', 2: 'พอใช้', 1: 'ต่ำ', 0: '—' };

  const lastAdh  = adhData[adhData.length - 1]?.value;
  const prevAdh  = adhData[adhData.length - 2]?.value;
  const lastEx   = exData[exData.length - 1]?.value;
  const prevEx   = exData[exData.length - 2]?.value;

  const adhTrend = prevAdh !== undefined ? (lastAdh - prevAdh) : 0;
  const exTrend  = prevEx  !== undefined ? (lastEx  - prevEx)  : 0;

  const TrendArrow = ({ delta, good = 'up' }) => {
    if (delta === 0 || delta === undefined) return <span style={{ color: C.textMuted }}>—</span>;
    const isGood = (good === 'up' && delta > 0) || (good === 'down' && delta < 0);
    const color  = isGood ? C.low : C.high;
    const arrow  = delta > 0 ? '▲' : '▼';
    return <span style={{ color, fontWeight: 700, fontSize: 11 }}>{arrow} {Math.abs(delta)}</span>;
  };

  const Chart = ({ title, data, color, formatVal, currentLabel, trendArrow }) => (
    <div style={{
      padding: '12px 14px', borderRadius: 8, border: `1px solid ${C.border}`,
      background: '#fff',
    }}>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 4 }}>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', letterSpacing: '0.04em' }}>{title}</div>
          <div style={{ fontSize: 18, fontWeight: 800, color, marginTop: 2, lineHeight: 1.1 }}>{currentLabel}</div>
        </div>
        <div style={{ fontSize: 11, textAlign: 'right' }}>
          <div style={{ color: C.textMuted, fontSize: 10 }}>เทียบครั้งก่อน</div>
          <div>{trendArrow}</div>
        </div>
      </div>
      <Sparkline data={data} color={color} width={240} height={48} label={title} formatVal={formatVal} interventions={interventions} />
    </div>
  );

  return (
    <Card style={{ marginBottom: 20 }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <h4 style={{ margin: 0, fontSize: 13, fontWeight: 700, color: C.primary }}>
          📊 Trend ผลลัพธ์ทางคลินิก ({sorted.length} ครั้ง)
        </h4>
        <span style={{ fontSize: 11, color: C.textMuted }}>
          <span style={{ color: '#D97706', fontWeight: 700 }}>⚡</span> = Intervention / DRP
        </span>
      </div>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 12 }}>
        <Chart title="Adherence" data={adhData} color={C.low}
          currentLabel={adhLabels[lastAdh] || '—'}
          trendArrow={<TrendArrow delta={adhTrend} good="up" />}
          formatVal={v => adhLabels[v] || '—'} />
        <Chart title="Exacerbation / 6 เดือน" data={exData} color={C.high}
          currentLabel={`${lastEx ?? 0} ครั้ง`}
          trendArrow={<TrendArrow delta={exTrend} good="down" />}
          formatVal={v => `${v} ครั้ง`} />
        <Chart title="เทคนิคยาพ่น" data={techData} color="#7C3AED"
          currentLabel={techLabels[Math.round(techData[techData.length-1]?.value || 0)] || '—'}
          trendArrow={<span style={{ color: C.textMuted }}>—</span>}
          formatVal={v => techLabels[Math.round(v)] || '—'} />
      </div>
    </Card>
  );
}

Object.assign(window, { Sparkline, TrendsSection });
</script>

<script type="text/babel">
// SafetyChecks.jsx — Allergy banner · Drug Interactions · Renal alerts
// All clinical safety components for COPD/Asthma pharmacy care

// ── Allergy Banner ──────────────────────────────────
function AllergyBanner({ patient, compact }) {
  const allergies = patient?.allergies || [];
  if (allergies.length === 0) return null;

  // Check for "NKDA" — no allergies known
  const isNKDA = allergies.length === 1 && allergies[0].startsWith('NKDA');

  if (isNKDA) {
    if (compact) return null;
    return (
      <div style={{
        display: 'inline-flex', alignItems: 'center', gap: 6,
        padding: '4px 10px', borderRadius: 6, background: C.lowBg,
        color: C.low, fontSize: 11, fontWeight: 600, border: `1px solid ${C.lowBorder}`,
      }}>
        ✓ NKDA (ไม่แพ้ยา)
      </div>
    );
  }

  return (
    <div style={{
      background: 'linear-gradient(90deg, #FEE2E2 0%, #FECACA 100%)',
      border: '2px solid #DC2626', borderRadius: compact ? 6 : 10,
      padding: compact ? '6px 10px' : '10px 14px',
      display: 'flex', alignItems: 'center', gap: compact ? 7 : 10,
    }}>
      <div style={{ fontSize: compact ? 16 : 22, flexShrink: 0 }}>⚠️</div>
      <div style={{ flex: 1, minWidth: 0 }}>
        <div style={{ fontSize: compact ? 11 : 12, fontWeight: 800, color: '#7F1D1D', letterSpacing: '0.04em', textTransform: 'uppercase' }}>
          แพ้ยา (Drug Allergy)
        </div>
        <div style={{ fontSize: compact ? 12 : 13, color: '#7F1D1D', fontWeight: 700, marginTop: 1 }}>
          {allergies.join(', ')}
        </div>
        {!compact && patient.allergyDetail && (
          <div style={{ fontSize: 11, color: '#991B1B', marginTop: 3, fontStyle: 'italic' }}>{patient.allergyDetail}</div>
        )}
      </div>
    </div>
  );
}

// ── Drug Interaction Checker ────────────────────────
function checkInteractions(medications, patient) {
  if (!medications || medications.length === 0) return [];
  const medNames = medications.map(m => (m.name || '').toLowerCase());
  const comorbidMeds = []; // could extract from comorbidities in future

  const alerts = [];
  AppStore.DRUG_INTERACTIONS.forEach(rule => {
    const drug1Match = rule.drugs.find(d => medNames.some(n => n.includes(d.toLowerCase())));
    if (!drug1Match) return;
    const drug2Match = rule.with.find(d => medNames.some(n => n.includes(d.toLowerCase())));
    if (drug2Match) {
      alerts.push({
        ...rule,
        drug1: drug1Match,
        drug2: drug2Match,
        type: 'med-med',
      });
    }
  });

  // Smoking + Theophylline check
  if (patient?.smokingStatus === 'Current' && medNames.some(n => n.includes('theophylline'))) {
    alerts.push({
      severity: 'Medium',
      drug1: 'Theophylline', drug2: 'การสูบบุหรี่',
      mechanism: 'บุหรี่ induce CYP1A2 → ↓ Theophylline level ~50%',
      action: 'ผู้ป่วยสูบบุหรี่อาจต้องใช้ Theophylline dose สูงกว่าปกติ — ตรวจ level และพิจารณาแนะนำเลิกบุหรี่',
      type: 'med-smoking',
    });
  }

  return alerts;
}

function InteractionAlerts({ medications, patient, compact }) {
  const alerts = checkInteractions(medications, patient);
  if (alerts.length === 0) return null;

  const severityColor = { High: '#DC2626', Medium: '#D97706', Low: '#0369A1' };
  const severityBg    = { High: '#FEF2F2', Medium: '#FFFBEB', Low: '#EFF6FF' };
  const severityBorder= { High: '#FECACA', Medium: '#FDE68A', Low: '#BFDBFE' };
  const severityLabel = { High: 'สูง', Medium: 'ปานกลาง', Low: 'ต่ำ' };

  if (compact) {
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 10px', borderRadius: 6, background: '#FEF2F2',
        color: C.high, fontSize: 11, fontWeight: 600, border: `1px solid ${C.highBorder}`,
      }}>⚠ พบ Drug Interaction ({alerts.length})</div>
    );
  }

  return (
    <Card style={{ border: `2px solid ${C.highBorder}`, padding: 0, overflow: 'hidden' }}>
      <div style={{ background: C.high, color: '#fff', padding: '8px 14px', display: 'flex', alignItems: 'center', gap: 8 }}>
        <span style={{ fontSize: 18 }}>⚠️</span>
        <div>
          <div style={{ fontSize: 12, fontWeight: 700 }}>Drug Interaction Alert ({alerts.length})</div>
          <div style={{ fontSize: 10, opacity: 0.85 }}>พบปฏิกิริยาระหว่างยาที่ผู้ป่วยใช้</div>
        </div>
      </div>
      <div style={{ padding: '8px 12px' }}>
        {alerts.map((a, i) => (
          <div key={i} style={{
            padding: '10px 12px', borderRadius: 7, marginBottom: 6,
            background: severityBg[a.severity], border: `1px solid ${severityBorder[a.severity]}`,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 4 }}>
              <span style={{
                fontSize: 10, fontWeight: 700, padding: '2px 7px', borderRadius: 12,
                background: severityColor[a.severity], color: '#fff',
              }}>{severityLabel[a.severity]}</span>
              <span style={{ fontSize: 12, fontWeight: 700, color: C.text }}>
                {a.drug1} <span style={{ color: severityColor[a.severity] }}>↔</span> {a.drug2}
              </span>
            </div>
            <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 3, lineHeight: 1.5 }}>
              <strong style={{ color: C.text }}>กลไก: </strong>{a.mechanism}
            </div>
            <div style={{ fontSize: 11, color: severityColor[a.severity], fontWeight: 600, lineHeight: 1.5 }}>
              <strong>คำแนะนำ: </strong>{a.action}
            </div>
          </div>
        ))}
      </div>
    </Card>
  );
}

// ── Renal Function Alert ─────────────────────────────
function getRenalCategory(eGFR) {
  if (eGFR == null || eGFR === '') return null;
  const v = parseFloat(eGFR);
  if (isNaN(v)) return null;
  if (v >= 90)  return { label: 'Normal',      stage: 'G1', color: '#059669', sev: 'ok' };
  if (v >= 60)  return { label: 'Mild ↓',      stage: 'G2', color: '#059669', sev: 'ok' };
  if (v >= 45)  return { label: 'Moderate ↓ (a)', stage: 'G3a', color: '#D97706', sev: 'warn' };
  if (v >= 30)  return { label: 'Moderate ↓ (b)', stage: 'G3b', color: '#D97706', sev: 'warn' };
  if (v >= 15)  return { label: 'Severe ↓',    stage: 'G4', color: '#DC2626', sev: 'alert' };
  return          { label: 'Kidney Failure',stage: 'G5', color: '#991B1B', sev: 'alert' };
}

function RenalAlert({ patient, medications, compact }) {
  const renal = getRenalCategory(patient?.eGFR);
  if (!renal) return null;

  // Find relevant drugs at risk
  const medNames = (medications || []).map(m => (m.name || '').toLowerCase());
  const renalRisks = [];

  if (renal.sev !== 'ok') {
    if (medNames.some(n => n.includes('theophylline'))) {
      renalRisks.push({
        drug: 'Theophylline',
        action: renal.stage.startsWith('G3') ? 'ตรวจ Theophylline level สม่ำเสมอ' : 'พิจารณาลดขนาดยาและตรวจ level',
      });
    }
    if (medNames.some(n => n.includes('ciprofloxacin') || n.includes('levofloxacin'))) {
      renalRisks.push({
        drug: 'Fluoroquinolones',
        action: 'ปรับขนาดยาตาม CrCl (CrCl <50: 50% dose)',
      });
    }
  }

  if (compact) {
    if (renal.sev === 'ok') return null;
    return (
      <div style={{
        display: 'flex', alignItems: 'center', gap: 6,
        padding: '4px 10px', borderRadius: 6,
        background: renal.sev === 'alert' ? '#FEF2F2' : '#FFFBEB',
        color: renal.color, fontSize: 11, fontWeight: 600,
        border: `1px solid ${renal.sev === 'alert' ? C.highBorder : C.mediumBorder}`,
      }}>🩺 eGFR {patient.eGFR} ({renal.stage})</div>
    );
  }

  return (
    <Card style={{
      border: `2px solid ${renal.color}30`,
      background: renal.sev !== 'ok' ? `${renal.color}05` : C.surface,
    }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 8 }}>
        <div>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase' }}>การทำงานของไต</div>
          <div style={{ marginTop: 2 }}>
            <span style={{ fontSize: 20, fontWeight: 800, color: renal.color }}>{patient.eGFR}</span>
            <span style={{ fontSize: 11, color: C.textMuted, marginLeft: 4 }}>mL/min/1.73m²</span>
          </div>
        </div>
        <div style={{
          padding: '4px 10px', borderRadius: 20, fontSize: 11, fontWeight: 700,
          background: `${renal.color}15`, color: renal.color, border: `1px solid ${renal.color}40`,
        }}>{renal.stage} · {renal.label}</div>
      </div>

      {renalRisks.length > 0 && (
        <div style={{ marginTop: 8 }}>
          <div style={{ fontSize: 10, fontWeight: 700, color: C.textMuted, textTransform: 'uppercase', marginBottom: 5 }}>
            ⚠ ยาที่ต้องระวัง ({renalRisks.length})
          </div>
          {renalRisks.map((r, i) => (
            <div key={i} style={{
              padding: '7px 10px', borderRadius: 6, marginBottom: 4,
              background: '#FEF2F2', borderLeft: `3px solid ${C.high}`, fontSize: 11,
            }}>
              <strong style={{ color: C.high }}>{r.drug}: </strong>{r.action}
            </div>
          ))}
        </div>
      )}
    </Card>
  );
}

// ── Smoking Status Badge ────────────────────────────
function SmokingBadge({ status, packYears, compact }) {
  if (!status) return null;
  const cfg = {
    Current: { icon: '🚬', label: `ยังสูบ${packYears ? ` (${packYears} pack-years)` : ''}`, color: C.high, bg: C.highBg },
    Ex:      { icon: '✋', label: `เลิกแล้ว${packYears ? ` (${packYears} pack-years)` : ''}`, color: C.medium, bg: C.mediumBg },
    Never:   { icon: '✓',  label: 'ไม่เคยสูบ', color: C.low, bg: C.lowBg },
    Unknown: { icon: '?',  label: 'ไม่ทราบสถานะการสูบบุหรี่', color: C.textMuted, bg: '#F1F5F9' },
  }[status];
  if (!cfg) return null;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 5,
      padding: compact ? '2px 8px' : '3px 10px', borderRadius: 20,
      fontSize: 11, fontWeight: 600, color: cfg.color, background: cfg.bg,
    }}>{cfg.icon} {cfg.label}</span>
  );
}

// ── Vaccination Status ──────────────────────────────
function VaccinationStatus({ patient, compact }) {
  const vac = patient?.vaccinations || {};
  const today = new Date();
  const daysSince = (d) => d ? Math.floor((today - new Date(d)) / 86400000) : null;

  const items = AppStore.VACCINATION_TYPES.map(t => {
    const date = vac[t.id];
    const days = daysSince(date);
    let status = 'none';
    if (date) {
      if (!t.recommendInterval) status = 'done';
      else if (days < t.recommendInterval) status = 'current';
      else status = 'overdue';
    }
    return { ...t, date, days, status };
  });

  const overdueCount = items.filter(i => i.status === 'overdue' || i.status === 'none').length;

  if (compact) {
    return (
      <div style={{ display: 'flex', gap: 4, alignItems: 'center', flexWrap: 'wrap' }}>
        {items.map((it, i) => {
          const c = { done: C.low, current: C.low, overdue: C.medium, none: C.textMuted }[it.status];
          return (
            <span key={i} title={`${it.label}: ${it.date || 'ยังไม่ได้ฉีด'}`} style={{
              fontSize: 10, padding: '1px 6px', borderRadius: 4,
              background: `${c}15`, color: c, fontWeight: 600,
            }}>
              {it.id.toUpperCase()} {it.status === 'current' || it.status === 'done' ? '✓' : '✕'}
            </span>
          );
        })}
      </div>
    );
  }

  return (
    <Card>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
        <h4 style={{ margin: 0, fontSize: 13, fontWeight: 700, color: C.primary }}>💉 วัคซีน</h4>
        {overdueCount > 0 && (
          <span style={{ fontSize: 11, fontWeight: 600, color: C.medium }}>
            ต้องฉีด/ฉีดซ้ำ {overdueCount} รายการ
          </span>
        )}
      </div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {items.map((it, i) => {
          const c = { done: C.low, current: C.low, overdue: C.medium, none: C.textMuted }[it.status];
          const icon = (it.status === 'done' || it.status === 'current') ? '✓' : (it.status === 'overdue' ? '⏰' : '○');
          return (
            <div key={i} style={{
              display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px',
              borderRadius: 6, background: '#F8FAFC',
            }}>
              <span style={{ fontSize: 14, color: c }}>{icon}</span>
              <div style={{ flex: 1, fontSize: 12 }}>
                <div style={{ fontWeight: 600, color: C.text }}>{it.label}</div>
                <div style={{ fontSize: 10, color: C.textMuted, marginTop: 1 }}>
                  {it.date ? `ฉีดเมื่อ ${it.date} (${it.days} วันก่อน)` : 'ยังไม่ได้ฉีด'}
                </div>
              </div>
              <span style={{ fontSize: 10, color: c, fontWeight: 600 }}>
                {it.status === 'current' ? 'OK' : it.status === 'done' ? 'OK' : it.status === 'overdue' ? 'ฉีดซ้ำ' : 'ขาด'}
              </span>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

Object.assign(window, {
  AllergyBanner, InteractionAlerts, RenalAlert, SmokingBadge, VaccinationStatus,
  checkInteractions, getRenalCategory,
});
</script>
<script type="text/babel">
// Settings.jsx — Login Screen · PIN Auth · Pharmacist Mgmt · Firebase Setup
// Requires: window.* from Shared.jsx, AppStore from store.js

const { useState: stState, useEffect: stEffect } = React;

const FB_KEY    = 'copd_firebase_v1';

// ── Storage helpers ───────────────────────────────────
const loadFBConfig = () => { try { return JSON.parse(localStorage.getItem(FB_KEY)); } catch { return null; } };
const saveFBConfig = (c) => c ? localStorage.setItem(FB_KEY, JSON.stringify(c)) : localStorage.removeItem(FB_KEY);

// ── PIN Dot ───────────────────────────────────────────
const PINDot = ({ filled }) => (
  <div style={{
    width: 14, height: 14, borderRadius: '50%',
    background: filled ? '#FFFFFF' : 'transparent',
    border: `2px solid ${filled ? '#FFFFFF' : 'rgba(255,255,255,0.4)'}`,
    transition: 'all 0.15s',
  }} />
);

// ── Login Screen ──────────────────────────────────────
function LoginScreen({ onLogin, data, onDataChange, syncStatus }) {
  const users = (data && data.users) || [];
  const clinicCode = (data && data.clinicCode) || '';

  // Migration: รัน หลัง Firebase sync เสร็จเท่านั้น (ป้องกันเขียนทับข้อมูลจริง)
  stEffect(() => {
    if (syncStatus !== 'synced') return;
    if (!data) return;
    const existingUsers = data.users || [];
    if (existingUsers.length === 0 && data.pharmacists && data.pharmacists.length > 0) {
      const migrated = data.pharmacists.map(ph => ({
        id: ph.id || AppStore.generateId(),
        prefix: ph.prefix || 'ภก.',
        name: ph.name || '',
        username: (ph.name || '').split(' ')[0].toLowerCase(),
        pin: '',
      }));
      onDataChange({ ...data, users: migrated });
    }
  }, [syncStatus]);

  // mode: 'gate' | 'select' | 'pin' | 'register'
  const [mode, setMode]         = stState(clinicCode ? 'gate' : 'select');
  const [gateInput, setGateInput] = stState('');
  const [gateErr, setGateErr]   = stState('');
  const [selUser, setSelUser]   = stState(null);
  const [pin, setPin]           = stState('');
  const [pinErr, setPinErr]     = stState('');
  const [attempts, setAttempts] = stState(0);
  const [lockUntil, setLockUntil] = stState(0);
  const [lockSecs, setLockSecs] = stState(0);
  const [regStep, setRegStep]   = stState(1); // 1=info, 2=pin numpad
  const [regPinStep, setRegPinStep] = stState('new'); // 'new'|'confirm'
  const [regPfx,  setRegPfx]   = stState('ภก.');
  const [regName, setRegName]   = stState('');
  const [regUname, setRegUname] = stState('');
  const [regPin,  setRegPin]    = stState('');
  const [regConf, setRegConf]   = stState('');
  const [regErr,  setRegErr]    = stState('');

  // Lockout countdown
  stEffect(() => {
    if (!lockUntil) return;
    const iv = setInterval(() => {
      const rem = Math.ceil((lockUntil - Date.now()) / 1000);
      if (rem <= 0) { setLockSecs(0); setLockUntil(0); setAttempts(0); }
      else setLockSecs(rem);
    }, 500);
    return () => clearInterval(iv);
  }, [lockUntil]);

  // Sync gate mode when clinicCode changes (e.g. first set via Firebase)
  stEffect(() => {
    if (clinicCode && mode === 'select') setMode('gate');
    if (!clinicCode && mode === 'gate') setMode('select');
  }, [clinicCode]);

  const bgStyle = {
    position: 'fixed', inset: 0,
    background: 'linear-gradient(145deg, #060E25 0%, #0B1D45 40%, #0E2558 70%, #091535 100%)',
    display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center',
    zIndex: 2000, padding: 16, fontFamily: 'Sarabun, sans-serif', overflow: 'hidden',
  };
  const cardStyle = {
    background: 'rgba(255,255,255,0.07)', backdropFilter: 'blur(28px)',
    WebkitBackdropFilter: 'blur(28px)',
    border: '1px solid rgba(255,255,255,0.13)', borderRadius: 24,
    width: '100%', maxWidth: 400, padding: '28px 28px 32px',
    boxShadow: '0 24px 60px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.12)',
  };

  const Logo = () => (
    <div style={{ textAlign: 'center', marginBottom: 26 }}>
      <div style={{
        width: 76, height: 76, borderRadius: '50%', margin: '0 auto 14px',
        background: 'linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 60%, #2563EB 100%)',
        boxShadow: '0 8px 32px rgba(37,99,235,0.55)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 38,
      }}>🫁</div>
      <h1 style={{ color: '#FFFFFF', fontSize: 20, fontWeight: 800, margin: '0 0 4px', letterSpacing: '-0.3px' }}>
        Rx-COPD/Asthma Clinic
      </h1>
      <p style={{ color: 'rgba(147,197,253,0.7)', fontSize: 12, margin: '0 0 8px' }}>ระบบบริบาลเภสัชกรรม</p>
      <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.28)', lineHeight: 1.8 }}>
        <span style={{ color: 'rgba(147,197,253,0.5)', fontWeight: 600 }}>จัดทำโดย </span>
        ภก.อนัส มะยีแต · ฝ่ายเภสัชกรรมและคุ้มครองผู้บริโภค · โรงพยาบาลกรงปินัง
      </div>
    </div>
  );

  const NBtn = ({ label, onClick, disabled }) => (
    <button onClick={onClick} disabled={disabled} style={{
      width: 72, height: 72, borderRadius: '50%',
      border: disabled ? '1.5px solid rgba(255,255,255,0.07)' : '1.5px solid rgba(255,255,255,0.18)',
      background: disabled ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.09)',
      cursor: disabled ? 'default' : 'pointer',
      fontSize: label === '⌫' ? 20 : 24, fontWeight: 600,
      color: disabled ? 'rgba(255,255,255,0.2)' : '#FFFFFF',
      fontFamily: 'Sarabun, sans-serif', transition: 'all 0.12s',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}
    onMouseEnter={e => !disabled && (e.currentTarget.style.background = 'rgba(255,255,255,0.2)')}
    onMouseLeave={e => !disabled && (e.currentTarget.style.background = 'rgba(255,255,255,0.09)')}>
      {label}
    </button>
  );

  const PinDots = ({ count, filled }) => (
    <div style={{ display: 'flex', gap: 14, justifyContent: 'center', margin: '18px 0 6px' }}>
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} style={{
          width: 14, height: 14, borderRadius: '50%',
          background: i < filled ? '#FFFFFF' : 'transparent',
          border: i < filled ? 'none' : '2px solid rgba(255,255,255,0.3)',
          boxShadow: i < filled ? '0 0 10px rgba(255,255,255,0.5)' : 'none',
          transition: 'all 0.12s',
        }} />
      ))}
    </div>
  );

  const ErrBadge = ({ msg }) => msg ? (
    <div style={{
      background: 'rgba(239,68,68,0.18)', border: '1px solid rgba(239,68,68,0.35)',
      borderRadius: 20, padding: '7px 16px', fontSize: 12, color: '#FCA5A5',
      textAlign: 'center', margin: '10px 0',
    }}>{msg}</div>
  ) : null;

  const PrimaryBtn = ({ children, onClick }) => (
    <button onClick={onClick} style={{
      width: '100%', padding: '14px', borderRadius: 12,
      background: 'linear-gradient(135deg, #1E40AF 0%, #2563EB 100%)',
      boxShadow: '0 4px 18px rgba(37,99,235,0.4)',
      color: '#fff', border: 'none', cursor: 'pointer',
      fontSize: 15, fontWeight: 700, fontFamily: 'Sarabun, sans-serif', transition: 'all 0.15s',
    }}
    onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-1px)'}
    onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}
    >{children}</button>
  );

  const BackBtn = ({ onClick }) => (
    <button onClick={onClick} style={{
      background: 'none', border: 'none', cursor: 'pointer',
      color: 'rgba(147,197,253,0.7)', fontSize: 13, fontFamily: 'Sarabun, sans-serif',
      display: 'flex', alignItems: 'center', gap: 5, padding: '0 0 16px',
    }}>‹ กลับ</button>
  );

  const Numpad = ({ onDigit, onBack, disabled }) => (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3,72px)', gap: 10, justifyContent: 'center', marginTop: 16 }}>
      {[1,2,3,4,5,6,7,8,9].map(n => <NBtn key={n} label={n} disabled={disabled} onClick={() => onDigit(String(n))} />)}

      <NBtn label="⌫" onClick={onBack} />

  );

  // ── Gate mode ──────────────────────────────────────
  if (mode === 'gate') {
    const pushGate = (d) => {
      if (gateInput.length >= 6) return;
      const next = gateInput + d;
      setGateInput(next); setGateErr('');
      if (next.length === clinicCode.length) {
        setTimeout(() => {
          if (next === clinicCode) { setGateInput(''); setGateErr(''); setMode('select'); }
          else { setGateErr('รหัสเข้าคลินิกไม่ถูกต้อง'); setGateInput(''); }
        }, 180);
      }
    };
    return (
      <div style={bgStyle}>
        <Logo />
        <div style={{ ...cardStyle, textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🔐</div>
          <h3 style={{ margin: '0 0 4px', fontSize: 16, fontWeight: 700, color: '#FFFFFF' }}>รหัสเข้าคลินิก</h3>
          <p style={{ margin: '0 0 4px', fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>
            กรุณากรอกรหัส {clinicCode.length} หลักเพื่อเข้าใช้งาน
          </p>
          <PinDots count={clinicCode.length} filled={gateInput.length} />
          <ErrBadge msg={gateErr} />
          <Numpad onDigit={pushGate} onBack={() => { setGateInput(p => p.slice(0,-1)); setGateErr(''); }} />
        </div>
      </div>
    );
  }

  // ── Select mode ────────────────────────────────────
  if (mode === 'select') {
    return (
      <div style={bgStyle}>
        <Logo />
        <div style={cardStyle}>
          <h3 style={{ margin: '0 0 16px', fontSize: 15, fontWeight: 700, color: '#FFFFFF', textAlign: 'center' }}>
            เลือกผู้ใช้งาน
          </h3>
          {users.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '16px 0 20px' }}>
              <div style={{ fontSize: 38, marginBottom: 8 }}>👤</div>
              <p style={{ color: 'rgba(255,255,255,0.45)', fontSize: 13, margin: 0 }}>ยังไม่มีผู้ใช้ กรุณาสมัครสมาชิก</p>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12, maxHeight: 280, overflowY: 'auto' }}>

                  setSelUser(u); setPin(''); setPinErr(''); setAttempts(0); setLockUntil(0); setLockSecs(0);

                }} style={{
                  display: 'flex', alignItems: 'center', gap: 14, padding: '12px 16px', borderRadius: 14,
                  border: '1px solid rgba(255,255,255,0.12)', background: 'rgba(255,255,255,0.06)',
                  cursor: 'pointer', width: '100%', textAlign: 'left', transition: 'all 0.15s',
                  color: '#fff', fontFamily: 'Sarabun, sans-serif',
                }}
                onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.14)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.28)'; }}
                onMouseLeave={e => { e.currentTarget.style.background='rgba(255,255,255,0.06)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.12)'; }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: '50%', flexShrink: 0,
                    background: 'linear-gradient(135deg, #1E40AF, #2563EB)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 18, fontWeight: 700, color: '#fff',
                    boxShadow: '0 4px 14px rgba(37,99,235,0.4)',
                  }}>{(u.name || '?').charAt(0)}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 700, fontSize: 14 }}>{u.prefix}{u.name}</div>
                    <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>@{u.username}</div>
                  </div>
                  <div style={{ fontSize: 20, color: 'rgba(255,255,255,0.3)' }}>›</div>
                </button>
              ))}
            </div>
          )}
          <button onClick={() => {
            setSelUser(null); setRegPfx('ภก.'); setRegName(''); setRegUname('');
            setRegPin(''); setRegConf(''); setRegStep(1); setRegPinStep('new'); setRegErr('');
            setMode('register');
          }} style={{
            width: '100%', padding: '11px', borderRadius: 12,
            border: '1px solid rgba(255,255,255,0.18)', background: 'rgba(255,255,255,0.05)',
            color: 'rgba(147,197,253,0.85)', fontFamily: 'Sarabun, sans-serif',
            fontSize: 13, fontWeight: 600, cursor: 'pointer',
          }}>+ สมัครสมาชิกใหม่</button>
        </div>
      </div>
    );
  }

  // ── PIN mode ───────────────────────────────────────
  if (mode === 'pin' && selUser) {
    const isLocked = lockUntil > Date.now();
    const pushDigit = (d) => {
      if (isLocked || pin.length >= 4) return;
      const next = pin + d;
      setPin(next); setPinErr('');
      if (next.length === 4) {
        setTimeout(() => {
          if (next === selUser.pin) { onLogin(selUser); return; }
          const na = attempts + 1;
          setAttempts(na); setPin('');
          if (na >= 5) {
            const until = Date.now() + 30000;
            setLockUntil(until); setLockSecs(30);
            setPinErr('ล็อกชั่วคราว 30 วินาที (พยายามผิดเกิน 5 ครั้ง)');
          } else {
            setPinErr(`PIN ไม่ถูกต้อง · เหลือ ${5 - na} ครั้ง`);
          }
        }, 180);
      }
    };
    return (
      <div style={bgStyle}>
        <Logo />
        <div style={{ ...cardStyle, textAlign: 'center' }}>
          <BackBtn onClick={() => { setMode('select'); setPin(''); setPinErr(''); setAttempts(0); setLockUntil(0); }} />
          <div style={{
            width: 64, height: 64, borderRadius: '50%', margin: '0 auto 10px',
            background: 'linear-gradient(135deg, #1E40AF, #2563EB)',
            boxShadow: '0 8px 24px rgba(37,99,235,0.45)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 24, fontWeight: 700, color: '#fff',
          }}>{(selUser.name || '?').charAt(0)}</div>
          <div style={{ fontWeight: 700, fontSize: 15, color: '#FFFFFF', marginBottom: 2 }}>
            {selUser.prefix}{selUser.name}
          </div>
          <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>กรอก PIN 4 หลัก</div>
          {isLocked ? (
            <div style={{ padding: '24px 0 8px' }}>
              <div style={{ fontSize: 38, marginBottom: 8 }}>🔒</div>
              <div style={{ color: '#FCA5A5', fontSize: 14, fontWeight: 700 }}>บัญชีถูกล็อกชั่วคราว</div>
              <div style={{ color: 'rgba(255,255,255,0.45)', fontSize: 12, marginTop: 6 }}>ลองใหม่ใน {lockSecs} วินาที</div>
            </div>
          ) : (
            <>
              <PinDots count={4} filled={pin.length} />
              <ErrBadge msg={pinErr} />
              <Numpad onDigit={pushDigit} onBack={() => { setPin(p => p.slice(0,-1)); setPinErr(''); }} />
            </>
          )}
        </div>
      </div>
    );
  }

  // ── Register mode ──────────────────────────────────
  if (mode === 'register') {
    const handleInfoNext = () => {
      if (!regName.trim()) { setRegErr('กรุณากรอกชื่อ-นามสกุล'); return; }
      if (!selUser) {
        if (!regUname.trim()) { setRegErr('กรุณากรอก username'); return; }
        const existing = (data && data.users) || [];
        if (existing.find(u => u.username === regUname.trim().toLowerCase())) {
          setRegErr('username นี้มีอยู่แล้ว'); return;
        }
      }
      setRegErr(''); setRegPin(''); setRegConf(''); setRegPinStep('new'); setRegStep(2);
    };
    const pushRegPin = (d) => {
      if (regPinStep === 'new') {
        if (regPin.length >= 4) return;
        const next = regPin + d;
        setRegPin(next); setRegErr('');
        if (next.length === 4) setTimeout(() => { setRegPinStep('confirm'); setRegConf(''); }, 200);
      } else {
        if (regConf.length >= 4) return;
        const next = regConf + d;
        setRegConf(next); setRegErr('');
        if (next.length === 4) {
          setTimeout(() => {
            if (next !== regPin) {
              setRegErr('PIN ไม่ตรงกัน ลองใหม่');
              setRegPin(''); setRegConf(''); setRegPinStep('new'); return;
            }
            const existing = (data && data.users) || [];
            if (selUser && !selUser.pin) {
              const upd = { ...selUser, pin: regPin, username: regUname.trim().toLowerCase() || selUser.username };
              onDataChange({ ...data, users: existing.map(u => u.id === selUser.id ? upd : u) });
              onLogin(upd);
            } else {
              const nu = { id: AppStore.generateId(), prefix: regPfx, name: regName.trim(), username: regUname.trim().toLowerCase(), pin: regPin };
              onDataChange({ ...data, users: [...existing, nu] });
              onLogin(nu);
            }
          }, 200);
        }
      }
    };
    const iStyle = {
      width: '100%', padding: '11px 14px', borderRadius: 10,
      border: '1px solid rgba(255,255,255,0.2)', background: 'rgba(255,255,255,0.08)',
      color: '#FFFFFF', fontFamily: 'Sarabun, sans-serif', fontSize: 14,
      outline: 'none', boxSizing: 'border-box', marginBottom: 10,
    };
    return (
      <div style={bgStyle}>
        <Logo />
        <div style={cardStyle}>
          <BackBtn onClick={() => { setMode('select'); setSelUser(null); setRegErr(''); setRegStep(1); }} />
          {regStep === 1 ? (
            <>
              <h3 style={{ margin: '0 0 18px', fontSize: 15, fontWeight: 700, color: '#FFFFFF' }}>
                {selUser && !selUser.pin ? `ตั้ง PIN — ${selUser.prefix}${selUser.name}` : '✦ สมัครสมาชิกใหม่'}
              </h3>
              {!(selUser && !selUser.pin) && (
                <>
                  <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 6, display: 'block' }}>คำนำหน้า</label>
                  <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                    {['ภก.','ภกญ.'].map(p => (
                      <button key={p} onClick={() => setRegPfx(p)} style={{
                        flex: 1, padding: '10px', borderRadius: 10,
                        border: regPfx === p ? '2px solid #3B82F6' : '1px solid rgba(255,255,255,0.15)',
                        background: regPfx === p ? 'rgba(59,130,246,0.25)' : 'rgba(255,255,255,0.06)',
                        color: '#fff', fontFamily: 'Sarabun, sans-serif', fontSize: 14, fontWeight: 600, cursor: 'pointer',
                      }}>{p}</button>
                    ))}
                  </div>
                  <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 4, display: 'block' }}>ชื่อ-นามสกุล</label>
                  <input value={regName} onChange={e => { setRegName(e.target.value); setRegErr(''); }}
                    placeholder="เช่น อนัส มะยีแต" autoFocus style={iStyle} />
                  <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 4, display: 'block' }}>Username (ภาษาอังกฤษ)</label>
                  <input value={regUname} onChange={e => { setRegUname(e.target.value); setRegErr(''); }}
                    placeholder="เช่น anas" style={iStyle} />
                </>
              )}
              <ErrBadge msg={regErr} />
              <PrimaryBtn onClick={handleInfoNext}>ถัดไป →</PrimaryBtn>
            </>
          ) : (
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: '#FFFFFF', marginBottom: 4 }}>
                {regPinStep === 'new' ? '🔑 ตั้ง PIN 4 หลัก' : '✅ ยืนยัน PIN อีกครั้ง'}
              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>
                {regPinStep === 'new' ? 'กด PIN ที่ต้องการตั้ง' : 'กด PIN ซ้ำเพื่อยืนยัน'}
              </div>
              <PinDots count={4} filled={regPinStep === 'new' ? regPin.length : regConf.length} />
              <ErrBadge msg={regErr} />
              <Numpad
                onDigit={pushRegPin}
                onBack={() => { setRegErr(''); regPinStep === 'new' ? setRegPin(p => p.slice(0,-1)) : setRegConf(p => p.slice(0,-1)); }}
              />
            </div>
          )}
        </div>
      </div>
    );
  }

  return null;
}

// ── UserManager (Settings) ────────────────────────────
function UserManager({ data, onDataChange, currentUser }) {
  const users = (data && data.users) || [];
  const clinicCode = (data && data.clinicCode) || '';
  const [adding,    setAdding]    = stState(false);
  const [newPfx,    setNewPfx]    = stState('ภก.');
  const [newNm,     setNewNm]     = stState('');
  const [newUname,  setNewUname]  = stState('');
  const [newPin,    setNewPin]    = stState('');
  const [resetId,   setResetId]   = stState(null);
  const [resetPin,  setResetPin]  = stState('');
  const [msg,       setMsg]       = stState('');
  const [codeEdit,  setCodeEdit]  = stState(false);
  const [newCode,   setNewCode]   = stState('');
  const [codeMsg,   setCodeMsg]   = stState('');

  const handleAdd = () => {
    if (!newNm.trim() || !newUname.trim() || newPin.length !== 4) {
      setMsg('กรุณากรอกข้อมูลให้ครบและ PIN 4 หลัก'); return;
    }
    if (users.find(u => u.username === newUname.trim().toLowerCase())) {
      setMsg('username นี้มีอยู่แล้ว'); return;
    }
    const nu = { id: AppStore.generateId(), prefix: newPfx, name: newNm.trim(), username: newUname.trim().toLowerCase(), pin: newPin };
    onDataChange({ ...data, users: [...users, nu] });
    setNewNm(''); setNewUname(''); setNewPin(''); setAdding(false); setMsg('');
  };

  const handleResetPIN = (id) => {
    if (resetPin.length !== 4) { setMsg('กรุณากรอก PIN 4 หลัก'); return; }
    onDataChange({ ...data, users: users.map(u => u.id === id ? { ...u, pin: resetPin } : u) });
    setResetId(null); setResetPin(''); setMsg('');
  };

  const handleSaveCode = () => {
    const c = newCode.replace(/\D/g, '');
    if (c.length < 4 || c.length > 6) { setCodeMsg('รหัสต้องเป็นตัวเลข 4–6 หลัก'); return; }
    onDataChange({ ...data, clinicCode: c });
    setCodeEdit(false); setNewCode(''); setCodeMsg('');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Clinic Access Code */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <div>
            <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>🔐 รหัสเข้าคลินิก</h4>
            <p style={{ margin: '3px 0 0', fontSize: 11, color: C.textMuted }}>
              ป้องกันคนนอกเข้าดูข้อมูลผู้ป่วย · ตัวเลข 4–6 หลัก
            </p>
          </div>
          <Btn size="sm" variant={clinicCode ? 'ghost' : 'primary'} onClick={() => { setCodeEdit(!codeEdit); setNewCode(''); setCodeMsg(''); }}>
            {clinicCode ? 'เปลี่ยน' : 'ตั้งรหัส'}
          </Btn>
        </div>
        <div style={{
          padding: '10px 14px', borderRadius: 8,
          background: clinicCode ? '#EFF6FF' : '#FEF2F2',
          border: `1px solid ${clinicCode ? '#BFDBFE' : '#FECACA'}`,
          fontSize: 13, fontWeight: 600,
          color: clinicCode ? '#1E40AF' : '#DC2626',
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
          {clinicCode ? `🔒 ตั้งรหัสแล้ว (${clinicCode.length} หลัก)` : '🔓 ยังไม่ได้ตั้งรหัส — คนนอกสามารถเข้าได้'}
          {clinicCode && (
            <button onClick={() => { if (window.confirm('ลบรหัสเข้าคลินิก?')) onDataChange({ ...data, clinicCode: '' }); }} style={{
              marginLeft: 'auto', background: 'none', border: 'none', cursor: 'pointer',
              color: '#DC2626', fontSize: 11, fontFamily: 'Sarabun, sans-serif',
            }}>ลบรหัส</button>
          )}
        </div>
        {codeEdit && (
          <div style={{ marginTop: 10 }}>
            <input value={newCode} onChange={e => { setNewCode(e.target.value.replace(/\D/g,'').slice(0,6)); setCodeMsg(''); }}
              placeholder="รหัสใหม่ 4–6 หลัก" maxLength={6} type="password" style={{
                width: '100%', padding: '9px 14px', borderRadius: 8, border: `1px solid ${C.border}`,
                fontFamily: 'Sarabun, sans-serif', fontSize: 16, textAlign: 'center', letterSpacing: 10,
                boxSizing: 'border-box', marginBottom: 8,
              }} />
            {codeMsg && <p style={{ color: C.high, fontSize: 12, margin: '0 0 8px' }}>{codeMsg}</p>}
            <div style={{ display: 'flex', gap: 8 }}>
              <Btn size="sm" variant="primary" onClick={handleSaveCode}>บันทึก</Btn>
              <Btn size="sm" variant="ghost" onClick={() => { setCodeEdit(false); setCodeMsg(''); }}>ยกเลิก</Btn>
            </div>
          </div>
        )}
      </Card>

      {/* User list */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>👤 รายชื่อผู้ใช้</h4>
          <Btn size="sm" variant="primary" onClick={() => { setAdding(true); setMsg(''); }}>+ เพิ่ม</Btn>
        </div>
        {adding && (
          <div style={{ padding: 12, background: '#F8FAFC', borderRadius: 8, border: `1px solid ${C.border}`, marginBottom: 12 }}>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'center' }}>
              <Select value={newPfx} onChange={setNewPfx} options={['ภก.','ภกญ.']} style={{ width: 90 }} />
              <Input value={newNm} onChange={v => { setNewNm(v); setMsg(''); }} placeholder="ชื่อ นามสกุล" />
            </div>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
              <Input value={newUname} onChange={v => { setNewUname(v); setMsg(''); }} placeholder="username" />
              <input type="password" value={newPin} onChange={e => { setNewPin(e.target.value.replace(/\D/g,'').slice(0,4)); setMsg(''); }}
                placeholder="PIN 4 หลัก" maxLength={4} style={{
                  width: 120, padding: '8px 12px', borderRadius: 7, border: `1px solid ${C.border}`,
                  fontFamily: 'Sarabun, sans-serif', fontSize: 14, textAlign: 'center', letterSpacing: 8,
                }} />
            </div>
            {msg && <p style={{ color: C.high, fontSize: 12, margin: '0 0 8px' }}>{msg}</p>}
            <div style={{ display: 'flex', gap: 8 }}>
              <Btn size="sm" variant="primary" onClick={handleAdd}>บันทึก</Btn>
              <Btn size="sm" variant="ghost" onClick={() => { setAdding(false); setMsg(''); }}>ยกเลิก</Btn>
            </div>
          </div>
        )}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {users.map(u => (
            <div key={u.id} style={{
              padding: '12px 14px', borderRadius: 8,
              border: `1px solid ${currentUser?.id === u.id ? '#BFDBFE' : C.border}`,
              background: currentUser?.id === u.id ? '#EFF6FF' : '#F8FAFC',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{
                  width: 38, height: 38, borderRadius: '50%',
                  background: currentUser?.id === u.id ? C.primary : '#94A3B8',
                  color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 15, fontWeight: 700, flexShrink: 0,
                }}>{(u.name || '').charAt(0)}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ fontWeight: 600, fontSize: 13 }}>{u.prefix}{u.name}</div>
                  <div style={{ fontSize: 11, color: C.textMuted }}>
                    @{u.username} &nbsp;·&nbsp; {u.pin ? '🔒 มี PIN' : '🔓 ไม่มี PIN'}
                    {currentUser?.id === u.id && <span style={{ marginLeft: 8, color: '#0369A1', fontWeight: 600 }}>● กำลังใช้งาน</span>}
                  </div>
                </div>
                <div style={{ display: 'flex', gap: 6 }}>
                  <Btn size="sm" variant="ghost" onClick={() => { setResetId(resetId === u.id ? null : u.id); setResetPin(''); setMsg(''); }}>
                    รีเซ็ต PIN
                  </Btn>
                  {currentUser?.id !== u.id && <Btn size="sm" variant="danger" onClick={() => onDataChange({ ...data, users: users.filter(x => x.id !== u.id) })}>ลบ</Btn>}
                </div>
              </div>
              {resetId === u.id && (
                <div style={{ marginTop: 10, display: 'flex', gap: 8, alignItems: 'center' }}>
                  <input type="password" value={resetPin} onChange={e => { setResetPin(e.target.value.replace(/\D/g,'').slice(0,4)); setMsg(''); }}
                    placeholder="PIN ใหม่ 4 หลัก" maxLength={4} style={{
                      width: 160, padding: '7px 12px', borderRadius: 7, border: `1px solid ${C.border}`,
                      fontFamily: 'Sarabun, sans-serif', fontSize: 14, textAlign: 'center', letterSpacing: 8,
                    }} />
                  <Btn size="sm" variant="primary" onClick={() => handleResetPIN(u.id)}>บันทึก PIN</Btn>
                  <Btn size="sm" variant="ghost" onClick={() => { setResetId(null); setMsg(''); }}>ยกเลิก</Btn>
                  {msg && <span style={{ fontSize: 12, color: C.high }}>{msg}</span>}
                </div>
              )}
            </div>
          ))}
          {users.length === 0 && <EmptyState icon="👤" title="ยังไม่มีผู้ใช้ในระบบ" />}
        </div>
      </Card>
    </div>
  );
}

// ── FirebaseSetup ─────────────────────────────────────
function FirebaseSetup({ onConfigSave, syncStatus }) {
  const [cfgText, setCfgText] = stState(() => {
    const c = loadFBConfig();
    return c ? JSON.stringify(c, null, 2) : '';
  });
  const [msg, setMsg]   = stState(null);
  const [busy, setBusy] = stState(false);

  const handleSave = async () => {
    try {
      const parsed = JSON.parse(cfgText);
      const needed = ['apiKey','authDomain','projectId'];
      const miss = needed.filter(k => !parsed[k]);
      if (miss.length) { setMsg({ ok: false, text: `ขาด field: ${miss.join(', ')}` }); return; }
      setBusy(true);
      saveFBConfig(parsed);
      const ok = await onConfigSave(parsed);
      setMsg(ok ? { ok: true, text: '✅ เชื่อมต่อ Firebase สำเร็จ!' }
                : { ok: false, text: '❌ เชื่อมต่อไม่สำเร็จ — ตรวจสอบ config และ Firestore Rules' });
    } catch (e) {
      setMsg({ ok: false, text: `JSON ไม่ถูกต้อง: ${e.message}` });
    } finally { setBusy(false); }
  };

  const sIcon = { synced:'🟢', syncing:'🔄', error:'🔴', offline:'⚫' };
  const sTxt  = {
    synced:  'เชื่อมต่อแล้ว — ข้อมูลซิงค์อัตโนมัติ',
    syncing: 'กำลังซิงค์ข้อมูล...',
    error:   'เชื่อมต่อไม่สำเร็จ',
    offline: 'ออฟไลน์ — บันทึกใน Local Storage',
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <Card style={{ background: syncStatus==='synced' ? C.lowBg : syncStatus==='error' ? C.highBg : '#F8FAFC' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 22 }}>{sIcon[syncStatus]||'⚫'}</span>
          <div>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{sTxt[syncStatus]||'ออฟไลน์'}</div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>ข้อมูลในเครื่องปลอดภัยเสมอ แม้ไม่ได้เชื่อมต่อ</div>
          </div>
        </div>
      </Card>

      <Card style={{ background: '#EFF6FF', border: '1px solid #BFDBFE' }}>
        <h4 style={{ margin: '0 0 10px', fontSize: 13, fontWeight: 700, color: '#1E40AF' }}>📋 วิธีตั้งค่า Firebase (ฟรี)</h4>
        {['ไปที่ console.firebase.google.com → สร้าง Project ใหม่',
          'เลือก Firestore Database → Create database → Production mode',
          'ไปที่ Rules แก้เป็น: allow read, write: if true;  (สำหรับ intranet)',
          'Project Settings → Your apps → เพิ่ม Web App → คัดลอก firebaseConfig',
          'วาง config ด้านล่าง กด "เชื่อมต่อ"',
        ].map((s,i) => (

// ── CSV download (UTF-8 BOM for Thai Excel) ───────────
function downloadCSV(filename, headers, rows) {
  const escape = (v) => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const csv = [headers.map(escape).join(','), ...rows.map(r => r.map(escape).join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function exportVisits(visits, patients) {
  const getPt = id => patients.find(p => p.id === id);

    `บันทึกการเยี่ยม_${new Date().toISOString().slice(0,10)}.csv`,
    ['วันที่','HN','ชื่อ-นามสกุล','การวินิจฉัย',
     'Ex. ครั้ง/ปี','นอน รพ.','เข้า ER','ความรุนแรง Ex.',

     'ยาที่ใช้','Adherence รายยา',
     'เทคนิคยาพ่น','SpO2','RR','BP',
     'Subjective','Objective','Assessment','Plan',
     'หัวข้อให้คำปรึกษา','ความเสี่ยง','เภสัชกร','นัดถัดไป'],
    visits.map(v => {
      const pt = getPt(v.patientId);
      const ex = v.exacerbation || {};

        v.visitDate,
        pt?.hn || '', pt ? `${pt.prefix}${pt.firstName} ${pt.lastName}` : '',
        pt?.diagnosis || '',
        ex.countThisYear ?? 0,
        ex.hospitalized ? 'ใช่' : 'ไม่', ex.erVisit ? 'ใช่' : 'ไม่',
        ex.severity || '', (ex.triggers || []).join('; '), ex.rescueMedUse || '',
        (v.medications || []).map(m => `${m.name}(${m.dose})`).join('; '),
        (v.medications || []).map(m => `${m.name}:${m.adherence||'-'}`).join('; '),
        (v.inhalerTechnique || []).map(t => `${t.device}:${t.overallScore}`).join('; '),
        v.vitals?.spO2 || '', v.vitals?.rr || '', v.vitals?.bp || '',
        v.soap?.s || '', v.soap?.o || '', v.soap?.a || '', v.soap?.p || '',
        (v.counselingTopics || []).join('; '),
        v.riskLevel || '', v.pharmacist || '', v.nextVisit || '',
      ];
    })
  );
}

      <div class="item"><label>โรคร่วม</label><div>${(patient.comorbidities||[]).join(', ')||'ไม่มี'}</div></div>
      <div class="item"><label>เบอร์โทร</label><div style="font-weight:600">${patient.phone}</div></div>
      <div class="item"><label>ปัจจัยเสี่ยง</label><div style="color:${rc};font-size:11px">${(patient.riskFlags||[]).join(' · ')||'ไม่มี'}</div></div>
    </div>
    <h2>บันทึกการบริบาล (${ptV.length} ครั้ง)</h2>
    ${visitCards || '<p style="text-align:center;color:#64748B;padding:14px">ยังไม่มีบันทึก</p>'}
    ${ptT.length ? `<h2>Telepharmacy (${ptT.length} ครั้ง)</h2>
    <table><thead><tr><th>วันนัด</th><th>โทรจริง</th><th>สถานะ</th><th>อาการ</th><th>คำแนะนำ</th><th>นัดถัดไป</th></tr></thead>
    <tbody>${teleRows}</tbody></table>` : ''}`;

  openPrintWindow(html, `รายงานผู้ป่วย — ${patient.prefix}${patient.firstName} ${patient.lastName}`);
}

// ── PDF: รายงานสรุปคลินิกรายเดือน ────────────────────
function printMonthlyReport(data, yearMonth) {
  const [yr, mo] = yearMonth.split('-');
  const thMonth = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][parseInt(mo)];
  const label = `${thMonth} ${parseInt(yr)+543}`;

  const mVis  = data.visits.filter(v => v.visitDate.startsWith(yearMonth));
  const mTele = data.telepharmacy.filter(t => (t.actualDate||t.scheduledDate||'').startsWith(yearMonth));
  const getPt  = id => data.patients.find(p => p.id === id);

  const hR = data.patients.filter(p => p.riskLevel==='High').length;
  const mR = data.patients.filter(p => p.riskLevel==='Medium').length;
  const lR = data.patients.filter(p => !p.riskLevel||p.riskLevel==='Low').length;
  const exTotal = mVis.reduce((s,v) => s+(v.exacerbation?.countThisYear||0),0);
  const hospC   = mVis.filter(v => v.exacerbation?.hospitalized).length;
  const poorAdh = mVis.filter(v => v.adherence?.level==='Poor').length;
  const poorTch = mVis.filter(v => (v.inhalerTechnique||[]).some(t=>t.overallScore==='Poor')).length;
  const tSucc   = mTele.filter(t=>t.status==='Success').length;
  const tTotal  = mTele.filter(t=>t.status!=='Pending').length;
  const tRate   = tTotal>0?Math.round(tSucc/tTotal*100):0;

  const visRows = mVis.map(v => {
    const pt = getPt(v.patientId);
    const rc = {High:'risk-H',Medium:'risk-M',Low:'risk-L'}[v.riskLevel]||'risk-L';
    const adhC = {Good:'#059669',Fair:'#D97706',Poor:'#DC2626'}[v.adherence?.level]||'#64748B';
    return `<tr>
      <td>${v.visitDate}</td>
      <td>${pt?.hn||''}</td>
      <td>${pt?`${pt.prefix}${pt.firstName} ${pt.lastName}`:''}</td>
      <td>${pt?.diagnosis||''}</td>
      <td style="text-align:center">${v.exacerbation?.countThisYear??0}${v.exacerbation?.hospitalized?' 🏥':''}</td>
      <td style="text-align:center;color:${adhC};font-weight:600">${v.adherence?.level||'—'}</td>
      <td style="text-align:center">${(v.inhalerTechnique||[]).map(t=>t.overallScore).join(', ')||'—'}</td>
      <td style="text-align:center" class="${rc}">${v.riskLevel||'—'}</td>
      <td>${v.pharmacist||''}</td>
    </tr>`;
  }).join('');

  const html = `
    <h1>รายงานสรุปคลินิก COPD/Asthma</h1>
    <div class="meta">ประจำเดือน ${label} · พิมพ์วันที่ ${new Date().toLocaleDateString('th-TH')}</div>
    <div class="stat-row">
      <div class="stat"><div class="n">${data.patients.length}</div><div class="l">ผู้ป่วยทั้งหมด</div></div>
      <div class="stat"><div class="n" style="color:#DC2626">${hR}</div><div class="l">High Risk</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${mR}</div><div class="l">Medium Risk</div></div>
      <div class="stat"><div class="n" style="color:#059669">${lR}</div><div class="l">Low Risk</div></div>
      <div class="stat"><div class="n">${mVis.length}</div><div class="l">บันทึกเดือนนี้</div></div>
    </div>
    <div class="stat-row" style="margin-bottom:20px">
      <div class="stat"><div class="n" style="color:#DC2626">${exTotal}</div><div class="l">Exacerbation รวม</div></div>
      <div class="stat"><div class="n" style="color:#DC2626">${hospC}</div><div class="l">นอน รพ.</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${poorAdh}</div><div class="l">Adherence ต่ำ</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${poorTch}</div><div class="l">เทคนิคพ่นยาไม่ดี</div></div>
      <div class="stat"><div class="n" style="color:#059669">${tRate}%</div><div class="l">Tele สำเร็จ (${tSucc}/${tTotal})</div></div>
    </div>
    <h2>รายการบันทึกเดือน ${label} (${mVis.length} ครั้ง)</h2>
    <table>
      <thead><tr>
        <th>วันที่</th><th>HN</th><th>ชื่อ-นามสกุล</th><th>การวินิจฉัย</th>
        <th style="text-align:center">Exacerbation</th><th style="text-align:center">Adherence</th>
        <th style="text-align:center">เทคนิคยาพ่น</th><th style="text-align:center">Risk</th><th>เภสัชกร</th>
      </tr></thead>
      <tbody>${visRows||'<tr><td colspan="9" style="text-align:center;color:#64748B;padding:16px">ไม่มีบันทึกในเดือนนี้</td></tr>'}</tbody>
    </table>`;

  openPrintWindow(html, `รายงานสรุปคลินิก ${label}`);
}

      {/* PDF: patient */}

        </p>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <Select value={selPt} onChange={setSelPt} placeholder="เลือกผู้ป่วย"

              value: p.id, label: `${p.prefix}${p.firstName} ${p.lastName} (${p.hn})`

          </Btn>
        </div>
      </div>

      {/* PDF: monthly */}
      <div>
        <p style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 10, textTransform: 'uppercase', letterSpacing: '0.05em' }}>
          PDF — รายงานสรุปคลินิกรายเดือน
        </p>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center' }}>
          <input type="month" value={selMonth} onChange={e => setSelMonth(e.target.value)}
            style={{
              padding: '8px 12px', borderRadius: 7, border: `1px solid ${C.border}`,
              fontFamily: 'Sarabun, sans-serif', fontSize: 13, background: C.surface, color: C.text,
              outline: 'none',
            }} />
          <Btn size="sm" variant="primary" onClick={() => printMonthlyReport(data, selMonth)}>
            🖨️ พิมพ์ / PDF
          </Btn>
        </div>
        <p style={{ fontSize: 11, color: C.textMuted, marginTop: 6 }}>
          เมื่อกด "พิมพ์" จะเปิดหน้าต่างใหม่ → กด Ctrl+P (หรือ ⌘P) เพื่อบันทึกเป็น PDF
        </p>
      </div>
    </Card>
  );
}

      .ok-card   { background: #F0FDF4; border-left: 4px solid #059669; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-bottom: 6px; }
      .action { background: #EFF6FF; border-left: 4px solid #0EA5C9; padding: 8px 12px; border-radius: 0 6px 6px 0; margin-bottom: 6px; }
      .contact { background: #FFFBEB; padding: 10px 14px; border-radius: 8px; border: 1px dashed #FDE68A; text-align: center; font-size: 13px; color: #92400E; }

    </style>
    <div class="takehome-header">
      <h1>📋 สรุปการบริบาลเภสัชกรรม</h1>
      <div style="font-size:12px;opacity:0.85;margin-top:4px">${patient.prefix}${patient.firstName} ${patient.lastName} · HN: ${patient.hn} · ${today}</div>
    </div>

    <div class="sec">
      <h2>💊 ยาที่ต้องใช้</h2>
      ${meds.length > 0 ? meds.map(m => `
        <div class="med-row">
          <div style="flex:1">
            <div class="med-name">${m.name}</div>
            <div class="med-dose">วิธีใช้: ${m.dose || '—'}</div>
          </div>
        </div>
      `).join('') : '<div style="color:#64748B;text-align:center;padding:8px">—</div>'}
    </div>

    ${inhalerSteps.length > 0 ? `
    <div class="sec">
      <h2>⚠️ เทคนิคการใช้ยาพ่นที่ต้องปรับ</h2>
      ${inhalerSteps.map(t => `
        <div class="warn-card">
          <strong>${AppStore.INHALER_CHECKLISTS[t.device]?.label || t.device}:</strong>
          <ul style="margin:4px 0 0 18px;padding:0;font-size:12px;line-height:1.5">
            ${t.errors.map(e => `<li>${e}</li>`).join('')}

    ` : ''}

    <div class="sec">
      <h2>🎯 แผนการดูแลตัวเอง (Action Plan)</h2>

      ${(v.counselingTopics || []).length > 0 ? `
