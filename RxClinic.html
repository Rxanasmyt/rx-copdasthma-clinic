<script type="text/babel">
// SmartRecommendations.jsx — AI-powered suggestions
const { useMemo } = React;

// ============ Calculate Recommendations ============
const generateRecommendations = (data, patientId = null) => {
  const recommendations = [];
  const patients = patientId ? data.patients.filter(p => p.id === patientId) : data.patients;

  patients.forEach(p => {
    const visits = (data.visits || [])
      .filter(v => v.patientId === p.id)
      .sort((a, b) => b.visitDate.localeCompare(a.visitDate));
    
    const lastVisit = visits[0];
    const prevVisit = visits[1];

    // 1. Next Action — Telepharmacy needed
    if (p.riskLevel === 'High' && lastVisit) {
      const daysSinceVisit = Math.floor((Date.now() - new Date(lastVisit.visitDate)) / (1000 * 60 * 60 * 24));
      if (daysSinceVisit >= 14 && daysSinceVisit <= 21) {
        const tele = (data.telepharmacy || []).find(t => t.patientId === p.id && t.status === 'Scheduled');
        if (!tele) {
          recommendations.push({
            id: `tele-${p.id}`,
            type: 'next-action',
            priority: 'high',
            icon: '📞',
            patient: p,
            title: 'แนะนำนัด Telepharmacy',
            message: `${p.hn} ${p.firstName} — High Risk, Visit ล่าสุด ${daysSinceVisit} วันที่แล้ว`,
            action: 'นัดโทรติดตามภายใน 7 วัน',
            reason: 'ผู้ป่วย High Risk ควรได้รับการติดตามอย่างใกล้ชิด (2-4 สัปดาห์)',
          });
        }
      }
    }

    // 2. Risk Prediction — CAT score increasing
    if (lastVisit?.cat?.score != null && prevVisit?.cat?.score != null) {
      const delta = lastVisit.cat.score - prevVisit.cat.score;
      if (delta >= 5) {
        recommendations.push({
          id: `cat-${p.id}`,
          type: 'risk-prediction',
          priority: 'high',
          icon: '⚠️',
          patient: p,
          title: 'CAT Score เพิ่มขึ้นมาก',
          message: `${p.hn} ${p.firstName} — CAT เพิ่ม +${delta} (${prevVisit.cat.score} → ${lastVisit.cat.score})`,
          action: 'ตรวจสอบเทคนิคการใช้ยาพ่น + Adherence + ประเมิน exacerbation',
          reason: 'CAT เพิ่ม ≥5 คะแนนบ่งชี้ว่าอาการแย่ลงอย่างมีนัยสำคัญ',
        });
      }
    }

    // 3. Auto-tag — New Smoker
    if (lastVisit && prevVisit) {
      const wasNonSmoker = prevVisit.smokingStatus === 'Never' || prevVisit.smokingStatus === 'Ex-smoker';
      const nowSmoker = lastVisit.smokingStatus === 'Current';
      if (wasNonSmoker && nowSmoker) {
        recommendations.push({
          id: `smoke-${p.id}`,
          type: 'auto-tag',
          priority: 'medium',
          icon: '🚬',
          patient: p,
          title: 'ตรวจพบสถานะสูบบุหรี่เปลี่ยน',
          message: `${p.hn} ${p.firstName} — เปลี่ยนจาก ${prevVisit.smokingStatus} → Current smoker`,
          action: 'ให้คำปรึกษาเลิกบุหรี่ + แนะนำ Smoking Cessation Clinic',
          reason: 'สูบบุหรี่ต่อเนื่องเป็นปัจจัยเสี่ยงสำคัญต่อ exacerbation',
        });
      }
    }

    // 4. Technique re-check
    if (lastVisit?.inhalerTechnique) {
      const lowScores = lastVisit.inhalerTechnique.filter(t => t.overallScore < 7);
      if (lowScores.length > 0 && visits.length >= 2) {
        recommendations.push({
          id: `tech-${p.id}`,
          type: 'next-action',
          priority: 'medium',
          icon: '🌬️',
          patient: p,
          title: 'เทคนิคยาพ่นยังไม่ดีพอ',
          message: `${p.hn} ${p.firstName} — ${lowScores.length} อุปกรณ์ที่คะแนน <7`,
          action: 'สอนเทคนิคซ้ำ + นัดประเมินอีกครั้งใน 2 สัปดาห์',
          reason: 'เทคนิคไม่ถูกต้องทำให้ยาไม่ถึงปอด → อาการควบคุมได้ไม่ดี',
        });
      }
    }

    // 5. Vaccine Overdue
    const currentYear = new Date().getFullYear();
    if (p.vaccinations?.flu && parseInt(p.vaccinations.flu) < currentYear - 1) {
      recommendations.push({
        id: `vacc-${p.id}`,
        type: 'auto-tag',
        priority: 'low',
        icon: '💉',
        patient: p,
        title: 'วัคซีน Flu เลยกำหนด',
        message: `${p.hn} ${p.firstName} — ฉีดล่าสุด ${p.vaccinations.flu}`,
        action: 'แนะนำฉีดวัคซีน Flu (ทุกปี)',
        reason: 'Flu vaccine ลดความเสี่ยง exacerbation ใน COPD/Asthma',
      });
    }

    // 6. Adherence trend down
    if (visits.length >= 3) {
      const recent3 = visits.slice(0, 3).filter(v => v.adherence?.selfScore != null);
      if (recent3.length === 3) {
        const scores = recent3.map(v => v.adherence.selfScore);
        const trend = (scores[0] - scores[2]); // latest - oldest
        if (trend <= -2) {
          recommendations.push({
            id: `adh-${p.id}`,
            type: 'risk-prediction',
            priority: 'medium',
            icon: '📉',
            patient: p,
            title: 'Adherence ลดลงต่อเนื่อง',
            message: `${p.hn} ${p.firstName} — Adherence: ${scores[2]} → ${scores[1]} → ${scores[0]}`,
            action: 'สอบถามอุปสรรคในการใช้ยา + ปรับ regimen หากจำเป็น',
            reason: 'Adherence ลดลงต่อเนื่อง บ่งชี้ความร่วมมือลดลง',
          });
        }
      }
    }
  });

  return recommendations.sort((a, b) => {
    const priorityOrder = { high: 3, medium: 2, low: 1 };
    return priorityOrder[b.priority] - priorityOrder[a.priority];
  });
};

// ============ RecommendationCard ============
const RecommendationCard = ({ rec, onDismiss, onAction }) => {
  const priorityColor = rec.priority === 'high' ? C.high : rec.priority === 'medium' ? C.accent : C.primary;
  const priorityBg = rec.priority === 'high' ? C.highBg : rec.priority === 'medium' ? C.accentBg : C.primaryBg;

  return (
    <div style={{
      background: '#fff', border: `1px solid ${C.border}`,
      borderLeft: `4px solid ${priorityColor}`,
      borderRadius: 8, padding: '14px 16px', display: 'flex', gap: 12,
    }}>
      <div style={{
        fontSize: 28, width: 48, height: 48, borderRadius: 10,
        background: priorityBg, display: 'flex', alignItems: 'center',
        justifyContent: 'center', flexShrink: 0,
      }}>{rec.icon}</div>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 14, fontWeight: 700, color: C.text, marginBottom: 3 }}>{rec.title}</div>
        <div style={{ fontSize: 13, color: C.textMuted, marginBottom: 6 }}>{rec.message}</div>
        <div style={{
          background: '#F8FAFC', padding: '8px 10px', borderRadius: 6,
          fontSize: 12, color: C.text, marginBottom: 6, borderLeft: `3px solid ${C.accent}`,
        }}>
          <strong>แนะนำ:</strong> {rec.action}
        </div>
        <div style={{ fontSize: 11, color: C.textMuted, marginBottom: 8 }}>
          <strong>เหตุผล:</strong> {rec.reason}
        </div>
        <div style={{ display: 'flex', gap: 8 }}>
          {onAction && (
            <Btn size="sm" variant="primary" onClick={() => onAction(rec)}>ดำเนินการ</Btn>
          )}
          <Btn size="sm" variant="ghost" onClick={() => onDismiss(rec.id)}>ซ่อน</Btn>
        </div>
      </div>
    </div>
  );
};

// ============ SmartRecommendations Panel ============
const SmartRecommendations = ({ data, patientId = null }) => {
  const recommendations = useMemo(() => generateRecommendations(data, patientId), [data, patientId]);
  const [dismissed, setDismissed] = React.useState([]);

  const visible = recommendations.filter(r => !dismissed.includes(r.id));

  const handleDismiss = (id) => setDismissed([...dismissed, id]);
  
  const handleAction = (rec) => {
    alert(`ดำเนินการ: ${rec.action}\n\n(ฟีเจอร์นี้เชื่อมต่อกับ Visit Form / Telepharmacy ได้ในอนาคต)`);
    handleDismiss(rec.id);
  };

  if (visible.length === 0) {
    return (
      <Card>
        <div style={{ textAlign: 'center', padding: '30px 20px' }}>
          <div style={{ fontSize: 48, marginBottom: 10 }}>✅</div>
          <div style={{ fontSize: 16, fontWeight: 600, color: C.text }}>ไม่มีคำแนะนำในขณะนี้</div>
          <div style={{ fontSize: 13, color: C.textMuted, marginTop: 6 }}>
            {patientId ? 'ผู้ป่วยรายนี้ทุกอย่างเรียบร้อย' : 'ทุกผู้ป่วยได้รับการดูแลอย่างเหมาะสม'}
          </div>
        </div>
      </Card>
    );
  }

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      {!patientId && (
        <div style={{
          background: '#EFF6FF', border: `1px solid ${C.primaryBorder}`,
          borderRadius: 8, padding: '12px 16px', display: 'flex', alignItems: 'center', gap: 10,
        }}>
          <span style={{ fontSize: 20 }}>💡</span>
          <div style={{ fontSize: 13, color: C.text }}>
            <strong>Smart Recommendations</strong> — ระบบแนะนำการดำเนินการอัตโนมัติจากข้อมูลผู้ป่วย
          </div>
        </div>
      )}
      {visible.map(rec => (
        <RecommendationCard key={rec.id} rec={rec} onDismiss={handleDismiss} onAction={handleAction} />
      ))}
    </div>
  );
};

// Export
window.SmartRecommendations = SmartRecommendations;
window.generateRecommendations = generateRecommendations;
</script>

<script type="text/babel">
// MobileUX.jsx — Voice Input, Offline Queue, Camera Scan Stub
const { useState, useEffect, useRef } = React;

// ============ Voice Input for SOAP ============
const VoiceInputSOAP = ({ onTranscript }) => {
  const [isListening, setIsListening] = useState(false);
  const [transcript, setTranscript] = useState('');
  const recognitionRef = useRef(null);

  useEffect(() => {
    if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
      return;
    }

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    recognitionRef.current = new SpeechRecognition();
    recognitionRef.current.continuous = true;
    recognitionRef.current.interimResults = true;
    recognitionRef.current.lang = 'th-TH';

    recognitionRef.current.onresult = (event) => {
      let interimTranscript = '';
      let finalTranscript = '';

      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcriptPart = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalTranscript += transcriptPart + ' ';
        } else {
          interimTranscript += transcriptPart;
        }
      }

      setTranscript(finalTranscript + interimTranscript);
      if (finalTranscript) {
        onTranscript(finalTranscript.trim());
      }
    };

    recognitionRef.current.onerror = (event) => {
      console.error('Speech recognition error:', event.error);
      setIsListening(false);
    };

    recognitionRef.current.onend = () => {
      setIsListening(false);
    };

    return () => {
      if (recognitionRef.current) {
        recognitionRef.current.stop();
      }
    };
  }, [onTranscript]);

  const toggleListening = () => {
    if (!recognitionRef.current) {
      alert('⚠️ เบราว์เซอร์นี้ไม่รองรับ Voice Input (ต้องใช้ Chrome/Edge)');
      return;
    }

    if (isListening) {
      recognitionRef.current.stop();
      setIsListening(false);
    } else {
      setTranscript('');
      recognitionRef.current.start();
      setIsListening(true);
    }
  };

  const supported = 'webkitSpeechRecognition' in window || 'SpeechRecognition' in window;

  return (
    <div style={{
      padding: '12px 16px', background: isListening ? '#FEF3C7' : '#F8FAFC',
      border: `1px solid ${isListening ? '#F59E0B' : C.border}`,
      borderRadius: 8, display: 'flex', alignItems: 'center', gap: 12,
    }}>
      <button
        onClick={toggleListening}
        disabled={!supported}
        style={{
          width: 48, height: 48, borderRadius: '50%',
          background: isListening ? '#DC2626' : C.primary,
          color: '#fff', border: 'none', cursor: supported ? 'pointer' : 'not-allowed',
          fontSize: 20, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}
      >
        {isListening ? '⏸' : '🎤'}
      </button>
      <div style={{ flex: 1 }}>
        <div style={{ fontSize: 12, fontWeight: 600, color: C.textMuted }}>
          {supported ? (isListening ? '🔴 กำลังฟัง...' : 'กดไมค์เพื่อพูด') : '⚠️ เบราว์เซอร์ไม่รองรับ'}
        </div>
        {transcript && (
          <div style={{ fontSize: 13, color: C.text, marginTop: 4 }}>"{transcript}"</div>
        )}
      </div>
    </div>
  );
};

// ============ Offline Queue Manager ============
const OfflineQueueManager = () => {
  const [queue, setQueue] = useState([]);
  const [isOnline, setIsOnline] = useState(navigator.onLine);

  useEffect(() => {
    const handleOnline = () => setIsOnline(true);
    const handleOffline = () => setIsOnline(false);
    
    window.addEventListener('online', handleOnline);
    window.addEventListener('offline', handleOffline);

    // Load queue from localStorage
    const stored = localStorage.getItem('offline_queue');
    if (stored) {
      try {
        setQueue(JSON.parse(stored));
      } catch {}
    }

    return () => {
      window.removeEventListener('online', handleOnline);
      window.removeEventListener('offline', handleOffline);
    };
  }, []);

  const addToQueue = (action) => {
    const newQueue = [...queue, { id: Date.now(), timestamp: new Date().toISOString(), ...action }];
    setQueue(newQueue);
    localStorage.setItem('offline_queue', JSON.stringify(newQueue));
  };

  const syncQueue = async () => {
    if (!isOnline || queue.length === 0) return;

    alert(`🔄 กำลัง Sync ${queue.length} รายการ...\n\n(ในเวอร์ชันจริงจะส่งไปยัง Firebase/Backend)`);
    
    // Stub: In production, send to backend
    setTimeout(() => {
      setQueue([]);
      localStorage.removeItem('offline_queue');
      alert('✅ Sync สำเร็จ!');
    }, 1000);
  };

  const clearQueue = () => {
    if (confirm('ล้างคิวทั้งหมด? การเปลี่ยนแปลงที่ยังไม่ sync จะหายไป')) {
      setQueue([]);
      localStorage.removeItem('offline_queue');
    }
  };

  // Expose to window for app to use
  useEffect(() => {
    window.OfflineQueue = { addToQueue, isOnline };
  }, [queue, isOnline]);

  return (
    <Card>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>
        <h3 style={{ margin: 0, fontSize: 16, fontWeight: 700 }}>📶 Offline Queue</h3>
        <div style={{
          padding: '4px 10px', borderRadius: 20, fontSize: 11, fontWeight: 600,
          background: isOnline ? C.lowBg : C.highBg,
          color: isOnline ? C.low : C.high,
        }}>
          {isOnline ? '🟢 Online' : '🔴 Offline'}
        </div>
      </div>

      {queue.length === 0 ? (
        <EmptyState icon="✅" title="ไม่มีรายการรอ Sync" subtitle={isOnline ? 'ทุกอย่างพร้อมแล้ว' : 'เมื่อ offline จะบันทึกไว้ที่นี่'} />
      ) : (
        <>
          <div style={{ marginBottom: 12, display: 'flex', flexDirection: 'column', gap: 8 }}>
            {queue.map(item => (
              <div key={item.id} style={{
                padding: '10px 12px', background: '#F8FAFC', borderRadius: 7,
                border: `1px solid ${C.border}`, fontSize: 12,
              }}>
                <div style={{ fontWeight: 600, marginBottom: 3 }}>{item.type || 'Action'}</div>
                <div style={{ color: C.textMuted }}>{new Date(item.timestamp).toLocaleString('th-TH')}</div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn variant="primary" onClick={syncQueue} disabled={!isOnline}>
              🔄 Sync ทั้งหมด ({queue.length})
            </Btn>
            <Btn variant="ghost" onClick={clearQueue}>ล้างคิว</Btn>
          </div>
        </>
      )}
    </Card>
  );
};

// ============ Camera Inhaler Scanner (Stub) ============
const CameraInhalerScanner = ({ onDetected }) => {
  const [scanning, setScanning] = useState(false);
  const videoRef = useRef(null);

  const startScan = async () => {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      if (videoRef.current) {
        videoRef.current.srcObject = stream;
        videoRef.current.play();
        setScanning(true);
        
        // Stub: In production, use TensorFlow.js or ML model to detect device
        setTimeout(() => {
          const detectedDevice = 'turbuhaler'; // Mock detection
          onDetected(detectedDevice);
          stopScan();
        }, 3000);
      }
    } catch (err) {
      alert('⚠️ ไม่สามารถเปิดกล้องได้: ' + err.message);
    }
  };

  const stopScan = () => {
    if (videoRef.current && videoRef.current.srcObject) {
      videoRef.current.srcObject.getTracks().forEach(track => track.stop());
    }
    setScanning(false);
  };

  return (
    <Card>
      <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>📷 Camera Inhaler Scanner</h3>
      <p style={{ margin: '0 0 12px', fontSize: 13, color: C.textMuted }}>
        ถ่ายรูป inhaler device เพื่อตรวจจับชนิดอัตโนมัติ (ใช้ ML model)
      </p>

      {scanning ? (
        <div>
          <video ref={videoRef} style={{ width: '100%', borderRadius: 8, background: '#000' }} />
          <Btn variant="ghost" onClick={stopScan} style={{ marginTop: 8 }}>หยุดสแกน</Btn>
          <div style={{ marginTop: 8, fontSize: 12, color: C.textMuted }}>
            🔍 กำลังวิเคราะห์... (ใช้ TensorFlow.js / ML model)
          </div>
        </div>
      ) : (
        <Btn variant="primary" onClick={startScan}>📷 เปิดกล้องสแกน</Btn>
      )}

      <div style={{ marginTop: 12, padding: '10px 12px', background: '#FEF3C7', borderRadius: 7, fontSize: 11 }}>
        ⚠️ <strong>Note:</strong> ฟีเจอร์นี้ต้องใช้ ML model (เช่น MobileNet + Custom classifier) เพื่อ detect pMDI, Turbuhaler, Diskus ฯลฯ
      </div>
    </Card>
  );
};

// ============ Mobile UX Dashboard ============
const MobileUXDashboard = () => {
  const [soapText, setSoapText] = useState('');
  const [detectedDevice, setDetectedDevice] = useState(null);

  const handleVoiceTranscript = (text) => {
    setSoapText(prev => prev + ' ' + text);

  return (

      <PageHeader title="📱 Mobile UX Enhancements" subtitle="Voice Input · Offline Mode · Camera Scan" />

      {/* Voice Input */}
      <Card>
        <h3 style={{ margin: '0 0 12px', fontSize: 16, fontWeight: 700 }}>🎤 Voice Input for SOAP</h3>
        <VoiceInputSOAP onTranscript={handleVoiceTranscript} />
        {soapText && (

            <textarea
              value={soapText}
              onChange={e => setSoapText(e.target.value)}

              style={{
                width: '100%', padding: '8px 10px', borderRadius: 7, border: `1px solid ${C.border}`,
                fontSize: 13, resize: 'vertical', boxSizing: 'border-box',
              }}
            />
          </div>
        )}
      </Card>

      {/* Offline Queue */}
      <OfflineQueueManager />

      {/* Camera Scanner */}
      <CameraInhalerScanner onDetected={setDetectedDevice} />
      {detectedDevice && (
        <Card style={{ background: C.lowBg, border: `1px solid ${C.lowBorder}` }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.low }}>✅ ตรวจพบ: {detectedDevice}</div>
        </Card>
      )}
    </div>
  );
};

// Export
window.MobileUXDashboard = MobileUXDashboard;
window.VoiceInputSOAP = VoiceInputSOAP;
window.OfflineQueueManager = OfflineQueueManager;
window.CameraInhalerScanner = CameraInhalerScanner;

<script type="text/babel">
// ResearchExport.jsx — De-identified Dataset, Stats, Citation-ready Reports
const { useState, useMemo } = React;

// ============ De-identify Patient Data ============
const deIdentifyData = (data) => {
  return {
    patients: data.patients.map((p, i) => ({
      id: `PT${String(i + 1).padStart(3, '0')}`,
      age: p.age,
      gender: p.gender,
      diagnosis: p.diagnosis,
      comorbidities: p.comorbidities || [],
      smokingStatus: p.smokingStatus,
      packYears: p.packYears,
      eGFR: p.eGFR,
      riskLevel: p.riskLevel,
    })),
    visits: data.visits.map((v, i) => {
      const ptIndex = data.patients.findIndex(p => p.id === v.patientId);
      return {
        id: `V${String(i + 1).padStart(4, '0')}`,
        patientId: `PT${String(ptIndex + 1).padStart(3, '0')}`,
        visitDate: v.visitDate,
        riskLevel: v.riskLevel,
        adherence: v.adherence,
        exacerbation: v.exacerbation,
        cat: v.cat,
        act: v.act,
        mMRC: v.mMRC,
        inhalerTechnique: v.inhalerTechnique?.map(t => ({ device: t.device, score: t.overallScore })),
        drp: v.drp ? { noDRP: v.drp.noDRP, itemCount: v.drp.items?.length || 0 } : null,
      };
    }),
  };
};

// ============ Calculate Statistics ============
const calculateStats = (data) => {
  const patients = data.patients || [];
  const visits = data.visits || [];

  const stats = {
    // Demographics
    totalPatients: patients.length,
    meanAge: patients.length > 0 ? (patients.reduce((sum, p) => sum + p.age, 0) / patients.length).toFixed(1) : '—',
    sdAge: patients.length > 1 
      ? Math.sqrt(patients.reduce((sum, p) => sum + Math.pow(p.age - (patients.reduce((s, x) => s + x.age, 0) / patients.length), 2), 0) / (patients.length - 1)).toFixed(1)
      : '—',
    genderDistribution: {
      male: patients.filter(p => p.gender === 'M').length,
      female: patients.filter(p => p.gender === 'F').length,
    },
    
    // Clinical
    diagnosisDistribution: {},
    meanAdherence: '—',
    sdAdherence: '—',
    exacerbationRate: '—',
    drpPrevalence: '—',
    
    // Technique
    meanTechniqueScore: '—',
    
    // Outcomes
    catImprovement: '—',
  };

  // Diagnosis
  patients.forEach(p => {
    stats.diagnosisDistribution[p.diagnosis] = (stats.diagnosisDistribution[p.diagnosis] || 0) + 1;
  });

  // Adherence
  const adherenceScores = visits.filter(v => v.adherence?.selfScore != null).map(v => v.adherence.selfScore);
  if (adherenceScores.length > 0) {
    const mean = adherenceScores.reduce((a, b) => a + b, 0) / adherenceScores.length;
    stats.meanAdherence = mean.toFixed(2);
    if (adherenceScores.length > 1) {
      stats.sdAdherence = Math.sqrt(adherenceScores.reduce((sum, x) => sum + Math.pow(x - mean, 2), 0) / (adherenceScores.length - 1)).toFixed(2);
    }
  }

  // Exacerbation
  const totalExacerb = visits.reduce((sum, v) => sum + (v.exacerbation?.countThisYear || 0), 0);
  stats.exacerbationRate = patients.length > 0 ? (totalExacerb / patients.length).toFixed(2) : '—';

  // DRP
  const visitsWithDRP = visits.filter(v => v.drp?.noDRP === false);
  stats.drpPrevalence = visits.length > 0 ? ((visitsWithDRP.length / visits.length) * 100).toFixed(1) + '%' : '—';

  // Technique
  const techScores = visits.flatMap(v => (v.inhalerTechnique || []).map(t => t.overallScore));
  if (techScores.length > 0) {
    stats.meanTechniqueScore = (techScores.reduce((a, b) => a + b, 0) / techScores.length).toFixed(2);
  }

  return stats;
};

// ============ Export De-ID CSV ============
const exportDeIDCSV = (data) => {
  const deID = deIdentifyData(data);
  
  // Patients CSV
  const ptHeader = 'ID,Age,Gender,Diagnosis,Comorbidities,SmokingStatus,PackYears,eGFR,RiskLevel\n';
  const ptRows = deID.patients.map(p => 
    `${p.id},${p.age},${p.gender},${p.diagnosis},"${(p.comorbidities || []).join('; ')}",${p.smokingStatus || ''},${p.packYears || ''},${p.eGFR || ''},${p.riskLevel}`
  ).join('\n');
  
  // Visits CSV
  const visitHeader = 'VisitID,PatientID,VisitDate,RiskLevel,Adherence,Exacerbation,CAT,ACT,mMRC,TechniqueScore,DRP\n';
  const visitRows = deID.visits.map(v => {
    const techScore = v.inhalerTechnique && v.inhalerTechnique.length > 0
      ? (v.inhalerTechnique.reduce((s, t) => s + t.score, 0) / v.inhalerTechnique.length).toFixed(1)
      : '';
    return `${v.id},${v.patientId},${v.visitDate},${v.riskLevel},${v.adherence?.selfScore || ''},${v.exacerbation?.countThisYear || ''},${v.cat?.score || ''},${v.act?.score || ''},${v.mMRC?.grade || ''},${techScore},${v.drp?.noDRP === false ? 'Yes' : 'No'}`;
  }).join('\n');

  const blob1 = new Blob([ptHeader + ptRows], { type: 'text/csv' });
  const blob2 = new Blob([visitHeader + visitRows], { type: 'text/csv' });
  
  const url1 = URL.createObjectURL(blob1);
  const url2 = URL.createObjectURL(blob2);
  
  const a1 = document.createElement('a');
  a1.href = url1;
  a1.download = 'research_patients_deidentified.csv';
  a1.click();
  
  setTimeout(() => {
    const a2 = document.createElement('a');
    a2.href = url2;
    a2.download = 'research_visits_deidentified.csv';
    a2.click();
  }, 500);
};

const LASA_PAIRS = [
  ['Salbutamol','Salmeterol'],['Budesonide','Beclomethasone'],['Ipratropium','Tiotropium'],
  ['Formoterol','Fluticasone'],['Montelukast','Mometasone'],
];

// ──────────────────────────────────────────────────────────────
// HA3: HAM Alert Banner
// ──────────────────────────────────────────────────────────────
function HAMAlert({ medications }) {
  const meds = medications || [];
  const hamFound = meds.filter(m => HAM_DRUGS.some(h => m.name?.toLowerCase().includes(h.toLowerCase())));
  const lasaFound = [];
  meds.forEach(m => {
    LASA_PAIRS.forEach(([a, b]) => {
      const hasA = m.name?.toLowerCase().includes(a.toLowerCase());
      const hasB = m.name?.toLowerCase().includes(b.toLowerCase());
      if (hasA && !lasaFound.find(l => l.a === a)) lasaFound.push({ a, b });
    });
  });

  if (hamFound.length === 0 && lasaFound.length === 0) return null;

  return (
    <div style={{ marginBottom: 14 }}>
      {hamFound.length > 0 && (
        <div style={{
          background: '#FFF7ED', border: '2px solid #F97316', borderRadius: 8,
          padding: '10px 14px', marginBottom: 6,
        }}>
          <div style={{ fontWeight: 800, fontSize: 12, color: '#9A3412', marginBottom: 4 }}>
            🚨 HIGH ALERT MEDICATION (HAM) — ต้องการ Double Check
          </div>
          <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap' }}>
            {hamFound.map((m, i) => (
              <span key={i} style={{
                background: '#FED7AA', color: '#7C2D12', fontSize: 11, fontWeight: 700,
                padding: '2px 8px', borderRadius: 4,
              }}>⚠ {m.name}</span>
            ))}
          </div>
        </div>
      )}
      {lasaFound.length > 0 && (
        <div style={{
          background: '#FEF9C3', border: '1px solid #FBBF24', borderRadius: 8, padding: '8px 14px',
        }}>
          <div style={{ fontWeight: 700, fontSize: 11, color: '#78350F', marginBottom: 3 }}>
            ⚡ LASA Alert — ยาที่ออกเสียงหรือมีลักษณะคล้ายกัน
          </div>
          {lasaFound.map((l, i) => (
            <div key={i} style={{ fontSize: 12, color: '#92400E' }}>
              <strong>{l.a}</strong> ↔ <strong>{l.b}</strong>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// HA5: PCNE DRP Classification Panel
// ──────────────────────────────────────────────────────────────
function PCNEPanel({ pcne, onChange }) {
  const p = pcne || { problem: '', cause: '', intervention: 'I0', outcome: 'O0', resolved: false };

  const SelRow = ({ label, options, value, field }) => (
    <div style={{ marginBottom: 14 }}>
      <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 6, textTransform: 'uppercase' }}>{label}</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 4 }}>
        {options.map(opt => (
          <label key={opt.code} style={{
            display: 'flex', alignItems: 'flex-start', gap: 8, cursor: 'pointer', padding: '5px 10px',
            borderRadius: 6, background: value === opt.code ? '#EFF6FF' : 'transparent',
            border: `1px solid ${value === opt.code ? '#93C5FD' : 'transparent'}`,
          }}>
            <input type="radio" checked={value === opt.code}
              onChange={() => onChange({ ...p, [field]: opt.code })}
              style={{ marginTop: 2, accentColor: C.primaryLight }} />
            <div>
              <div style={{ fontSize: 12, fontWeight: 600, color: C.text }}>{opt.code} — {opt.label?.replace(/^[A-Z]\d+ — /, '')}</div>
              {opt.subs && (
                <div style={{ display: 'flex', flexWrap: 'wrap', gap: 4, marginTop: 4 }}>
                  {opt.subs.map(sub => (
                    <button key={sub} onClick={() => onChange({ ...p, [field]: sub })}
                      style={{
                        fontSize: 10, padding: '2px 7px', borderRadius: 4, cursor: 'pointer',
                        background: value === sub ? C.primaryLight : '#F1F5F9',
                        color: value === sub ? '#fff' : C.textMuted,
                        border: 'none', fontFamily: 'inherit',
                      }}>{sub}</button>
                  ))}
                </div>
              )}
            </div>
          </label>
        ))}
      </div>
    </div>
  );

  return (
    <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 20 }}>
      <div>
        <SelRow label="Problem Classification (P)" options={PCNE_PROBLEMS} value={p.problem} field="problem" />
        <SelRow label="Cause Classification (C)" options={PCNE_CAUSES} value={p.cause} field="cause" />
      </div>
      <div>
        <SelRow label="Intervention (I)" options={PCNE_INTERVENTIONS} value={p.intervention} field="intervention" />
        <SelRow label="Outcome (O)" options={PCNE_OUTCOMES} value={p.outcome} field="outcome" />
        <label style={{ display: 'flex', alignItems: 'center', gap: 8, cursor: 'pointer', fontSize: 13 }}>
          <input type="checkbox" checked={p.resolved || false}
            onChange={e => onChange({ ...p, resolved: e.target.checked })}
            style={{ accentColor: C.low, width: 16, height: 16 }} />
          <span style={{ fontWeight: 600, color: C.low }}>✅ แก้ไข DRP สำเร็จแล้ว</span>
        </label>
      </div>
    </div>
  );
}

// ──────────────────────────────────────────────────────────────
// HA2: Medication Reconciliation
// ──────────────────────────────────────────────────────────────
function MedReconciliationModal({ open, onClose, patient, onSave }) {
  const empty = { drug: '', dose: '', frequency: '', route: '', inHospital: true, discrepancy: 'none', reason: '' };
  const [type, setType] = useState('admission');
  const [rows, setRows] = useState([{ ...empty }]);
  const [note, setNote] = useState('');
  const [pharmacist, setPharmacist] = useState('');

  const addRow = () => setRows(r => [...r, { ...empty }]);
  const updateRow = (i, k, v) => setRows(r => r.map((row, j) => j === i ? { ...row, [k]: v } : row));
  const removeRow = (i) => setRows(r => r.filter((_, j) => j !== i));

  const handleSave = () => {
    const rec = {
      id: AppStore.generateId(),
      patientId: patient.id,
      type, rows, note, pharmacist,
      date: new Date().toISOString().slice(0, 10),
      timestamp: new Date().toISOString(),
    };
    onSave(rec);
    onClose();
  };

  const discrepancyCount = rows.filter(r => r.discrepancy !== 'none').length;

  if (!open) return null;
  return (
    <Modal open={open} onClose={onClose} title={`💊 Medication Reconciliation — ${type === 'admission' ? 'รับใหม่' : 'จำหน่าย'}`} width={860}>
      <div style={{ marginBottom: 12, display: 'flex', gap: 10, alignItems: 'center' }}>
        <div style={{ fontSize: 13, fontWeight: 600 }}>จุดเปลี่ยนผ่าน:</div>
        {[{v:'admission',l:'🏥 Admission (รับใหม่)'},{v:'discharge',l:'🏠 Discharge (จำหน่าย)'}].map(({v,l}) => (
          <label key={v} style={{
            display: 'flex', alignItems: 'center', gap: 6, cursor: 'pointer',
            padding: '6px 14px', borderRadius: 7, fontSize: 13, fontWeight: 600,
            border: `1px solid ${type===v ? C.primaryLight : C.border}`,
            background: type===v ? '#EFF6FF' : '#fff', color: type===v ? C.primaryLight : C.text,
          }}>
            <input type="radio" checked={type===v} onChange={() => setType(v)} style={{ accentColor: C.primaryLight }} />
            {l}
          </label>
        ))}
        {discrepancyCount > 0 && (
          <span style={{ marginLeft: 'auto', background: C.highBg, color: C.high, fontSize: 12, fontWeight: 700, padding: '3px 10px', borderRadius: 6 }}>
            ⚠ Discrepancy {discrepancyCount} รายการ
          </span>
        )}
      </div>

      <div style={{ overflowX: 'auto', marginBottom: 12 }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 12 }}>
          <thead>
            <tr style={{ background: '#F8FAFC' }}>
              {['ยา','ขนาด','ความถี่','Route','มีในโรงพยาบาล','Discrepancy','เหตุผล',''].map(h => (
                <th key={h} style={{ padding: '7px 8px', textAlign: 'left', borderBottom: `1px solid ${C.border}`, fontWeight: 700, color: C.textMuted, whiteSpace: 'nowrap' }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {rows.map((row, i) => (
              <tr key={i} style={{ borderBottom: `1px solid ${C.border}`, background: row.discrepancy !== 'none' ? C.highBg : 'transparent' }}>
                <td style={{ padding: '4px 6px' }}>
                  <input value={row.drug} onChange={e => updateRow(i, 'drug', e.target.value)}
                    style={{ width: 140, padding: '4px 7px', border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 12, fontFamily: 'inherit' }} />
                </td>
                <td style={{ padding: '4px 6px' }}>
                  <input value={row.dose} onChange={e => updateRow(i, 'dose', e.target.value)}
                    style={{ width: 70, padding: '4px 7px', border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 12, fontFamily: 'inherit' }} />
                </td>
                <td style={{ padding: '4px 6px' }}>
                  <input value={row.frequency} onChange={e => updateRow(i, 'frequency', e.target.value)}
                    style={{ width: 70, padding: '4px 7px', border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 12, fontFamily: 'inherit' }} />
                </td>
                <td style={{ padding: '4px 6px' }}>
                  <select value={row.route} onChange={e => updateRow(i, 'route', e.target.value)}
                    style={{ width: 70, padding: '4px 7px', border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 12, fontFamily: 'inherit' }}>
                    {['PO','INH','SC','IV','TOP','PR'].map(r => <option key={r}>{r}</option>)}
                  </select>
                </td>
                <td style={{ padding: '4px 6px', textAlign: 'center' }}>
                  <input type="checkbox" checked={row.inHospital} onChange={e => updateRow(i, 'inHospital', e.target.checked)} style={{ accentColor: C.low }} />
                </td>
                <td style={{ padding: '4px 6px' }}>
                  <select value={row.discrepancy} onChange={e => updateRow(i, 'discrepancy', e.target.value)}
                    style={{ width: 130, padding: '4px 7px', border: `1px solid ${row.discrepancy !== 'none' ? C.high : C.border}`, borderRadius: 5, fontSize: 11, fontFamily: 'inherit', color: row.discrepancy !== 'none' ? C.high : C.text, fontWeight: row.discrepancy !== 'none' ? 700 : 400 }}>
                    <option value="none">None</option>
                    <option value="intentional">Intentional</option>
                    <option value="unintentional">Unintentional ⚠</option>
                    <option value="omission">Omission</option>
                    <option value="addition">Addition</option>
                    <option value="substitution">Substitution</option>
                  </select>
                </td>
                <td style={{ padding: '4px 6px' }}>
                  <input value={row.reason} onChange={e => updateRow(i, 'reason', e.target.value)}
                    placeholder="เหตุผล..." disabled={row.discrepancy === 'none'}
                    style={{ width: 140, padding: '4px 7px', border: `1px solid ${C.border}`, borderRadius: 5, fontSize: 11, fontFamily: 'inherit', opacity: row.discrepancy === 'none' ? 0.4 : 1 }} />
                </td>
                <td style={{ padding: '4px 6px' }}>
                  <button onClick={() => removeRow(i)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.high, fontSize: 14 }}>✕</button>
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      <div style={{ display: 'flex', gap: 10, marginBottom: 12, alignItems: 'flex-start' }}>
        <Btn variant="ghost" onClick={addRow}>+ เพิ่มรายการยา</Btn>
        <div style={{ flex: 1 }}>
          <input value={note} onChange={e => setNote(e.target.value)}
            placeholder="หมายเหตุ / แผนการดูแล..." style={{
              width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`,
              borderRadius: 7, fontSize: 13, fontFamily: 'inherit',
            }} />
        </div>
        <div>
          <input value={pharmacist} onChange={e => setPharmacist(e.target.value)}
            placeholder="เภสัชกรผู้บันทึก" style={{
              width: 180, padding: '7px 10px', border: `1px solid ${C.border}`,
              borderRadius: 7, fontSize: 13, fontFamily: 'inherit',
            }} />
        </div>
      </div>

      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
        <Btn variant="ghost" onClick={onClose}>ยกเลิก</Btn>
        <Btn variant="primary" onClick={handleSave}>💾 บันทึก Reconciliation</Btn>
      </div>
    </Modal>
  );
}

// HA9: Discharge Counseling Checklist
// ──────────────────────────────────────────────────────────────
function DischargeCounselingModal({ open, onClose, patient, visits, onSave }) {
  const lastVisit = visits?.[0];
  const meds = lastVisit?.medications || [];

  const ITEMS = [
    { id: 'new_meds',       label: 'อธิบายยาใหม่ / ยาที่เปลี่ยนแปลง' },
    { id: 'stopped_meds',   label: 'แจ้งยาที่หยุดและเหตุผล' },
    { id: 'technique',      label: 'สาธิตและตรวจสอบเทคนิคการใช้ยาพ่น' },
    { id: 'adherence',      label: 'เน้นย้ำความสม่ำเสมอในการใช้ยา' },
    { id: 'side_effects',   label: 'แจ้งผลข้างเคียงที่ต้องระวัง' },
    { id: 'er_signs',       label: 'อาการที่ต้องมาห้องฉุกเฉินทันที' },
    { id: 'follow_up',      label: 'วันนัดติดตามครั้งต่อไป' },
    { id: 'phone',          label: 'เบอร์ติดต่อหน่วยบริบาลเภสัชกรรม' },
    { id: 'written',        label: 'มอบเอกสารสรุปการใช้ยาเป็นลายลักษณ์อักษร' },
    { id: 'understanding',  label: 'ผู้ป่วย/ญาติแสดงความเข้าใจได้ (Teach-back)' },
  ];

  const [checked, setChecked] = useState({});
  const [consent, setConsent] = useState(false);
  const [followupDate, setFollowupDate] = useState('');
  const [pharmacist, setPharmacist] = useState('');
  const [notes, setNotes] = useState('');

  const toggle = (id) => setChecked(c => ({ ...c, [id]: !c[id] }));
  const doneCount = ITEMS.filter(i => checked[i.id]).length;

  const handleSave = () => {
    onSave({
      id: AppStore.generateId(), patientId: patient.id,
      checklist: checked, consent, followupDate, pharmacist, notes,
      date: new Date().toISOString().slice(0, 10), timestamp: new Date().toISOString(),
    });
    onClose();
  };

  if (!open) return null;
  return (
    <Modal open={open} onClose={onClose} title="🏠 Discharge Counseling Checklist — PCT.9" width={640}>
      <div style={{ marginBottom: 12 }}>
        <div style={{ fontSize: 13, fontWeight: 700, color: C.primary, marginBottom: 3 }}>
          ผู้ป่วย: {patient.prefix}{patient.firstName} {patient.lastName} · HN: {patient.hn}
        </div>
        {lastVisit?.medications?.length > 0 && (
          <div style={{ fontSize: 12, color: C.textMuted }}>
            ยา: {meds.map(m => m.name).join(', ')}
          </div>
        )}
      </div>

      {/* Progress */}
      <div style={{ marginBottom: 14 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 4, fontSize: 12 }}>
          <span>ความครบถ้วน</span>
          <span style={{ fontWeight: 700, color: doneCount === ITEMS.length ? C.low : C.primary }}>{doneCount}/{ITEMS.length}</span>
        </div>
        <div style={{ height: 6, background: C.border, borderRadius: 3, overflow: 'hidden' }}>
          <div style={{ height: '100%', width: `${(doneCount/ITEMS.length)*100}%`, background: doneCount === ITEMS.length ? C.low : C.accent, transition: 'width 0.3s', borderRadius: 3 }} />
        </div>
      </div>

      {/* Checklist */}
      <div style={{ display: 'flex', flexDirection: 'column', gap: 6, marginBottom: 16 }}>
        {ITEMS.map((item, i) => (
          <label key={item.id} style={{
            display: 'flex', alignItems: 'center', gap: 10, cursor: 'pointer', padding: '8px 12px',
            borderRadius: 7, background: checked[item.id] ? C.lowBg : '#F8FAFC',
            border: `1px solid ${checked[item.id] ? C.lowBorder : C.border}`,
          }}>
            <input type="checkbox" checked={checked[item.id] || false} onChange={() => toggle(item.id)}
              style={{ accentColor: C.low, width: 16, height: 16 }} />
            <span style={{ fontSize: 13, fontWeight: checked[item.id] ? 600 : 400, color: checked[item.id] ? C.low : C.text, textDecoration: checked[item.id] ? 'none' : 'none' }}>
              {i + 1}. {item.label}
            </span>
            {checked[item.id] && <span style={{ marginLeft: 'auto', fontSize: 14 }}>✅</span>}
          </label>
        ))}
      </div>

      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 12, marginBottom: 14 }}>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>วันนัดครั้งต่อไป</div>
          <input type="date" value={followupDate} onChange={e => setFollowupDate(e.target.value)}
            style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 13, fontFamily: 'inherit' }} />
        </div>
        <div>
          <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>เภสัชกรผู้บันทึก</div>
          <input value={pharmacist} onChange={e => setPharmacist(e.target.value)}
            style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 13, fontFamily: 'inherit' }} />
        </div>
        <div style={{ gridColumn: '1/-1' }}>
          <textarea value={notes} onChange={e => setNotes(e.target.value)}
            placeholder="หมายเหตุเพิ่มเติม..." rows={2}
            style={{ width: '100%', padding: '8px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 13, fontFamily: 'inherit', resize: 'vertical' }} />
        </div>
      </div>

      <label style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16, cursor: 'pointer', padding: '10px 14px', borderRadius: 8, background: consent ? '#F0FDF4' : '#FEF9C3', border: `2px solid ${consent ? C.low : '#FBBF24'}` }}>
        <input type="checkbox" checked={consent} onChange={e => setConsent(e.target.checked)}
          style={{ accentColor: C.low, width: 18, height: 18 }} />
        <div>
          <div style={{ fontSize: 13, fontWeight: 700, color: consent ? C.low : '#92400E' }}>
            ✍️ Informed Consent — ผู้ป่วย/ผู้แทนรับทราบและยินยอม
          </div>
          <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>บันทึกว่าผู้ป่วยหรือญาติได้รับข้อมูลครบถ้วนและยินยอมรับคำแนะนำ</div>
        </div>
      </label>

      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
        <Btn variant="ghost" onClick={onClose}>ยกเลิก</Btn>
        <Btn variant="primary" onClick={handleSave} disabled={!consent}>
          🏠 บันทึก Discharge Checklist
        </Btn>
      </div>
    </Modal>
  );
}

              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit', resize: 'vertical' }} />

          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>Systemic Fix (แก้ไขระดับระบบ)</div>
            <textarea value={form.systemic} onChange={e => set('systemic', e.target.value)} rows={3}
              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit', resize: 'vertical' }} />

        </div>

            <label key={v} style={{ display: 'flex', alignItems: 'center', gap: 5, cursor: 'pointer', fontSize: 12 }}>

      <div style={{ display: 'flex', gap: 10, justifyContent: 'flex-end' }}>
        <Btn variant="ghost" onClick={onClose}>ยกเลิก</Btn>
        <Btn variant="primary" onClick={handleSave}>💾 บันทึก RCA</Btn>
      </div>
    </Modal>
  );
}

// HA Compliance Dashboard Page

function HAComplianceDashboard({ data, onDataChange, currentUser }) {

  const [adrOpen, setAdrOpen] = useState(false);
  const [referralOpen, setReferralOpen] = useState(false);
  const [dischargeOpen, setDischargeOpen] = useState(false);
  const [rcaOpen, setRcaOpen] = useState(false);

  const ha = data.haCompliance || { medRec: [], adr: [], referrals: [], discharge: [], rca: [] };
  const saveHA = (field, record) => {
    const updated = { ...ha, [field]: [...(ha[field] || []), record] };
    onDataChange({ ...data, haCompliance: updated });
  };

  const stats = useMemo(() => ({
    medRec: ha.medRec?.length || 0,
    adr: ha.adr?.length || 0,
    referrals: ha.referrals?.length || 0,
    discharge: ha.discharge?.length || 0,
    rca: ha.rca?.length || 0,
    unresReferrals: (ha.referrals || []).filter(r => !r.feedbackReceived).length,

  }), [ha]);

  const pt = selected || data.patients[0];
  const ptVisits = pt ? (data.visits || []).filter(v => v.patientId === pt.id).sort((a, b) => b.visitDate.localeCompare(a.visitDate)) : [];

  return (
    <div>
      <PageHeader title="🏥 HA Compliance" subtitle="Hospital Accreditation — Patient Safety Goals + Clinical Documentation" />

      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(5, 1fr)', gap: 12, marginBottom: 20 }}>
        {[
          { icon: '💊', label: 'Med Reconciliation', value: stats.medRec, color: C.accent },
          { icon: '📋', label: 'ADR Reports', value: stats.adr, sub: stats.severeADR > 0 ? `${stats.severeADR} severe` : null, color: stats.severeADR > 0 ? C.high : C.textMuted },
          { icon: '🔗', label: 'Referrals', value: stats.referrals, sub: stats.unresReferrals > 0 ? `${stats.unresReferrals} รอ feedback` : null, color: stats.unresReferrals > 0 ? C.medium : C.textMuted },

        ].map(k => (
          <Card key={k.label} style={{ padding: '14px 16px' }}>
            <div style={{ fontSize: 20, marginBottom: 4 }}>{k.icon}</div>
            <div style={{ fontSize: 22, fontWeight: 800, color: k.color }}>{k.value}</div>
            <div style={{ fontSize: 11, fontWeight: 600, color: C.textMuted }}>{k.label}</div>
            {k.sub && <div style={{ fontSize: 10, color: k.color, marginTop: 2, fontWeight: 700 }}>{k.sub}</div>}

        ))}

        <div style={{ display: 'flex', gap: 12, alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ flex: 1, minWidth: 200 }}>

                <option key={p.id} value={p.id}>{p.hn} — {p.prefix}{p.firstName} {p.lastName} ({p.diagnosis})</option>

          }
        </Card>

        {/* Med Rec */}
        <Card>
          <h4 style={{ margin: '0 0 10px', fontSize: 14, fontWeight: 700, color: C.accent }}>💊 Med Reconciliation ล่าสุด</h4>
          {(ha.medRec || []).length === 0
            ? <div style={{ fontSize: 12, color: C.textMuted }}>ยังไม่มีการ Reconcile</div>
            : (ha.medRec || []).slice(-5).reverse().map(r => {
                const pt2 = data.patients.find(p => p.id === r.patientId);
                const discCount = (r.rows || []).filter(row => row.discrepancy !== 'none').length;
                return (
                  <div key={r.id} style={{ padding: '8px 0', borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
                    <div style={{ display: 'flex', justifyContent: 'space-between' }}>
                      <span style={{ fontWeight: 700 }}>{r.type === 'admission' ? '🏥 Admission' : '🏠 Discharge'} — {r.rows?.length || 0} รายการยา</span>
                      <span style={{ fontSize: 10, color: C.textMuted }}>{r.date}</span>
                    </div>
                    <div style={{ color: discCount > 0 ? C.high : C.textMuted }}>{pt2?.firstName} {discCount > 0 ? `· ⚠ Discrepancy ${discCount} รายการ` : '· ไม่มี Discrepancy'}</div>
                  </div>
                );
              })
          }
        </Card>

        {/* RCA */}
        <Card>
          <h4 style={{ margin: '0 0 10px', fontSize: 14, fontWeight: 700, color: C.primary }}>🔍 RCA ล่าสุด</h4>
          {(ha.rca || []).length === 0
            ? <div style={{ fontSize: 12, color: C.textMuted }}>ยังไม่มีรายงาน RCA</div>
            : (ha.rca || []).slice(-5).reverse().map(r => {
                const pt2 = data.patients.find(p => p.id === r.patientId);
                return (
                  <div key={r.id} style={{ padding: '8px 0', borderBottom: `1px solid ${C.border}`, fontSize: 12 }}>
                    <div style={{ fontWeight: 700 }}>{r.event?.slice(0, 60)}</div>
                    <div style={{ color: C.textMuted }}>{pt2?.firstName} · {r.date} · {r.preventable === 'yes' ? '🛡 ป้องกันได้' : r.preventable === 'no' ? 'ป้องกันไม่ได้' : 'ไม่แน่ใจ'}</div>
                  </div>
                );
              })
          }
        </Card>
      </div>

      {/* Modals */}
      {pt && (
        <>
          <MedReconciliationModal open={medRecOpen} onClose={() => setMedRecOpen(false)} patient={pt} onSave={r => saveHA('medRec', r)} />
          <ADRReportModal open={adrOpen} onClose={() => setAdrOpen(false)} patient={pt} onSave={r => saveHA('adr', r)} />
          <ReferralModal open={referralOpen} onClose={() => setReferralOpen(false)} patient={pt} onSave={r => saveHA('referrals', r)} currentUser={currentUser} />
          <DischargeCounselingModal open={dischargeOpen} onClose={() => setDischargeOpen(false)} patient={pt} visits={ptVisits} onSave={r => saveHA('discharge', r)} />
          <RCAModal open={rcaOpen} onClose={() => setRcaOpen(false)} patient={pt} triggerEvent={rcaTrigger} onSave={r => saveHA('rca', r)} />
        </>
      )}
    </div>
  );
}

// Export
window.HAMAlert = HAMAlert;
window.PCNEPanel = PCNEPanel;
window.HAComplianceDashboard = HAComplianceDashboard;
window.MedReconciliationModal = MedReconciliationModal;
window.ADRReportModal = ADRReportModal;
window.ReferralModal = ReferralModal;
window.DischargeCounselingModal = DischargeCounselingModal;
window.RCAModal = RCAModal;

  { id: 'risk',         icon: '🔴', label: 'คัดกรองความเสี่ยง',  sub: 'Risk Screening' },
  { id: 'telepharmacy', icon: '📞', label: 'Telepharmacy',        sub: 'ติดตามทางโทรศัพท์' },
  { id: 'history',      icon: '📅', label: 'ประวัติการเยี่ยม',   sub: 'Visit History' },
  { id: 'reports',      icon: '📈', label: 'รายงาน & Export',     sub: 'Reports' },
  { id: 'analytics',    icon: '📊', label: 'Analytics',           sub: 'วิเคราะห์ผลลัพธ์' },

  { id: 'training',     icon: '🎓', label: 'Training',            sub: 'ฝึกฝน & ทดสอบ' },
  { id: 'research',     icon: '🔬', label: 'Research',            sub: 'Export งานวิจัย' },

];

// ── Sidebar ───────────────────────────────────────────
function Sidebar({ view, navigate, data, syncStatus, currentUser }) {
  const highRisk = data.patients.filter(p => p.riskLevel === 'High').length;
  const pending  = data.telepharmacy.filter(t => t.status === 'Pending').length;
  const badges   = { risk: highRisk, telepharmacy: pending };

  const syncDot = { synced: '#4ADE80', syncing: '#60A5FA', error: '#F87171', offline: '#94A3B8' }[syncStatus] || '#94A3B8';

  return (
    <aside style={{
      width: 232, background: '#0B1D45', display: 'flex', flexDirection: 'column',
      flexShrink: 0, height: '100vh', position: 'sticky', top: 0,
    }}>
      {/* Logo */}
      <div style={{ padding: '18px 16px 14px', borderBottom: '1px solid #1A3060' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <div style={{ width: 38, height: 38, borderRadius: 10, background: '#0EA5C9', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 20, flexShrink: 0 }}>🫁</div>
          <div>
            <div style={{ fontSize: 13, fontWeight: 800, color: '#FFFFFF', lineHeight: 1.2 }}>Rx-COPD/Asthma</div>
            <div style={{ fontSize: 10, color: '#94A3B8', marginTop: 1 }}>Pharmaceutical Care</div>
          </div>
        </div>
      </div>

      {/* Current user chip */}
      {currentUser && (
        <div style={{ margin: '10px 10px 0', padding: '8px 10px', background: 'rgba(255,255,255,0.06)', borderRadius: 8, display: 'flex', alignItems: 'center', gap: 8 }}>
          <div style={{ width: 28, height: 28, borderRadius: '50%', background: '#1848A0', color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 12, fontWeight: 700, flexShrink: 0 }}>
            {currentUser.name.charAt(0)}
          </div>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 11, fontWeight: 600, color: '#FFFFFF', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
              {currentUser.prefix}{currentUser.name}
            </div>
            <div style={{ fontSize: 9, color: '#4A6480', display: 'flex', alignItems: 'center', gap: 4, marginTop: 1 }}>
              <div style={{ width: 6, height: 6, borderRadius: '50%', background: syncDot }} />
              {syncStatus === 'synced' ? 'ซิงค์แล้ว' : syncStatus === 'syncing' ? 'กำลังซิงค์' : syncStatus === 'error' ? 'ซิงค์ผิดพลาด' : 'Local Storage'}
            </div>
          </div>
        </div>
      )}

      {/* Nav */}
      <nav style={{ flex: 1, overflowY: 'auto', padding: '10px 8px' }}>
        {NAV.map(n => {
          const active = view === n.id
            || (view === 'visit-form' && n.id === 'patients')
            || (view === 'telepharmacy-add' && n.id === 'telepharmacy');
          const badge = badges[n.id];
          return (
            <button key={n.id} onClick={() => navigate(n.id)} style={{
              width: '100%', display: 'flex', alignItems: 'center', gap: 10, padding: '9px 12px',
              borderRadius: 8, border: 'none', cursor: 'pointer', textAlign: 'left',
              background: active ? '#1848A0' : 'transparent',
              transition: 'background 0.15s', marginBottom: 2,
            }}
            onMouseEnter={e => { if (!active) e.currentTarget.style.background = '#162B5E'; }}
            onMouseLeave={e => { if (!active) e.currentTarget.style.background = 'transparent'; }}>
              <span style={{ fontSize: 16, flexShrink: 0 }}>{n.icon}</span>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 12, fontWeight: active ? 700 : 500, color: active ? '#FFFFFF' : '#A8C5DA', lineHeight: 1.2 }}>{n.label}</div>
                <div style={{ fontSize: 10, color: active ? '#93C5FD' : '#4A6480', marginTop: 1 }}>{n.sub}</div>
              </div>
              {badge > 0 && (
                <span style={{ background: n.id === 'risk' ? '#DC2626' : '#0EA5C9', color: '#fff', fontSize: 10, fontWeight: 700, padding: '1px 7px', borderRadius: 20, flexShrink: 0 }}>{badge}</span>
              )}
            </button>
          );
        })}
      </nav>

      {/* Footer */}
      <div style={{ padding: '10px 14px', borderTop: '1px solid #1A3060' }}>
        <div style={{ fontSize: 10, color: '#4A6480', lineHeight: 1.7 }}>
          <div>ผู้ป่วยทั้งหมด: <span style={{ color: '#A8C5DA', fontWeight: 600 }}>{data.patients.length} ราย</span></div>
          <div>High Risk: <span style={{ color: '#FCA5A5', fontWeight: 600 }}>{highRisk} ราย</span></div>
        </div>
        <div style={{ marginTop: 8, paddingTop: 8, borderTop: '1px dashed #1A3060', fontSize: 9, color: '#6B8AAF', lineHeight: 1.5 }}>
          <div style={{ fontWeight: 700, color: '#93C5FD' }}>จัดทำโดย</div>
          <div>ภก.อนัส มะยีแต</div>
          <div style={{ opacity: 0.85 }}>ฝ่ายเภสัชกรรมและคุ้มครองผู้บริโภค</div>
          <div style={{ opacity: 0.85 }}>โรงพยาบาลกรงปินัง</div>
        </div>
      </div>
    </aside>
