              <p style={{ margin:'2px 0 0', fontSize:11, color:C.textMuted }}>ต้องติดตามด่วน</p>
            </div>
            <Btn size="sm" variant="ghost" onClick={() => navigate('risk')}>ดูทั้งหมด</Btn>
          </div>
          {highRisk.length === 0 ? (
            <div style={{ textAlign:'center', padding:'28px 0' }}>
              <div style={{ fontSize:32 }}>✅</div>
              <div style={{ fontSize:13, color:C.textMuted, marginTop:8, fontWeight:600 }}>ไม่มีผู้ป่วย High Risk</div>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {highRisk.slice(0,5).map(p => (
                <div key={p.id} className="rx-card-hover" style={{
                  display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
                  background:C.highBg, borderRadius:12, border:`1px solid ${C.highBorder}`, cursor:'pointer',
                }} onClick={() => navigate('history', p.id)}>
                  <div style={{
                    width:38, height:38, borderRadius:'50%', flexShrink:0,
                    background:'linear-gradient(135deg,#DC2626,#EF4444)',
                    color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
                    fontSize:15, fontWeight:800, boxShadow:'0 3px 10px rgba(220,38,38,0.35)',
                  }}>{p.firstName.charAt(0)}</div>
                  <div style={{ flex:1, minWidth:0 }}>
                    <div style={{ fontWeight:700, fontSize:12 }}>{p.prefix}{p.firstName} {p.lastName}</div>
                    <div style={{ fontSize:10, color:C.textMuted }}>HN: {p.hn}</div>
                  </div>
                  <DiagBadge diagnosis={p.diagnosis} />
                </div>
              ))}
              {highRisk.length > 5 && (
                <button onClick={() => navigate('risk')} style={{ background:'none', border:'none', cursor:'pointer', fontSize:12, color:C.primaryLight, fontWeight:700, padding:'6px 0', textAlign:'center' }}>
                  + {highRisk.length - 5} ราย →
                </button>
              )}
            </div>
          )}
        </Card>

        {/* Telepharmacy */}
        <Card>
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:14 }}>
            <div>
              <h3 style={{ margin:0, fontSize:14, fontWeight:700, color:'#0891B2' }}>📞 Telepharmacy</h3>
              <p style={{ margin:'2px 0 0', fontSize:11, color:C.textMuted }}>รอการโทรติดตาม</p>
            </div>
            <Btn size="sm" variant="ghost" onClick={() => navigate('telepharmacy')}>ดูทั้งหมด</Btn>
          </div>
          {pending.length === 0 ? (
            <div style={{ textAlign:'center', padding:'28px 0' }}>
              <div style={{ fontSize:32 }}>✅</div>
              <div style={{ fontSize:13, color:C.textMuted, marginTop:8, fontWeight:600 }}>ไม่มีนัดรอโทร</div>
            </div>
          ) : (
            <div style={{ display:'flex', flexDirection:'column', gap:8 }}>
              {pending.map(t => {
                const pt = getPt(t.patientId);
                const overdue = t.scheduledDate < todayStr;
                return (
                  <div key={t.id} className="rx-card-hover" style={{
                    display:'flex', alignItems:'center', gap:10, padding:'10px 12px',
                    background: overdue ? C.highBg : '#EFF6FF',
                    border:`1px solid ${overdue ? C.highBorder : '#BFDBFE'}`,
                    borderRadius:12, cursor:'pointer',
                  }} onClick={() => navigate('telepharmacy')}>
                    <div style={{
                      width:38, height:38, borderRadius:'50%', flexShrink:0,
                      background: overdue ? 'linear-gradient(135deg,#DC2626,#EF4444)' : 'linear-gradient(135deg,#0284C7,#06B6D4)',
                      color:'#fff', display:'flex', alignItems:'center', justifyContent:'center',
                      fontSize:18, boxShadow:`0 3px 10px ${overdue?'rgba(220,38,38,0.3)':'rgba(6,182,212,0.35)'}`,
                    }}>📞</div>
                    <div style={{ flex:1, minWidth:0 }}>
                      <div style={{ fontWeight:700, fontSize:12 }}>{pt ? `${pt.prefix}${pt.firstName} ${pt.lastName}` : '—'}</div>
                      <div style={{ fontSize:10, color:C.textMuted }}>{pt?.hn}</div>
                    </div>
                    <div style={{ textAlign:'right', flexShrink:0 }}>
                      <div style={{ fontSize:11, fontWeight:700, color: overdue ? C.high : '#0369A1' }}>{t.scheduledDate}</div>
                      {overdue && <div style={{ fontSize:9, color:C.high, fontWeight:600 }}>เกินกำหนด</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          )}
        </Card>
      </div>

      {/* ── Recent visits table ── */}
      <Card>
        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:16 }}>
          <div>
            <h3 style={{ margin:0, fontSize:14, fontWeight:700, color:C.primary }}>📋 บันทึกการบริบาลล่าสุด</h3>
            <p style={{ margin:'2px 0 0', fontSize:11, color:C.textMuted }}>5 รายการล่าสุด</p>
          </div>
          <Btn size="sm" variant="ghost" onClick={() => navigate('patients')}>ดูทั้งหมด</Btn>
        </div>
        {recentV.length === 0 ? (
          <EmptyState icon="📋" title="ยังไม่มีบันทึกการเยี่ยม" subtitle="เริ่มต้นโดยเพิ่มผู้ป่วยและบันทึกการบริบาล"
            action={<Btn variant="primary" onClick={() => navigate('patients')}>👥 ไปที่ทะเบียนผู้ป่วย</Btn>} />
        ) : (
          <div style={{ borderRadius:12, border:`1px solid ${C.border}`, overflow:'hidden' }}>
            <table style={{ width:'100%', borderCollapse:'collapse', fontSize:13 }}>
              <thead>
                <tr>{['วันที่','ผู้ป่วย','โรค','Exacerbation','Adherence','เทคนิคยาพ่น','Risk'].map(h => (
                  <th key={h} style={{ padding:'10px 14px', background:C.bgAlt, borderBottom:`1px solid ${C.border}`, textAlign:'left', fontSize:10, color:C.textMuted, fontWeight:700, textTransform:'uppercase', letterSpacing:'0.06em', whiteSpace:'nowrap' }}>{h}</th>
                ))}</tr>
              </thead>
              <tbody>
                {recentV.map((v, ri) => {
                  const pt = getPt(v.patientId);
                  return (
                    <tr key={v.id} style={{ borderBottom: ri < recentV.length-1 ? `1px solid ${C.border}` : 'none', cursor:'pointer', transition:'background 0.12s' }}
                      onClick={() => navigate('history', v.patientId)}
                      onMouseEnter={e => e.currentTarget.style.background='#F8FAFC'}
                      onMouseLeave={e => e.currentTarget.style.background='transparent'}>
                      <td style={{ padding:'12px 14px', fontFamily:'monospace', fontSize:11, color:C.textMuted }}>{v.visitDate}</td>
                      <td style={{ padding:'12px 14px' }}>
                        <div style={{ fontWeight:700, color:C.text }}>{pt ? `${pt.prefix}${pt.firstName} ${pt.lastName}` : '—'}</div>
                        <div style={{ fontSize:10, color:C.textMuted }}>{pt?.hn}</div>
                      </td>
                      <td style={{ padding:'12px 14px' }}><DiagBadge diagnosis={pt?.diagnosis} /></td>
                      <td style={{ padding:'12px 14px', fontSize:12 }}>
                        {v.exacerbation?.countThisYear ?? 0} ครั้ง
                        {v.exacerbation?.hospitalized && <span style={{ marginLeft:5, color:C.high, fontSize:10, fontWeight:700 }}>นอน รพ.</span>}
                      </td>
                      <td style={{ padding:'12px 14px' }}><AdherenceBadge level={v.adherence?.level} /></td>
                      <td style={{ padding:'12px 14px' }}>
                        {(v.inhalerTechnique||[]).map((t,i) => <span key={i} style={{ marginRight:4 }}><TechniqueBadge score={t.overallScore} /></span>)}
                        {(!v.inhalerTechnique||v.inhalerTechnique.length===0) && <span style={{ color:C.textMuted }}>—</span>}
                      </td>
                      <td style={{ padding:'12px 14px' }}><RiskBadge level={v.riskLevel} /></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        )}
      </Card>
    </div>
  );
}

// ── App ───────────────────────────────────────────────
function App() {
  // Auth — session เก็บแค่ใน localStorage (ไม่ใช่ข้อมูลแอพ)
  const [currentUser, setCurrentUser] = useState(() => {
    try { return JSON.parse(localStorage.getItem('copd_user_v1')); } catch { return null; }
  });

  // Data — null = ยังรอ Firebase (แสดง loading), object = โหลดแล้ว
  const [data, setData] = useState(null);
  const [fbReady, setFbReady] = useState(false); // Firebase โหลดครั้งแรกเสร็จ

  // Firebase
  const [syncStatus, setSyncStatus] = useState('syncing');
  const dbRef    = useRef(null);
  const unsubRef = useRef(null);
  const persistTried = useRef(false);   // กัน enablePersistence ถูกเรียกซ้ำ
  const currentUserRef = useRef(null);  // ใช้ใน callback ที่ไม่อยากผูก dep currentUser
  useEffect(() => { currentUserRef.current = currentUser; }, [currentUser]);

  // Nav
  const [view,         setView]         = useState('dashboard');
  const [selectedPtId, setSelectedPtId] = useState(null);
  const [teleAddPtId,  setTeleAddPtId]  = useState(null);
  const [searchOpen,   setSearchOpen]   = useState(false);
  const [editVisitId,  setEditVisitId]  = useState(null);
  const [isOnline,     setIsOnline]     = useState(navigator.onLine);
  const [isMobile,     setIsMobile]     = useState(() => window.innerWidth <= 900);
  const [navOpen,      setNavOpen]      = useState(false);
  const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
  const [showKbHelp,   setShowKbHelp]   = useState(false);
  const [fabOpen,      setFabOpen]      = useState(false);  // speed-dial quick actions
  const [appToast,     setAppToast]     = useState(null);   // {msg,type} global toast
  const [refreshing,   setRefreshing]   = useState(false);
  const [themeTick,    setThemeTick]    = useState(0);  // re-render on theme change
  const isDark = (typeof document !== 'undefined') && document.documentElement.getAttribute('data-theme') === 'dark';
  const prevSync = useRef('syncing');

  // แจ้งเตือนเมื่อ sync ล้มเหลว (toast ระดับแอพ)
  useEffect(() => {
    if (syncStatus === 'error' && prevSync.current !== 'error') {
      setAppToast({ msg: 'ซิงค์ข้อมูลขึ้น Cloud ไม่สำเร็จ — กำลังลองใหม่อัตโนมัติ', type: 'error' });
    } else if (syncStatus === 'synced' && prevSync.current === 'error') {
      setAppToast({ msg: 'เชื่อมต่อ Cloud อีกครั้งสำเร็จ', type: 'success' });
    }
    prevSync.current = syncStatus;
  }, [syncStatus]);

  useEffect(() => {
    if (!appToast) return;
    const t = setTimeout(() => setAppToast(null), 3800);
    return () => clearTimeout(t);
  }, [appToast]);

  // ติดตามขนาดหน้าจอ
  useEffect(() => {
    const h = () => setIsMobile(window.innerWidth <= 900);
    window.addEventListener('resize', h);
    return () => window.removeEventListener('resize', h);
  }, []);
  useEffect(() => { if (!isMobile) setNavOpen(false); }, [isMobile]);

  // Online/offline indicator
  useEffect(() => {
    const on  = () => setIsOnline(true);
    const off = () => setIsOnline(false);
    window.addEventListener('online',  on);
    window.addEventListener('offline', off);
    return () => { window.removeEventListener('online', on); window.removeEventListener('offline', off); };
  }, []);

  // Persist login session
  useEffect(() => {
    if (currentUser) localStorage.setItem('copd_user_v1', JSON.stringify(currentUser));
    else localStorage.removeItem('copd_user_v1');
  }, [currentUser]);

  // ── Firebase init ──────────────────────────────────
  const retryRef  = useRef(null);
  const lastRemoteSig  = useRef(null); // ลายเซ็นข้อมูลที่รับจาก Firebase ล่าสุด (กัน echo loop)
  const dataSig = (d) => { try { const {_savedAt,_editedBy,_backupAt,...r}=d||{}; return JSON.stringify(r); } catch { return ''; } };

  // Auto-backup — เก็บ snapshot หมุนเวียน 10 ช่อง ใน Firebase (best-effort, ทุก 6 ชม.)
  const maybeAutoBackup = useCallback(async (db, snapshot) => {
    if (!db || !snapshot) return;
    try {
      const KEY = 'copd_autobackup_v1';
      const meta = JSON.parse(localStorage.getItem(KEY) || '{"slot":0,"at":0}');
      if (Date.now() - (meta.at || 0) < 6 * 3600 * 1000) return; // ยังไม่ถึงรอบ (6 ชม.)
      const slot = (meta.slot || 0) % 10;
      await db.collection('clinic_backups').doc('slot_' + slot).set({
        _backupAt: Date.now(),
        _editedBy: currentUserRef.current?.name || currentUserRef.current?.username || '',
        data: { ...snapshot, _savedAt: snapshot._savedAt || Date.now() },
      });
      localStorage.setItem(KEY, JSON.stringify({ slot: (slot + 1) % 10, at: Date.now() }));
    } catch (e) { /* best-effort — ไม่ขัดจังหวะการใช้งาน */ }
  }, []);

  const initFirebase = useCallback(async (config, attempt = 0) => {
    if (unsubRef.current) { unsubRef.current(); unsubRef.current = null; }
    clearTimeout(retryRef.current);
    if (!config || typeof firebase === 'undefined') { setSyncStatus('offline'); return; }
    try {
      if (!firebase.apps.length) firebase.initializeApp(config);
      else firebase.app();
      const db = firebase.firestore();
      dbRef.current = db;

      // Offline persistence ถูกปิดไว้เพื่อป้องกัน IndexedDB pending-write queue
      // เขียนข้อมูลเก่ากลับ Firebase โดยไม่ตั้งใจ — ใช้ onSnapshot realtime แทน
      setSyncStatus('syncing');

      // โหลดครั้งแรก
      const snap = await db.collection('clinic').doc('main').get();
      let remote = snap.exists ? snap.data() : { patients:[], visits:[], telepharmacy:[], users:[], haCompliance:{medRec:[],adr:[],referrals:[],discharge:[],rca:[]}, _savedAt: Date.now() };
      lastRemoteSig.current = dataSig(remote);
      setData(remote);
      // Sync currentUser role from Firebase (localStorage session may have stale/missing role)
      setCurrentUser(prev => {
        if (!prev) return prev;
        const fresh = remote.users?.find(u => u.id === prev.id);
        if (!fresh) return prev;
        if (fresh.role === prev.role) return prev;
        const updated = { ...prev, role: fresh.role };
        try { localStorage.setItem('copd_user_v1', JSON.stringify(updated)); } catch {}
        return updated;
      });
      setFbReady(true);
      setSyncStatus('synced');

      // Auto-backup ตอนโหลด (ถ้าถึงรอบ) — เก็บ snapshot หมุนเวียนใน Firebase
      maybeAutoBackup(db, remote);

      // Realtime listener
      unsubRef.current = db.collection('clinic').doc('main').onSnapshot(
        doc => {
          if (!doc.exists) return;
          const d = doc.data();
          // ── เตือน conflict: ข้อมูลถูกแก้จากอีกเครื่อง/คน ──
          const me = currentUserRef.current?.name || currentUserRef.current?.username;
          if (d._editedBy && me && d._editedBy !== me && d._savedAt && (Date.now() - d._savedAt) < 60000) {
            setAppToast({ msg: `🔄 ข้อมูลถูกอัปเดตโดย ${d._editedBy} (อีกเครื่อง) — หน้าจอรีเฟรชแล้ว`, type: 'info' });
          }
          lastRemoteSig.current = dataSig(d);
          setData(d);
          setCurrentUser(prev => {
            if (!prev) return prev;
            const fresh = d.users?.find(u => u.id === prev.id);
            if (!fresh || fresh.role === prev.role) return prev;
            const updated = { ...prev, role: fresh.role };
            try { localStorage.setItem('copd_user_v1', JSON.stringify(updated)); } catch {}
            return updated;
          });
          setSyncStatus('synced');
        },
        err => {
          console.error('Firebase snapshot error:', err);
          setSyncStatus('error');
          if (attempt < 5) retryRef.current = setTimeout(() => initFirebase(config, attempt + 1), Math.min(2000 * Math.pow(2, attempt), 32000));
        }
      );
    } catch (e) {
      console.error('Firebase init error:', e);
      setSyncStatus('error');
      if (attempt < 5) retryRef.current = setTimeout(() => initFirebase(config, attempt + 1), Math.min(2000 * Math.pow(2, attempt), 32000));
    }
  }, []);

  useEffect(() => {
    const cfg = loadFBConfig();
    if (cfg) initFirebase(cfg);
    else setSyncStatus('offline');
  }, []);

  // ── เขียนข้อมูลขึ้น Firebase เท่านั้น ──────────────
  const saveTimer = useRef(null);
  const pendingData = useRef(null);     // ข้อมูลล่าสุดที่ยังเขียนขึ้น cloud ไม่สำเร็จ
  const [pendingSync, setPendingSync] = useState(false);  // มีงานค้าง sync หรือไม่

  const flushToCloud = useCallback((nd) => {
    const sig = dataSig(nd);
    if (sig === lastRemoteSig.current) { pendingData.current = null; setPendingSync(false); return; }
    setSyncStatus('syncing');
    const payload = { ...nd, _savedAt: Date.now(), _editedBy: currentUserRef.current?.name || currentUserRef.current?.username || '' };
    dbRef.current.collection('clinic').doc('main').set(payload)
      .then(() => {
        lastRemoteSig.current = dataSig(nd);
        pendingData.current = null; setPendingSync(false);
        setSyncStatus('synced');
        maybeAutoBackup(dbRef.current, payload);
      })
      .catch(err => {
        console.error('Firebase save error:', err);
        pendingData.current = nd; setPendingSync(true);  // เก็บไว้รอ retry เมื่อกลับมาออนไลน์
        setSyncStatus('error');
      });
  }, [maybeAutoBackup]);

  const handleDataChange = useCallback((nd) => {
    setData(nd);
    if (!dbRef.current || !fbReady) return;
    clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(() => flushToCloud(nd), 600);
  }, [fbReady, flushToCloud]);

  // เมื่อกลับมาออนไลน์ → flush งานที่ค้างอัตโนมัติ
  useEffect(() => {
    const onOnline = () => {
      if (pendingData.current && dbRef.current) {
        window.rxToast?.('เชื่อมต่ออีกครั้ง — กำลังซิงค์ข้อมูลที่ค้างไว้...', 'info');
        flushToCloud(pendingData.current);
      }
    };
    window.addEventListener('online', onOnline);
    return () => window.removeEventListener('online', onOnline);
  }, [flushToCloud]);

  const navigate = useCallback((target, patientId = null, extra = null) => {
    if (target === 'telepharmacy-add') {
      setTeleAddPtId(patientId); setView('telepharmacy');
    } else if (target === 'visit-form-edit') {
      setEditVisitId(extra);
      setSelectedPtId(patientId);
      setView('visit-form');
    } else {
      setView(target); setSelectedPtId(patientId);
      if (target !== 'visit-form') setEditVisitId(null);
      if (target !== 'telepharmacy') setTeleAddPtId(null);
    }
    document.getElementById('main-scroll')?.scrollTo({ top: 0 });
  }, []);

  const handleLogout = () => { localStorage.removeItem('copd_user_v1'); setCurrentUser(null); };

  // Deep link: ?hn=XXX (from QR patient card) → open that patient's history
  const hnLinkHandled = useRef(false);
  useEffect(() => {
    if (hnLinkHandled.current || !currentUser || !data) return;
    const params = new URLSearchParams(window.location.search);
    const hn = params.get('hn');
    if (hn) {
      const pt = (data.patients || []).find(p => p.hn === hn);
      if (pt) {
        navigate('history', pt.id);
        window.rxToast?.(`เปิดประวัติ ${pt.prefix}${pt.firstName} ${pt.lastName} จาก QR`, 'info');
      } else {
        window.rxToast?.(`ไม่พบผู้ป่วย HN: ${hn}`, 'error');
      }
      // Clean URL
      window.history.replaceState({}, '', window.location.pathname);
    }
    hnLinkHandled.current = true;
  }, [currentUser, data, navigate]);

  // ดึงข้อมูลล่าสุดจาก Firebase ด้วยตนเอง (กดรีเฟรช)
  const handleRefresh = useCallback(async () => {
    if (refreshing || !dbRef.current) return;
    setRefreshing(true);
    setSyncStatus('syncing');
    try {
      const snap = await dbRef.current.collection('clinic').doc('main').get();
      if (snap.exists) {
        const d = snap.data();
        lastRemoteSig.current = dataSig(d);
        setData(d);
      }
      setSyncStatus('synced');
      setAppToast({ msg: 'ดึงข้อมูลล่าสุดแล้ว', type: 'success' });
    } catch (e) {
      setSyncStatus('error');
    } finally {
      setRefreshing(false);
    }
  }, [refreshing]);

  // Ctrl+K / Cmd+K to open QuickSearch
  useEffect(() => {
    if (!currentUser) return;
    const handler = (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault(); setSearchOpen(true);
      }
      if (e.key === '?' && !e.ctrlKey && !e.metaKey && document.activeElement.tagName !== 'INPUT' && document.activeElement.tagName !== 'TEXTAREA') {
        e.preventDefault(); setShowKbHelp(h => !h);
      }
    };
    window.addEventListener('keydown', handler);
    return () => window.removeEventListener('keydown', handler);
  }, [currentUser]);

  // ⚠ Hooks ต้องอยู่ก่อน early-return ทุกอัน (Rules of Hooks) — ใช้ optional chaining กัน data=null
  const overdueHighRisk = useMemo(() => {
    const now = Date.now();
    return (data?.patients || []).filter(p => {
      if (p.riskLevel !== 'High') return false;
      const visits = (data?.visits || []).filter(v => v.patientId === p.id);
      if (visits.length === 0) return true;
      const last = Math.max(...visits.map(v => new Date(v.visitDate).getTime()));
      return (now - last) > 30 * 86400000;
    });
  }, [data]);

  // ── Loading — รอ Firebase โหลดครั้งแรก ───────────
  if (!fbReady) {
    return (
      <div style={{
        position:'fixed', inset:0, display:'flex', flexDirection:'column',
        alignItems:'center', justifyContent:'center', gap:18,
        background:'linear-gradient(145deg,#050B1E 0%,#0B1D45 38%,#0E2558 68%,#071230 100%)',
        fontFamily:'Sarabun,sans-serif',
      }}>
        <div style={{fontSize:48}}>🫁</div>
        <div style={{color:'#fff',fontSize:17,fontWeight:700}}>กำลังเชื่อมต่อ Firebase...</div>
        {syncStatus==='error' && (
          <div style={{color:'#FCA5A5',fontSize:13,marginTop:4}}>
            ⚠ เชื่อมต่อไม่ได้ กำลังลองใหม่...
          </div>
        )}
        <div style={{width:180,height:4,borderRadius:99,background:'rgba(255,255,255,0.1)',overflow:'hidden',marginTop:8}}>
          <div style={{height:'100%',width:'60%',borderRadius:99,background:'#3B82F6',animation:'rxPulse 1.2s ease-in-out infinite'}} />
        </div>
      </div>
    );
  }

  // ── Login gate ────────────────────────────────────
  if (!currentUser) {
    return <LoginScreen onLogin={u => setCurrentUser(u)} data={data} onDataChange={handleDataChange} syncStatus={syncStatus} />;
  }

  // Safety: data still null after fbReady (should not happen, but guard anyway)
  if (!data) {
    return (
      <div style={{ position:'fixed', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, background:'#F0F4F8', fontFamily:'Sarabun,sans-serif' }}>
        <div style={{fontSize:40}}>🫁</div>
        <div style={{fontSize:15,fontWeight:700,color:'#1E3A8A'}}>กำลังโหลดข้อมูล...</div>
      </div>
    );
  }
  const renderView = () => {
    switch (view) {
      case 'dashboard':
        return <Dashboard data={data} navigate={navigate} />;
      case 'patients':
        return <PatientList data={data} onDataChange={handleDataChange} navigate={navigate} />;
      case 'history':
        return selectedPtId
          ? <VisitHistory data={data} patientId={selectedPtId} navigate={navigate}
              onEditVisit={(vid) => navigate('visit-form-edit', selectedPtId, vid)} />
          : <PatientList data={data} onDataChange={handleDataChange} navigate={navigate} />;
      case 'visit-form':
        return selectedPtId
          ? <VisitForm data={data} patientId={selectedPtId}
              editingVisit={editVisitId ? data.visits.find(v => v.id === editVisitId) : null}
              onSave={handleDataChange} navigate={navigate} currentUser={currentUser} />
          : <PatientList data={data} onDataChange={handleDataChange} navigate={navigate} />;
      case 'risk':
        return <RiskScreeningView data={data} navigate={navigate} />;
      case 'telepharmacy':
        return <TelepharmacyView data={data} onDataChange={handleDataChange} navigate={navigate} initPatientId={teleAddPtId} />;
      case 'reports':
        return <ReportsView data={data} navigate={navigate} onDataChange={handleDataChange} />;
      case 'analytics':
        return <AnalyticsDashboard data={data} />;
      case 'ha':
        return <HAComplianceDashboard data={data} onDataChange={handleDataChange} currentUser={currentUser} />;
      case 'research':
        return <ResearchExportDashboard data={data} />;
      case 'settings':
        if (currentUser?.role !== 'admin') return (
          <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', minHeight:320, gap:12 }}>
            <div style={{ fontSize:48 }}>🔒</div>
            <div style={{ fontSize:16, fontWeight:700, color:'#1E40AF' }}>เฉพาะ Admin เท่านั้น</div>
            <div style={{ fontSize:13, color:'#64748B' }}>หน้านี้สงวนไว้สำหรับผู้ดูแลระบบเท่านั้น</div>
          </div>
        );
        return <SettingsView data={data} onDataChange={handleDataChange}
          currentUser={currentUser} onSwitch={u => setCurrentUser(u)}
          onConfigSave={initFirebase} syncStatus={syncStatus} />;
      default:
        return <Dashboard data={data} navigate={navigate} />;
    }
  };

  // ── High-risk overdue computation (>30 days no visit) ──
  // ── Breadcrumb ────────────────────────────────────
  const crumbMap = {
    dashboard: 'Dashboard', patients: 'ทะเบียนผู้ป่วย', risk: 'คัดกรองความเสี่ยง',
    telepharmacy: 'Telepharmacy', history: 'ประวัติการเยี่ยม',
    reports: 'รายงาน & Export', analytics: 'Analytics', ha: 'HA Compliance',
    research: 'Research Export',
    settings: 'ตั้งค่า', 'visit-form': 'บันทึกการบริบาล',
  };
  const crumb = crumbMap[view] || '';

  return (
    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>
      <AppBgCanvas />
      {isMobile
        ? <Sidebar view={view} navigate={navigate} data={data} syncStatus={syncStatus} currentUser={currentUser} mobile open={navOpen} onClose={() => setNavOpen(false)} collapsed={false} onToggleCollapse={() => {}} />
        : <Sidebar view={view} navigate={navigate} data={data} syncStatus={syncStatus} currentUser={currentUser} collapsed={sidebarCollapsed} onToggleCollapse={() => setSidebarCollapsed(c => !c)} />
      }

      <main id="main-scroll" style={{ flex: 1, overflowY: 'auto', background: 'transparent', position: 'relative', zIndex: 1 }}>
        {/* Top bar */}
        <div style={{
          position: 'sticky', top: 0, zIndex: 100,
          background: 'rgba(241,245,249,0.85)', backdropFilter: 'blur(16px)', WebkitBackdropFilter: 'blur(16px)',
          borderBottom: `1px solid ${C.border}`, padding: isMobile ? '0 14px' : '0 28px',
          display: 'flex', alignItems: 'center', justifyContent: 'space-between', height: 54, gap: 8,
        }}>
          {/* Breadcrumb */}
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 0 }}>
            {isMobile && (
              <button onClick={() => setNavOpen(true)} aria-label="เปิดเมนู" style={{
                width: 36, height: 36, borderRadius: 9, flexShrink: 0, cursor: 'pointer',
                background: C.surface, border: `1.5px solid ${C.border}`, color: C.primary,
                fontSize: 17, display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 1px 3px rgba(15,23,42,0.06)',
              }}>☰</button>
            )}
            <div style={{
              width: 30, height: 30, borderRadius: 8,
              background: 'linear-gradient(135deg,#1E40AF,#2563EB)',
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 15,
              boxShadow: '0 2px 8px rgba(37,99,235,0.3)',
            }}>{NAV.find(n=>n.id===view)?.icon || '📄'}</div>
            <div>
              <div style={{ fontSize: 14, fontWeight: 800, color: C.primary, lineHeight: 1.2 }}>{crumb}</div>
              <div style={{ fontSize: 10, color: C.textMuted }}>{NAV.find(n=>n.id===view)?.sub || ''}</div>
            </div>
          </div>

          <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexShrink: 0 }}>
            {/* Search */}
            {isMobile ? (
              <button onClick={() => setSearchOpen(true)} aria-label="ค้นหา" style={{
                width: 36, height: 36, borderRadius: 9, cursor: 'pointer',
                background: C.surface, border: `1.5px solid ${C.border}`, fontSize: 15,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 1px 3px rgba(15,23,42,0.06)',
              }}>🔍</button>
            ) : (
            <button onClick={() => setSearchOpen(true)} style={{
              display: 'flex', alignItems: 'center', gap: 8, padding: '6px 12px 6px 14px',
              borderRadius: 10, background: C.surface, border: `1.5px solid ${C.border}`,
              cursor: 'pointer', fontFamily: 'Sarabun, sans-serif',
              fontSize: 12, color: C.textMuted, transition: 'all 0.15s', minWidth: 220,
              boxShadow: '0 1px 3px rgba(15,23,42,0.06)',
            }}
            onMouseEnter={e => { e.currentTarget.style.borderColor = '#2563EB'; e.currentTarget.style.boxShadow='0 0 0 3px rgba(37,99,235,0.12)'; }}
            onMouseLeave={e => { e.currentTarget.style.borderColor = C.border; e.currentTarget.style.boxShadow='0 1px 3px rgba(15,23,42,0.06)'; }}>
              <span>🔍</span>
              <span style={{ flex: 1, textAlign: 'left' }}>ค้นหา HN / ชื่อผู้ป่วย...</span>
              <span style={{ fontSize: 10, fontWeight: 700, padding: '2px 6px', borderRadius: 5, background: C.bgAlt, color: C.textMuted, fontFamily: 'monospace', border: `1px solid ${C.border}` }}>⌘K</span>
            </button>
            )}

            {/* Offline badge */}
            {!isOnline && !isMobile && (
              <span style={{ fontSize: 11, fontWeight: 600, padding: '4px 12px', borderRadius: 20, background: C.mediumBg, color: C.medium, border: `1px solid ${C.mediumBorder}` }}>
                ⚫ ออฟไลน์
              </span>
            )}

            {/* Pending sync queue badge */}
            {pendingSync && !isMobile && (
              <button onClick={() => { if (pendingData.current) flushToCloud(pendingData.current); }}
                title="มีข้อมูลรอซิงค์ขึ้น Cloud — คลิกเพื่อลองอีกครั้ง"
                className="rx-pulse" style={{ fontSize: 11, fontWeight: 700, padding: '4px 12px', borderRadius: 20, background: C.mediumBg, color: C.medium, border: `1px solid ${C.mediumBorder}`, cursor: 'pointer' }}>
                ⏳ รอซิงค์ · ลองใหม่
              </button>
            )}

            {/* Dark mode toggle */}
            <button onClick={() => { window.rxToggleTheme?.(); setThemeTick(t => t + 1); }} aria-label="สลับธีมมืด/สว่าง" title="สลับโหมดมืด/สว่าง" className="rx-icon-wiggle" style={{
              width: 36, height: 36, borderRadius: 9, flexShrink: 0, cursor: 'pointer',
              background: C.surface, border: `1.5px solid ${C.border}`, color: C.primary, fontSize: 15,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              boxShadow: '0 1px 3px rgba(15,23,42,0.06)',
            }}>{isDark ? '☀️' : '🌙'}</button>

            {/* Refresh button — ดึงข้อมูลล่าสุดจาก Cloud */}
            <button onClick={handleRefresh} disabled={refreshing} aria-label="รีเฟรชข้อมูล" title="ดึงข้อมูลล่าสุดจาก Cloud" style={{
              width: 36, height: 36, borderRadius: 9, flexShrink: 0,
              cursor: refreshing ? 'default' : 'pointer',
              background: C.surface, border: `1.5px solid ${C.border}`, color: C.primary, fontSize: 15,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              boxShadow: '0 1px 3px rgba(15,23,42,0.06)',
            }}>
              <span className={refreshing ? 'rx-spin-icon' : ''} style={{ display: 'inline-block' }}>🔄</span>
            </button>

            {/* Sync badge */}
            {syncStatus !== 'offline' && !isMobile && (
              <span style={{
                fontSize: 11, fontWeight: 600, padding: '4px 12px', borderRadius: 20,
                background: syncStatus==='synced'?C.lowBg : syncStatus==='syncing'?'#EFF6FF':C.highBg,
                color:      syncStatus==='synced'?C.low   : syncStatus==='syncing'?'#0369A1':C.high,
                border: `1px solid ${syncStatus==='synced'?C.lowBorder : syncStatus==='syncing'?'#BFDBFE':C.highBorder}`,
              }}>
                {syncStatus==='synced'?'☁ ซิงค์แล้ว':syncStatus==='syncing'?'🔄 กำลังซิงค์...':'⚠ ซิงค์ผิดพลาด'}
              </span>
            )}

            {/* User + logout */}
            <div style={{ display:'flex', alignItems:'center', gap:8, padding: isMobile ? 4 : '5px 14px 5px 6px', borderRadius:24, background:'linear-gradient(135deg,#EFF6FF,#DBEAFE)', border:'1px solid #BFDBFE', boxShadow:'0 1px 3px rgba(37,99,235,0.1)' }}>
              <div style={{ width:28,height:28,borderRadius:'50%',background:'linear-gradient(135deg,#1E40AF,#2563EB)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,boxShadow:'0 2px 6px rgba(37,99,235,0.35)' }}>
                {currentUser.name.charAt(0)}
              </div>
              {!isMobile && <span style={{ fontSize:12.5,fontWeight:700,color:C.primary }}>{currentUser.prefix}{currentUser.name}</span>}
            </div>
            {isMobile ? (
            <button onClick={handleLogout} aria-label="ออกจากระบบ" style={{
              width: 36, height: 36, borderRadius: 9, cursor: 'pointer', flexShrink: 0,
              background: C.surface, border: `1.5px solid ${C.border}`, color: C.textMuted, fontSize: 15,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
            }}>⎋</button>
            ) : (
            <button onClick={handleLogout} style={{
              background:'none', border:`1.5px solid ${C.border}`, borderRadius:10, cursor:'pointer',
              padding:'5px 13px', fontSize:12, color:C.textMuted, fontFamily:'Sarabun,sans-serif',
              transition:'all 0.15s',
            }}
            onMouseEnter={e=>{e.currentTarget.style.background='#FEF2F2';e.currentTarget.style.color='#DC2626';e.currentTarget.style.borderColor='#FECACA';}}
            onMouseLeave={e=>{e.currentTarget.style.background='none';e.currentTarget.style.color=C.textMuted;e.currentTarget.style.borderColor=C.border;}}>
              ออกจากระบบ
            </button>
            )}
          </div>
        </div>

        {/* Content */}
        <div className="rx-page-pad" style={{ padding: isMobile ? '16px 14px' : '24px 28px' }}>
          <div key={view} className="rx-view">{renderView()}</div>
        </div>
      </main>

      <QuickSearch data={data} navigate={navigate}
        isOpen={searchOpen} onClose={() => setSearchOpen(false)} />

      <RxToastHost />

      {/* Quick Actions speed dial — all screens */}
      {view !== 'visit-form' && (
        <>
          {fabOpen && <div className="rx-qa-overlay" onClick={() => setFabOpen(false)} />}
          <div style={{ position: 'fixed', bottom: 26, right: 24, zIndex: 1200, display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 14 }}>
            {fabOpen && (
              <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end', gap: 12, marginBottom: 4 }}>
                {[
                  { icon: '👥', label: 'ทะเบียนผู้ป่วย', delay: '0.02s', run: () => navigate('patients') },
                  { icon: '🔍', label: 'ค้นหา / คำสั่ง (Ctrl+K)', delay: '0.06s', run: () => setSearchOpen(true) },
                  { icon: '📞', label: 'นัด Telepharmacy', delay: '0.10s', run: () => navigate('telepharmacy') },
                  { icon: '📊', label: 'Analytics', delay: '0.14s', run: () => navigate('analytics') },
                ].map((a, i) => (
                  <div key={i} className="rx-qa-item" style={{ animationDelay: a.delay }}>
                    <span style={{ background: C.surface, color: C.text, fontSize: 12, fontWeight: 600, padding: '6px 12px', borderRadius: 8, boxShadow: '0 4px 14px rgba(15,23,42,0.14)', whiteSpace: 'nowrap', border: `1px solid ${C.border}` }}>{a.label}</span>
                    <button onClick={() => { a.run(); setFabOpen(false); }} aria-label={a.label}
                      style={{ width: 46, height: 46, borderRadius: '50%', background: C.surface, border: `1px solid ${C.border}`, boxShadow: '0 4px 16px rgba(15,23,42,0.16)', cursor: 'pointer', fontSize: 20, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{a.icon}</button>
                  </div>
                ))}
              </div>
            )}
            <button className={`rx-qa-fab${fabOpen ? ' open' : ''}`} onClick={() => setFabOpen(o => !o)}
              style={{ position: 'static' }} aria-label="เมนูลัด" title="เมนูลัด (Quick Actions)">＋</button>
          </div>
        </>
      )}

      {/* Keyboard shortcuts modal */}
      {showKbHelp && (
        <div onClick={() => setShowKbHelp(false)} style={{
          position: 'fixed', inset: 0, background: 'rgba(15,23,42,0.45)', backdropFilter: 'blur(4px)',
          zIndex: 4000, display: 'flex', alignItems: 'center', justifyContent: 'center',
        }}>
          <div onClick={e => e.stopPropagation()} style={{
            background: C.surface, borderRadius: 16, padding: '24px 28px', width: 380, maxWidth: 'calc(100vw - 32px)',
            boxShadow: '0 24px 64px rgba(15,23,42,0.22)', border: `1px solid ${C.border}`,
            animation: 'rxKbIn 0.2s ease both',
          }}>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 18 }}>
              <div style={{ fontSize: 16, fontWeight: 800, color: C.primary }}>⌨️ Keyboard Shortcuts</div>
              <button onClick={() => setShowKbHelp(false)} style={{ background: 'none', border: 'none', cursor: 'pointer', fontSize: 18, color: C.textMuted }}>✕</button>
            </div>
            {[
              ['⌘ K', 'ค้นหาผู้ป่วย'],
              ['⌘ S', 'บันทึก Visit (ในฟอร์ม)'],
              ['?', 'แสดง / ซ่อน shortcuts นี้'],
              ['Esc', 'ปิด modal / dialog'],
            ].map(([key, desc]) => (
              <div key={key} style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '9px 0', borderBottom: `1px solid ${C.border}` }}>
                <span style={{ fontSize: 13, color: C.text }}>{desc}</span>
                <kbd style={{ fontSize: 11, fontWeight: 700, padding: '3px 9px', borderRadius: 6, background: '#F1F5F9', border: `1px solid ${C.border}`, fontFamily: 'monospace', color: C.primary }}>{key}</kbd>
              </div>
            ))}
            <div style={{ marginTop: 14, fontSize: 11, color: C.textMuted, textAlign: 'center' }}>กด ? หรือ Esc เพื่อปิด</div>
          </div>
        </div>
      )}

      {/* High-risk overdue alert banner */}
      {overdueHighRisk.length > 0 && view === 'dashboard' && (
        <div className="rx-alert-pulse" style={{
          position: 'fixed', bottom: isMobile ? 80 : 24, left: '50%', transform: 'translateX(-50%)',
          background: C.highBg, border: `1.5px solid ${C.highBorder}`, borderRadius: 12,
          padding: '12px 18px', display: 'flex', alignItems: 'center', gap: 10,
          boxShadow: '0 8px 24px rgba(220,38,38,0.15)', zIndex: 800,
          maxWidth: 'calc(100vw - 32px)', cursor: 'pointer',
        }} onClick={() => navigate('risk')}>
          <span style={{ fontSize: 18 }}>🔴</span>
          <div style={{ flex: 1, minWidth: 0 }}>
            <div style={{ fontSize: 13, fontWeight: 700, color: C.high }}>
              ผู้ป่วย High Risk ค้างนาน {overdueHighRisk.length} ราย (>30 วันไม่ได้เยี่ยม)
            </div>
            <div style={{ fontSize: 11, color: C.high, opacity: 0.8 }}>แตะเพื่อดูรายการคัดกรองความเสี่ยง</div>
          </div>
          <span style={{ fontSize: 12, color: C.high, fontWeight: 700, opacity: 0.7 }}>›</span>
        </div>
      )}

      {/* Global toast (sync status / refresh) */}
      {appToast && (
        <div onClick={() => setAppToast(null)} style={{
          position: 'fixed', bottom: 24, left: '50%', transform: 'translateX(-50%)',
          padding: '12px 18px', display: 'flex', alignItems: 'center', gap: 9, cursor: 'pointer',
          background: appToast.type === 'success' ? C.low : appToast.type === 'warning' ? C.medium : appToast.type === 'info' ? C.primaryLight : C.high,
          color: '#fff', borderRadius: 10, boxShadow: '0 10px 30px rgba(0,0,0,0.22)',
          fontSize: 13, fontWeight: 600, zIndex: 3000, maxWidth: 'calc(100vw - 32px)',
          animation: 'rxToastIn 0.25s ease both',
        }}>
          <span style={{ fontSize: 15 }}>{appToast.type === 'success' ? '✅' : appToast.type === 'warning' ? '⚠️' : appToast.type === 'info' ? '🔄' : '⛔'}</span>
          <span>{appToast.msg}</span>
        </div>
      )}
    </div>
  );
}

// ── Error Boundary — กัน render error ทำทั้งแอปขาว ──────
class RxErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { hasError: false, error: null }; }
  static getDerivedStateFromError(error) { return { hasError: true, error }; }
  componentDidCatch(error, info) { console.error('App render error:', error, info); }
  render() {
    if (this.state.hasError) {
      return (
        <div style={{ position:'fixed', inset:0, display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', gap:16, background:'#F0F4F8', fontFamily:'Sarabun,sans-serif', padding:24, textAlign:'center' }}>
          <div style={{ fontSize:48 }}>⚠️</div>
          <div style={{ fontSize:18, fontWeight:800, color:'#1E3A8A' }}>เกิดข้อผิดพลาดในการแสดงผล</div>
          <div style={{ fontSize:13, color:'#64748B', maxWidth:420 }}>
            ข้อมูลของคุณปลอดภัย (บันทึกใน Cloud แล้ว) — กรุณารีโหลดหน้าเพื่อใช้งานต่อ
          </div>
          <pre style={{ fontSize:11, color:'#94A3B8', maxWidth:'90vw', overflow:'auto', background:'#fff', padding:'8px 12px', borderRadius:8, border:'1px solid #E2E8F0' }}>
            {String(this.state.error?.message || this.state.error || '')}
          </pre>
          <button onClick={() => window.location.reload()} style={{ padding:'10px 24px', borderRadius:10, border:'none', background:'linear-gradient(135deg,#1E40AF,#2563EB)', color:'#fff', fontWeight:700, fontSize:14, cursor:'pointer', fontFamily:'inherit' }}>
            🔄 รีโหลดหน้า
          </button>
        </div>
      );
    }
    return this.props.children;
  }
}

ReactDOM.createRoot(document.getElementById('root')).render(
  <RxErrorBoundary><App /></RxErrorBoundary>
);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').then(
      (reg) => console.log('SW registered:', reg.scope),
      (err) => console.warn('SW registration failed:', err)
    );
  });
}
</script>
