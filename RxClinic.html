              </span>
            </div>
          );
        })}
      </div>
    </Card>
  );
}

// ── Automatic DRP Detection Engine ──────────────────
// ตรวจจับ Drug Related Problems อัตโนมัติจากข้อมูลที่บันทึกใน Visit
// ครอบคลุมทั้งระบบยา ตาม Cipolle/PCNE taxonomy (7 หมวดหลัก)
// คืนค่า array ของ { code, categoryEn, categoryTh, severity, problemEn, problemTh, actionEn, actionTh }
function detectDRP(visit, patient) {
  if (!visit) return [];
  const out = [];
  const meds        = visit.medications || [];
  const medNames    = meds.map(m => (m.name || '').toLowerCase());
  const techs       = visit.inhalerTechnique || [];
  const adh         = visit.adherence || {};
  const ex          = visit.exacerbation || {};
  const a           = visit.assessments || {};
  const dx          = patient?.diagnosis;            // 'COPD' | 'Asthma' | 'Both'
  const isResp      = dx === 'COPD' || dx === 'Asthma' || dx === 'Both';
  const smoker      = patient?.smokingStatus === 'Current';

  const has = (kw) => medNames.some(n => n.includes(kw.toLowerCase()));
  const catOf = (name) => {
    const m = (AppStore.COMMON_MEDICATIONS || []).find(x => x.name === name);
    return m ? m.category : '';
  };
  const cats = meds.map(m => catOf(m.name));
  const hasCat = (frag) => cats.some(c => (c || '').toLowerCase().includes(frag.toLowerCase()));
  const hasICS  = hasCat('ICS');
  const hasSABA = hasCat('SABA');
  const hasLABA = hasCat('LABA');
  const hasLAMA = hasCat('LAMA');

  const exYear = Number(ex.countThisYear) || 0;
  const hosp   = !!ex.hospitalized;

  // ── Category 1: Indication — Needs additional drug therapy (ต้องการยาเพิ่ม) ──
  // 1a) ผู้ป่วยทางเดินหายใจที่มียา controller แต่ไม่มี SABA rescue
  if (isResp && meds.length > 0 && (hasICS || hasLABA || hasLAMA) && !hasSABA) {
    out.push({ code: 'P1.2', categoryEn: 'Needs additional drug therapy', categoryTh: 'ต้องการยาเพิ่มเติม',
      severity: 'Medium',
      problemEn: 'No rescue reliever (SABA) prescribed alongside controller therapy',
      problemTh: 'ไม่มียาขยายหลอดลมออกฤทธิ์สั้น (SABA) สำหรับบรรเทาอาการเฉียบพลัน',
      actionEn: 'Ensure a SABA reliever (e.g. Salbutamol MDI) is available for acute symptoms',
      actionTh: 'ควรมียา SABA (เช่น Salbutamol MDI) ติดตัวไว้บรรเทาอาการกำเริบ' });
  }
  // 1b) Asthma ที่ใช้ SABA อย่างเดียว ไม่มี ICS controller (SABA-only treatment — ห้ามตาม GINA)
  if ((dx === 'Asthma' || dx === 'Both') && hasSABA && !hasICS) {
    out.push({ code: 'P1.2', categoryEn: 'Needs additional drug therapy', categoryTh: 'ต้องการยาเพิ่มเติม',
      severity: 'High',
      problemEn: 'SABA-only treatment in asthma without ICS controller (against GINA)',
      problemTh: 'ใช้ SABA อย่างเดียวในโรคหืดโดยไม่มี ICS (ขัดกับแนวทาง GINA)',
      actionEn: 'Initiate ICS-containing controller therapy; SABA-only increases exacerbation/mortality risk',
      actionTh: 'ควรเริ่มยา controller ที่มี ICS — การใช้ SABA เดี่ยวเพิ่มความเสี่ยงกำเริบและเสียชีวิต' });
  }
  // 1c) COPD กำเริบบ่อย (≥2/ปี หรือเคยนอน รพ.) แต่ไม่มี LABA/LAMA controller
  if ((dx === 'COPD' || dx === 'Both') && (exYear >= 2 || hosp) && !(hasLABA || hasLAMA)) {
    out.push({ code: 'P1.2', categoryEn: 'Needs additional drug therapy', categoryTh: 'ต้องการยาเพิ่มเติม',
      severity: 'High',
      problemEn: 'Frequent exacerbations without long-acting bronchodilator (LABA/LAMA)',
      problemTh: 'กำเริบบ่อยแต่ไม่มียาขยายหลอดลมออกฤทธิ์ยาว (LABA/LAMA)',
      actionEn: 'Consider stepping up to LABA+LAMA (±ICS) per GOLD to reduce exacerbations',
      actionTh: 'พิจารณาเพิ่ม LABA+LAMA (±ICS) ตาม GOLD เพื่อลดการกำเริบ' });
  }

  // ── Category 2: Unnecessary / duplicate drug therapy (ยาซ้ำซ้อน/ไม่จำเป็น) ──
  const dupCat = {};
  cats.forEach(c => { if (c) dupCat[c] = (dupCat[c] || 0) + 1; });
  Object.entries(dupCat).forEach(([c, n]) => {
    if (n >= 2) {
      out.push({ code: 'P3.2', categoryEn: 'Unnecessary / duplicate drug therapy', categoryTh: 'ยาซ้ำซ้อน/ไม่จำเป็น',
        severity: 'Medium',
        problemEn: `Therapeutic duplication: ${n} drugs in the same class (${c})`,
        problemTh: `ใช้ยาซ้ำกลุ่มเดียวกัน ${n} รายการ (${c})`,
        actionEn: 'Review for therapeutic duplication and consolidate to a single agent/class',
        actionTh: 'ทบทวนยาซ้ำซ้อนและรวมเหลือรายการเดียวในกลุ่มนั้น' });
    }
  });

  // ── Category 3: Drug interactions (ปฏิกิริยาระหว่างยา) — ใช้ engine เดิม ──
  (typeof checkInteractions === 'function' ? checkInteractions(meds, patient) : []).forEach(ix => {
    out.push({ code: 'P2.1', categoryEn: 'Drug interaction', categoryTh: 'ปฏิกิริยาระหว่างยา',
      severity: ix.severity || 'Medium',
      problemEn: `${ix.drug1} + ${ix.drug2}: ${ix.mechanism}`,
      problemTh: `${ix.drug1} + ${ix.drug2} — ${ix.mechanism}`,
      actionEn: ix.action,
      actionTh: ix.action });
  });

  // ── Category 4: Adverse drug reaction / safety (ผลข้างเคียง/ความปลอดภัย) ──
  // 4a) ICS โดยไม่ได้สอนล้างปาก → เสี่ยง oral candidiasis / dysphonia
  const counseled = visit.counselingTopics || [];
  const rinseCounseled = counseled.some(t => /ล้างปาก|rinse/i.test(t));
  if (hasICS && !rinseCounseled) {
    out.push({ code: 'P2.1', categoryEn: 'Adverse drug reaction (potential)', categoryTh: 'ผลข้างเคียงที่อาจเกิด',
      severity: 'Low',
      problemEn: 'ICS use without mouth-rinsing counseling — risk of oral candidiasis/dysphonia',
      problemTh: 'ใช้ ICS โดยยังไม่ได้สอนล้างปาก — เสี่ยงเชื้อราในช่องปาก/เสียงแหบ',
      actionEn: 'Counsel patient to rinse mouth and spit after each ICS dose',
      actionTh: 'สอนผู้ป่วยบ้วนปากทุกครั้งหลังพ่นยา ICS' });
  }
  // 4b) Smoker + Theophylline → metabolism เปลี่ยน, เสี่ยงระดับยาผันผวน
  if (smoker && has('theophylline')) {
    out.push({ code: 'P2.1', categoryEn: 'Adverse drug reaction (potential)', categoryTh: 'ผลข้างเคียงที่อาจเกิด',
      severity: 'Medium',
      problemEn: 'Smoking induces CYP1A2 → reduced & unstable theophylline levels',
      problemTh: 'การสูบบุหรี่เร่ง CYP1A2 → ระดับ Theophylline ต่ำและผันผวน',
      actionEn: 'Monitor theophylline level; counsel smoking cessation',
      actionTh: 'ตรวจระดับ Theophylline และแนะนำเลิกบุหรี่' });
  }
  // 4c) ใช้ OCS (Prednisolone) — ระวัง long-term steroid ADR
  if (has('prednisolone')) {
    out.push({ code: 'P2.1', categoryEn: 'Adverse drug reaction (monitoring)', categoryTh: 'เฝ้าระวังผลข้างเคียง',
      severity: 'Medium',
      problemEn: 'Oral corticosteroid in use — monitor for long-term steroid adverse effects',
      problemTh: 'มีการใช้สเตียรอยด์ชนิดกิน — เฝ้าระวังผลข้างเคียงระยะยาว',
      actionEn: 'Use shortest effective course; monitor BP/glucose/bone if chronic',
      actionTh: 'ใช้ระยะสั้นที่สุด; หากใช้ยาวควรเฝ้าระวังความดัน/น้ำตาล/กระดูก' });
  }

  // ── Category 5: Inhaler technique (เทคนิคยาพ่นไม่ถูกต้อง) ──
  const techPoor = techs.filter(t => t.overallScore === 'Poor');
  if (techPoor.length > 0) {
    const devs = techPoor.map(t => AppStore.INHALER_CHECKLISTS?.[t.device]?.label || t.device).join(', ');
    out.push({ code: 'P1.3', categoryEn: 'Incorrect inhaler technique', categoryTh: 'เทคนิคการใช้ยาพ่นไม่ถูกต้อง',
      severity: 'High',
      problemEn: `Poor inhaler technique on ${techPoor.length} device(s): ${devs}`,
      problemTh: `เทคนิคยาพ่นไม่ผ่าน ${techPoor.length} อุปกรณ์: ${devs}`,
      actionEn: 'Re-educate technique (teach-back) before any treatment step-up',
      actionTh: 'สอนเทคนิคซ้ำ (teach-back) ก่อนพิจารณาเพิ่มยา' });
  }

  // ── Category 6: Non-adherence (ความร่วมมือในการใช้ยาต่ำ) ──
  if (adh.level === 'Poor') {
    out.push({ code: 'P1.1', categoryEn: 'Non-adherence', categoryTh: 'ความร่วมมือในการใช้ยาต่ำ',
      severity: 'High',
      problemEn: 'Poor medication adherence detected',
      problemTh: 'พบความร่วมมือในการใช้ยาต่ำ',
      actionEn: 'Identify barrier (forgetfulness/ADR/cost/belief); simplify regimen, pill box, follow-up',
      actionTh: 'หาสาเหตุ (ลืม/ผลข้างเคียง/ค่าใช้จ่าย/ความเชื่อ); simplify ยา, จัดกล่องยา, นัดติดตาม' });
  } else if (adh.level === 'Fair' || adh.level === 'Acceptable') {
    out.push({ code: 'P1.1', categoryEn: 'Non-adherence', categoryTh: 'ความร่วมมือในการใช้ยาปานกลาง',
      severity: 'Medium',
      problemEn: 'Suboptimal medication adherence',
      problemTh: 'ความร่วมมือในการใช้ยาปานกลาง ยังไม่สม่ำเสมอ',
      actionEn: 'Reinforce importance of controller; close follow-up',
      actionTh: 'ย้ำความสำคัญของยาควบคุมและติดตามใกล้ชิด' });
  }
  // 6b) Per-medication adherence flag
  meds.forEach(m => {
    if (m.adherence === 'Poor' && m.name) {
      out.push({ code: 'P1.1', categoryEn: 'Non-adherence (specific drug)', categoryTh: 'ไม่ร่วมมือใช้ยาเฉพาะรายการ',
        severity: 'Medium',
        problemEn: `Poor adherence to ${m.name}`,
        problemTh: `ใช้ยา ${m.name} ไม่สม่ำเสมอ`,
        actionEn: 'Explore specific barrier for this drug and address it',
        actionTh: 'หาสาเหตุการไม่ใช้ยารายการนี้และแก้ไข' });
    }
  });

  // ── Category 7: Untreated indication — Smoking cessation (ข้อบ่งชี้ที่ยังไม่ได้รักษา) ──
  if (smoker) {
    out.push({ code: 'P1.2', categoryEn: 'Untreated indication (smoking)', categoryTh: 'ข้อบ่งชี้ที่ยังไม่ได้จัดการ (บุหรี่)',
      severity: 'High',
      problemEn: 'Current smoker — single most important modifiable factor in COPD/asthma',
      problemTh: 'ผู้ป่วยยังสูบบุหรี่ — ปัจจัยสำคัญที่สุดที่แก้ไขได้ในโรคปอด',
      actionEn: 'Provide 5A counseling; consider NRT/pharmacotherapy; refer cessation clinic',
      actionTh: 'ให้คำปรึกษา 5A; พิจารณา NRT/ยาเลิกบุหรี่; ส่งคลินิกเลิกบุหรี่' });
  }

  // ── Category 8: Dosage — high rescue (SABA) use signalling poor control ──
  if (ex.rescueMedUse === 'Daily' || ex.rescueMedUse === 'Often' || ex.rescueMedUse === 'Sometimes') {
    out.push({ code: 'P3.1', categoryEn: 'Dosage / overuse signal', categoryTh: 'สัญญาณใช้ยา rescue เกิน',
      severity: ex.rescueMedUse === 'Sometimes' ? 'Low' : 'Medium',
      problemEn: 'Frequent SABA reliever use (≥2/week) indicates inadequate disease control',
      problemTh: 'ใช้ยา rescue (SABA) บ่อย (≥2 ครั้ง/สัปดาห์) บ่งชี้ว่าคุมโรคได้ไม่ดี',
      actionEn: 'Reassess controller adequacy, technique and adherence before symptomatic treatment',
      actionTh: 'ประเมินยา controller, เทคนิค และ adherence ก่อนเพิ่มยาบรรเทาอาการ' });
  }

  // ── Category 9: Contraindication — comorbidity drug risks ──
  // 9a) NSAIDs (non-selective) in Asthma — NSAID-exacerbated respiratory disease (AERD ~5–20%)
  const hasNSAID = hasCat('NSAID');
  if (hasNSAID && (dx === 'Asthma' || dx === 'Both')) {
    out.push({ code: 'P2.2', categoryEn: 'Contraindication (relative)', categoryTh: 'ข้อห้ามใช้สัมพัทธ์',
      severity: 'High',
      problemEn: 'NSAID use in asthma patient — risk of NSAID-exacerbated respiratory disease (AERD)',
      problemTh: 'ใช้ NSAID ในผู้ป่วยหืด — เสี่ยง AERD (ผู้ป่วยหืด 5–20% แพ้ Aspirin/NSAIDs)',
      actionEn: 'Ask about NSAID/Aspirin sensitivity. If AERD suspected, switch to Paracetamol or COX2-inhibitor',
      actionTh: 'ซักประวัติแพ้ NSAID/Aspirin ถ้าสงสัย AERD ให้เปลี่ยนเป็น Paracetamol หรือ Celecoxib' });
  }
  // 9b) Non-selective Beta-blocker in Asthma — absolute contraindication
  const hasNSBB = hasCat('BB-NS');
  if (hasNSBB && (dx === 'Asthma' || dx === 'Both')) {
    out.push({ code: 'P2.2', categoryEn: 'Contraindication (absolute in Asthma)', categoryTh: 'ข้อห้ามใช้เด็ดขาดในหืด',
      severity: 'High',
      problemEn: 'Non-selective beta-blocker (Propranolol) in asthma — absolute contraindication',
      problemTh: 'ใช้ Beta-blocker ไม่ selective (Propranolol) ในผู้ป่วยหืด — ข้อห้ามใช้เด็ดขาด',
      actionEn: 'Discontinue non-selective BB; if BB required use cardioselective BB1 (Atenolol/Metoprolol) with close monitoring',
      actionTh: 'หยุด Non-selective BB ทันที ถ้าจำเป็นต้องใช้ BB เปลี่ยนเป็น Cardioselective BB (Atenolol/Metoprolol) พร้อมเฝ้าระวัง' });
  }
  // 9c) Cardioselective BB (Atenolol/Metoprolol/Carvedilol) in Asthma — relative caution
  const hasBB = hasCat('BB');
  if (hasBB && (dx === 'Asthma' || dx === 'Both')) {
    out.push({ code: 'P2.1', categoryEn: 'Adverse drug reaction (potential)', categoryTh: 'ระวังผลข้างเคียงในหืด',
      severity: 'Medium',
      problemEn: 'Cardioselective beta-blocker in asthma patient — use with caution',
      problemTh: 'Cardioselective BB ในผู้ป่วยหืด — ต้องระวัง (ยังอาจกระตุ้นหืดได้โดยเฉพาะขนาดสูง)',
      actionEn: 'Start at lowest dose; monitor for worsening of bronchospasm',
      actionTh: 'เริ่มขนาดต่ำที่สุด ติดตามอาการหลอดลมหดตัว ปรึกษาแพทย์ถ้าหืดแย่ลง' });
  }
  // 9d) BB (any) in COPD — relative caution
  if ((hasBB || hasNSBB) && dx === 'COPD') {
    out.push({ code: 'P2.1', categoryEn: 'Adverse drug reaction (potential)', categoryTh: 'ระวัง BB ใน COPD',
      severity: 'Low',
      problemEn: 'Beta-blocker in COPD — benefit often outweighs risk (for CV) but monitor respiratory',
      problemTh: 'Beta-blocker ใน COPD — โดยรวม benefit > risk สำหรับโรคหัวใจ แต่ต้องติดตามอาการปอด',
      actionEn: 'Use cardioselective BB; monitor respiratory symptoms and FEV1',
      actionTh: 'ใช้ Cardioselective BB ติดตามอาการทางปอดและ Spirometry' });
  }
  // 9e) ACE-I causing dry cough — may mimic or worsen respiratory disease
  const hasACEI = hasCat('ACE-I');
  if (hasACEI && isResp) {
    out.push({ code: 'P2.1', categoryEn: 'Adverse drug reaction (monitoring)', categoryTh: 'ระวัง ACE-I ทำให้ไอ',
      severity: 'Low',
      problemEn: 'ACE inhibitor-induced dry cough may be confused with or worsen respiratory disease',
      problemTh: 'ACE inhibitor อาจทำให้ไอแห้ง (พบ 10–20% ในคนเอเชีย) ซึ่งอาจสับสนกับอาการโรคปอด',
      actionEn: 'Ask specifically about dry cough; if present, consider switching to ARB',
      actionTh: 'ซักถามอาการไอแห้งโดยเฉพาะ ถ้ามีพิจารณาเปลี่ยนเป็น ARB (Losartan/Valsartan)' });
  }
  // 9f) Pioglitazone in Heart failure comorbidity
  const hasPioglit = has('pioglitazone');
  const hasHF = (patient?.comorbidities || []).some(c => /heart failure|HF/i.test(c));
  if (hasPioglit && hasHF) {
    out.push({ code: 'P2.2', categoryEn: 'Contraindication (relative)', categoryTh: 'ข้อห้ามใช้สัมพัทธ์ใน HF',
      severity: 'High',
      problemEn: 'Pioglitazone in patient with Heart Failure — increases fluid retention and worsens HF',
      problemTh: 'Pioglitazone ในผู้ป่วย Heart Failure — เพิ่ม fluid retention ทำให้ HF แย่ลง',
      actionEn: 'Discontinue Pioglitazone; switch to SGLT2 inhibitor (Empagliflozin/Dapagliflozin) which has cardiovascular benefit',
      actionTh: 'หยุด Pioglitazone; พิจารณาเปลี่ยนเป็น SGLT2-I (Empagliflozin/Dapagliflozin) ซึ่งมี CV benefit' });
  }

  // ── Category 10: Polypharmacy (≥5 medications) ──
  if (meds.length >= 5) {
    out.push({ code: 'P3.2', categoryEn: 'Polypharmacy risk', categoryTh: 'ความเสี่ยงจาก Polypharmacy',
      severity: meds.length >= 8 ? 'High' : 'Medium',
      problemEn: `Patient on ${meds.length} medications — polypharmacy increases ADR, interaction & adherence risk`,
      problemTh: `ผู้ป่วยใช้ยา ${meds.length} รายการ — Polypharmacy เพิ่มความเสี่ยง ADR ปฏิกิริยายา และการไม่ร่วมมือ`,
      actionEn: 'Conduct medication review: deprescribe, simplify, or consolidate regimen where clinically safe',
      actionTh: 'ทบทวนรายการยาทั้งหมด: ลดยาที่ไม่จำเป็น ปรับ regimen ให้ง่ายขึ้น และลดความเสี่ยง' });
  }

  // ── Category 11: GINA/GOLD step-up trigger ──
  const actSc = a.act?.allAnswered ? a.act.score : null;
  const catSc = a.cat?.allAnswered ? a.cat.score : null;
  if ((dx === 'Asthma' || dx === 'Both') && actSc !== null && actSc < 20 && hasICS && !hasLABA) {
    out.push({ code: 'P1.2', categoryEn: 'GINA step-up needed', categoryTh: 'ควร Step-Up ยาตาม GINA',
      severity: actSc < 16 ? 'High' : 'Medium',
      problemEn: `ACT ${actSc} — asthma ${actSc < 16 ? 'uncontrolled' : 'partially controlled'} on ICS monotherapy`,
      problemTh: `ACT ${actSc} — หืด${actSc < 16 ? 'ควบคุมไม่ได้' : 'ควบคุมได้บางส่วน'} ขณะใช้ ICS เดี่ยว (ยังไม่มี LABA)`,
      actionEn: 'Step up per GINA 2023: add LABA to ICS (ICS+LABA fixed combination preferred)',
      actionTh: 'Step-up ตาม GINA 2023: เพิ่ม LABA เข้ากับ ICS — ใช้ ICS+LABA fixed-dose combination' });
  }
  if ((dx === 'COPD' || dx === 'Both') && catSc !== null && catSc >= 10 && !hasLABA && !hasLAMA) {
    out.push({ code: 'P1.2', categoryEn: 'GOLD step-up needed', categoryTh: 'ควร Step-Up ยาตาม GOLD',
      severity: 'Medium',
      problemEn: `CAT ${catSc} ≥10 — COPD symptomatic (Group B/E) but no long-acting bronchodilator (LABA/LAMA)`,
      problemTh: `CAT ${catSc} ≥10 — COPD มีอาการมาก (Group B/E) แต่ยังไม่ได้รับ LABA หรือ LAMA`,
      actionEn: 'Initiate LAMA or LABA+LAMA per GOLD Group B/E recommendation',
      actionTh: 'เริ่ม LAMA หรือ LABA+LAMA ตามแนวทาง GOLD Group B/E' });
  }

  // ── Category 12: Renal-specific dose adjustments ──
  if (patient?.eGFR) {
    const egfr = Number(patient.eGFR);
    if (!isNaN(egfr)) {
      if (egfr < 30 && has('metformin')) {
        out.push({ code: 'P2.2', categoryEn: 'Contraindication (renal)', categoryTh: 'ข้อห้ามใช้ในไตบกพร่อง',
          severity: 'High',
          problemEn: `Metformin contraindicated: eGFR ${egfr} mL/min (<30) — risk of lactic acidosis`,
          problemTh: `Metformin ห้ามใช้เมื่อ eGFR ${egfr} mL/min (<30) — เสี่ยง lactic acidosis รุนแรง`,
          actionEn: 'Discontinue Metformin immediately; switch to SGLT2-I (if eGFR ≥25) or Insulin',
          actionTh: 'หยุด Metformin ทันที พิจารณาเปลี่ยนเป็น SGLT2-I (eGFR ≥25) หรือ Insulin' });
      } else if (egfr >= 30 && egfr < 45 && has('metformin')) {
        out.push({ code: 'P3.1', categoryEn: 'Dosage adjustment required (renal)', categoryTh: 'ต้องปรับขนาด Metformin',
          severity: 'Medium',
          problemEn: `Metformin caution: eGFR ${egfr} mL/min (30–45) — reduce dose, monitor renal function`,
          problemTh: `Metformin ต้องระวัง: eGFR ${egfr} mL/min (30–45) — ลดขนาดและตรวจ eGFR สม่ำเสมอ`,
          actionEn: 'Reduce Metformin to max 1000 mg/day; check eGFR every 3 months',
          actionTh: 'ลด Metformin เหลือ max 1000 mg/day ตรวจ eGFR ทุก 3 เดือน' });
      }
      if (egfr < 25 && (has('dapagliflozin') || has('empagliflozin'))) {
        out.push({ code: 'P2.2', categoryEn: 'Contraindication (renal)', categoryTh: 'ข้อห้ามใช้ SGLT2-I ในไตบกพร่อง',
          severity: 'High',
          problemEn: `SGLT2 inhibitor ineffective and unsafe: eGFR ${egfr} mL/min (<25)`,
          problemTh: `SGLT2 inhibitor ไม่มีประสิทธิภาพและอาจเป็นอันตราย: eGFR ${egfr} mL/min (<25)`,
          actionEn: 'Discontinue SGLT2 inhibitor when eGFR <25 mL/min',
          actionTh: 'หยุด SGLT2-I ทันที เมื่อ eGFR <25 mL/min' });
      }
      if (egfr < 30 && has('sitagliptin')) {
        out.push({ code: 'P3.1', categoryEn: 'Dosage adjustment required (renal)', categoryTh: 'ต้องปรับขนาด Sitagliptin',
          severity: 'High',
          problemEn: `Sitagliptin standard dose accumulates: eGFR ${egfr} mL/min (<30) — hypoglycemia risk`,
          problemTh: `Sitagliptin 100 mg สะสมเมื่อ eGFR ${egfr} mL/min (<30) — เสี่ยงน้ำตาลต่ำ`,
          actionEn: 'Reduce Sitagliptin to 25 mg OD when eGFR <30',
          actionTh: 'ลด Sitagliptin เหลือ 25 mg OD เมื่อ eGFR <30' });
      }
      if (egfr < 30 && has('digoxin')) {
        out.push({ code: 'P3.1', categoryEn: 'Dosage adjustment required (renal)', categoryTh: 'ต้องปรับขนาด Digoxin ในไตบกพร่อง',
          severity: 'High',
          problemEn: `Digoxin toxicity risk: eGFR ${egfr} mL/min (<30) — renal clearance severely reduced`,
          problemTh: `Digoxin เสี่ยง toxicity: eGFR ${egfr} mL/min (<30) — ไตขับถ่ายยาได้น้อยมาก`,
          actionEn: 'Reduce Digoxin to 0.0625–0.125 mg OD; monitor level (target 0.5–1 ng/mL) and K+',
          actionTh: 'ลด Digoxin เหลือ 0.0625–0.125 mg/day ตรวจ level (เป้าหมาย 0.5–1 ng/mL) และ K+' });
      }
      if (egfr < 30 && has('glibenclamide')) {
        out.push({ code: 'P2.2', categoryEn: 'Contraindication (renal)', categoryTh: 'ห้ามใช้ Glibenclamide ในไตบกพร่อง',
          severity: 'High',
          problemEn: `Glibenclamide contraindicated: eGFR ${egfr} mL/min (<30) — prolonged, severe hypoglycemia risk`,
          problemTh: `Glibenclamide ห้ามใช้: eGFR ${egfr} mL/min (<30) — เสี่ยงน้ำตาลต่ำรุนแรง/ยาวนาน`,
          actionEn: 'Discontinue Glibenclamide; switch to short-acting Repaglinide or low-dose Gliclazide',
          actionTh: 'หยุด Glibenclamide ทันที เปลี่ยนเป็น Repaglinide หรือ Gliclazide ขนาดต่ำ' });
      }
    }
  }

  // จัดเรียงตามความรุนแรง High → Medium → Low
  const rank = { High: 0, Medium: 1, Low: 2 };
  return out.sort((x, y) => (rank[x.severity] ?? 3) - (rank[y.severity] ?? 3));
}

// ── Auto SOAP Generation (concise bilingual) ────────────
function autoGenerateSOAP(visit, patient) {
  if (!visit || !patient) return { s: '', o: '', a: '', p: '' };
  const meds    = visit.medications || [];
  const ex      = visit.exacerbation || {};
  const adh     = visit.adherence || {};
  const a       = visit.assessments || {};
  const techs   = visit.inhalerTechnique || [];
  const dx      = patient?.diagnosis;
  const drps    = detectDRP(visit, patient);
  const catScore  = a.cat?.allAnswered  ? a.cat.score  : null;
  const actScore  = a.act?.allAnswered  ? a.act.score  : null;
  const mmrc      = a.mmrc?.grade != null ? a.mmrc.grade : null;
  const adhLevel  = adh.level || '';
  const exYear    = Number(ex.countThisYear) || 0;

  const adhMap    = { Good: 'ดี (Good)', Fair: 'พอใช้ (Fair)', Poor: 'ต่ำ (Poor)' };
  const dxLabel   = { COPD: 'COPD', Asthma: 'Asthma', Both: 'ACO (COPD+Asthma)' }[dx] || dx || '';
  const gold = (dx === 'COPD' || dx === 'Both') && typeof classifyGOLD !== 'undefined'
    ? classifyGOLD({ catScore, mmrcGrade: mmrc, exYear, hospitalized: !!ex.hospitalized }) : null;
  const gina = (dx === 'Asthma' || dx === 'Both') && typeof classifyGINA !== 'undefined'
    ? classifyGINA({ actScore, exYear }) : null;
  const poorTech = techs.filter(t => t.overallScore === 'Poor');

  // S — Subjective
  const sParts = [];
  if (visit.chiefComplaint) sParts.push(visit.chiefComplaint);
  const exPart = [];
  if (exYear > 0) exPart.push(`กำเริบ ${exYear} ครั้ง/ปี`);
  if (ex.hospitalized) exPart.push('นอน รพ.');
  if (ex.erVisit) exPart.push('เข้า ER');
  if (exPart.length) sParts.push(`Exacerbation: ${exPart.join(', ')}`);
  const rescueMap = { Never: '', Rarely: 'Rescue นานๆ ครั้ง', Sometimes: 'Rescue 2–3×/wk', Often: 'Rescue ทุกวัน', Daily: 'Rescue >1×/day' };
  if (ex.rescueMedUse && rescueMap[ex.rescueMedUse]) sParts.push(rescueMap[ex.rescueMedUse]);
  if ((ex.triggers || []).length) sParts.push(`Triggers: ${ex.triggers.join(', ')}`);
  if (adhLevel) sParts.push(`Adherence: ${adhMap[adhLevel] || adhLevel}`);
  if (patient.smokingStatus === 'Current') sParts.push('ยังสูบบุหรี่ / Current smoker');
  else if (patient.smokingStatus === 'Ex') sParts.push('Ex-smoker');

  // O — Objective
  const oParts = [];
  if (meds.length) oParts.push(`Meds: ${meds.map(m => `${m.name}${m.dose ? ' ' + m.dose : ''}`).join(', ')}`);
  const ap = [];
  if (catScore != null) { const ci = typeof interpretCAT !== 'undefined' ? interpretCAT(catScore) : null; ap.push(`CAT ${catScore}${ci ? ' ' + ci.label : ''}`); }
  if (actScore != null) { const ai = typeof interpretACT !== 'undefined' ? interpretACT(actScore) : null; ap.push(`ACT ${actScore}${ai ? ' ' + ai.label : ''}`); }
  if (mmrc != null) ap.push(`mMRC ${mmrc}`);
  if (ap.length) oParts.push(ap.join(' | '));
  if (gold) oParts.push(`GOLD 2023: ${gold.label} — ${gold.desc}`);
  if (gina) oParts.push(`GINA 2023: ${gina.step} (${gina.label})`);
  if (techs.length) oParts.push(`Inhaler technique: ${techs.map(t => `${t.device} → ${t.overallScore}`).join(', ')}`);

  // A — Assessment
  const aLines = [];
  aLines.push(`${dxLabel}${gold ? ' GOLD ' + gold.group : ''}${gina ? ' GINA ' + gina.step : ''} | Risk: ${{ High: 'สูง', Medium: 'ปานกลาง', Low: 'ต่ำ' }[visit.riskLevel] || ''}`);
  if (adhLevel) aLines.push(`Adherence: ${adhMap[adhLevel] || adhLevel}`);
  if (poorTech.length) aLines.push(`⚠ Inhaler technique ผิด: ${poorTech.map(t => t.device).join(', ')}`);
  if (drps.length) drps.forEach(d => aLines.push(`⚠ DRP [${d.code}] ${d.problemTh} (${d.severity})`));
  else aLines.push('No DRP detected');
  if ((visit.drp?.items || []).length) aLines.push(`DRP (manual): ${visit.drp.items.join('; ')}`);

  // P — Plan
  const pLines = [];
  let n = 1;
  if (gold) pLines.push(`${n++}. GOLD ${gold.label}: ${gold.rx}`);
  if (gina) pLines.push(`${n++}. GINA ${gina.step}: ${gina.rx}`);
  drps.filter(d => d.severity !== 'Low').forEach(d => pLines.push(`${n++}. [${d.code}] ${d.actionTh}`));
  if (poorTech.length) pLines.push(`${n++}. สอนเทคนิคยาพ่นซ้ำ: ${poorTech.map(t => t.device).join(', ')}`);
  if (adhLevel === 'Poor' || adhLevel === 'Fair') pLines.push(`${n++}. ส่งเสริม adherence`);
  if ((visit.counselingTopics || []).length) pLines.push(`${n++}. Counseling: ${visit.counselingTopics.join(', ')}`);
  if (visit.nextVisit) pLines.push(`${n++}. นัดติดตาม / Next visit: ${visit.nextVisit}`);

  return { s: sParts.join('\n'), o: oParts.join('\n'), a: aLines.join('\n'), p: pLines.join('\n') };
}


// ── Auto Pharmacist Note (Telepharmacy — concise bilingual) ──
function autoPharmacistNote(visit, patient) {
  if (!visit || !patient) return '';
  const meds   = visit.medications || [];
  const ex     = visit.exacerbation || {};
  const adh    = visit.adherence || {};
  const drps   = detectDRP(visit, patient);
  const techs  = visit.inhalerTechnique || [];
  const a      = visit.assessments || {};
  const dx     = patient.diagnosis || '';
  const name   = `${patient.prefix || ''}${patient.firstName || ''} ${patient.lastName || ''}`.trim();
  const today  = visit.visitDate || new Date().toISOString().slice(0, 10);
  const pharm  = visit.pharmacist || '';
  const dxLabel = { COPD: 'COPD', Asthma: 'Asthma', Both: 'ACO (COPD/Asthma)' }[dx] || dx;
  const adhLevel = adh.level || '';
  const catScore = a.cat?.allAnswered ? a.cat.score : null;
  const actScore = a.act?.allAnswered ? a.act.score : null;
  const poorTech = techs.filter(t => t.overallScore === 'Poor');
  const exYear = Number(ex.countThisYear) || 0;

  const lines = [];
  lines.push(`[Telepharmacy] ${today}${pharm ? ' | ' + pharm : ''}`);
  lines.push(`Pt: ${name}${patient.hn ? ' HN ' + patient.hn : ''}, ${patient.age || '?'} ปี | Dx: ${dxLabel}`);
  if (meds.length) lines.push(`Rx: ${meds.map(m => m.name + (m.dose ? ' ' + m.dose : '')).join('; ')}`);

  const issues = [];
  if (adhLevel === 'Poor')  issues.push('Adherence ต่ำ (Poor)');
  else if (adhLevel === 'Fair') issues.push('Adherence พอใช้ (Fair)');
  if (exYear > 0)           issues.push(`กำเริบ ${exYear}×/ปี${ex.hospitalized ? ' (admit)' : ''}`);
  if (ex.rescueMedUse && !['Never','Rarely'].includes(ex.rescueMedUse)) issues.push(`Rescue ${ex.rescueMedUse}`);
  if (poorTech.length)      issues.push(`Technique ผิด: ${poorTech.map(t => t.device).join(', ')}`);
  if (catScore != null)     issues.push(`CAT ${catScore}`);
  if (actScore != null)     issues.push(`ACT ${actScore}`);
  if (issues.length) lines.push(`ประเด็น: ${issues.join(' | ')}`);

  if (drps.length) {
    lines.push(`DRP (${drps.length}): ${drps.map(d => `[${d.code}] ${d.problemTh}`).join('; ')}`);
    lines.push(`Plan: ${drps.slice(0,3).map(d => d.actionTh).join('; ')}`);
  } else {
    lines.push('No DRP detected');
  }
  if ((visit.counselingTopics || []).length) lines.push(`Counseling: ${visit.counselingTopics.join(', ')}`);
  if (visit.nextVisit) lines.push(`นัดครั้งถัดไป: ${visit.nextVisit}`);

  return lines.join('\n');
}

// ── Auto PCNE v9.1 Classification ─────────────────────
// แปลง DRP ที่ตรวจจับได้ (ตัวที่รุนแรงที่สุด) → PCNE v9.1 problem/cause/intervention/outcome
function autoPCNE(visit, patient) {
  const drps = detectDRP(visit, patient);
  if (!drps.length) return null;
  const top = drps[0]; // เรียง High → Low อยู่แล้ว เลือกตัวรุนแรงสุด

  // map ตาม categoryEn ของ DRP → PCNE v9.1
  // P: P1 ADE, P2 Treatment effectiveness, P3 Others
  // I: I0 none, I1 prescriber, I2 patient, I3 drug, I4 other, I5 referral
  const cat = top.categoryEn || '';
  let problem = 'P2.1', cause = 'C1.1', intervention = 'I1';

  if (/inhaler technique/i.test(cat)) {
    problem = 'P2.1'; cause = 'C6.2'; intervention = 'I2';        // เทคนิคผิด → effect ต่ำ → administration → counseling
  } else if (/non-adherence/i.test(cat)) {
    problem = 'P2.1'; cause = 'C7.2'; intervention = 'I2';        // adherence ต่ำ → effect ต่ำ → adherence → counseling
  } else if (/interaction/i.test(cat)) {
    problem = 'P1.1'; cause = 'C1.2'; intervention = 'I1';        // ปฏิกิริยา → ADE → contra → prescriber
  } else if (/contraindication/i.test(cat)) {
    problem = 'P1.1'; cause = 'C1.2'; intervention = 'I1';        // ข้อห้ามใช้
  } else if (/adverse drug reaction/i.test(cat)) {
    problem = 'P1.1'; cause = 'C1.1'; intervention = 'I2';        // ADR
  } else if (/duplicate|unnecessary/i.test(cat)) {
    problem = 'P3.1'; cause = 'C8.1'; intervention = 'I1';        // ยาซ้ำซ้อน/ไม่จำเป็น
  } else if (/needs additional|untreated/i.test(cat)) {
    problem = 'P2.1'; cause = 'C1.1'; intervention = 'I1';        // ต้องการยาเพิ่ม → effect ต่ำ → no drug → prescriber
  } else if (/dosage|overuse/i.test(cat)) {
    problem = 'P2.1'; cause = 'C3.1'; intervention = 'I1';        // ขนาด/ใช้เกิน
  }

  return { problem, cause, intervention, outcome: 'O0', resolved: false, _autoFrom: top.problemTh };
}

Object.assign(window, {
  AllergyBanner, InteractionAlerts, RenalAlert, SmokingBadge, VaccinationStatus,

});

// ── Login animated particle background (constellation) ──
function LoginCanvas() {
  const ref = React.useRef(null);
  stEffect(() => {
    const canvas = ref.current;
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    let w, h, raf, particles = [];
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const resize = () => {
      w = window.innerWidth; h = window.innerHeight;
      canvas.width = w * dpr; canvas.height = h * dpr;
      canvas.style.width = w + 'px'; canvas.style.height = h + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    };
    resize();
    window.addEventListener('resize', resize);
    const N = Math.min(80, Math.floor(w / 20));
    for (let i = 0; i < N; i++) {
      particles.push({
        x: Math.random() * w, y: Math.random() * h,
        r: Math.random() * 1.8 + 0.8,
        vx: (Math.random() - 0.5) * 0.35,
        vy: (Math.random() - 0.5) * 0.35,
      });
    }
    const LINK = 130;
    const draw = () => {
      ctx.clearRect(0, 0, w, h);
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.x += p.vx; p.y += p.vy;
        if (p.x < 0 || p.x > w) p.vx *= -1;
        if (p.y < 0 || p.y > h) p.vy *= -1;
        for (let j = i + 1; j < particles.length; j++) {
          const q = particles[j];
          const dx = p.x - q.x, dy = p.y - q.y;
          const dist = Math.sqrt(dx * dx + dy * dy);
          if (dist < LINK) {
            ctx.strokeStyle = 'rgba(96,165,250,' + (0.16 * (1 - dist / LINK)) + ')';
            ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(q.x, q.y); ctx.stroke();
          }
        }
        ctx.fillStyle = 'rgba(147,197,253,0.55)';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
      }
      raf = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(raf); window.removeEventListener('resize', resize); };
  }, []);
  return <canvas ref={ref} style={{ position: 'absolute', inset: 0, zIndex: 0, pointerEvents: 'none' }} />;
}

        background: 'linear-gradient(135deg, #1E3A8A 0%, #1D4ED8 60%, #2563EB 100%)',
        boxShadow: '0 8px 32px rgba(37,99,235,0.55)',
        display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 38,
      }}>
        <svg viewBox="0 0 48 48" width="42" height="42" fill="#FFFFFF" aria-label="lungs">
          <rect x="22.5" y="6" width="3" height="14" rx="1.5"/>
          <rect x="16" y="11" width="16" height="3" rx="1.5"/>
          <path d="M21 14c0 6-1 9-4 13s-6 6-6 11c0 3 2 5 5 5 4 0 5-3 5-8V14z"/>
          <path d="M27 14c0 6 1 9 4 13s6 6 6 11c0 3-2 5-5 5-4 0-5-3-5-8V14z"/>
        </svg>
      </div>
      <h1 style={{ color: '#FFFFFF', fontSize: 20, fontWeight: 800, margin: '0 0 4px', letterSpacing: '-0.3px' }}>
        Rx-COPD/Asthma Clinic
      </h1>
      <p style={{ color: 'rgba(147,197,253,0.75)', fontSize: 12, margin: '4px 0 0' }}>ระบบบริบาลเภสัชกรรมผู้ป่วยโรคปอด</p>
    </div>
  );

  // Shell: animated background + hero + card column.
  // NOTE: render function (not a component) so the card subtree is reconciled
  // by position — keeps input focus & avoids restarting the canvas each keystroke.
  const renderShell = (children) => (
    <div style={bgStyle}>
      <LoginCanvas />
      <div className="rx-blob rx-blob-1" />
      <div className="rx-blob rx-blob-2" />
      <div className="rx-blob rx-blob-3" />
      <div style={{
        position: 'relative', zIndex: 2, display: 'flex', alignItems: 'center',
        justifyContent: 'center', gap: 56, width: '100%', maxWidth: 1000, flexWrap: 'wrap',
      }}>
        {Hero()}
        <div className="rx-login-card" style={{ width: '100%', maxWidth: 400 }}>
          {MobileLogo()}
          {children}
        </div>
      </div>
    </div>
  );

  const NBtn = ({ label, onClick, disabled }) => (
    <button onClick={onClick} disabled={disabled} style={{
      width: '100%', aspectRatio: '1 / 1', maxWidth: 72, maxHeight: 72, minHeight: 56, borderRadius: '50%',
      justifySelf: 'center',
      border: disabled ? '1.5px solid rgba(255,255,255,0.07)' : '1.5px solid rgba(255,255,255,0.18)',
      background: disabled ? 'rgba(255,255,255,0.03)' : 'rgba(255,255,255,0.09)',
      cursor: disabled ? 'default' : 'pointer',
      fontSize: label === '⌫' ? 20 : 24, fontWeight: 600,
      color: disabled ? 'rgba(255,255,255,0.2)' : '#FFFFFF',
      fontFamily: 'Sarabun, sans-serif', transition: 'all 0.12s',
      display: 'flex', alignItems: 'center', justifyContent: 'center',
    }}
    onMouseEnter={e => !disabled && (e.currentTarget.style.background = 'rgba(255,255,255,0.2)')}
    onMouseLeave={e => !disabled && (e.currentTarget.style.background = 'rgba(255,255,255,0.09)')}>
      {label}
    </button>
  );

  const PinDots = ({ count, filled }) => (
    <div style={{ display: 'flex', gap: 14, justifyContent: 'center', margin: '18px 0 6px' }}>
      {Array.from({ length: count }).map((_, i) => (
        <div key={i} style={{
          width: 14, height: 14, borderRadius: '50%',
          background: i < filled ? '#FFFFFF' : 'transparent',
          border: i < filled ? 'none' : '2px solid rgba(255,255,255,0.3)',
          boxShadow: i < filled ? '0 0 10px rgba(255,255,255,0.5)' : 'none',
          transition: 'all 0.12s',
        }} />
      ))}
    </div>
  );

  const ErrBadge = ({ msg }) => msg ? (
    <div style={{
      background: 'rgba(239,68,68,0.18)', border: '1px solid rgba(239,68,68,0.35)',
      borderRadius: 20, padding: '7px 16px', fontSize: 12, color: '#FCA5A5',
      textAlign: 'center', margin: '10px 0',
    }}>{msg}</div>
  ) : null;

  const PrimaryBtn = ({ children, onClick }) => (
    <button onClick={onClick} style={{
      width: '100%', padding: '14px', borderRadius: 12,
      background: 'linear-gradient(135deg, #1E40AF 0%, #2563EB 100%)',
      boxShadow: '0 4px 18px rgba(37,99,235,0.4)',
      color: '#fff', border: 'none', cursor: 'pointer',
      fontSize: 15, fontWeight: 700, fontFamily: 'Sarabun, sans-serif', transition: 'all 0.15s',
    }}
    onMouseEnter={e => e.currentTarget.style.transform = 'translateY(-1px)'}
    onMouseLeave={e => e.currentTarget.style.transform = 'translateY(0)'}
    >{children}</button>
  );

  const BackBtn = ({ onClick }) => (
    <button onClick={onClick} style={{
      background: 'none', border: 'none', cursor: 'pointer',
      color: 'rgba(147,197,253,0.7)', fontSize: 13, fontFamily: 'Sarabun, sans-serif',
      display: 'flex', alignItems: 'center', gap: 5, padding: '0 0 16px',
    }}>‹ กลับ</button>
  );

  const Numpad = ({ onDigit, onBack, disabled }) => (
    <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, justifyContent: 'center', marginTop: 16, maxWidth: 256, marginLeft: 'auto', marginRight: 'auto' }}>
      {[1,2,3,4,5,6,7,8,9].map(n => <NBtn key={n} label={n} disabled={disabled} onClick={() => onDigit(String(n))} />)}
      <div />
      <NBtn label={0} disabled={disabled} onClick={() => onDigit('0')} />
      <NBtn label="⌫" onClick={onBack} />
    </div>
  );

  // ── Gate mode ──────────────────────────────────────
  if (mode === 'gate') {
    const pushGate = (d) => {
      if (gateInput.length >= 6) return;
      const next = gateInput + d;
      setGateInput(next); setGateErr('');
      if (next.length === clinicCode.length) {
        setTimeout(() => {
          if (next === clinicCode) { setGateInput(''); setGateErr(''); setMode('select'); }
          else { setGateErr('รหัสเข้าคลินิกไม่ถูกต้อง'); setGateInput(''); }
        }, 180);
      }
    };
    return renderShell(
        <div style={{ ...cardStyle, textAlign: 'center' }}>
          <div style={{ fontSize: 36, marginBottom: 8 }}>🔐</div>
          <h3 style={{ margin: '0 0 4px', fontSize: 16, fontWeight: 700, color: '#FFFFFF' }}>รหัสเข้าคลินิก</h3>
          <p style={{ margin: '0 0 4px', fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>
            กรุณากรอกรหัส {clinicCode.length} หลักเพื่อเข้าใช้งาน
          </p>
          <PinDots count={clinicCode.length} filled={gateInput.length} />
          <ErrBadge msg={gateErr} />
          <Numpad onDigit={pushGate} onBack={() => { setGateInput(p => p.slice(0,-1)); setGateErr(''); }} />
        </div>
    );
  }

  // ── Select mode ────────────────────────────────────
  if (mode === 'select') {
    return renderShell(
        <div style={cardStyle}>
          <h3 style={{ margin: '0 0 16px', fontSize: 15, fontWeight: 700, color: '#FFFFFF', textAlign: 'center' }}>
            เลือกผู้ใช้งาน
          </h3>
          {users.length === 0 ? (
            <div style={{ textAlign: 'center', padding: '16px 0 8px' }}>
              <div style={{ fontSize: 38, marginBottom: 8 }}>🛡️</div>
              <p style={{ color: 'rgba(255,255,255,0.45)', fontSize: 13, margin: 0, lineHeight: 1.7 }}>ยังไม่มีผู้ใช้ในระบบ<br/>กรุณาสร้างบัญชี <b style={{color:'#93C5FD'}}>Admin</b> คนแรก</p>
            </div>
          ) : (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 8, marginBottom: 12, maxHeight: 280, overflowY: 'auto' }}>
              {users.map(u => (
                <button key={u.id} onClick={() => {
                  setSelUser(u); setPin(''); setPinErr(''); setAttempts(0); setLockUntil(0); setLockSecs(0);
                  setMode(u.pin ? 'pin' : 'register');
                }} style={{
                  display: 'flex', alignItems: 'center', gap: 14, padding: '12px 16px', borderRadius: 14,
                  border: '1px solid rgba(255,255,255,0.12)', background: 'rgba(255,255,255,0.06)',
                  cursor: 'pointer', width: '100%', textAlign: 'left', transition: 'all 0.15s',
                  color: '#fff', fontFamily: 'Sarabun, sans-serif',
                }}
                onMouseEnter={e => { e.currentTarget.style.background='rgba(255,255,255,0.14)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.28)'; }}
                onMouseLeave={e => { e.currentTarget.style.background='rgba(255,255,255,0.06)'; e.currentTarget.style.borderColor='rgba(255,255,255,0.12)'; }}>
                  <div style={{
                    width: 44, height: 44, borderRadius: '50%', flexShrink: 0,
                    background: 'linear-gradient(135deg, #1E40AF, #2563EB)',
                    display: 'flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 18, fontWeight: 700, color: '#fff',
                    boxShadow: '0 4px 14px rgba(37,99,235,0.4)',
                  }}>{(u.name || '?').charAt(0)}</div>
                  <div style={{ flex: 1 }}>
                    <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                      <span style={{ fontWeight: 700, fontSize: 14 }}>{u.prefix}{u.name}</span>
                      {u.role === 'admin' && <span style={{ fontSize:9, fontWeight:700, background:'rgba(37,99,235,0.7)', color:'#BAE6FD', padding:'2px 7px', borderRadius:20 }}>ADMIN</span>}
                    </div>
                    <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)' }}>@{u.username}</div>
                  </div>
                  <div style={{ fontSize: 20, color: 'rgba(255,255,255,0.3)' }}>›</div>
                </button>
              ))}
            </div>
          )}
          {users.length === 0 ? (
            <button onClick={() => {
              setSelUser(null); setRegPfx('ภก.'); setRegName(''); setRegUname('');
              setRegPin(''); setRegConf(''); setRegStep(1); setRegPinStep('new'); setRegErr('');
              setMode('register');
            }} style={{
              width: '100%', padding: '11px', borderRadius: 12,
              border: '1px solid rgba(255,255,255,0.18)', background: 'rgba(255,255,255,0.05)',
              color: 'rgba(147,197,253,0.85)', fontFamily: 'Sarabun, sans-serif',
              fontSize: 13, fontWeight: 600, cursor: 'pointer',
            }}>+ สร้างบัญชีผู้ดูแลคนแรก</button>
          ) : (
            <div style={{
              textAlign: 'center', fontSize: 11.5, color: 'rgba(255,255,255,0.4)',
              padding: '10px 8px 2px', lineHeight: 1.7,
            }}>
              🔒 การเพิ่มผู้ใช้ใหม่ต้องทำในแอพ (ตั้งค่า → จัดการผู้ใช้)<br/>โดยผู้ดูแลระบบเท่านั้น
            </div>
          )}
        </div>
    );
  }

  // ── PIN mode ───────────────────────────────────────
  if (mode === 'pin' && selUser) {
    const isLocked = lockUntil > Date.now();
    const pushDigit = (d) => {
      if (isLocked || pin.length >= 4) return;
      const next = pin + d;
      setPin(next); setPinErr('');
      if (next.length === 4) {
        setTimeout(() => {
          if (next === selUser.pin) { onLogin(selUser); return; }
          const na = attempts + 1;
          setAttempts(na); setPin('');
          if (na >= 5) {
            const until = Date.now() + 30000;
            setLockUntil(until); setLockSecs(30);
            setPinErr('ล็อกชั่วคราว 30 วินาที (พยายามผิดเกิน 5 ครั้ง)');
          } else {
            setPinErr(`PIN ไม่ถูกต้อง · เหลือ ${5 - na} ครั้ง`);
          }
        }, 180);
      }
    };
    return renderShell(
        <div style={{ ...cardStyle, textAlign: 'center' }}>
          <BackBtn onClick={() => { setMode('select'); setPin(''); setPinErr(''); setAttempts(0); setLockUntil(0); }} />
          <div style={{
            width: 64, height: 64, borderRadius: '50%', margin: '0 auto 10px',
            background: 'linear-gradient(135deg, #1E40AF, #2563EB)',
            boxShadow: '0 8px 24px rgba(37,99,235,0.45)',
            display: 'flex', alignItems: 'center', justifyContent: 'center',
            fontSize: 24, fontWeight: 700, color: '#fff',
          }}>{(selUser.name || '?').charAt(0)}</div>
          <div style={{ fontWeight: 700, fontSize: 15, color: '#FFFFFF', marginBottom: 2 }}>
            {selUser.prefix}{selUser.name}
          </div>
          <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.4)' }}>กรอก PIN 4 หลัก</div>
          {isLocked ? (
            <div style={{ padding: '24px 0 8px' }}>
              <div style={{ fontSize: 38, marginBottom: 8 }}>🔒</div>
              <div style={{ color: '#FCA5A5', fontSize: 14, fontWeight: 700 }}>บัญชีถูกล็อกชั่วคราว</div>
              <div style={{ color: 'rgba(255,255,255,0.45)', fontSize: 12, marginTop: 6 }}>ลองใหม่ใน {lockSecs} วินาที</div>
            </div>
          ) : (
            <>
              <PinDots count={4} filled={pin.length} />
              <ErrBadge msg={pinErr} />
              <Numpad onDigit={pushDigit} onBack={() => { setPin(p => p.slice(0,-1)); setPinErr(''); }} />
            </>
          )}
        </div>
    );
  }

  // ── Register mode ──────────────────────────────────
  if (mode === 'register') {
    const handleInfoNext = () => {
      if (!regName.trim()) { setRegErr('กรุณากรอกชื่อ-นามสกุล'); return; }
      if (!selUser) {
        if (!regUname.trim()) { setRegErr('กรุณากรอก username'); return; }
        const existing = (data && data.users) || [];
        if (existing.find(u => u.username === regUname.trim().toLowerCase())) {
          setRegErr('username นี้มีอยู่แล้ว'); return;
        }
      }
      setRegErr(''); setRegPin(''); setRegConf(''); setRegPinStep('new'); setRegStep(2);
    };
    const pushRegPin = (d) => {
      if (regPinStep === 'new') {
        if (regPin.length >= 4) return;
        const next = regPin + d;
        setRegPin(next); setRegErr('');
        if (next.length === 4) setTimeout(() => { setRegPinStep('confirm'); setRegConf(''); }, 200);
      } else {
        if (regConf.length >= 4) return;
        const next = regConf + d;
        setRegConf(next); setRegErr('');
        if (next.length === 4) {
          setTimeout(() => {
            if (next !== regPin) {
              setRegErr('PIN ไม่ตรงกัน ลองใหม่');
              setRegPin(''); setRegConf(''); setRegPinStep('new'); return;
            }
            const existing = (data && data.users) || [];
            if (selUser && !selUser.pin) {
              const upd = { ...selUser, pin: regPin, username: regUname.trim().toLowerCase() || selUser.username };
              onDataChange({ ...data, users: existing.map(u => u.id === selUser.id ? upd : u) });
              onLogin(upd);
            } else {
              // user แรกที่สร้าง → เป็น Admin อัตโนมัติ
              const isFirstUser = existing.length === 0;
              const nu = { id: AppStore.generateId(), prefix: regPfx, name: regName.trim(), username: regUname.trim().toLowerCase(), pin: regPin, role: isFirstUser ? 'admin' : 'user' };
              onDataChange({ ...data, users: [...existing, nu] });
              onLogin(nu);
            }
          }, 200);
        }
      }
    };
    const iStyle = {
      width: '100%', padding: '11px 14px', borderRadius: 10,
      border: '1px solid rgba(255,255,255,0.2)', background: 'rgba(255,255,255,0.08)',
      color: '#FFFFFF', fontFamily: 'Sarabun, sans-serif', fontSize: 14,
      outline: 'none', boxSizing: 'border-box', marginBottom: 10,
    };
    return renderShell(
        <div style={cardStyle}>
          <BackBtn onClick={() => { setMode('select'); setSelUser(null); setRegErr(''); setRegStep(1); }} />
          {regStep === 1 ? (
            <>
              <h3 style={{ margin: '0 0 18px', fontSize: 15, fontWeight: 700, color: '#FFFFFF' }}>
                {selUser && !selUser.pin ? `ตั้ง PIN — ${selUser.prefix}${selUser.name}` : users.length === 0 ? '🛡️ สร้างบัญชี Admin' : '✦ สมัครสมาชิกใหม่'}
              </h3>
              {!(selUser && !selUser.pin) && (
                <>
                  <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 6, display: 'block' }}>คำนำหน้า</label>
                  <div style={{ display: 'flex', gap: 8, marginBottom: 12 }}>
                    {['ภก.','ภญ.'].map(p => (
                      <button key={p} onClick={() => setRegPfx(p)} style={{
                        flex: 1, padding: '10px', borderRadius: 10,
                        border: regPfx === p ? '2px solid #3B82F6' : '1px solid rgba(255,255,255,0.15)',
                        background: regPfx === p ? 'rgba(59,130,246,0.25)' : 'rgba(255,255,255,0.06)',
                        color: '#fff', fontFamily: 'Sarabun, sans-serif', fontSize: 14, fontWeight: 600, cursor: 'pointer',
                      }}>{p}</button>
                    ))}
                  </div>
                  <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 4, display: 'block' }}>ชื่อ-นามสกุล</label>
                  <input value={regName} onChange={e => { setRegName(e.target.value); setRegErr(''); }}
                    placeholder="เช่น อนัส มะยีแต" autoFocus style={iStyle} />
                  <label style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginBottom: 4, display: 'block' }}>Username (ภาษาอังกฤษ)</label>
                  <input value={regUname} onChange={e => { setRegUname(e.target.value); setRegErr(''); }}
                    placeholder="เช่น anas" style={iStyle} />
                </>
              )}
              <ErrBadge msg={regErr} />
              <PrimaryBtn onClick={handleInfoNext}>ถัดไป →</PrimaryBtn>
            </>
          ) : (
            <div style={{ textAlign: 'center' }}>
              <div style={{ fontSize: 18, fontWeight: 700, color: '#FFFFFF', marginBottom: 4 }}>
                {regPinStep === 'new' ? '🔑 ตั้ง PIN 4 หลัก' : '✅ ยืนยัน PIN อีกครั้ง'}
              </div>
              <div style={{ fontSize: 12, color: 'rgba(255,255,255,0.45)' }}>
                {regPinStep === 'new' ? 'กด PIN ที่ต้องการตั้ง' : 'กด PIN ซ้ำเพื่อยืนยัน'}
              </div>
              <PinDots count={4} filled={regPinStep === 'new' ? regPin.length : regConf.length} />
              <ErrBadge msg={regErr} />
              <Numpad
                onDigit={pushRegPin}
                onBack={() => { setRegErr(''); regPinStep === 'new' ? setRegPin(p => p.slice(0,-1)) : setRegConf(p => p.slice(0,-1)); }}
              />
            </div>
          )}
        </div>
    );
  }

  return null;
}

// ── UserManager (Settings) ────────────────────────────
function UserManager({ data, onDataChange, currentUser }) {
  const users      = (data && data.users) || [];
  const clinicCode = (data && data.clinicCode) || '';
  const isAdmin    = currentUser?.role === 'admin';

  const [adding,   setAdding]   = stState(false);
  const [newPfx,   setNewPfx]   = stState('ภก.');
  const [newNm,    setNewNm]    = stState('');
  const [newUname, setNewUname] = stState('');
  const [newPin,   setNewPin]   = stState('');
  const [resetId,  setResetId]  = stState(null);
  const [resetPin, setResetPin] = stState('');
  const [msg,      setMsg]      = stState('');
  const [codeEdit, setCodeEdit] = stState(false);
  const [newCode,  setNewCode]  = stState('');
  const [codeMsg,  setCodeMsg]  = stState('');

  const handleAdd = () => {
    if (!newNm.trim() || !newUname.trim() || newPin.length !== 4) {
      setMsg('กรุณากรอกข้อมูลให้ครบและ PIN 4 หลัก'); return;
    }
    if (users.find(u => u.username === newUname.trim().toLowerCase())) {
      setMsg('username นี้มีอยู่แล้ว'); return;
    }
    const nu = { id: AppStore.generateId(), prefix: newPfx, name: newNm.trim(), username: newUname.trim().toLowerCase(), pin: newPin, role: 'user' };
    onDataChange({ ...data, users: [...users, nu] });
    setNewNm(''); setNewUname(''); setNewPin(''); setAdding(false); setMsg('');
  };

  const handleResetPIN = (id) => {
    if (resetPin.length !== 4) { setMsg('กรุณากรอก PIN 4 หลัก'); return; }
    onDataChange({ ...data, users: users.map(u => u.id === id ? { ...u, pin: resetPin } : u) });
    setResetId(null); setResetPin(''); setMsg('');
  };

  const handleSaveCode = () => {
    const c = newCode.replace(/\D/g, '');
    if (c.length < 4 || c.length > 6) { setCodeMsg('รหัสต้องเป็นตัวเลข 4–6 หลัก'); return; }
    onDataChange({ ...data, clinicCode: c });
    setCodeEdit(false); setNewCode(''); setCodeMsg('');
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      {/* Clinic Access Code — admin only */}
      {isAdmin && <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <div>
            <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>🔐 รหัสเข้าคลินิก</h4>
            <p style={{ margin: '3px 0 0', fontSize: 11, color: C.textMuted }}>
              ป้องกันคนนอกเข้าดูข้อมูลผู้ป่วย · ตัวเลข 4–6 หลัก
            </p>
          </div>
          <Btn size="sm" variant={clinicCode ? 'ghost' : 'primary'} onClick={() => { setCodeEdit(!codeEdit); setNewCode(''); setCodeMsg(''); }}>
            {clinicCode ? 'เปลี่ยน' : 'ตั้งรหัส'}
          </Btn>
        </div>
        <div style={{
          padding: '10px 14px', borderRadius: 8,
          background: clinicCode ? '#EFF6FF' : '#FEF2F2',
          border: `1px solid ${clinicCode ? '#BFDBFE' : '#FECACA'}`,
          fontSize: 13, fontWeight: 600,
          color: clinicCode ? '#1E40AF' : '#DC2626',
          display: 'flex', alignItems: 'center', gap: 8,
        }}>
          {clinicCode ? `🔒 ตั้งรหัสแล้ว (${clinicCode.length} หลัก)` : '🔓 ยังไม่ได้ตั้งรหัส — คนนอกสามารถเข้าได้'}
          {clinicCode && (

              placeholder="รหัสใหม่ 4–6 หลัก" maxLength={6} type="password" style={{
                width: '100%', padding: '9px 14px', borderRadius: 8, border: `1px solid ${C.border}`,
                fontFamily: 'Sarabun, sans-serif', fontSize: 16, textAlign: 'center', letterSpacing: 10,
                boxSizing: 'border-box', marginBottom: 8,

            <div style={{ display: 'flex', gap: 8 }}>

              <Btn size="sm" variant="ghost" onClick={() => { setCodeEdit(false); setCodeMsg(''); }}>ยกเลิก</Btn>
            </div>
          </div>
        )}
      </Card>}

      {/* User list */}
      <Card>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 14 }}>
          <div>
            <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.primary }}>👤 รายชื่อผู้ใช้</h4>
            {!isAdmin && <p style={{ margin: '3px 0 0', fontSize: 11, color: C.textMuted }}>เฉพาะ Admin เท่านั้นที่สามารถเพิ่ม/ลบ/รีเซ็ตผู้ใช้ได้</p>}
          </div>
          {isAdmin && <Btn size="sm" variant="primary" onClick={() => { setAdding(true); setMsg(''); }}>+ เพิ่มผู้ใช้</Btn>}
        </div>
        {adding && isAdmin && (
          <div style={{ padding: 12, background: '#F8FAFC', borderRadius: 8, border: `1px solid ${C.border}`, marginBottom: 12 }}>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8, alignItems: 'center' }}>
              <Select value={newPfx} onChange={setNewPfx} options={['ภก.','ภญ.']} style={{ width: 90 }} />
              <Input value={newNm} onChange={v => { setNewNm(v); setMsg(''); }} placeholder="ชื่อ นามสกุล" />
            </div>
            <div style={{ display: 'flex', gap: 8, marginBottom: 8 }}>
              <Input value={newUname} onChange={v => { setNewUname(v); setMsg(''); }} placeholder="username" />
              <input type="password" value={newPin} onChange={e => { setNewPin(e.target.value.replace(/\D/g,'').slice(0,4)); setMsg(''); }}
                placeholder="PIN 4 หลัก" maxLength={4} style={{
                  width: 120, padding: '8px 12px', borderRadius: 7, border: `1px solid ${C.border}`,
                  fontFamily: 'Sarabun, sans-serif', fontSize: 14, textAlign: 'center', letterSpacing: 8,
                }} />
            </div>
            {msg && <p style={{ color: C.high, fontSize: 12, margin: '0 0 8px' }}>{msg}</p>}
            <div style={{ display: 'flex', gap: 8 }}>
              <Btn size="sm" variant="primary" onClick={handleAdd}>บันทึก</Btn>
              <Btn size="sm" variant="ghost" onClick={() => { setAdding(false); setMsg(''); }}>ยกเลิก</Btn>
            </div>
          </div>
        )}
        <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
          {users.map(u => (
            <div key={u.id} style={{
              padding: '12px 14px', borderRadius: 8,
              border: `1px solid ${currentUser?.id === u.id ? '#BFDBFE' : C.border}`,
              background: currentUser?.id === u.id ? '#EFF6FF' : '#F8FAFC',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
                <div style={{
                  width: 38, height: 38, borderRadius: '50%',
                  background: currentUser?.id === u.id ? C.primary : '#94A3B8',
                  color: '#fff', display: 'flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 15, fontWeight: 700, flexShrink: 0,
                }}>{(u.name || '').charAt(0)}</div>
                <div style={{ flex: 1 }}>
                  <div style={{ display:'flex', alignItems:'center', gap:7 }}>
                    <span style={{ fontWeight: 600, fontSize: 13 }}>{u.prefix}{u.name}</span>
                    {u.role === 'admin' && <span style={{ fontSize:9, fontWeight:700, background:'#EFF6FF', color:'#1E40AF', padding:'2px 8px', borderRadius:20, border:'1px solid #BFDBFE' }}>ADMIN</span>}
                  </div>
                  <div style={{ fontSize: 11, color: C.textMuted }}>
                    @{u.username} &nbsp;·&nbsp; {u.pin ? '🔒 มี PIN' : '🔓 ไม่มี PIN'}
                    {currentUser?.id === u.id && <span style={{ marginLeft: 8, color: '#0369A1', fontWeight: 600 }}>● กำลังใช้งาน</span>}
                  </div>
                </div>
                {isAdmin && (
                <div style={{ display: 'flex', gap: 6 }}>
                  <Btn size="sm" variant="ghost" onClick={() => { setResetId(resetId === u.id ? null : u.id); setResetPin(''); setMsg(''); }}>
                    รีเซ็ต PIN
                  </Btn>
                  {currentUser?.id !== u.id && u.role !== 'admin' && <Btn size="sm" variant="danger" onClick={() => onDataChange({ ...data, users: users.filter(x => x.id !== u.id) })}>ลบ</Btn>}
                </div>
                )}
              </div>
              {resetId === u.id && isAdmin && (
                <div style={{ marginTop: 10, display: 'flex', gap: 8, alignItems: 'center' }}>
                  <input type="password" value={resetPin} onChange={e => { setResetPin(e.target.value.replace(/\D/g,'').slice(0,4)); setMsg(''); }}
                    placeholder="PIN ใหม่ 4 หลัก" maxLength={4} style={{
                      width: 160, padding: '7px 12px', borderRadius: 7, border: `1px solid ${C.border}`,
                      fontFamily: 'Sarabun, sans-serif', fontSize: 14, textAlign: 'center', letterSpacing: 8,
                    }} />
                  <Btn size="sm" variant="primary" onClick={() => handleResetPIN(u.id)}>บันทึก PIN</Btn>
                  <Btn size="sm" variant="ghost" onClick={() => { setResetId(null); setMsg(''); }}>ยกเลิก</Btn>
                  {msg && <span style={{ fontSize: 12, color: C.high }}>{msg}</span>}
                </div>
              )}
            </div>
          ))}
          {users.length === 0 && <EmptyState icon="👤" title="ยังไม่มีผู้ใช้ในระบบ" />}
        </div>
      </Card>

      {/* Danger zone — admin only: clear all patient data */}
      {isAdmin && (
        <Card>
          <h4 style={{ margin: 0, fontSize: 14, fontWeight: 700, color: C.high }}>⚠️ ล้างข้อมูลทั้งหมด</h4>
          <p style={{ margin: '4px 0 10px', fontSize: 11, color: C.textMuted }}>
            ลบข้อมูลผู้ป่วย การเยี่ยม และ Telepharmacy ทั้งหมดออกจากระบบ (เก็บบัญชีผู้ใช้และรหัสคลินิกไว้) — ใช้กรณีต้องการเริ่มต้นใหม่ด้วยข้อมูลจริงเท่านั้น
          </p>
          <Btn size="sm" variant="danger" onClick={() => {
            if (!window.confirm('ยืนยันลบข้อมูลผู้ป่วย/การเยี่ยม/Telepharmacy ทั้งหมด? การกระทำนี้ย้อนกลับไม่ได้')) return;
            if (!window.confirm('ยืนยันอีกครั้ง — ข้อมูลผู้ป่วยทั้งหมดจะถูกลบถาวร')) return;
            onDataChange({ ...data, patients: [], visits: [], telepharmacy: [],
              haCompliance: { medRec:[], adr:[], referrals:[], discharge:[], rca:[] } });
          }}>ล้างข้อมูลผู้ป่วยทั้งหมด</Btn>
        </Card>
      )}
    </div>
  );
}

// ── FirebaseSetup ─────────────────────────────────────
function FirebaseSetup({ onConfigSave, syncStatus }) {
  const [cfgText, setCfgText] = stState(() => {
    const c = loadFBConfig();
    return c ? JSON.stringify(c, null, 2) : '';
  });
  const [msg, setMsg]   = stState(null);
  const [busy, setBusy] = stState(false);

  const handleSave = async () => {
    try {
      const parsed = JSON.parse(cfgText);
      const needed = ['apiKey','authDomain','projectId'];
      const miss = needed.filter(k => !parsed[k]);
      if (miss.length) { setMsg({ ok: false, text: `ขาด field: ${miss.join(', ')}` }); return; }
      setBusy(true);
      saveFBConfig(parsed);
      const ok = await onConfigSave(parsed);
      setMsg(ok ? { ok: true, text: '✅ เชื่อมต่อ Firebase สำเร็จ!' }
                : { ok: false, text: '❌ เชื่อมต่อไม่สำเร็จ — ตรวจสอบ config และ Firestore Rules' });
    } catch (e) {
      setMsg({ ok: false, text: `JSON ไม่ถูกต้อง: ${e.message}` });
    } finally { setBusy(false); }
  };

  const sIcon = { synced:'🟢', syncing:'🔄', error:'🔴', offline:'⚫' };
  const sTxt  = {
    synced:  'เชื่อมต่อแล้ว — ข้อมูลซิงค์อัตโนมัติ',
    syncing: 'กำลังซิงค์ข้อมูล...',
    error:   'เชื่อมต่อไม่สำเร็จ',
    offline: 'ออฟไลน์ — บันทึกใน Local Storage',
  };

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
      <Card style={{ background: syncStatus==='synced' ? C.lowBg : syncStatus==='error' ? C.highBg : '#F8FAFC' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
          <span style={{ fontSize: 22 }}>{sIcon[syncStatus]||'⚫'}</span>
          <div>
            <div style={{ fontWeight: 600, fontSize: 13 }}>{sTxt[syncStatus]||'ออฟไลน์'}</div>
            <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>ข้อมูลในเครื่องปลอดภัยเสมอ แม้ไม่ได้เชื่อมต่อ</div>
          </div>
        </div>
      </Card>

      <Card style={{ background: '#EFF6FF', border: '1px solid #BFDBFE' }}>
        <h4 style={{ margin: '0 0 10px', fontSize: 13, fontWeight: 700, color: '#1E40AF' }}>📋 วิธีตั้งค่า Firebase (ฟรี)</h4>
        {['ไปที่ console.firebase.google.com → สร้าง Project ใหม่',
          'เลือก Firestore Database → Create database → Production mode',
          'ไปที่ Rules แก้เป็น: allow read, write: if true;  (สำหรับ intranet)',
          'Project Settings → Your apps → เพิ่ม Web App → คัดลอก firebaseConfig',
          'วาง config ด้านล่าง กด "เชื่อมต่อ"',
        ].map((s,i) => (
          <div key={i} style={{ display:'flex', gap:8, marginBottom:5, fontSize:12, color:'#1E40AF', alignItems:'flex-start' }}>
            <span style={{ width:18,height:18,borderRadius:'50%',background:'#1E40AF',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,fontWeight:700,flexShrink:0,marginTop:1 }}>{i+1}</span>
            {s}
          </div>
        ))}
        <div style={{ marginTop:10, padding:'8px 10px', background:'#DBEAFE', borderRadius:6, fontSize:11, color:'#1E40AF' }}>
          ⚠️ ข้อมูลผู้ป่วยจะถูกเก็บใน Google Cloud — กรุณาตรวจสอบนโยบาย PDPA ของโรงพยาบาลก่อนใช้งานจริง
        </div>
      </Card>

      <Card>
        <FormField label="Firebase Config (วาง JSON ที่นี่)"
          hint='ตัวอย่าง: { "apiKey": "AIza...", "authDomain": "xxx.firebaseapp.com", "projectId": "xxx", ... }'>
          <Textarea value={cfgText} onChange={v => { setCfgText(v); setMsg(null); }} rows={9}
            placeholder={'{\n  "apiKey": "AIza...",\n  "authDomain": "your-app.firebaseapp.com",\n  "projectId": "your-project-id",\n  "storageBucket": "your-app.appspot.com",\n  "messagingSenderId": "123456789",\n  "appId": "1:123456789:web:abc123"\n}'} />
        </FormField>
        {msg && (
          <div style={{ padding:'8px 12px', borderRadius:7, marginBottom:12, fontSize:13,
            background: msg.ok ? C.lowBg : C.highBg,
            color: msg.ok ? C.low : C.high, fontWeight:600 }}>{msg.text}</div>
        )}
        <div style={{ display:'flex', gap:8 }}>
          <Btn variant="primary" onClick={handleSave} disabled={busy || !cfgText.trim()}>
            {busy ? 'กำลังเชื่อมต่อ...' : '🔗 เชื่อมต่อ Firebase'}
          </Btn>
          {loadFBConfig() && (
            <Btn variant="danger" onClick={() => { saveFBConfig(null); setCfgText(''); setMsg(null); onConfigSave(null); }}>
              ยกเลิกการเชื่อมต่อ
            </Btn>
          )}
        </div>
      </Card>
    </div>
  );
}

// ── HA10: Competency Log ───────────────────────────────
const CPKEY = 'copd_competency_log';
function CompetencyLog({ currentUser }) {
  const load = () => { try { return JSON.parse(localStorage.getItem(CPKEY)) || []; } catch { return []; } };
  const [logs, setLogs] = React.useState(load);
  const [form, setForm] = React.useState({ date: new Date().toISOString().slice(0,10), type: 'Case Discussion', topic: '', patient: '', outcome: '', hours: 1 });
  const set = (k, v) => setForm(f => ({ ...f, [k]: v }));
  const save = () => {
    const entry = { ...form, id: Date.now().toString(), pharmacist: currentUser?.name || 'Unknown', ts: new Date().toISOString() };
    const updated = [entry, ...logs];
    setLogs(updated);
    localStorage.setItem(CPKEY, JSON.stringify(updated));
    setForm(f => ({ ...f, topic: '', patient: '', outcome: '' }));
  };
  const remove = (id) => { const u = logs.filter(l => l.id !== id); setLogs(u); localStorage.setItem(CPKEY, JSON.stringify(u)); };
  const totalHours = logs.reduce((s, l) => s + (parseFloat(l.hours) || 0), 0);
  const types = ['Case Discussion', 'Journal Club', 'Grand Round', 'In-service Training', 'Self-Study', 'Workshop', 'Conference', 'Other'];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', gap: 14 }}>
      <Card>
        <h4 style={{ margin: '0 0 12px', fontSize: 14, fontWeight: 700, color: C.primary }}>🎓 Pharmacist Competency Log — HRM Standard</h4>
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 10, marginBottom: 12 }}>
          <div style={{ padding: '10px 14px', background: '#EFF6FF', borderRadius: 8, textAlign: 'center' }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: C.primary }}>{logs.length}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>กิจกรรม CPD</div>
          </div>
          <div style={{ padding: '10px 14px', background: C.lowBg, borderRadius: 8, textAlign: 'center' }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: C.low }}>{totalHours.toFixed(1)}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>ชั่วโมง CPD</div>
          </div>
          <div style={{ padding: '10px 14px', background: '#FEF9C3', borderRadius: 8, textAlign: 'center' }}>
            <div style={{ fontSize: 24, fontWeight: 800, color: '#92400E' }}>{new Set(logs.map(l => l.type)).size}</div>
            <div style={{ fontSize: 11, color: C.textMuted }}>ประเภทกิจกรรม</div>
          </div>
        </div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 10, marginBottom: 10 }}>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>วันที่</div>
            <input type="date" value={form.date} onChange={e => set('date', e.target.value)}
              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit' }} />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>ประเภท</div>
            <select value={form.type} onChange={e => set('type', e.target.value)}
              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit' }}>
              {types.map(t => <option key={t}>{t}</option>)}
            </select>
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>ชั่วโมง</div>
            <input type="number" value={form.hours} min="0.5" step="0.5" onChange={e => set('hours', e.target.value)}
              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit' }} />
          </div>
          <div style={{ gridColumn: '1/-1' }}>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>หัวข้อ / กิจกรรม</div>
            <input value={form.topic} onChange={e => set('topic', e.target.value)}
              placeholder="เช่น GOLD 2024 Update, Case COPD Exacerbation ซ้ำ..."
              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit' }} />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>ผู้ป่วยที่เกี่ยวข้อง (ถ้ามี)</div>
            <input value={form.patient} onChange={e => set('patient', e.target.value)} placeholder="HN หรือ Case อ้างอิง"
              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit' }} />
          </div>
          <div>
            <div style={{ fontSize: 11, fontWeight: 700, color: C.textMuted, marginBottom: 4 }}>สิ่งที่เรียนรู้ / ผลลัพธ์</div>
            <input value={form.outcome} onChange={e => set('outcome', e.target.value)} placeholder="Key learning point..."
              style={{ width: '100%', padding: '7px 10px', border: `1px solid ${C.border}`, borderRadius: 7, fontSize: 12, fontFamily: 'inherit' }} />
          </div>
          <div style={{ display: 'flex', alignItems: 'flex-end' }}>
            <Btn variant="primary" onClick={save} disabled={!form.topic.trim()}>+ บันทึก CPD</Btn>
          </div>
        </div>
      </Card>
      <Card>
        <h4 style={{ margin: '0 0 10px', fontSize: 13, fontWeight: 700, color: C.primary }}>ประวัติกิจกรรม CPD</h4>
        {logs.length === 0
          ? <div style={{ fontSize: 12, color: C.textMuted }}>ยังไม่มีบันทึก</div>
          : logs.map(l => (
            <div key={l.id} style={{ padding: '10px 0', borderBottom: `1px solid ${C.border}`, display: 'flex', gap: 12, alignItems: 'flex-start' }}>
              <div style={{ width: 40, height: 40, borderRadius: 8, background: '#EFF6FF', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 10, fontWeight: 700, color: C.primaryLight, textAlign: 'center', flexShrink: 0, lineHeight: 1.3 }}>
                {l.hours}h
              </div>
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: C.text }}>{l.topic}</div>
                <div style={{ fontSize: 11, color: C.textMuted, marginTop: 2 }}>{l.date} · {l.type} · {l.pharmacist}</div>
                {l.outcome && <div style={{ fontSize: 11, color: C.accent, marginTop: 2 }}>💡 {l.outcome}</div>}
              </div>
              <button onClick={() => remove(l.id)} style={{ background: 'none', border: 'none', cursor: 'pointer', color: C.textMuted, fontSize: 14, flexShrink: 0 }}>✕</button>
            </div>
          ))
        }
      </Card>
    </div>
  );
}

        <div style={{ fontSize: 13, textAlign: 'center', maxWidth: 320, lineHeight: 1.7 }}>
          เฉพาะผู้ดูแลระบบ (Admin) เท่านั้นที่สามารถเข้าถึงหน้าตั้งค่าได้<br />

      <Tabs tabs={[

}

Object.assign(window, {
  LoginScreen, SettingsView, UserManager, FirebaseSetup,
  loadFBConfig, saveFBConfig,
});

<script type="text/babel">
// ExportUtils.jsx — CSV / PDF Export Utilities
// Requires: window.* from Shared.jsx

// ── CSV download (UTF-8 BOM for Thai Excel) ───────────
function downloadCSV(filename, headers, rows) {
  const escape = (v) => '"' + String(v ?? '').replace(/"/g, '""') + '"';
  const csv = [headers.map(escape).join(','), ...rows.map(r => r.map(escape).join(','))].join('\n');
  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8' });
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), { href: url, download: filename });
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

// ── Export: ทะเบียนผู้ป่วย ────────────────────────────
function exportPatients(patients) {
  downloadCSV(
    `ทะเบียนผู้ป่วย_${new Date().toISOString().slice(0,10)}.csv`,
    ['HN','คำนำหน้า','ชื่อ','นามสกุล','อายุ','เพศ','การวินิจฉัย','GOLD Grade',
     'Asthma Control','โรคร่วม','เบอร์โทร','สิทธิ์','ความเสี่ยง','ปัจจัยเสี่ยง','วันที่ลงทะเบียน'],
    patients.map(p => [
      p.hn, p.prefix, p.firstName, p.lastName,
      p.age, p.gender === 'M' ? 'ชาย' : 'หญิง',
      p.diagnosis, p.goldGrade || '', p.asthmaControl || '',
      (p.comorbidities || []).join('; '), p.phone, p.insurance,
      p.riskLevel || 'Low', (p.riskFlags || []).join('; '), p.createdAt,
    ])
  );
}

// ── Export: บันทึกการเยี่ยม ───────────────────────────
function exportVisits(visits, patients) {

     'ปัจจัยกระตุ้น','Rescue Use',
     'ยาที่ใช้','Adherence รายยา',
     'เทคนิคยาพ่น','SpO2','RR','BP',
     'Subjective','Objective','Assessment','Plan',
     'หัวข้อให้คำปรึกษา','ความเสี่ยง','เภสัชกร','นัดถัดไป'],
    visits.map(v => {

        pt?.diagnosis || '',

        ex.severity || '', (ex.triggers || []).join('; '), ex.rescueMedUse || '',
        (v.medications || []).map(m => `${m.name}(${m.dose})`).join('; '),
        (v.medications || []).map(m => `${m.name}:${m.adherence||'-'}`).join('; '),

        v.vitals?.spO2 || '', v.vitals?.rr || '', v.vitals?.bp || '',

// ── Export: Telepharmacy ──────────────────────────────

// ── PDF: รายงานสรุปคลินิกรายเดือน ────────────────────
function printMonthlyReport(data, yearMonth) {
  const [yr, mo] = yearMonth.split('-');
  const thMonth = ['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'][parseInt(mo)];
  const label = `${thMonth} ${parseInt(yr)+543}`;

  const mVis  = data.visits.filter(v => v.visitDate.startsWith(yearMonth));
  const mTele = data.telepharmacy.filter(t => (t.actualDate||t.scheduledDate||'').startsWith(yearMonth));
  const getPt  = id => data.patients.find(p => p.id === id);

  const hR = data.patients.filter(p => p.riskLevel==='High').length;
  const mR = data.patients.filter(p => p.riskLevel==='Medium').length;
  const lR = data.patients.filter(p => !p.riskLevel||p.riskLevel==='Low').length;
  const exTotal = mVis.reduce((s,v) => s+(v.exacerbation?.countThisYear||0),0);
  const hospC   = mVis.filter(v => v.exacerbation?.hospitalized).length;
  const poorAdh = mVis.filter(v => v.adherence?.level==='Poor').length;
  const poorTch = mVis.filter(v => (v.inhalerTechnique||[]).some(t=>t.overallScore==='Poor')).length;
  const tSucc   = mTele.filter(t=>t.status==='Success').length;
  const tTotal  = mTele.filter(t=>t.status!=='Pending').length;
  const tRate   = tTotal>0?Math.round(tSucc/tTotal*100):0;

  const visRows = mVis.map(v => {
    const pt = getPt(v.patientId);
    const rc = {High:'risk-H',Medium:'risk-M',Low:'risk-L'}[v.riskLevel]||'risk-L';
    const adhC = {Good:'#059669',Fair:'#D97706',Poor:'#DC2626'}[v.adherence?.level]||'#64748B';
    return `<tr>
      <td>${v.visitDate}</td>
      <td>${pt?.hn||''}</td>
      <td>${pt?`${pt.prefix}${pt.firstName} ${pt.lastName}`:''}</td>
      <td>${pt?.diagnosis||''}</td>
      <td style="text-align:center">${v.exacerbation?.countThisYear??0}${v.exacerbation?.hospitalized?' 🏥':''}</td>
      <td style="text-align:center;color:${adhC};font-weight:600">${v.adherence?.level||'—'}</td>
      <td style="text-align:center">${(v.inhalerTechnique||[]).map(t=>t.overallScore).join(', ')||'—'}</td>
      <td style="text-align:center" class="${rc}">${v.riskLevel||'—'}</td>
      <td>${v.pharmacist||''}</td>
    </tr>`;
  }).join('');

  const html = `
    <h1>รายงานสรุปคลินิก COPD/Asthma</h1>
    <div class="meta">ประจำเดือน ${label} · พิมพ์วันที่ ${new Date().toLocaleDateString('th-TH')}</div>
    <div class="stat-row">
      <div class="stat"><div class="n">${data.patients.length}</div><div class="l">ผู้ป่วยทั้งหมด</div></div>
      <div class="stat"><div class="n" style="color:#DC2626">${hR}</div><div class="l">High Risk</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${mR}</div><div class="l">Medium Risk</div></div>
      <div class="stat"><div class="n" style="color:#059669">${lR}</div><div class="l">Low Risk</div></div>
      <div class="stat"><div class="n">${mVis.length}</div><div class="l">บันทึกเดือนนี้</div></div>
    </div>
    <div class="stat-row" style="margin-bottom:20px">
      <div class="stat"><div class="n" style="color:#DC2626">${exTotal}</div><div class="l">Exacerbation รวม</div></div>
      <div class="stat"><div class="n" style="color:#DC2626">${hospC}</div><div class="l">นอน รพ.</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${poorAdh}</div><div class="l">Adherence ต่ำ</div></div>
      <div class="stat"><div class="n" style="color:#D97706">${poorTch}</div><div class="l">เทคนิคพ่นยาไม่ดี</div></div>
      <div class="stat"><div class="n" style="color:#059669">${tRate}%</div><div class="l">Tele สำเร็จ (${tSucc}/${tTotal})</div></div>
    </div>
    <h2>รายการบันทึกเดือน ${label} (${mVis.length} ครั้ง)</h2>
    <table>
      <thead><tr>
        <th>วันที่</th><th>HN</th><th>ชื่อ-นามสกุล</th><th>การวินิจฉัย</th>
        <th style="text-align:center">Exacerbation</th><th style="text-align:center">Adherence</th>
        <th style="text-align:center">เทคนิคยาพ่น</th><th style="text-align:center">Risk</th><th>เภสัชกร</th>
